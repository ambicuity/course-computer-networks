name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages and authenticate the deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate site/data.js from README + ROADMAP
        run: node site/build.js

      - name: Ensure custom-domain CNAME is in the published output
        run: echo "course-computer-networks.riteshrana.engineer" > site/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
