<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#FFF7EC"/>
  <style>
    .ink { fill: #2A1A2E; font-family: monospace; font-size: 11px; }
    .accent { fill: #E2557A; font-family: monospace; font-size: 11px; font-weight: bold; }
    .box { fill: #FFFFFF; stroke: #2A1A2E; stroke-width: 1.5; }
    .box-accent { fill: #FFFFFF; stroke: #E2557A; stroke-width: 2; }
    .line { stroke: #2A1A2E; stroke-width: 1.5; }
    .line-accent { stroke: #E2557A; stroke-width: 2; }
    .line-dash { stroke: #2A1A2E; stroke-width: 1.5; stroke-dasharray: 4 3; }
    .label { fill: #2A1A2E; font-family: monospace; font-size: 10px; }
  </style>

  <text x="400" y="25" class="accent" text-anchor="middle" font-size="14">RPKI ORIGIN VALIDATION + RFC 9234 LEAK DETECTION</text>

  <!-- RIR trust anchors -->
  <rect x="20" y="60" width="120" height="50" class="box"/>
  <text x="80" y="80" class="ink" text-anchor="middle">ARIN trust anchor</text>
  <text x="80" y="95" class="label" text-anchor="middle">root CA</text>

  <rect x="20" y="130" width="120" height="50" class="box"/>
  <text x="80" y="150" class="ink" text-anchor="middle">RIPE trust anchor</text>
  <text x="80" y="165" class="label" text-anchor="middle">root CA</text>

  <!-- Repository -->
  <rect x="180" y="100" width="140" height="60" class="box"/>
  <text x="250" y="120" class="ink" text-anchor="middle">RPKI Repository</text>
  <text x="250" y="135" class="label" text-anchor="middle">/root/ manifest</text>
  <text x="250" y="148" class="label" text-anchor="middle">ROA cert + ROA obj</text>

  <line x1="140" y1="85" x2="180" y2="115" class="line"/>
  <line x1="140" y1="155" x2="180" y2="145" class="line"/>

  <!-- Validator (Routinator) -->
  <rect x="360" y="100" width="160" height="80" class="box-accent"/>
  <text x="440" y="120" class="accent" text-anchor="middle">Routinator</text>
  <text x="440" y="135" class="label" text-anchor="middle">RPKI validator</text>
  <text x="440" y="150" class="label" text-anchor="middle">RFC 8210 server</text>
  <text x="440" y="163" class="label" text-anchor="middle">:3323 rpki</text>
  <text x="440" y="175" class="label" text-anchor="middle">refresh: 60s</text>

  <line x1="320" y1="130" x2="360" y2="135" class="line"/>
  <text x="340" y="125" class="label" text-anchor="middle">rsync</text>

  <!-- VRP table -->
  <rect x="560" y="100" width="220" height="80" class="box"/>
  <text x="670" y="120" class="accent" text-anchor="middle">VRP TABLE</text>
  <text x="670" y="135" class="label" text-anchor="middle">198.51.100.0/24  AS65020  max /24</text>
  <text x="670" y="148" class="label" text-anchor="middle">203.0.113.0/24    AS65020  max /24</text>
  <text x="670" y="161" class="label" text-anchor="middle">+ manifest signature verified</text>
  <text x="670" y="174" class="label" text-anchor="middle">last refresh: 2026-01-01 12:00 UTC</text>

  <line x1="520" y1="140" x2="560" y2="140" class="line"/>
  <text x="540" y="135" class="label" text-anchor="middle">VRP</text>

  <!-- BGP speakers -->
  <rect x="100" y="240" width="130" height="60" class="box"/>
  <text x="165" y="260" class="ink" text-anchor="middle">Edge-A</text>
  <text x="165" y="275" class="label" text-anchor="middle">Cisco N9300</text>
  <text x="165" y="290" class="label" text-anchor="middle">rpki: 10.0.0.1</text>

  <rect x="280" y="240" width="130" height="60" class="box"/>
  <text x="345" y="260" class="ink" text-anchor="middle">Edge-B</text>
  <text x="345" y="275" class="label" text-anchor="middle">Juniper MX204</text>
  <text x="345" y="290" class="label" text-anchor="middle">rpki: 10.0.0.1</text>

  <rect x="460" y="240" width="130" height="60" class="box"/>
  <text x="525" y="260" class="ink" text-anchor="middle">Edge-C</text>
  <text x="525" y="275" class="label" class="label" text-anchor="middle">FRR 8.x</text>
  <text x="525" y="290" class="label" text-anchor="middle">rpki: 10.0.0.1</text>

  <line x1="440" y1="180" x2="165" y2="240" class="line-dash"/>
  <line x1="440" y1="180" x2="345" y2="240" class="line-dash"/>
  <line x1="440" y1="180" x2="525" y2="240" class="line-dash"/>
  <text x="320" y="215" class="label" text-anchor="middle">RFC 8210 (RPKI-Router)</text>

  <!-- Result matrix -->
  <rect x="40" y="340" width="720" height="100" class="box"/>
  <text x="400" y="358" class="accent" text-anchor="middle">BGP BEST-PATH EXTENSION - VALIDATION STATES</text>
  <text x="60" y="380" class="label">198.51.100.0/24 via AS65020  path=[64600 65020]  state=Valid   action=accept</text>
  <text x="60" y="395" class="label">198.51.100.0/24 via AS65999  path=[64500 65999]  state=Invalid action=DROP</text>
  <text x="60" y="410" class="label">198.51.100.0/24 via AS65020  path=[64500 64600 64900 65020]  state=Valid   leak=Rule1 (provider hop)</text>
  <text x="60" y="425" class="label">203.0.113.0/24  via AS65020  path=[64600 65020]  state=Valid   action=accept</text>

  <!-- Legend -->
  <rect x="40" y="450" width="720" height="40" class="box"/>
  <text x="50" y="465" class="accent">LEGEND</text>
  <line x1="50" y1="478" x2="90" y2="478" class="line"/>
  <text x="100" y="481" class="label">Validated control plane path</text>
  <line x1="280" y1="478" x2="320" y2="478" class="line-dash"/>
  <text x="330" y="481" class="label">RPKI-to-router data session</text>
  <rect x="540" y="470" width="14" height="14" class="box-accent"/>
  <text x="560" y="481" class="label">RPKI validator</text>
</svg>
