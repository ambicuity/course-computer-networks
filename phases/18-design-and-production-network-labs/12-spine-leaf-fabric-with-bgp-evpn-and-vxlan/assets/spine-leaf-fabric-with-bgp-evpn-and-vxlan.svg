<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#FFF7EC"/>
  <style>
    .ink { fill: #2A1A2E; font-family: monospace; font-size: 11px; }
    .accent { fill: #E2557A; font-family: monospace; font-size: 11px; font-weight: bold; }
    .box { fill: #FFFFFF; stroke: #2A1A2E; stroke-width: 1.5; }
    .box-accent { fill: #FFFFFF; stroke: #E2557A; stroke-width: 2; }
    .line { stroke: #2A1A2E; stroke-width: 1; }
    .line-accent { stroke: #E2557A; stroke-width: 1.5; }
    .label { fill: #2A1A2E; font-family: monospace; font-size: 9px; }
  </style>

  <text x="400" y="20" class="accent" text-anchor="middle" font-size="14">SPINE-LEAF FABRIC - 8 SPINES x 32 LEAVES - BGP EVPN VXLAN</text>

  <!-- Spines (8) -->
  <text x="400" y="50" class="ink" text-anchor="middle">SPINE LAYER (8 x Cisco N9336C-FX2, 100G)</text>
  for i = 1..8 (approximated as 4 visible)
  <rect x="80"  y="55" width="100" height="35" class="box"/>
  <text x="130" y="78" class="ink" text-anchor="middle">spine-1</text>
  <rect x="220" y="55" width="100" height="35" class="box"/>
  <text x="270" y="78" class="ink" text-anchor="middle">spine-2</text>
  <rect x="360" y="55" width="100" height="35" class="box"/>
  <text x="410" y="78" class="ink" text-anchor="middle">spine-3</text>
  <rect x="500" y="55" width="100" height="35" class="box"/>
  <text x="550" y="78" class="ink" text-anchor="middle">spine-4</text>
  <rect x="640" y="55" width="100" height="35" class="box"/>
  <text x="690" y="78" class="ink" text-anchor="middle">...</text>

  <!-- Leaves (4 of 32 shown) -->
  <text x="400" y="170" class="ink" text-anchor="middle">LEAF LAYER (32 x Cisco N9348GC-FX4, 100G uplinks)</text>
  <rect x="60"  y="180" width="120" height="50" class="box-accent"/>
  <text x="120" y="200" class="accent" text-anchor="middle">leaf-01</text>
  <text x="120" y="215" class="label" text-anchor="middle">VTEP 10.255.0.1</text>
  <text x="120" y="226" class="label" text-anchor="middle">lo0 10.254.0.1</text>

  <rect x="240" y="180" width="120" height="50" class="box"/>
  <text x="300" y="200" class="ink" text-anchor="middle">leaf-02</text>
  <text x="300" y="215" class="label" text-anchor="middle">VTEP 10.255.0.2</text>
  <text x="300" y="226" class="label" text-anchor="middle">lo0 10.254.0.2</text>

  <rect x="420" y="180" width="120" height="50" class="box"/>
  <text x="480" y="200" class="ink" text-anchor="middle">leaf-03</text>
  <text x="480" y="215" class="label" text-anchor="middle">VTEP 10.255.0.3</text>
  <text x="480" y="226" class="label" text-anchor="middle">lo0 10.254.0.3</text>

  <rect x="600" y="180" width="120" height="50" class="box"/>
  <text x="660" y="200" class="ink" text-anchor="middle">leaf-04</text>
  <text x="660" y="215" class="label" text-anchor="middle">VTEP 10.255.0.4</text>
  <text x="660" y="226" class="label" text-anchor="middle">lo0 10.254.0.4</text>

  <!-- Servers -->
  <text x="400" y="290" class="ink" text-anchor="middle">SERVERS (80 per leaf, 25G, total 2560)</text>
  <rect x="40"  y="300" width="160" height="40" class="box"/>
  <text x="120" y="320" class="ink" text-anchor="middle">80 servers, 25G each</text>
  <text x="120" y="332" class="label" text-anchor="middle">anycast gw 172.16.1.1</text>

  <rect x="220" y="300" width="160" height="40" class="box"/>
  <text x="300" y="320" class="ink" text-anchor="middle">80 servers, 25G each</text>
  <text x="300" y="332" class="label" text-anchor="middle">anycast gw 172.16.2.1</text>

  <rect x="400" y="300" width="160" height="40" class="box"/>
  <text x="480" y="320" class="ink" text-anchor="middle">80 servers, 25G each</text>
  <text x="480" y="332" class="label" text-anchor="middle">anycast gw 172.16.3.1</text>

  <rect x="580" y="300" width="160" height="40" class="box"/>
  <text x="660" y="320" class="ink" text-anchor="middle">80 servers, 25G each</text>
  <text x="660" y="332" class="label" text-anchor="middle">anycast gw 172.16.4.1</text>

  <!-- Connections leaf to spines (ECMP) -->
  <line x1="120" y1="180" x2="130" y2="90" class="line"/>
  <line x1="120" y1="180" x2="270" y2="90" class="line"/>
  <line x1="120" y1="180" x2="410" y2="90" class="line"/>
  <line x1="120" y1="180" x2="550" y2="90" class="line"/>
  <line x1="300" y1="180" x2="130" y2="90" class="line"/>
  <line x1="300" y1="180" x2="270" y2="90" class="line"/>
  <line x1="300" y1="180" x2="410" y2="90" class="line"/>
  <line x1="300" y1="180" x2="550" y2="90" class="line"/>
  <line x1="480" y1="180" x2="130" y2="90" class="line"/>
  <line x1="480" y1="180" x2="270" y2="90" class="line"/>
  <line x1="480" y1="180" x2="410" y2="90" class="line"/>
  <line x1="480" y1="180" x2="550" y2="90" class="line"/>
  <line x1="660" y1="180" x2="130" y2="90" class="line"/>
  <line x1="660" y1="180" x2="270" y2="90" class="line"/>
  <line x1="660" y1="180" x2="410" y2="90" class="line"/>
  <line x1="660" y1="180" x2="550" y2="90" class="line"/>

  <!-- Server uplinks -->
  <line x1="120" y1="230" x2="120" y2="300" class="line-accent"/>
  <line x1="300" y1="230" x2="300" y2="300" class="line-accent"/>
  <line x1="480" y1="230" x2="480" y2="300" class="line-accent"/>
  <line x1="660" y1="230" x2="660" y2="300" class="line-accent"/>

  <!-- Legend -->
  <rect x="20" y="380" width="760" height="100" class="box"/>
  <text x="400" y="400" class="accent" text-anchor="middle">FABRIC PROPERTIES</text>
  <text x="40" y="420" class="label">- 8 spines x 32 leaves, every leaf one hop from every leaf (ECMP across all spines)</text>
  <text x="40" y="435" class="label">- Fabric capacity: 8 * 32 * 100G = 25.6 Tbps;  oversubscription 2.5:1 (target 4:1 met)</text>
  <text x="40" y="450" class="label">- VXLAN overlay with 24-bit VNI, 16M logical networks;  MTU 1550 on every underlay link</text>
  <text x="40" y="465" class="label">- BGP EVPN control plane: Type 2 (MAC/IP), Type 3 (BUM), Type 5 (L3 prefix);  2 RRs reduce sessions 99.9%</text>
</svg>
