# NGINX OCSP stapling — add to your server { } block
# Verify with: openssl s_client -connect compliance-vault.example.com:443 -status

server {
    listen 443 ssl http2;
    server_name compliance-vault.example.com;

    ssl_certificate     /etc/letsencrypt/live/compliance-vault.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/compliance-vault.example.com/privkey.pem;

    # Chain for staple verification (intermediates only, not the leaf)
    ssl_trusted_certificate /etc/letsencrypt/live/compliance-vault.example.com/chain.pem;

    # OCSP stapling — server fetches + caches the signed OCSP response
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Resolver used to contact the OCSP responder
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # TLS hardening
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
}
