# Prometheus blackbox_exporter — TLS expiry monitoring
# Place in /etc/prometheus/blackbox.yml

modules:
  tls_expiry:
    prober: tcp
    timeout: 10s
    tcp:
      tls: true
      tls_config:
        insecure_skip_verify: false

