<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" width="760" height="500">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#2A1A2E"/></marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#E2557A"/></marker>
  </defs>
  <rect width="760" height="500" fill="#FFF7EC"/>
  <text x="30" y="32" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#2A1A2E">NetFlow / IPFIX Export Topology</text>
  <text x="30" y="50" font-family="Inter,sans-serif" font-size="11" fill="#2A1A2E">UDP/4739: exporter streams templates + data to collector (RFC 7011)</text>

  <g font-family="Inter,sans-serif" font-size="12" fill="#2A1A2E">
    <rect x="30" y="70" width="110" height="50" rx="6" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="40" y="88" font-weight="700">h1</text>
    <text x="40" y="103" font-size="11">10.10.1.2/30</text>

    <rect x="220" y="70" width="170" height="150" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
    <text x="230" y="88" font-weight="700">exporter (router)</text>
    <text x="230" y="106" font-size="11">ip_forward=1</text>
    <text x="230" y="120" font-size="11">veth-e-1 10.10.1.1/30</text>
    <text x="230" y="134" font-size="11">veth-e-2 10.10.2.1/30</text>
    <text x="230" y="148" font-size="11">veth-e-c 10.10.0.2/30</text>
    <text x="230" y="170" font-size="11" font-weight="700" fill="#E2557A">flow record emitter</text>
    <text x="230" y="184" font-size="11">samplerate=1  (RFC 5475)</text>
    <text x="230" y="198" font-size="11">template_id=256 obs=42</text>
    <text x="230" y="214" font-size="11" font-weight="700">nfacctd exporter</text>

    <rect x="30" y="170" width="110" height="50" rx="6" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="40" y="188" font-weight="700">h2</text>
    <text x="40" y="203" font-size="11">10.10.2.2/30</text>

    <rect x="500" y="70" width="190" height="150" rx="8" fill="#FDE6EC" stroke="#E2557A" stroke-width="2"/>
    <text x="510" y="88" font-weight="700" fill="#E2557A">collector</text>
    <text x="510" y="106" font-size="11">veth-c-e 10.10.0.1/30</text>
    <text x="510" y="120" font-size="11">UDP/4739 listener</text>
    <text x="510" y="134" font-size="11">nfcapd (nfdump)</text>
    <text x="510" y="148" font-size="11">rotate every 300s</text>
    <text x="510" y="166" font-size="11">/var/netflow/data/*.nfcap</text>
    <text x="510" y="186" font-size="11" font-weight="700">queries:</text>
    <text x="510" y="200" font-size="11">nfdump -R /var/netflow/data</text>
    <text x="510" y="214" font-size="11">nfdump -s dst/bytes</text>
  </g>

  <line x1="140" y1="95" x2="220" y2="95" stroke="#2A1A2E" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="148" y="86" font-family="Inter,sans-serif" font-size="10" fill="#2A1A2E">veth-e-1</text>
  <line x1="220" y1="195" x2="140" y2="195" stroke="#2A1A2E" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="148" y="215" font-family="Inter,sans-serif" font-size="10" fill="#2A1A2E">veth-e-2</text>
  <line x1="390" y1="120" x2="500" y2="120" stroke="#E2557A" stroke-width="2.5" marker-end="url(#arrB)"/>
  <text x="398" y="110" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#E2557A">UDP/4739 IPFIX</text>
  <text x="398" y="136" font-family="Inter,sans-serif" font-size="10" fill="#2A1A2E">veth-e-c / veth-c-e</text>

  <text x="30" y="266" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#E2557A">IPFIX MESSAGE HEADER (16 B, RFC 7011 §10)</text>
  <g font-family="monospace" font-size="10" fill="#2A1A2E">
    <rect x="30" y="278" width="60" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="36" y="298">ver=10</text>
    <rect x="90" y="278" width="60" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="96" y="298">length</text>
    <rect x="150" y="278" width="80" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="156" y="298">export_time</text>
    <rect x="230" y="278" width="60" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="236" y="298">seq#</text>
    <rect x="290" y="278" width="100" height="30" fill="#FDE6EC" stroke="#E2557A" stroke-width="2"/>
    <text x="296" y="298" fill="#E2557A" font-weight="700">obs_domain</text>
  </g>

  <text x="30" y="334" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#E2557A">FLOWSET SEQUENCE</text>
  <g font-family="monospace" font-size="10" fill="#2A1A2E">
    <rect x="30" y="346" width="100" height="28" fill="#fff" stroke="#2A1A2E"/>
    <text x="38" y="365">FSID=2 TPL</text>
    <rect x="130" y="346" width="300" height="28" fill="#fff" stroke="#2A1A2E"/>
    <text x="138" y="365">IE8 srcIPv4 IE12 dstIPv4 IE4 proto IE7 sport</text>
    <rect x="430" y="346" width="100" height="28" fill="#fff" stroke="#2A1A2E"/>
    <text x="438" y="365">FSID=256 DATA</text>
    <rect x="530" y="346" width="180" height="28" fill="#FDE6EC" stroke="#E2557A" stroke-width="2"/>
    <text x="538" y="365" fill="#E2557A" font-weight="700">record 1, record 2, ...</text>
  </g>

  <text x="30" y="402" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#E2557A">KEY IANA INFORMATION ELEMENTS (RFC 7012)</text>
  <g font-family="monospace" font-size="11" fill="#2A1A2E">
    <text x="30" y="424">IE 1  octetDeltaCount</text>
    <text x="190" y="424">IE 4  protocolIdentifier</text>
    <text x="360" y="424">IE 8  srcIPv4Address</text>
    <text x="510" y="424">IE 152 flowStartSysUpTime</text>
    <text x="30" y="444">IE 2  packetDeltaCount</text>
    <text x="190" y="444">IE 5  classOfServiceIPv4 (DSCP)</text>
    <text x="360" y="444">IE 12 dstIPv4Address</text>
    <text x="510" y="444">IE 153 flowEndSysUpTime</text>
  </g>
  <text x="30" y="478" font-family="Inter,sans-serif" font-size="10" fill="#2A1A2E">Templates refresh every ~5 min; collector buffers out-of-order records by sequence number.</text>
</svg>