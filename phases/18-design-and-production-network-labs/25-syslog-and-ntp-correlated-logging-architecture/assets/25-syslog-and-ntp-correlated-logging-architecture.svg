<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#2A1A2E"/></marker>
    <marker id="arrE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#E2557A"/></marker>
  </defs>
  <rect width="820" height="560" fill="#FFF7EC"/>
  <text x="30" y="34" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#2A1A2E">Syslog + NTP Correlated Logging Architecture</text>
  <text x="30" y="54" font-family="Inter,sans-serif" font-size="12" fill="#2A1A2E">RFC 5424 over TCP/601 (TLS) + chrony stratum-1 sync for sub-ms skew</text>

  <g font-family="Inter,sans-serif" font-size="12" fill="#2A1A2E">
    <rect x="30" y="80" width="190" height="170" rx="8" fill="#FDE6EC" stroke="#E2557A" stroke-width="2"/>
    <text x="40" y="100" font-weight="700" fill="#E2557A">syslog-server</text>
    <text x="40" y="118" font-size="11">10.60.0.1</text>
    <text x="40" y="138" font-size="11" font-weight="700" fill="#E2557A">rsyslogd (TCP/601)</text>
    <text x="40" y="156" font-size="11">chronyd  stratum 1</text>
    <text x="40" y="174" font-size="11">local stratum 1</text>
    <text x="40" y="192" font-size="11">allow 10.60.0.0/24</text>
    <text x="40" y="210" font-size="11">makestep 1.0 3</text>
    <text x="40" y="232" font-size="11">/var/log/remote.log</text>

    <rect x="290" y="80" width="150" height="100" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="300" y="100" font-weight="700">router1</text>
    <text x="300" y="118" font-size="11">10.60.0.10</text>
    <text x="300" y="138" font-size="11">ospfd, bgpd</text>
    <text x="300" y="156" font-size="11">chrony client</text>
    <text x="300" y="174" font-size="11">rsyslog omfwd -&gt; :601</text>

    <rect x="290" y="200" width="150" height="100" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="300" y="220" font-weight="700">router2</text>
    <text x="300" y="238" font-size="11">10.60.0.20</text>
    <text x="300" y="258" font-size="11">ospfd, bgpd</text>
    <text x="300" y="276" font-size="11">chrony client</text>
    <text x="300" y="294" font-size="11">rsyslog omfwd -&gt; :601</text>

    <rect x="510" y="80" width="150" height="100" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="520" y="100" font-weight="700">client</text>
    <text x="520" y="118" font-size="11">10.60.0.40</text>
    <text x="520" y="138" font-size="11">sshd, named</text>
    <text x="520" y="156" font-size="11">chrony client</text>
    <text x="520" y="174" font-size="11">rsyslog omfwd -&gt; :601</text>
  </g>

  <line x1="220" y1="130" x2="290" y2="120" stroke="#E2557A" stroke-width="2" marker-end="url(#arrE)"/>
  <text x="225" y="110" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#E2557A">TCP/601</text>
  <line x1="220" y1="240" x2="290" y2="245" stroke="#E2557A" stroke-width="2" marker-end="url(#arrE)"/>
  <text x="225" y="270" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#E2557A">TCP/601</text>
  <line x1="220" y1="180" x2="510" y2="120" stroke="#E2557A" stroke-width="2" marker-end="url(#arrE)"/>
  <text x="345" y="100" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#E2557A">TCP/601</text>

  <line x1="220" y1="180" x2="290" y2="200" stroke="#2A1A2E" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="180" x2="290" y2="160" stroke="#2A1A2E" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="180" x2="510" y2="160" stroke="#2A1A2E" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="350" y="175" font-family="Inter,sans-serif" font-size="10" fill="#2A1A2E">UDP/123 NTP</text>

  <text x="30" y="350" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#E2557A">RFC 5424 SYSLOG MESSAGE LAYOUT</text>
  <g font-family="monospace" font-size="10" fill="#2A1A2E">
    <rect x="30" y="362" width="50" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="36" y="381">&lt;PRI&gt;</text>
    <rect x="80" y="362" width="20" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="86" y="381">ver</text>
    <rect x="100" y="362" width="160" height="30" fill="#FDE6EC" stroke="#E2557A" stroke-width="2"/>
    <text x="106" y="381" fill="#E2557A" font-weight="700">TIMESTAMP (RFC 3339, ms)</text>
    <rect x="260" y="362" width="100" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="266" y="381">HOSTNAME</text>
    <rect x="360" y="362" width="80" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="366" y="381">APPNAME</text>
    <rect x="440" y="362" width="60" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="446" y="381">PROCID</text>
    <rect x="500" y="362" width="60" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="506" y="381">MSGID</text>
    <rect x="560" y="362" width="100" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="566" y="381">SD-elements</text>
    <rect x="660" y="362" width="120" height="30" fill="#fff" stroke="#2A1A2E"/>
    <text x="666" y="381">MESSAGE</text>
  </g>
  <text x="30" y="412" font-family="Inter,sans-serif" font-size="10" fill="#2A1A2E">PRI = facility x 8 + severity. &lt;165&gt; = facility local4 severity notice.</text>

  <text x="30" y="442" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#E2557A">CHRONY STRATUM GRAPH (RFC 5905)</text>
  <g font-family="Inter,sans-serif" font-size="11" fill="#2A1A2E">
    <rect x="30" y="454" width="120" height="28" rx="4" fill="#fff" stroke="#2A1A2E"/>
    <text x="40" y="473">stratum 0 (HW)</text>
    <text x="160" y="473" font-size="10">GPS / atomic clock</text>

    <rect x="30" y="486" width="120" height="28" rx="4" fill="#FDE6EC" stroke="#E2557A" stroke-width="2"/>
    <text x="40" y="505" font-weight="700" fill="#E2557A">stratum 1</text>
    <text x="160" y="505" font-size="10">syslog-server (local)</text>

    <rect x="30" y="518" width="120" height="28" rx="4" fill="#fff" stroke="#2A1A2E"/>
    <text x="40" y="537">stratum 2</text>
    <text x="160" y="537" font-size="10">router1, router2, client (each polls stratum 1)</text>
  </g>
</svg>