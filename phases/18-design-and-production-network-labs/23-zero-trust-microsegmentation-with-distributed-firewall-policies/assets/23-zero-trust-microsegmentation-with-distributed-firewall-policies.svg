<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#2A1A2E"/></marker>
    <marker id="arrD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#E2557A"/></marker>
  </defs>
  <rect width="820" height="560" fill="#FFF7EC"/>
  <text x="30" y="34" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#2A1A2E">Zero-Trust Microsegmentation Topology</text>
  <text x="30" y="54" font-family="Inter,sans-serif" font-size="12" fill="#2A1A2E">Per-host nftables PEPs, default-deny + conntrack stateful allow</text>

  <!-- Tier boxes -->
  <g font-family="Inter,sans-serif" font-size="11" fill="#2A1A2E">
    <rect x="40" y="80" width="170" height="150" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="50" y="100" font-weight="700" font-size="13">DMZ tier</text>
    <text x="50" y="118">edge  10.40.10.1</text>
    <text x="50" y="134">app   10.40.10.2</text>
    <text x="50" y="156" font-weight="700" fill="#E2557A">policy: allow 443 from external</text>
    <text x="50" y="172" font-size="10">nft table inet zt_filter</text>
    <text x="50" y="186" font-size="10">chain input policy drop</text>
    <text x="50" y="200" font-size="10">chain forward policy drop</text>
    <text x="50" y="218" font-size="10" fill="#E2557A">per-host PEP</text>

    <rect x="250" y="80" width="170" height="150" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="260" y="100" font-weight="700" font-size="13">App tier</text>
    <text x="260" y="118">app   10.40.20.1</text>
    <text x="260" y="138" font-weight="700" fill="#E2557A">policy: allow 5432 to data</text>
    <text x="260" y="156" font-size="10">allow ssh from mgmt only</text>
    <text x="260" y="178" font-size="10">nft: ip saddr 10.40.20.0/24</text>
    <text x="260" y="192" font-size="10">ip daddr 10.40.50.0/24 tcp</text>
    <text x="260" y="206" font-size="10">dport 5432 accept</text>

    <rect x="460" y="80" width="170" height="150" rx="8" fill="#FDE6EC" stroke="#E2557A" stroke-width="2"/>
    <text x="470" y="100" font-weight="700" font-size="13" fill="#E2557A">Data tier</text>
    <text x="470" y="118">db   10.40.50.10</text>
    <text x="470" y="138" font-weight="700" fill="#E2557A">policy: allow 5432 from app only</text>
    <text x="470" y="156" font-size="10">allow ssh from mgmt only</text>
    <text x="470" y="178" font-size="10">nft: ip saddr 10.40.20.0/24</text>
    <text x="470" y="192" font-size="10">ip daddr 10.40.50.0/24 tcp</text>
    <text x="470" y="206" font-size="10">dport 5432 accept</text>

    <rect x="660" y="80" width="140" height="150" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="670" y="100" font-weight="700" font-size="13">Mgmt tier</text>
    <text x="670" y="118">mgmt 10.40.99.5</text>
    <text x="670" y="138" font-weight="700" fill="#E2557A">admin only</text>
    <text x="670" y="156" font-size="10">SSH to all tiers</text>
    <text x="670" y="172" font-size="10">syslog feed</text>
    <text x="670" y="188" font-size="10">audit collection</text>
    <text x="670" y="208" font-size="10" fill="#E2557A">PDP / control plane</text>
  </g>

  <!-- attacker -->
  <rect x="40" y="280" width="170" height="70" rx="8" fill="#fff" stroke="#E2557A" stroke-width="2"/>
  <text x="50" y="302" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#E2557A">attacker 10.40.10.4</text>
  <text x="50" y="320" font-family="Inter,sans-serif" font-size="11" fill="#2A1A2E">untrusted host on DMZ</text>
  <text x="50" y="338" font-family="Inter,sans-serif" font-size="11" fill="#2A1A2E">runs nmap</text>

  <!-- attacker to app (blocked) -->
  <line x1="125" y1="280" x2="335" y2="230" stroke="#E2557A" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrD)"/>
  <text x="160" y="248" font-family="Inter,sans-serif" font-size="10" fill="#E2557A">attacker -&gt; db:5432 DROP+LOG</text>

  <!-- app to db (allowed) -->
  <line x1="335" y1="200" x2="545" y2="180" stroke="#2A1A2E" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="380" y="180" font-family="Inter,sans-serif" font-size="10" fill="#2A1A2E">app -&gt; db:5432 ALLOW</text>

  <!-- mgmt ssh -->
  <line x1="730" y1="200" x2="545" y2="220" stroke="#2A1A2E" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="595" y="240" font-family="Inter,sans-serif" font-size="10" fill="#2A1A2E">mgmt -&gt; db:22 ALLOW</text>

  <!-- Policy table -->
  <text x="30" y="390" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#E2557A">ALLOW POLICY (PEP rules emitted from this dict)</text>
  <g font-family="monospace" font-size="11" fill="#2A1A2E">
    <rect x="30" y="402" width="760" height="22" fill="#fff" stroke="#2A1A2E"/>
    <text x="40" y="418">dmz  -&gt; app   tcp 443   (HTTPS in)</text>

    <rect x="30" y="424" width="760" height="22" fill="#fff" stroke="#2A1A2E"/>
    <text x="40" y="440">app  -&gt; data  tcp 5432  (Postgres)</text>

    <rect x="30" y="446" width="760" height="22" fill="#fff" stroke="#2A1A2E"/>
    <text x="40" y="462">mgmt -&gt; data  tcp 22    (SSH, rate 3/min)</text>

    <rect x="30" y="468" width="760" height="22" fill="#fff" stroke="#2A1A2E"/>
    <text x="40" y="484">mgmt -&gt; dmz   tcp 22    (SSH)</text>

    <rect x="30" y="490" width="760" height="22" fill="#FDE6EC" stroke="#E2557A" stroke-width="1.5"/>
    <text x="40" y="506" fill="#E2557A" font-weight="700">DEFAULT: deny + log prefix nft-drop tier=&lt;...&gt;</text>
  </g>
  <text x="30" y="540" font-family="Inter,sans-serif" font-size="11" fill="#2A1A2E">PDP = policy dict (signed Python)  |  PEP = nftables chain on each host  |  conntrack stateful allow for established/related</text>
</svg>