<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#2A1A2E"/></marker>
    <marker id="arrE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#E2557A"/></marker>
  </defs>
  <rect width="820" height="560" fill="#FFF7EC"/>
  <text x="30" y="34" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#2A1A2E">DSCP Marking + LLQ QoS Topology</text>
  <text x="30" y="54" font-family="Inter,sans-serif" font-size="12" fill="#2A1A2E">Voice (DSCP 46 EF) into priority queue with 33% ceil; bulk into BE</text>

  <g font-family="Inter,sans-serif" font-size="12" fill="#2A1A2E">
    <rect x="30" y="80" width="130" height="70" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="40" y="100" font-weight="700">phone</text>
    <text x="40" y="118" font-size="11">10.50.0.1</text>
    <text x="40" y="135" font-size="11">RTP UDP 5004</text>
    <text x="40" y="151" font-size="11" fill="#E2557A">mark DSCP 46</text>

    <rect x="240" y="80" width="220" height="180" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
    <text x="250" y="100" font-weight="700">router</text>
    <text x="250" y="118" font-size="11">10.50.0.2 / 10.50.1.1</text>
    <text x="250" y="136" font-size="11">ip_forward=1</text>
    <text x="250" y="154" font-size="11" font-weight="700" fill="#E2557A">LLQ configuration</text>
    <text x="250" y="170" font-size="10">tc qdisc root prio bands 4</text>
    <text x="250" y="184" font-size="10">tc qdisc parent 1:1 htb</text>
    <text x="250" y="198" font-size="10">class 10:10 EF  33mbit/33mbit</text>
    <text x="250" y="212" font-size="10">class 10:20 AF41 33mbit/100mbit</text>
    <text x="250" y="226" font-size="10">class 10:30 BE  33mbit/100mbit</text>
    <text x="250" y="244" font-size="10">filter tos 0xb8 -&gt; 10:10</text>
    <text x="250" y="256" font-size="10">filter tos 0x88 -&gt; 10:20</text>

    <rect x="540" y="80" width="130" height="70" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="550" y="100" font-weight="700">gateway</text>
    <text x="550" y="118" font-size="11">10.50.1.2</text>
    <text x="550" y="135" font-size="11">iperf3 server</text>
    <text x="550" y="151" font-size="11">tcpdump verify</text>
  </g>

  <line x1="160" y1="115" x2="240" y2="115" stroke="#2A1A2E" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="170" y="106" font-family="Inter,sans-serif" font-size="10" fill="#2A1A2E">veth-p-r</text>
  <line x1="460" y1="115" x2="540" y2="115" stroke="#2A1A2E" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="470" y="106" font-family="Inter,sans-serif" font-size="10" fill="#2A1A2E">veth-r-g 100Mbps</text>

  <!-- TOS byte layout -->
  <text x="30" y="298" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#E2557A">IP ToS byte (RFC 791 + RFC 2474 + RFC 3168)</text>
  <g font-family="monospace" font-size="11" fill="#2A1A2E">
    <rect x="30" y="310" width="180" height="32" fill="#FDE6EC" stroke="#E2557A" stroke-width="2"/>
    <text x="40" y="330" fill="#E2557A" font-weight="700">DSCP 6 bits (class)</text>
    <rect x="210" y="310" width="60" height="32" fill="#fff" stroke="#2A1A2E"/>
    <text x="220" y="330">CU/ECN 2 bits</text>
    <rect x="270" y="310" width="180" height="32" fill="#fff" stroke="#2A1A2E"/>
    <text x="280" y="330">101110 = EF (46)</text>
    <rect x="450" y="310" width="120" height="32" fill="#fff" stroke="#2A1A2E"/>
    <text x="460" y="330">00 = no ECN</text>
    <rect x="570" y="310" width="80" height="32" fill="#fff" stroke="#2A1A2E"/>
    <text x="580" y="330">ToS 0xb8</text>
  </g>

  <!-- Queue hierarchy -->
  <text x="30" y="378" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#E2557A">LLQ queueing hierarchy on egress</text>
  <g font-family="Inter,sans-serif" font-size="11" fill="#2A1A2E">
    <rect x="30" y="390" width="120" height="30" rx="4" fill="#FDE6EC" stroke="#E2557A" stroke-width="2"/>
    <text x="40" y="410" font-weight="700" fill="#E2557A">band 0 priority</text>
    <text x="160" y="410" font-size="10">EF + CS7  (33mbit ceil)</text>

    <rect x="30" y="424" width="120" height="30" rx="4" fill="#fff" stroke="#2A1A2E"/>
    <text x="40" y="444">band 1</text>
    <text x="160" y="444" font-size="10">CS6 (routing)</text>

    <rect x="30" y="458" width="120" height="30" rx="4" fill="#fff" stroke="#2A1A2E"/>
    <text x="40" y="478">band 2 WFQ</text>
    <text x="160" y="478" font-size="10">AF11..AF43 (video)</text>

    <rect x="30" y="492" width="120" height="30" rx="4" fill="#fff" stroke="#2A1A2E"/>
    <text x="40" y="512">band 3</text>
    <text x="160" y="512" font-size="10">BE (bulk / tail drop)</text>
  </g>

  <!-- Voice path -->
  <line x1="160" y1="170" x2="540" y2="200" stroke="#E2557A" stroke-width="2.5" marker-end="url(#arrE)"/>
  <text x="240" y="195" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#E2557A">voice flow 8Mbps  tos=0xb8</text>

  <!-- Verification commands -->
  <text x="450" y="378" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#E2557A">Verification commands</text>
  <g font-family="monospace" font-size="11" fill="#2A1A2E">
    <rect x="450" y="390" width="340" height="22" fill="#fff" stroke="#2A1A2E"/>
    <text x="458" y="406">tcpdump -i veth-r-g -v 'udp port 5004' | grep tos</text>
    <rect x="450" y="416" width="340" height="22" fill="#fff" stroke="#2A1A2E"/>
    <text x="458" y="432">iperf3 -c 10.50.1.2 -u -b 8M -l 200 -t 30</text>
    <rect x="450" y="442" width="340" height="22" fill="#fff" stroke="#2A1A2E"/>
    <text x="458" y="458">iperf3 -c 10.50.1.2 -u -b 90M -t 30   (bulk)</text>
    <rect x="450" y="468" width="340" height="22" fill="#fff" stroke="#2A1A2E"/>
    <text x="458" y="484">tc -s qdisc show dev veth-r-g</text>
    <rect x="450" y="494" width="340" height="22" fill="#fff" stroke="#2A1A2E"/>
    <text x="458" y="510">iptables -t mangle -L -nv  (mark hit count)</text>
  </g>
</svg>