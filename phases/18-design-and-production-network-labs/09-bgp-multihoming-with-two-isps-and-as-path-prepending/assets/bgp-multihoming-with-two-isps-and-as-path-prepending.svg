<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#FFF7EC"/>
  <style>
    .ink { fill: #2A1A2E; font-family: monospace; font-size: 11px; }
    .accent { fill: #E2557A; font-family: monospace; font-size: 11px; font-weight: bold; }
    .box { fill: #FFFFFF; stroke: #2A1A2E; stroke-width: 1.5; }
    .box-accent { fill: #FFFFFF; stroke: #E2557A; stroke-width: 2; }
    .line { stroke: #2A1A2E; stroke-width: 1.5; }
    .line-accent { stroke: #E2557A; stroke-width: 2; }
    .line-dash { stroke: #2A1A2E; stroke-width: 1.5; stroke-dasharray: 4 3; }
    .label { fill: #2A1A2E; font-family: monospace; font-size: 10px; }
    .legend-bg { fill: #FFFFFF; stroke: #2A1A2E; stroke-width: 1; }
  </style>

  <!-- Title -->
  <text x="400" y="25" class="accent" text-anchor="middle" font-size="14">BGP MULTIHOMING - CASCADE CLOUD AS65001</text>

  <!-- Customer AS cloud -->
  <rect x="120" y="170" width="200" height="160" rx="8" class="box-accent"/>
  <text x="220" y="195" class="accent" text-anchor="middle">AS65001 Cascade Cloud</text>

  <!-- CE-A router -->
  <rect x="140" y="210" width="70" height="50" rx="4" class="box"/>
  <text x="175" y="230" class="ink" text-anchor="middle">CE-A</text>
  <text x="175" y="245" class="label" text-anchor="middle">Cisco N9300</text>
  <text x="175" y="256" class="label" text-anchor="middle">VRF transit-A</text>

  <!-- CE-B router -->
  <rect x="230" y="210" width="70" height="50" rx="4" class="box"/>
  <text x="265" y="230" class="ink" text-anchor="middle">CE-B</text>
  <text x="265" y="245" class="label" text-anchor="middle">Cisco N9300</text>
  <text x="265" y="256" class="label" text-anchor="middle">VRF transit-B</text>

  <!-- iBGP between CE-A and CE-B -->
  <line x1="210" y1="235" x2="230" y2="235" class="line"/>
  <text x="220" y="230" class="label" text-anchor="middle">iBGP</text>

  <!-- Prefix labels -->
  <text x="220" y="285" class="ink" text-anchor="middle">advertises:</text>
  <text x="220" y="298" class="label" text-anchor="middle">198.51.100.0/24</text>
  <text x="220" y="310" class="label" text-anchor="middle">203.0.113.0/24</text>

  <!-- WestLink AS64500 (primary) -->
  <rect x="430" y="100" width="220" height="80" rx="8" class="box"/>
  <text x="540" y="125" class="accent" text-anchor="middle">AS64500 WestLink Telecom</text>
  <text x="540" y="145" class="ink" text-anchor="middle">PRIMARY (70% inbound)</text>
  <text x="540" y="160" class="label" text-anchor="middle">peer: 198.51.100.1</text>
  <text x="540" y="172" class="label" text-anchor="middle">AS_PATH: 65001 (no prepend)</text>

  <!-- Link CE-A to WestLink -->
  <line x1="210" y1="210" x2="430" y2="140" class="line"/>
  <text x="320" y="160" class="label" text-anchor="middle">eBGP 10G</text>
  <text x="320" y="172" class="label" text-anchor="middle">BFD 50msx3</text>

  <!-- NorthCoast AS64600 (backup) -->
  <rect x="430" y="320" width="220" height="80" rx="8" class="box"/>
  <text x="540" y="345" class="accent" text-anchor="middle">AS64600 NorthCoast Networks</text>
  <text x="540" y="365" class="ink" text-anchor="middle">BACKUP (30% inbound)</text>
  <text x="540" y="380" class="label" text-anchor="middle">peer: 203.0.113.1</text>
  <text x="540" y="392" class="label" text-anchor="middle">AS_PATH: 65001 65001 65001 (3x prepend)</text>

  <!-- Link CE-B to NorthCoast -->
  <line x1="265" y1="260" x2="430" y2="360" class="line-dash"/>
  <text x="350" y="335" class="label" text-anchor="middle">eBGP 10G</text>
  <text x="350" y="347" class="label" text-anchor="middle">BFD 50msx3</text>

  <!-- RPKI ROA -->
  <rect x="60" y="60" width="180" height="70" rx="6" class="box"/>
  <text x="150" y="80" class="accent" text-anchor="middle">RPKI ROA</text>
  <text x="150" y="95" class="label" text-anchor="middle">198.51.100.0/24</text>
  <text x="150" y="107" class="label" text-anchor="middle">  AS65001 max /24</text>
  <text x="150" y="120" class="label" text-anchor="middle">203.0.113.0/24 AS65001</text>

  <line x1="150" y1="130" x2="220" y2="170" class="line"/>

  <!-- Prefix-list / route-map filter -->
  <rect x="320" y="200" width="100" height="70" rx="4" class="box"/>
  <text x="370" y="220" class="ink" text-anchor="middle">prefix-list</text>
  <text x="370" y="235" class="label" text-anchor="middle">CASCADE-OUT</text>
  <text x="370" y="250" class="label" text-anchor="middle">permit /24</text>
  <text x="370" y="262" class="label" text-anchor="middle">deny any</text>

  <!-- Global table / looking glass -->
  <rect x="500" y="220" width="220" height="60" rx="6" class="box"/>
  <text x="610" y="240" class="accent" text-anchor="middle">GLOBAL BGP TABLE</text>
  <text x="610" y="255" class="label" text-anchor="middle">/24 visible via AS64500 (1 hop)</text>
  <text x="610" y="270" class="label" text-anchor="middle">/24 visible via AS64600 (3 hops)</text>

  <line x1="540" y1="180" x2="610" y2="220" class="line"/>
  <line x1="540" y1="320" x2="610" y2="280" class="line-dash"/>

  <!-- Legend -->
  <rect x="40" y="420" width="720" height="65" class="legend-bg"/>
  <text x="50" y="438" class="accent">LEGEND</text>
  <line x1="50" y1="455" x2="90" y2="455" class="line"/>
  <text x="100" y="458" class="label">eBGP session (solid: primary)</text>
  <line x1="280" y1="455" x2="320" y2="455" class="line-dash"/>
  <text x="330" y="458" class="label">eBGP session (dashed: backup with prepend)</text>
  <rect x="540" y="448" width="14" height="14" class="box"/>
  <text x="560" y="458" class="label">Router/Network</text>
  <rect x="660" y="448" width="14" height="14" class="box-accent"/>
  <text x="680" y="458" class="label">Customer AS</text>

  <text x="50" y="475" class="label">Convergence: BFD 150ms + BGP best-path 100ms + FIB 50ms = 300ms total. RPKI ROA protects against prefix hijack.</text>
</svg>
