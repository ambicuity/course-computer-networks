<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="1000" height="700" fill="#FFF7EC"/>
  <rect x="20" y="20" width="960" height="660" fill="none" stroke="#2A1A2E" stroke-width="2" rx="12"/>

  <text x="40" y="58" font-size="22" font-weight="700" fill="#2A1A2E">Network Monitoring &amp; Alerting Pipeline</text>
  <text x="40" y="82" font-size="13" fill="#2A1A2E">SNMPv3 + gNMI streaming telemetry → Prometheus → Alertmanager → PagerDuty · SLO + burn-rate alerts</text>

  <!-- Devices layer -->
  <rect x="40" y="120" width="180" height="60" fill="#FFD6BC" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="130" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Routers / Switches</text>
  <text x="130" y="163" text-anchor="middle" font-size="10" fill="#2A1A2E">SNMPv3 + gNMI</text>

  <rect x="240" y="120" width="180" height="60" fill="#FFD6BC" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="330" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Firewalls</text>
  <text x="330" y="163" text-anchor="middle" font-size="10" fill="#2A1A2E">Syslog + SNMP</text>

  <rect x="440" y="120" width="180" height="60" fill="#FFD6BC" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="530" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Servers</text>
  <text x="530" y="163" text-anchor="middle" font-size="10" fill="#2A1A2E">node-exporter</text>

  <rect x="640" y="120" width="180" height="60" fill="#FFD6BC" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="730" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Cloud (AWS/GCP)</text>
  <text x="730" y="163" text-anchor="middle" font-size="10" fill="#2A1A2E">CloudWatch / Cloud Mon</text>

  <rect x="840" y="120" width="120" height="60" fill="#FFD6BC" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="900" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Synthetic</text>
  <text x="900" y="163" text-anchor="middle" font-size="10" fill="#2A1A2E">Blackbox exp.</text>

  <!-- Collection layer -->
  <rect x="80" y="220" width="200" height="60" fill="#FCD3D8" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="180" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Telegraf / SNMP poller</text>
  <text x="180" y="263" text-anchor="middle" font-size="10" fill="#2A1A2E">30-60s polling</text>

  <rect x="320" y="220" width="200" height="60" fill="#FCD3D8" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="420" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">gNMI collector</text>
  <text x="420" y="263" text-anchor="middle" font-size="10" fill="#2A1A2E">sub-second streaming</text>

  <rect x="560" y="220" width="200" height="60" fill="#FCD3D8" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="660" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Syslog aggregator</text>
  <text x="660" y="263" text-anchor="middle" font-size="10" fill="#2A1A2E">rsyslog / syslog-ng</text>

  <!-- Arrows from devices to collection -->
  <line x1="130" y1="180" x2="180" y2="220" stroke="#2A1A2E" stroke-width="1"/>
  <line x1="330" y1="180" x2="180" y2="220" stroke="#2A1A2E" stroke-width="1"/>
  <line x1="330" y1="180" x2="420" y2="220" stroke="#2A1A2E" stroke-width="1"/>
  <line x1="530" y1="180" x2="180" y2="220" stroke="#2A1A2E" stroke-width="1"/>
  <line x1="730" y1="180" x2="660" y2="220" stroke="#2A1A2E" stroke-width="1"/>
  <line x1="900" y1="180" x2="660" y2="220" stroke="#2A1A2E" stroke-width="1"/>

  <!-- Storage -->
  <rect x="200" y="320" width="280" height="60" fill="#FFE9D6" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="340" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Prometheus TSDB</text>
  <text x="340" y="363" text-anchor="middle" font-size="10" fill="#2A1A2E">15s scrape, 30-day retention</text>

  <rect x="520" y="320" width="240" height="60" fill="#FFE9D6" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="640" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Loki (logs)</text>
  <text x="640" y="363" text-anchor="middle" font-size="10" fill="#2A1A2E">structured + full-text</text>

  <line x1="180" y1="280" x2="340" y2="320" stroke="#2A1A2E" stroke-width="1"/>
  <line x1="420" y1="280" x2="340" y2="320" stroke="#2A1A2E" stroke-width="1"/>
  <line x1="660" y1="280" x2="640" y2="320" stroke="#2A1A2E" stroke-width="1"/>

  <!-- Analysis -->
  <rect x="200" y="420" width="280" height="60" fill="#F7F0E1" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="340" y="445" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Recording rules (PromQL)</text>
  <text x="340" y="463" text-anchor="middle" font-size="10" fill="#2A1A2E">multi-window burn rate</text>

  <rect x="520" y="420" width="240" height="60" fill="#F7F0E1" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="640" y="445" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Alertmanager</text>
  <text x="640" y="463" text-anchor="middle" font-size="10" fill="#2A1A2E">group + dedup + route</text>

  <line x1="340" y1="380" x2="340" y2="420" stroke="#2A1A2E" stroke-width="1"/>
  <line x1="340" y1="480" x2="640" y2="450" stroke="#2A1A2E" stroke-width="1"/>

  <!-- Dashboards -->
  <rect x="80" y="510" width="200" height="50" fill="#FFD6BC" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="180" y="540" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Grafana dashboards</text>

  <line x1="340" y1="450" x2="180" y2="510" stroke="#2A1A2E" stroke-width="1"/>

  <!-- Notification -->
  <rect x="380" y="510" width="160" height="50" fill="#FCD3D8" stroke="#E2557A" stroke-width="2" rx="6"/>
  <text x="460" y="540" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">PagerDuty</text>

  <rect x="560" y="510" width="160" height="50" fill="#FCD3D8" stroke="#E2557A" stroke-width="2" rx="6"/>
  <text x="640" y="540" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">Slack #net-ops</text>

  <line x1="640" y1="480" x2="460" y2="510" stroke="#E2557A" stroke-width="2"/>
  <line x1="640" y1="480" x2="640" y2="510" stroke="#E2557A" stroke-width="2"/>

  <!-- On-call -->
  <rect x="760" y="510" width="160" height="50" fill="#FFE9D6" stroke="#2A1A2E" stroke-width="1.5" rx="6"/>
  <text x="840" y="540" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1A2E">On-call (FoS)</text>

  <line x1="640" y1="480" x2="840" y2="510" stroke="#2A1A2E" stroke-width="1"/>

  <!-- SLO box -->
  <text x="40" y="600" font-size="11" font-weight="700" fill="#2A1A2E">SLO model:</text>
  <text x="120" y="600" font-size="10" fill="#2A1A2E">SLI = packet_delivery / dns_p99 / reachability · SLO = 99.9% / 99.5% / 99.95% over 30 days</text>
  <text x="40" y="618" font-size="11" font-weight="700" fill="#2A1A2E">Burn rate:</text>
  <text x="120" y="618" font-size="10" fill="#2A1A2E">Page at 2%/1h, Ticket at 5%/6h, Slow-burn alert at 0.5%/24h</text>
  <text x="40" y="636" font-size="11" font-weight="700" fill="#2A1A2E">Runbooks:</text>
  <text x="120" y="636" font-size="10" fill="#2A1A2E">10 canonical incidents — interface down, BGP down, OSPF ExStart, packet loss, DNS slow, cert expiry, MTU blackhole, route flap, BGP reset, congestion</text>
  <text x="40" y="654" font-size="11" font-weight="700" fill="#2A1A2E">On-call:</text>
  <text x="120" y="654" font-size="10" fill="#2A1A2E">Follow-the-sun · 1-week shifts · primary/secondary/manager escalation at 5m / 15m</text>
</svg>