<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#FFF7EC"/>
  <style>
    .ink { fill: #2A1A2E; font-family: monospace; font-size: 11px; }
    .accent { fill: #E2557A; font-family: monospace; font-size: 11px; font-weight: bold; }
    .box { fill: #FFFFFF; stroke: #2A1A2E; stroke-width: 1.5; }
    .box-accent { fill: #FFFFFF; stroke: #E2557A; stroke-width: 2; }
    .line { stroke: #2A1A2E; stroke-width: 1.5; }
    .line-accent { stroke: #E2557A; stroke-width: 2; }
    .label { fill: #2A1A2E; font-family: monospace; font-size: 10px; }
  </style>

  <text x="400" y="22" class="accent" text-anchor="middle" font-size="14">HAProxy L7 - FRONTEND / BACKEND / STICK-TABLE</text>

  <!-- Client -->
  <rect x="20" y="200" width="100" height="60" class="box"/>
  <text x="70" y="220" class="ink" text-anchor="middle">Client</text>
  <text x="70" y="235" class="label" text-anchor="middle">10.0.0.42</text>
  <text x="70" y="248" class="label" text-anchor="middle">Cookie: abc</text>

  <!-- HAProxy frontend -->
  <rect x="180" y="100" width="200" height="240" class="box-accent"/>
  <text x="280" y="120" class="accent" text-anchor="middle">HAProxy</text>
  <text x="280" y="138" class="label" text-anchor="middle">frontend https :443</text>
  <text x="280" y="153" class="label" text-anchor="middle">SSL/TLS 1.3 + HSTS</text>
  <text x="280" y="175" class="label" text-anchor="middle">---</text>
  <text x="280" y="190" class="ink" text-anchor="middle">stick-table type ip</text>
  <text x="280" y="205" class="ink" text-anchor="middle">  size 100k expire 1800s</text>
  <text x="280" y="220" class="label" text-anchor="middle">active healthcheck GET /healthz</text>
  <text x="280" y="235" class="label" text-anchor="middle">  inter 2s rise 3 fall 3</text>
  <text x="280" y="258" class="label" text-anchor="middle">---</text>
  <text x="280" y="273" class="label" text-anchor="middle">acl url_api path_beg /api</text>
  <text x="280" y="288" class="label" text-anchor="middle">acl url_static path_beg /static</text>
  <text x="280" y="310" class="label" text-anchor="middle">stats :8404 /stats</text>
  <text x="280" y="325" class="label" text-anchor="middle">Prometheus /metrics</text>

  <line x1="120" y1="220" x2="180" y2="220" class="line-accent"/>
  <text x="150" y="212" class="label" text-anchor="middle">HTTPS</text>

  <!-- API backend -->
  <rect x="450" y="60" width="200" height="80" class="box"/>
  <text x="550" y="80" class="ink" text-anchor="middle">backend api</text>
  <text x="550" y="95" class="label" text-anchor="middle">balance leastconn</text>
  <text x="550" y="108" class="label" text-anchor="middle">stick on cookie JSESSIONID</text>
  <text x="550" y="120" class="label" text-anchor="middle">server api-1 10.0.1.10:8080</text>
  <text x="550" y="132" class="label" text-anchor="middle">server api-2 10.0.1.11:8080</text>

  <!-- Web backend -->
  <rect x="450" y="180" width="200" height="80" class="box"/>
  <text x="550" y="200" class="ink" text-anchor="middle">backend web</text>
  <text x="550" y="215" class="label" text-anchor="middle">balance roundrobin</text>
  <text x="550" y="228" class="label" text-anchor="middle">stick on src</text>
  <text x="550" y="240" class="label" text-anchor="middle">server web-1 10.0.2.10:8000</text>
  <text x="550" y="252" class="label" text-anchor="middle">server web-2 10.0.2.11:8000</text>

  <!-- Health check -->
  <rect x="450" y="300" width="200" height="80" class="box"/>
  <text x="550" y="320" class="ink" text-anchor="middle">health check</text>
  <text x="550" y="335" class="label" text-anchor="middle">GET /healthz HTTP/1.1</text>
  <text x="550" y="350" class="label" text-anchor="middle">expect status 200</text>
  <text x="550" y="365" class="label" text-anchor="middle">fail = backend down</text>

  <line x1="380" y1="180" x2="450" y2="100" class="line"/>
  <text x="415" y="135" class="label" text-anchor="middle">/api</text>
  <line x1="380" y1="220" x2="450" y2="220" class="line"/>
  <text x="415" y="213" class="label" text-anchor="middle">/static /</text>
  <line x1="380" y1="280" x2="450" y2="340" class="line"/>
  <text x="415" y="305" class="label" text-anchor="middle">probe</text>

  <!-- Stats -->
  <rect x="20" y="380" width="760" height="100" class="box"/>
  <text x="400" y="400" class="accent" text-anchor="middle">VERIFICATION MATRIX</text>
  <text x="40" y="420" class="label">haproxy -c -f /etc/haproxy/haproxy.cfg         -> syntax OK</text>
  <text x="40" y="435" class="label">curl -vk https://localhost/api/users             -> 200 from api-1 / api-2 / api-3 (leastconn)</text>
  <text x="40" y="450" class="label">curl -vk --cookie 'JSESSIONID=abc' .../api/x    -> always same backend (stick on cookie)</text>
  <text x="40" y="465" class="label">echo 'show stat' | socat /var/run/haproxy.sock - -> live stats;  ss -tnp | grep :443 -> TLS listener</text>
</svg>
