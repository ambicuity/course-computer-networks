<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <rect width="800" height="540" fill="#FFF7EC"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" fill="#2A1A2E">

    <text x="400" y="32" text-anchor="middle" font-size="22" font-weight="700">Incident Response Packet Kit</text>
    <text x="400" y="54" text-anchor="middle" font-size="13" fill="#5a4a5e">Six incident classes → capture filters → evidence → custody → analysis</text>

    <g>
      <rect x="40" y="90" width="170" height="60" fill="#FFE8C7" stroke="#E2557A" stroke-width="1.6" rx="6"/>
      <text x="125" y="112" text-anchor="middle" font-size="13" font-weight="700">1. Classify</text>
      <text x="125" y="130" text-anchor="middle" font-size="10" fill="#5a4a5e">outage / DDoS / breach / latency / DNS / DHCP</text>

      <rect x="230" y="90" width="170" height="60" fill="#FFE8C7" stroke="#E2557A" stroke-width="1.6" rx="6"/>
      <text x="315" y="112" text-anchor="middle" font-size="13" font-weight="700">2. Capture</text>
      <text x="315" y="130" text-anchor="middle" font-size="10" fill="#5a4a5e">tcpdump + BPF filter + ring rotation</text>

      <rect x="420" y="90" width="170" height="60" fill="#FFE8C7" stroke="#E2557A" stroke-width="1.6" rx="6"/>
      <text x="505" y="112" text-anchor="middle" font-size="13" font-weight="700">3. Preserve</text>
      <text x="505" y="130" text-anchor="middle" font-size="10" fill="#5a4a5e">off-box + WORM + chmod 444</text>

      <rect x="610" y="90" width="170" height="60" fill="#FFE8C7" stroke="#E2557A" stroke-width="1.6" rx="6"/>
      <text x="695" y="112" text-anchor="middle" font-size="13" font-weight="700">4. Custody</text>
      <text x="695" y="130" text-anchor="middle" font-size="10" fill="#5a4a5e">SHA-256 + access log + verify</text>
    </g>

    <g stroke="#2A1A2E" stroke-width="1.4" fill="#2A1A2E">
      <polygon points="218,120 226,115 226,125"/>
      <polygon points="408,120 416,115 416,125"/>
      <polygon points="598,120 606,115 606,125"/>
    </g>

    <g>
      <rect x="40" y="180" width="350" height="320" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.4" rx="6"/>
      <text x="55" y="200" font-size="14" font-weight="700">Capture filter templates</text>

      <g font-size="11" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace">
        <text x="55" y="222">outage    host &lt;ip&gt; and (port 80 or 443 or 22)</text>
        <text x="55" y="240">ddos      (dst port 80 or 443) and tcp[tcpflags] &amp; tcp-syn != 0</text>
        <text x="55" y="258">breach    host &lt;ip&gt; and (port 22 or 3389 or 4444)</text>
        <text x="55" y="276">latency   host &lt;ip&gt; and tcp</text>
        <text x="55" y="294">dns       port 53</text>
        <text x="55" y="312">rogue-dhcp (port 67 or 68) and ether src not &lt;legit_mac&gt;</text>
      </g>

      <text x="55" y="345" font-size="12" font-weight="700">tcpdump ring rotation</text>
      <g font-size="11" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace">
        <text x="55" y="365">tcpdump -i eth0 -w cap-%Y%m%d%H%M%S.pcap \</text>
        <text x="55" y="380">           -G 300 -W 12 '&lt;filter&gt;'</text>
      </g>
      <text x="55" y="402" font-size="10" fill="#5a4a5e">-G 300 rotate every 300s; -W 12 keep 12 files (1 hour)</text>

      <text x="55" y="430" font-size="12" font-weight="700">WORM + read-only</text>
      <g font-size="11" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace">
        <text x="55" y="450">chmod 444 cap-*.pcap</text>
        <text x="55" y="468">sha256sum cap-*.pcap &gt; cap.sha256</text>
        <text x="55" y="486">aws s3 cp cap.pcap s3://evidence/</text>
        <text x="55" y="504">  --object-lock-mode COMPLIANCE \</text>
        <text x="55" y="518">  --object-lock-retain-until-date 2031-06-22</text>
      </g>
    </g>

    <g>
      <rect x="410" y="180" width="370" height="320" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.4" rx="6"/>
      <text x="425" y="200" font-size="14" font-weight="700">Chain of custody log (CASE-2024-001)</text>

      <g font-size="11">
        <text x="425" y="220">Case ID:    CASE-2024-001</text>
        <text x="425" y="236">Incident:   Suspected data exfiltration (10.0.0.42 → 198.51.100.7)</text>
        <text x="425" y="252">Capturer:   J. Smith (NetOps)</text>
        <text x="425" y="268">Start:      2024-06-22T14:30:00Z</text>
        <text x="425" y="284">End:        2024-06-22T14:45:00Z</text>
        <text x="425" y="300">File:       breach-capture.pcap (45.2 MB)</text>
        <text x="425" y="316">SHA-256:    a1b2c3d4…ef123456</text>
        <text x="425" y="332">Storage:    /evidence/CASE-2024-001/</text>
      </g>

      <text x="425" y="360" font-size="12" font-weight="700">Access log</text>
      <g font-size="10" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace">
        <text x="425" y="378">2024-06-22T15:00Z  J.Smith      capture   edge-fw-1</text>
        <text x="425" y="392">2024-06-22T16:00Z  A.Jones      analysis  forensics-vm</text>
        <text x="425" y="406">2024-06-22T18:00Z  SecTeam      review    secure-vault</text>
        <text x="425" y="420">2024-06-23T09:00Z  Legal        export    counsel-only</text>
      </g>

      <text x="425" y="448" font-size="12" font-weight="700">Timeline (UTC) — pcap + syslog merged</text>
      <g font-size="10" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace">
        <text x="425" y="466">14:30:05  fw  1.2 Gbps out from 10.0.0.42</text>
        <text x="425" y="480">14:31:12  ids TROJAN-EXFIL-HTTP × 67</text>
        <text x="425" y="494">14:32:00  pcap capture start edge-fw-1</text>
        <text x="425" y="508">14:33:48  dns 47 lookups *.bad.example</text>
        <text x="425" y="522">14:45:00  pcap end → evidence vault</text>
      </g>
    </g>

  </g>
</svg>
