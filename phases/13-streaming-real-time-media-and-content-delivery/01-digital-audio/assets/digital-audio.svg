<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" font-family="Inter, sans-serif">
  <rect width="800" height="520" fill="#FFF7EC"/>
  <text x="400" y="36" text-anchor="middle" fill="#2A1A2E" font-size="20" font-weight="700">Digital Audio: Sampling → Perceptual Coding → Bitstream</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#2A1A2E"/></marker></defs>
  <rect x="30" y="70" width="160" height="90" rx="8" fill="#FFF" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="110" y="92" text-anchor="middle" fill="#2A1A2E" font-size="12" font-weight="700">1. Acoustic wave</text>
  <path d="M40 130 q15 -20 30 0 t30 0 t30 0 t30 0 t30 0" fill="none" stroke="#E2557A" stroke-width="2"/>
  <text x="110" y="152" text-anchor="middle" fill="#2A1A2E" font-size="10">20 Hz–20 kHz, 120 dB</text>
  <line x1="190" y1="115" x2="220" y2="115" stroke="#2A1A2E" stroke-width="2" marker-end="url(#a)"/>
  <rect x="220" y="70" width="160" height="90" rx="8" fill="#FFF" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="300" y="92" text-anchor="middle" fill="#2A1A2E" font-size="12" font-weight="700">2. ADC (sample)</text>
  <g fill="#E2557A"><rect x="240" y="118" width="3" height="14"/><rect x="255" y="122" width="3" height="10"/><rect x="270" y="118" width="3" height="14"/><rect x="285" y="124" width="3" height="8"/><rect x="300" y="120" width="3" height="12"/><rect x="315" y="126" width="3" height="6"/><rect x="330" y="122" width="3" height="10"/><rect x="345" y="120" width="3" height="12"/></g>
  <text x="300" y="152" text-anchor="middle" fill="#2A1A2E" font-size="10">Nyquist: sample at 2f</text>
  <line x1="380" y1="115" x2="410" y2="115" stroke="#2A1A2E" stroke-width="2" marker-end="url(#a)"/>
  <rect x="410" y="70" width="160" height="90" rx="8" fill="#FFF" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="490" y="92" text-anchor="middle" fill="#2A1A2E" font-size="12" font-weight="700">3. Quantize (n bits)</text>
  <g stroke="#E2557A" stroke-width="1"><line x1="425" y1="115" x2="565" y2="115"/><line x1="425" y1="125" x2="565" y2="125"/><line x1="425" y1="135" x2="565" y2="135"/><line x1="425" y1="145" x2="565" y2="145"/></g>
  <text x="490" y="152" text-anchor="middle" fill="#2A1A2E" font-size="10">2^n levels; quant. noise</text>
  <line x1="570" y1="115" x2="600" y2="115" stroke="#2A1A2E" stroke-width="2" marker-end="url(#a)"/>
  <rect x="600" y="70" width="170" height="90" rx="8" fill="#FFF" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="685" y="92" text-anchor="middle" fill="#2A1A2E" font-size="12" font-weight="700">4. PCM bitstream</text>
  <text x="685" y="116" text-anchor="middle" fill="#E2557A" font-size="11" font-weight="600">G.711: 64 kbps</text>
  <text x="685" y="134" text-anchor="middle" fill="#E2557A" font-size="11" font-weight="600">CD: 1.411 Mbps</text>
  <text x="685" y="152" text-anchor="middle" fill="#2A1A2E" font-size="10">µ-law / A-law / linear</text>
  <text x="400" y="200" text-anchor="middle" fill="#2A1A2E" font-size="16" font-weight="700">Perceptual coding (MP3 / AAC)</text>
  <rect x="30" y="220" width="160" height="90" rx="8" fill="#FFF" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="110" y="242" text-anchor="middle" fill="#2A1A2E" font-size="12" font-weight="700">Filter bank</text>
  <text x="110" y="262" text-anchor="middle" fill="#2A1A2E" font-size="10">Fourier transform</text>
  <text x="110" y="278" text-anchor="middle" fill="#2A1A2E" font-size="10">→ frequency bands</text>
  <text x="110" y="296" text-anchor="middle" fill="#2A1A2E" font-size="10">batched samples</text>
  <line x1="190" y1="265" x2="220" y2="265" stroke="#2A1A2E" stroke-width="2" marker-end="url(#a)"/>
  <rect x="220" y="220" width="180" height="90" rx="8" fill="#FFF" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="310" y="242" text-anchor="middle" fill="#2A1A2E" font-size="12" font-weight="700">Psychoacoustic model</text>
  <text x="310" y="262" text-anchor="middle" fill="#E2557A" font-size="10">frequency masking</text>
  <text x="310" y="278" text-anchor="middle" fill="#E2557A" font-size="10">temporal masking</text>
  <text x="310" y="296" text-anchor="middle" fill="#2A1A2E" font-size="10">threshold of audibility</text>
  <line x1="400" y1="265" x2="430" y2="265" stroke="#2A1A2E" stroke-width="2" marker-end="url(#a)"/>
  <rect x="430" y="220" width="160" height="90" rx="8" fill="#FFF" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="510" y="242" text-anchor="middle" fill="#2A1A2E" font-size="12" font-weight="700">Bit allocation</text>
  <text x="510" y="262" text-anchor="middle" fill="#2A1A2E" font-size="10">masked bands: 0 bits</text>
  <text x="510" y="278" text-anchor="middle" fill="#2A1A2E" font-size="10">loud unmasked: more</text>
  <text x="510" y="296" text-anchor="middle" fill="#2A1A2E" font-size="10">quiet unmasked: fewer</text>
  <line x1="590" y1="265" x2="620" y2="265" stroke="#2A1A2E" stroke-width="2" marker-end="url(#a)"/>
  <rect x="620" y="220" width="150" height="90" rx="8" fill="#FFF" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="695" y="242" text-anchor="middle" fill="#2A1A2E" font-size="12" font-weight="700">Huffman + pack</text>
  <text x="695" y="262" text-anchor="middle" fill="#E2557A" font-size="11" font-weight="600">96–128 kbps</text>
  <text x="695" y="280" text-anchor="middle" fill="#2A1A2E" font-size="10">~10:1, lossy</text>
</svg>
