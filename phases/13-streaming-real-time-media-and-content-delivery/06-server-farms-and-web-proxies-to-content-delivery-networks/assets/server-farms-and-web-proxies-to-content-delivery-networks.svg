<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="ui-monospace,Menlo,Consolas,monospace">
  <rect width="880" height="600" fill="#FFF7EC"/>
  <text x="440" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#2A1A2E">Server Farms, Web Proxies, and CDNs</text>
  <text x="440" y="58" text-anchor="middle" font-size="12" fill="#2A1A2E">From one server to many; from client-side caching to provider-pushed edges</text>

  <!-- Server farm panel -->
  <rect x="20" y="80" width="410" height="200" fill="#FFEFD8" stroke="#2A1A2E" stroke-width="1.4" rx="6"/>
  <text x="40" y="104" font-size="14" font-weight="700" fill="#2A1A2E">1. Server farm (textbook &#167; 7.5.2)</text>
  <text x="40" y="122" font-size="10" fill="#2A1A2E">Front-end load-balances TCP across N backends; backends share a virtual IP</text>

  <!-- Internet -->
  <rect x="40" y="140" width="80" height="40" fill="#FFC2A0" stroke="#2A1A2E" stroke-width="1"/>
  <text x="80" y="165" text-anchor="middle" font-size="10" fill="#2A1A2E">Internet</text>

  <!-- Front end -->
  <rect x="180" y="140" width="100" height="40" fill="#E2557A" stroke="#2A1A2E" stroke-width="1.4"/>
  <text x="230" y="158" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF7EC">Front-end</text>
  <text x="230" y="172" text-anchor="middle" font-size="9" fill="#FFF7EC">L4/L7 switch</text>

  <!-- Backends -->
  <g stroke="#2A1A2E" stroke-width="1">
    <rect x="320" y="120" width="80" height="28" fill="#F2A0B5"/>
    <text x="360" y="138" text-anchor="middle" font-size="9" fill="#2A1A2E">server-a</text>
    <rect x="320" y="152" width="80" height="28" fill="#F2A0B5"/>
    <text x="360" y="170" text-anchor="middle" font-size="9" fill="#2A1A2E">server-b</text>
    <rect x="320" y="184" width="80" height="28" fill="#F2A0B5"/>
    <text x="360" y="202" text-anchor="middle" font-size="9" fill="#2A1A2E">server-c</text>
  </g>

  <!-- arrows -->
  <line x1="120" y1="160" x2="178" y2="160" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="280" y1="160" x2="320" y2="135" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="280" y1="160" x2="320" y2="166" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="280" y1="160" x2="320" y2="198" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>

  <text x="40" y="240" font-size="10" fill="#2A1A2E">Policies: round-robin | least-connections | source-IP hash | cookie affinity</text>
  <text x="40" y="256" font-size="10" fill="#2A1A2E">Front-end is a "middlebox": inspects IP/TCP/HTTP headers to pick a backend</text>
  <text x="40" y="272" font-size="10" fill="#E2557A">Backends must appear as one logical site to clients (single virtual IP)</text>

  <!-- Web proxy panel -->
  <rect x="450" y="80" width="410" height="200" fill="#FFEFD8" stroke="#2A1A2E" stroke-width="1.4" rx="6"/>
  <text x="470" y="104" font-size="14" font-weight="700" fill="#2A1A2E">2. Web proxy cache (textbook &#167; 7.5.2)</text>
  <text x="470" y="122" font-size="10" fill="#2A1A2E">Shared cache for a community of users; reduce bandwidth and latency</text>

  <!-- browsers -->
  <g stroke="#2A1A2E" stroke-width="1" fill="#FFC2A0">
    <rect x="470" y="150" width="50" height="24"/>
    <text x="495" y="166" text-anchor="middle" font-size="9" fill="#2A1A2E">browser 1</text>
    <rect x="470" y="180" width="50" height="24"/>
    <text x="495" y="196" text-anchor="middle" font-size="9" fill="#2A1A2E">browser 2</text>
    <rect x="470" y="210" width="50" height="24"/>
    <text x="495" y="226" text-anchor="middle" font-size="9" fill="#2A1A2E">browser 3</text>
  </g>

  <!-- proxy -->
  <rect x="600" y="160" width="90" height="70" fill="#E2557A" stroke="#2A1A2E" stroke-width="1.4"/>
  <text x="645" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF7EC">Proxy</text>
  <text x="645" y="195" text-anchor="middle" font-size="9" fill="#FFF7EC">+ cache</text>
  <text x="645" y="210" text-anchor="middle" font-size="9" fill="#FFF7EC">(LRU)</text>

  <!-- origin -->
  <rect x="780" y="180" width="60" height="30" fill="#F2A0B5" stroke="#2A1A2E" stroke-width="1"/>
  <text x="810" y="200" text-anchor="middle" font-size="9" fill="#2A1A2E">origin</text>

  <line x1="520" y1="162" x2="600" y2="180" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="520" y1="192" x2="600" y2="195" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="520" y1="222" x2="600" y2="210" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="690" y1="195" x2="780" y2="195" stroke="#2A1A2E" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <text x="708" y="186" font-size="8" fill="#2A1A2E">on miss</text>

  <text x="470" y="262" font-size="10" fill="#2A1A2E">Diminishing returns beyond ~100 users (Wolman et al., 1999)</text>
  <text x="470" y="276" font-size="10" fill="#E2557A">Long-tail of unique pages is not in any cache</text>

  <!-- CDN panel -->
  <rect x="20" y="300" width="840" height="280" fill="#FFE7C2" stroke="#2A1A2E" stroke-width="1.4" rx="6"/>
  <text x="40" y="324" font-size="14" font-weight="700" fill="#2A1A2E">3. CDN: provider pushes, DNS redirects (textbook &#167; 7.5.3)</text>
  <text x="40" y="342" font-size="10" fill="#2A1A2E">Origin &#8594; edges (dashed) ; clients fetch from nearest edge (solid). DNS resolver returns edge IP based on client location.</text>

  <!-- origin -->
  <rect x="380" y="356" width="100" height="34" fill="#E2557A" stroke="#2A1A2E" stroke-width="1.4"/>
  <text x="430" y="372" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF7EC">CDN origin</text>
  <text x="430" y="384" text-anchor="middle" font-size="9" fill="#FFF7EC">fluffyvideo.com</text>

  <!-- edges -->
  <g stroke="#2A1A2E" stroke-width="1" fill="#F2A0B5">
    <rect x="120" y="430" width="100" height="34"/>
    <text x="170" y="446" text-anchor="middle" font-size="10" fill="#2A1A2E">Edge-Sydney</text>
    <text x="170" y="458" text-anchor="middle" font-size="8" fill="#2A1A2E">203.0.113.10</text>

    <rect x="380" y="430" width="100" height="34"/>
    <text x="430" y="446" text-anchor="middle" font-size="10" fill="#2A1A2E">Edge-Boston</text>
    <text x="430" y="458" text-anchor="middle" font-size="8" fill="#2A1A2E">192.0.2.20</text>

    <rect x="640" y="430" width="100" height="34"/>
    <text x="670" y="446" text-anchor="middle" font-size="10" fill="#2A1A2E">Edge-Amsterdam</text>
    <text x="670" y="458" text-anchor="middle" font-size="8" fill="#2A1A2E">198.51.100.25</text>
  </g>

  <!-- dashed lines from origin to edges -->
  <g stroke="#2A1A2E" stroke-width="1.2" stroke-dasharray="4 3">
    <line x1="380" y1="390" x2="170" y2="430"/>
    <line x1="430" y1="390" x2="430" y2="430"/>
    <line x1="480" y1="390" x2="690" y2="430"/>
  </g>
  <text x="320" y="416" font-size="9" fill="#2A1A2E">push content</text>

  <!-- DNS nameserver -->
  <rect x="380" y="500" width="100" height="34" fill="#FFC2A0" stroke="#2A1A2E" stroke-width="1"/>
  <text x="430" y="516" text-anchor="middle" font-size="10" fill="#2A1A2E">CDN DNS</text>
  <text x="430" y="528" text-anchor="middle" font-size="9" fill="#2A1A2E">authoritative</text>

  <!-- clients -->
  <g font-size="9" fill="#2A1A2E">
    <text x="80" y="498">Sydney client</text>
    <text x="350" y="498">Boston client</text>
    <text x="610" y="498">Amsterdam client</text>
  </g>

  <!-- arrows: client -> DNS -> edge -->
  <g stroke="#2A1A2E" stroke-width="1.2">
    <line x1="170" y1="490" x2="380" y2="510" marker-end="url(#arr)"/>
    <line x1="430" y1="490" x2="430" y2="466" marker-end="url(#arr)"/>
    <line x1="690" y1="490" x2="480" y2="510" marker-end="url(#arr)"/>
  </g>

  <text x="40" y="566" font-size="10" fill="#E2557A">DNS resolver returns "203.0.113.10" to Sydney, "192.0.2.20" to Boston, "198.51.100.25" to Amsterdam</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2A1A2E"/>
    </marker>
  </defs>
</svg>
