<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" font-family="Helvetica, Arial, sans-serif">
  <rect width="720" height="540" fill="#FFF7EC"/>
  <rect x="20" y="20" width="680" height="500" fill="none" stroke="#2A1A2E" stroke-width="2"/>

  <text x="40" y="55" font-size="22" font-weight="700" fill="#2A1A2E">MP3 / AAC encoder pipeline</text>
  <text x="40" y="78" font-size="12" fill="#2A1A2E">ISO/IEC 11172-3 Layer III (1993) and ISO/IEC 13818-7 AAC (1997)</text>

  <!-- PCM input block -->
  <g>
    <rect x="40" y="100" width="120" height="60" rx="6" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
    <text x="100" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#2A1A2E">PCM input</text>
    <text x="100" y="145" text-anchor="middle" font-size="10" fill="#2A1A2E">16-bit / 44.1 kHz</text>
  </g>

  <!-- Filter bank -->
  <g>
    <rect x="200" y="100" width="120" height="60" rx="6" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
    <text x="260" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#2A1A2E">MDCT / PQF</text>
    <text x="260" y="145" text-anchor="middle" font-size="10" fill="#2A1A2E">1024 / 2048 coeffs</text>
  </g>

  <!-- Psycho -->
  <g>
    <rect x="360" y="100" width="120" height="60" rx="6" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
    <text x="420" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Psycho model</text>
    <text x="420" y="145" text-anchor="middle" font-size="10" fill="#FFFFFF">Bark spread + SMR</text>
  </g>

  <!-- Quantize -->
  <g>
    <rect x="520" y="100" width="120" height="60" rx="6" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
    <text x="580" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#2A1A2E">Quantize</text>
    <text x="580" y="145" text-anchor="middle" font-size="10" fill="#2A1A2E">x^(3/4) power law</text>
  </g>

  <line x1="160" y1="130" x2="200" y2="130" stroke="#2A1A2E" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="320" y1="130" x2="360" y2="130" stroke="#2A1A2E" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="130" x2="520" y2="130" stroke="#2A1A2E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Huffman -->
  <g>
    <rect x="200" y="210" width="320" height="60" rx="6" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
    <text x="360" y="235" text-anchor="middle" font-size="13" font-weight="600" fill="#2A1A2E">Huffman coding of quantized spectral coefficients</text>
    <text x="360" y="255" text-anchor="middle" font-size="10" fill="#2A1A2E">Codebooks 1-11 in MP3, 12 codebooks in AAC</text>
  </g>

  <line x1="580" y1="160" x2="580" y2="200" stroke="#2A1A2E" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 580 200 L 520 240" fill="none" stroke="#2A1A2E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <g>
    <rect x="280" y="310" width="160" height="60" rx="6" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
    <text x="360" y="335" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Bitstream</text>
    <text x="360" y="355" text-anchor="middle" font-size="10" fill="#FFFFFF">128 kbps / 192 kbps</text>
  </g>

  <line x1="360" y1="270" x2="360" y2="310" stroke="#2A1A2E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Masking curve panel -->
  <g>
    <rect x="40" y="400" width="640" height="100" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1"/>
    <text x="60" y="420" font-size="11" font-weight="600" fill="#2A1A2E">Masking threshold vs frequency (1 kHz masker at 60 dB SPL)</text>
    <line x1="60" y1="490" x2="660" y2="490" stroke="#2A1A2E" stroke-width="1"/>
    <line x1="60" y1="430" x2="60" y2="490" stroke="#2A1A2E" stroke-width="1"/>
    <text x="60" y="495" font-size="9" fill="#2A1A2E">100 Hz</text>
    <text x="350" y="495" font-size="9" fill="#2A1A2E">1 kHz</text>
    <text x="630" y="495" font-size="9" fill="#2A1A2E">10 kHz</text>
    <text x="40" y="450" font-size="9" fill="#2A1A2E">dB SPL</text>
    <!-- Threshold of audibility curve -->
    <path d="M 60 470 Q 200 460 360 480 Q 500 488 660 460" fill="none" stroke="#2A1A2E" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="500" y="475" font-size="9" fill="#2A1A2E">absolute threshold</text>
    <!-- Masking curve around 1 kHz -->
    <path d="M 60 472 Q 200 470 320 445 L 350 435 L 380 445 Q 500 470 660 470" fill="none" stroke="#E2557A" stroke-width="2.5"/>
    <text x="320" y="430" font-size="9" fill="#E2557A">masking peak at 1 kHz</text>
  </g>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2A1A2E"/>
    </marker>
  </defs>
</svg>
