<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="820" height="480" fill="#FFF7EC"/>
  <g fill="#2A1A2E">
    <text x="410" y="30" text-anchor="middle" font-size="20" font-weight="bold">RFID EPC Gen 2 — Q-algorithm singulation</text>
    <text x="410" y="50" text-anchor="middle" font-size="11" font-weight="bold">860-960 MHz UHF · ISO/IEC 18000-63 · reader-talks-first · backscatter</text>
  </g>

  <!-- Reader / antenna / tags -->
  <g>
    <rect x="40" y="80" width="200" height="160" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="140" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2A1A2E">Reader</text>
    <text x="140" y="120" text-anchor="middle" font-size="10" fill="#2A1A2E">continuous wave</text>
    <text x="140" y="136" text-anchor="middle" font-size="10" fill="#2A1A2E">Tari 6.25-25 us</text>
    <text x="140" y="152" text-anchor="middle" font-size="10" fill="#2A1A2E">BLF 40-640 kHz</text>
    <text x="140" y="170" text-anchor="middle" font-size="10" fill="#2A1A2E">Query(Q) → ACK → Req_RN</text>
    <text x="140" y="186" text-anchor="middle" font-size="10" fill="#2A1A2E">Select → Query → ACK</text>
    <text x="140" y="204" text-anchor="middle" font-size="10" fill="#E2557A" font-weight="bold">→ Read</text>
    <text x="140" y="222" text-anchor="middle" font-size="10" fill="#2A1A2E">Persistence: S0/S1/S2/S3</text>
  </g>

  <!-- 4 tags with Q=2, 4-bit slot counters -->
  <g>
    <rect x="280" y="80" width="500" height="160" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="530" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2A1A2E">Tags (Q=2 → 4 slots)</text>
  </g>
  <g fill="#2A1A2E" font-size="11">
    <rect x="300" y="120" width="100" height="50" fill="#FFF7EC" stroke="#2A1A2E"/>
    <text x="350" y="142" text-anchor="middle">tag A</text>
    <text x="350" y="158" text-anchor="middle" font-size="10">slot 2</text>

    <rect x="420" y="120" width="100" height="50" fill="#FFF7EC" stroke="#2A1A2E"/>
    <text x="470" y="142" text-anchor="middle">tag B</text>
    <text x="470" y="158" text-anchor="middle" font-size="10">slot 0</text>

    <rect x="540" y="120" width="100" height="50" fill="#FFF7EC" stroke="#2A1A2E"/>
    <text x="590" y="142" text-anchor="middle">tag C</text>
    <text x="590" y="158" text-anchor="middle" font-size="10">slot 0</text>

    <rect x="660" y="120" width="100" height="50" fill="#E2557A"/>
    <text x="710" y="142" text-anchor="middle" font-size="10" fill="#FFF7EC" font-weight="bold">tag D</text>
    <text x="710" y="158" text-anchor="middle" font-size="10" fill="#FFF7EC">slot 1</text>
  </g>

  <!-- Slot map -->
  <g>
    <rect x="40" y="260" width="740" height="100" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="280" font-size="13" font-weight="bold" fill="#2A1A2E">Slot map (Q=2)</text>
    <g fill="#2A1A2E" font-size="11">
      <rect x="60" y="295" width="120" height="50" fill="#E2557A" opacity="0.4"/>
      <text x="120" y="318" text-anchor="middle" font-weight="bold">slot 0</text>
      <text x="120" y="334" text-anchor="middle" font-size="10">collision: B,C</text>

      <rect x="180" y="295" width="120" height="50" fill="#E2557A" opacity="0.7"/>
      <text x="240" y="318" text-anchor="middle" font-weight="bold" fill="#FFF7EC">slot 1</text>
      <text x="240" y="334" text-anchor="middle" font-size="10" fill="#FFF7EC">tag D</text>

      <rect x="300" y="295" width="120" height="50" fill="#E2557A" opacity="0.4"/>
      <text x="360" y="318" text-anchor="middle" font-weight="bold">slot 2</text>
      <text x="360" y="334" text-anchor="middle" font-size="10">tag A</text>

      <rect x="420" y="295" width="120" height="50" fill="none" stroke="#2A1A2E"/>
      <text x="480" y="318" text-anchor="middle" font-size="11">slot 3</text>
      <text x="480" y="334" text-anchor="middle" font-size="10">empty</text>
    </g>
  </g>

  <!-- Tag state machine -->
  <g>
    <rect x="40" y="380" width="740" height="80" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="400" font-size="13" font-weight="bold" fill="#2A1A2E">Tag state machine</text>
    <g fill="#2A1A2E" font-size="10">
      <text x="60" y="424">Ready → Arbitrate → Reply → Acknowledged → Open → Secured → Killed</text>
      <text x="60" y="442">On collision: dropped back to Arbitrate, picks new slot counter (16-bit RN16)</text>
    </g>
    <text x="60" y="458" font-size="10" fill="#2A1A2E">Mem banks: Reserved (kill pwd, access pwd) · EPC (TID) · TID · User</text>
  </g>
</svg>
