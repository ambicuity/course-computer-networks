<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" height="560">
  <rect width="760" height="560" fill="#FFF7EC"/>
  <style>
    .t  { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .m  { font-family: monospace; fill: #2A1A2E; }
    .acc { fill: #E2557A; }
    .stroke { stroke: #2A1A2E; fill: none; }
    .accstroke { stroke: #E2557A; fill: none; }
  </style>

  <text x="32" y="40" class="t" font-size="22" font-weight="700">Hidden Terminal: carrier sense vs. virtual sense (RTS/CTS + NAV)</text>

  <!-- ===== Topology panel ===== -->
  <text x="32" y="78" class="t" font-size="15" font-weight="700">Topology — A and C hear B, but NOT each other</text>

  <!-- range circle A -->
  <circle cx="150" cy="180" r="92" class="accstroke" stroke-dasharray="5 5" stroke-width="1.5" opacity="0.6"/>
  <!-- range circle C -->
  <circle cx="500" cy="180" r="92" class="accstroke" stroke-dasharray="5 5" stroke-width="1.5" opacity="0.6"/>

  <!-- node A -->
  <circle cx="150" cy="180" r="26" fill="#FFF7EC" class="stroke" stroke-width="2"/>
  <text x="150" y="186" class="t" font-size="18" font-weight="700" text-anchor="middle">A</text>
  <!-- node B (AP) -->
  <rect x="300" y="156" width="50" height="48" rx="6" fill="#2A1A2E"/>
  <text x="325" y="186" class="t" font-size="16" font-weight="700" fill="#FFF7EC" text-anchor="middle">B</text>
  <text x="325" y="228" class="t" font-size="12" text-anchor="middle">Access Point</text>
  <!-- node C -->
  <circle cx="500" cy="180" r="26" fill="#FFF7EC" class="stroke" stroke-width="2"/>
  <text x="500" y="186" class="t" font-size="18" font-weight="700" text-anchor="middle">C</text>

  <!-- links A-B and C-B -->
  <line x1="176" y1="180" x2="300" y2="180" class="stroke" stroke-width="2"/>
  <line x1="350" y1="180" x2="474" y2="180" class="stroke" stroke-width="2"/>

  <!-- A and C cannot hear each other -->
  <line x1="176" y1="160" x2="474" y2="160" class="accstroke" stroke-width="2" stroke-dasharray="2 6"/>
  <text x="325" y="148" class="t" font-size="12" fill="#E2557A" text-anchor="middle" font-weight="700">no path: A &#8596; C out of range</text>

  <!-- collision burst at B -->
  <polygon points="325,236 333,256 322,250 330,272 314,252 324,252" class="acc"/>
  <text x="430" y="262" class="t" font-size="12" fill="#E2557A" font-weight="700">collision at B</text>

  <!-- ===== Throughput panel ===== -->
  <text x="565" y="78" class="t" font-size="15" font-weight="700">Peak S</text>
  <text x="565" y="100" class="m" font-size="12">pure   1/2e</text>
  <text x="565" y="116" class="m" font-size="12">       =0.184</text>
  <text x="565" y="138" class="m" font-size="12">slot   1/e</text>
  <text x="565" y="154" class="m" font-size="12">       =0.368</text>
  <rect x="563" y="170" width="170" height="76" rx="6" class="accstroke" stroke-width="1.5"/>
  <text x="573" y="192" class="m" font-size="11">G frames/frame-time</text>
  <text x="573" y="210" class="m" font-size="11">vuln window:</text>
  <text x="573" y="226" class="m" font-size="11"> pure  = 2 tau_f</text>
  <text x="573" y="242" class="m" font-size="11"> slot  = 1 tau_f</text>

  <!-- ===== Sequence: without RTS/CTS ===== -->
  <text x="32" y="320" class="t" font-size="15" font-weight="700">Without RTS/CTS — both sense idle, both send, frames overlap</text>
  <line x1="32" y1="372" x2="360" y2="372" class="stroke" stroke-width="1.5"/>
  <text x="20" y="345" class="m" font-size="11" text-anchor="end">A</text>
  <line x1="32" y1="345" x2="360" y2="345" class="stroke" stroke-width="1" opacity="0.4"/>
  <text x="20" y="399" class="m" font-size="11" text-anchor="end">C</text>
  <line x1="32" y1="399" x2="360" y2="399" class="stroke" stroke-width="1" opacity="0.4"/>
  <rect x="70" y="333" width="120" height="22" rx="3" class="acc" opacity="0.85"/>
  <text x="130" y="349" class="t" font-size="11" fill="#FFF7EC" text-anchor="middle">DATA A</text>
  <rect x="120" y="389" width="120" height="22" rx="3" class="acc" opacity="0.85"/>
  <text x="180" y="405" class="t" font-size="11" fill="#FFF7EC" text-anchor="middle">DATA C</text>
  <rect x="120" y="333" width="70" height="78" fill="none" stroke="#E2557A" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="200" y="430" class="t" font-size="11" fill="#E2557A" font-weight="700">overlap = collision &#8594; both retransmit</text>

  <!-- ===== Sequence: with RTS/CTS ===== -->
  <text x="32" y="470" class="t" font-size="15" font-weight="700">With RTS/CTS — B's CTS heard by both; C sets NAV and defers</text>
  <line x1="32" y1="522" x2="730" y2="522" class="stroke" stroke-width="1.5"/>
  <rect x="70" y="510" width="40" height="22" rx="3" class="stroke" stroke-width="1.5"/>
  <text x="90" y="525" class="m" font-size="10" text-anchor="middle">RTS</text>
  <text x="90" y="548" class="m" font-size="9" text-anchor="middle">20 B</text>
  <rect x="118" y="510" width="40" height="22" rx="3" fill="#2A1A2E"/>
  <text x="138" y="525" class="m" font-size="10" fill="#FFF7EC" text-anchor="middle">CTS</text>
  <text x="138" y="548" class="m" font-size="9" text-anchor="middle">14 B</text>
  <rect x="166" y="510" width="200" height="22" rx="3" class="acc" opacity="0.85"/>
  <text x="266" y="525" class="t" font-size="11" fill="#FFF7EC" text-anchor="middle">DATA A (Duration sets NAV)</text>
  <rect x="374" y="510" width="40" height="22" rx="3" class="stroke" stroke-width="1.5"/>
  <text x="394" y="525" class="m" font-size="10" text-anchor="middle">ACK</text>
  <rect x="118" y="488" width="296" height="14" rx="3" fill="#E2557A" opacity="0.25"/>
  <text x="266" y="499" class="t" font-size="10" fill="#E2557A" text-anchor="middle" font-weight="700">C's NAV: virtual carrier busy &#8594; C stays silent</text>
</svg>
