<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" height="560">
  <rect x="0" y="0" width="760" height="560" fill="#FFF7EC"/>
  <text x="380" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#2A1A2E">MACA: RTS/CTS and the hidden / exposed terminal</text>

  <!-- ===================== Panel (a): hidden terminal ===================== -->
  <text x="40" y="76" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#2A1A2E">(a) Hidden terminal — A and C both send to B</text>

  <!-- radio range circles -->
  <circle cx="150" cy="160" r="95" fill="#E2557A" fill-opacity="0.07" stroke="#E2557A" stroke-dasharray="5 4" stroke-width="1.5"/>
  <circle cx="330" cy="160" r="95" fill="#2A1A2E" fill-opacity="0.04" stroke="#2A1A2E" stroke-dasharray="5 4" stroke-width="1.2"/>

  <!-- stations A B C -->
  <circle cx="110" cy="160" r="18" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
  <text x="110" y="166" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#2A1A2E">A</text>
  <circle cx="240" cy="160" r="18" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
  <text x="240" y="166" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#FFF7EC">B</text>
  <circle cx="370" cy="160" r="18" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
  <text x="370" y="166" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#2A1A2E">C</text>

  <!-- colliding transmissions to B -->
  <line x1="128" y1="160" x2="222" y2="160" stroke="#E2557A" stroke-width="3"/>
  <line x1="352" y1="160" x2="258" y2="160" stroke="#E2557A" stroke-width="3"/>
  <text x="185" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">A&#8594;B</text>
  <text x="305" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">C&#8594;B</text>
  <text x="240" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#E2557A">COLLISION at B</text>

  <text x="110" y="270" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#2A1A2E">A's range</text>
  <text x="370" y="270" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#2A1A2E">C's range</text>
  <text x="240" y="292" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">A and C cannot hear each other &#8594; both sense IDLE</text>

  <!-- ===================== Panel (b): exposed terminal ===================== -->
  <text x="440" y="76" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#2A1A2E">(b) Exposed terminal — B&#8594;A, C wants C&#8594;D</text>

  <circle cx="495" cy="160" r="18" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
  <text x="495" y="166" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#2A1A2E">A</text>
  <circle cx="575" cy="160" r="18" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
  <text x="575" y="166" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#FFF7EC">B</text>
  <circle cx="655" cy="160" r="18" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
  <text x="655" y="166" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#FFF7EC">C</text>
  <circle cx="735" cy="160" r="18" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
  <text x="735" y="166" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#2A1A2E">D</text>

  <line x1="557" y1="160" x2="513" y2="160" stroke="#2A1A2E" stroke-width="3"/>
  <text x="535" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">B&#8594;A</text>
  <line x1="673" y1="160" x2="717" y2="160" stroke="#E2557A" stroke-width="3" stroke-dasharray="4 3"/>
  <text x="695" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#E2557A">C&#8594;D ok</text>

  <text x="615" y="214" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">C hears B, but A and D are far apart &#8594; MACA lets C send.</text>

  <!-- ===================== Panel (c): RTS/CTS timeline ===================== -->
  <line x1="40" y1="320" x2="720" y2="320" stroke="#2A1A2E" stroke-width="1" stroke-opacity="0.25"/>
  <text x="40" y="350" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#2A1A2E">(c) The handshake on the wire (time &#8594;)</text>

  <!-- lanes -->
  <text x="70" y="392" text-anchor="end" font-family="monospace" font-size="13" font-weight="700" fill="#2A1A2E">A</text>
  <text x="70" y="436" text-anchor="end" font-family="monospace" font-size="13" font-weight="700" fill="#2A1A2E">B</text>
  <text x="70" y="480" text-anchor="end" font-family="monospace" font-size="13" font-weight="700" fill="#2A1A2E">nbr</text>
  <line x1="84" y1="392" x2="720" y2="392" stroke="#2A1A2E" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="84" y1="436" x2="720" y2="436" stroke="#2A1A2E" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="84" y1="480" x2="720" y2="480" stroke="#2A1A2E" stroke-width="1" stroke-opacity="0.3"/>

  <!-- RTS from A -->
  <rect x="100" y="378" width="70" height="28" rx="3" fill="#E2557A" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="135" y="397" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#FFF7EC">RTS</text>
  <text x="135" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#2A1A2E">30 B, len</text>

  <!-- CTS from B -->
  <rect x="210" y="422" width="70" height="28" rx="3" fill="#E2557A" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="245" y="441" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#FFF7EC">CTS</text>
  <text x="245" y="468" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#2A1A2E">echoes len</text>

  <!-- DATA from A -->
  <rect x="320" y="378" width="230" height="28" rx="3" fill="#2A1A2E"/>
  <text x="435" y="397" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#FFF7EC">DATA</text>

  <!-- ACK from B -->
  <rect x="590" y="422" width="60" height="28" rx="3" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="620" y="441" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#2A1A2E">ACK</text>

  <!-- NAV bar on neighbour lane -->
  <rect x="280" y="466" width="270" height="22" rx="3" fill="#E2557A" fill-opacity="0.25" stroke="#E2557A" stroke-dasharray="4 3" stroke-width="1.5"/>
  <text x="415" y="481" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#2A1A2E">NAV: neighbour silent for announced length</text>

  <!-- arrows -->
  <line x1="170" y1="392" x2="212" y2="430" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="280" y1="436" x2="322" y2="400" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="550" y1="392" x2="590" y2="430" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#ar)"/>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2A1A2E"/>
    </marker>
  </defs>

  <text x="40" y="534" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">Carrier sense senses the sender, but collisions happen at the receiver. The CTS speaks for the receiver, and</text>
  <text x="40" y="550" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">confines collisions to the 30-byte RTS: lost RTS &#8594; no CTS &#8594; random binary-exponential backoff and retry.</text>
</svg>
