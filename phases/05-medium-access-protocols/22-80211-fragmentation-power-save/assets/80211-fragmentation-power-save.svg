<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="800" height="480" fill="#FFF7EC"/>
  <g fill="#2A1A2E">
    <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold">802.11 Fragment Burst + Power Save (TIM)</text>
    <text x="400" y="50" text-anchor="middle" font-size="11" font-weight="bold">Stop-and-wait per fragment, SIFS-bounded burst, Duration/NAV reservation</text>
  </g>

  <!-- Fragment burst timeline -->
  <g>
    <rect x="40" y="80" width="720" height="180" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="100" font-size="13" font-weight="bold" fill="#2A1A2E">Fragment burst: SIFS-separated, ACK after each</text>
    <line x1="60" y1="130" x2="740" y2="130" stroke="#2A1A2E" stroke-width="1.5"/>

    <rect x="60" y="116" width="120" height="28" fill="#E2557A" opacity="0.7"/>
    <text x="120" y="135" text-anchor="middle" font-size="10" fill="#FFF7EC" font-weight="bold">DATA  frag 0</text>

    <rect x="190" y="116" width="60" height="28" fill="#2A1A2E"/>
    <text x="220" y="135" text-anchor="middle" font-size="10" fill="#FFF7EC" font-weight="bold">ACK 0</text>

    <rect x="260" y="116" width="120" height="28" fill="#E2557A" opacity="0.7"/>
    <text x="320" y="135" text-anchor="middle" font-size="10" fill="#FFF7EC" font-weight="bold">DATA  frag 1</text>

    <rect x="390" y="116" width="60" height="28" fill="#2A1A2E"/>
    <text x="420" y="135" text-anchor="middle" font-size="10" fill="#FFF7EC" font-weight="bold">ACK 1</text>

    <rect x="460" y="116" width="120" height="28" fill="#E2557A" opacity="0.7"/>
    <text x="520" y="135" text-anchor="middle" font-size="10" fill="#FFF7EC" font-weight="bold">DATA  frag 2</text>

    <rect x="590" y="116" width="60" height="28" fill="#2A1A2E"/>
    <text x="620" y="135" text-anchor="middle" font-size="10" fill="#FFF7EC" font-weight="bold">ACK 2</text>

    <text x="60" y="166" font-size="10" fill="#2A1A2E">SIFS</text>
    <text x="184" y="166" font-size="10" fill="#2A1A2E">SIFS</text>
    <text x="254" y="166" font-size="10" fill="#2A1A2E">SIFS</text>
    <text x="384" y="166" font-size="10" fill="#2A1A2E">SIFS</text>
    <text x="454" y="166" font-size="10" fill="#2A1A2E">SIFS</text>
    <text x="584" y="166" font-size="10" fill="#2A1A2E">SIFS</text>

    <text x="60" y="200" font-size="11" fill="#2A1A2E" font-weight="bold">SeqCtrl shared, Fragment Number increments 0,1,2 — MF=1 on all but last; Duration field reserves NAV until next ACK</text>
    <text x="60" y="220" font-size="11" fill="#2A1A2E">Retry bit set on retransmits; Last-Fragment flag means MF=0 + no more pieces</text>
    <text x="60" y="240" font-size="11" fill="#2A1A2E">Fragmentation threshold (aDot11FragmentationThreshold) typically 500-800 B; AP configures per BSS</text>
  </g>

  <!-- Power save with TIM -->
  <g>
    <rect x="40" y="280" width="720" height="180" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="300" font-size="13" font-weight="bold" fill="#2A1A2E">Power save: beacon with TIM</text>
    <line x1="60" y1="320" x2="740" y2="320" stroke="#2A1A2E" stroke-width="1"/>

    <rect x="60" y="310" width="60" height="20" fill="#E2557A" opacity="0.7"/>
    <text x="90" y="324" text-anchor="middle" font-size="10" fill="#FFF7EC" font-weight="bold">Beacon</text>
    <rect x="125" y="310" width="60" height="20" fill="#E2557A" opacity="0.7"/>
    <text x="155" y="324" text-anchor="middle" font-size="10" fill="#FFF7EC" font-weight="bold">Beacon</text>
    <rect x="190" y="310" width="60" height="20" fill="#E2557A" opacity="0.7"/>
    <text x="225" y="324" text-anchor="middle" font-size="10" fill="#FFF7EC" font-weight="bold">Beacon</text>

    <line x1="60" y1="350" x2="245" y2="350" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="150" y="345" text-anchor="middle" font-size="10" fill="#2A1A2E">interval 100 TU = 102.4 ms</text>

    <rect x="265" y="310" width="80" height="20" fill="#2A1A2E"/>
    <text x="305" y="324" text-anchor="middle" font-size="10" fill="#FFF7EC" font-weight="bold">DTIM (B/M)</text>

    <rect x="60" y="380" width="40" height="14" fill="#2A1A2E" opacity="0.4"/>
    <text x="80" y="395" text-anchor="middle" font-size="9" fill="#2A1A2E">STA awake</text>
    <rect x="100" y="380" width="60" height="14" fill="#2A1A2E" opacity="0.4"/>
    <text x="130" y="395" text-anchor="middle" font-size="9" fill="#2A1A2E">PS-Poll</text>
    <rect x="160" y="380" width="60" height="14" fill="#2A1A2E" opacity="0.4"/>
    <text x="190" y="395" text-anchor="middle" font-size="9" fill="#2A1A2E">data</text>
    <rect x="220" y="380" width="100" height="14" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.5"/>
    <text x="270" y="395" text-anchor="middle" font-size="9" fill="#2A1A2E">doze</text>

    <text x="350" y="360" font-size="11" fill="#2A1A2E" font-weight="bold">TIM element: 200 bytes (251 B virtual bitmap),</text>
    <text x="350" y="378" font-size="11" fill="#2A1A2E">1 bit per AID (1-2007), bit set means frame buffered.</text>
    <text x="350" y="396" font-size="11" fill="#2A1A2E">DTIM (Delivery TIM) interval for broadcast/multicast.</text>
    <text x="350" y="414" font-size="11" fill="#2A1A2E">U-APSD (802.11e): trigger frame → APSD delivery in same AC queue.</text>
    <text x="350" y="432" font-size="11" fill="#2A1A2E">Listen Interval: how many beacon periods STA sleeps before waking.</text>
  </g>
</svg>
