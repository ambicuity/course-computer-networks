<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560">
  <rect width="880" height="560" fill="#FFF7EC"/>
  <style>
    .ink { fill:#2A1A2E; font-family:Inter, ui-sans-serif, system-ui, sans-serif; }
    .berry { fill:#E2557A; }
    .stroke-ink { stroke:#2A1A2E; fill:none; }
    .stroke-berry { stroke:#E2557A; fill:none; }
    .mono { font-family: ui-monospace, Menlo, Consolas, monospace; fill:#2A1A2E; }
    .small { font-size:11px; }
    .lbl { font-size:13px; }
    .sec { font-size:18px; font-weight:700; }
    .tag { font-size:10px; font-weight:700; fill:#FFF7EC; }
  </style>
  <text x="440" y="32" text-anchor="middle" class="ink sec">OSPF Link-State Routing (RFC 2328)</text>

  <!-- Topology graph -->
  <text x="40" y="68" class="ink sec">AS topology → directed weighted graph</text>
  <g stroke="#2A1A2E" stroke-width="1.6" fill="#FFF7EC">
    <circle cx="180" cy="160" r="22"/><text x="180" y="166" text-anchor="middle" class="ink lbl">R1</text>
    <circle cx="380" cy="160" r="22"/><text x="380" y="166" text-anchor="middle" class="ink lbl">R3</text>
    <circle cx="180" cy="320" r="22"/><text x="180" y="326" text-anchor="middle" class="ink lbl">R2</text>
    <circle cx="380" cy="320" r="22"/><text x="380" y="326" text-anchor="middle" class="ink lbl">R4</text>
  </g>
  <g class="mono small">
    <!-- arcs -->
    <line x1="202" y1="160" x2="358" y2="160" class="stroke-ink"/>
    <text x="280" y="153" text-anchor="middle" class="ink">cost=5</text>
    <line x1="180" y1="182" x2="180" y2="298" class="stroke-ink"/>
    <text x="190" y="246" class="ink">cost=2</text>
    <line x1="380" y1="182" x2="380" y2="298" class="stroke-ink"/>
    <text x="390" y="246" class="ink">cost=4</text>
    <line x1="202" y1="320" x2="358" y2="320" class="stroke-berry" stroke-dasharray="5 3"/>
    <text x="280" y="313" text-anchor="middle" fill="#E2557A">cost=8 (down)</text>
    <line x1="202" y1="170" x2="358" y2="310" class="stroke-ink"/>
    <text x="285" y="246" class="ink">cost=3 (diag)</text>
  </g>

  <!-- LSA flooding -->
  <text x="500" y="68" class="ink sec">LSA flooding &amp; SPF</text>
  <g class="mono small">
    <text x="500" y="100" class="ink">R2 floods LSA: (R2, [R1@2, R4@8↓])</text>
    <text x="500" y="120" class="ink">R3 floods LSA: (R3, [R1@5, R4@4, R2@?])</text>
    <text x="500" y="140" class="ink">R1 runs Dijkstra:</text>
    <text x="500" y="158" class="ink">  R1→R2 = 2 (direct)</text>
    <text x="500" y="176" class="ink">  R1→R3 = 5 (direct)</text>
    <text x="500" y="194" class="ink">  R1→R4 = min(2+8↓, 5+4, 5+3+2) = 5</text>
    <text x="500" y="212" class="ink">  via R1→R3→R4 (ECMP: also R1→R3→R2→...)</text>
    <text x="500" y="240" class="ink">ECMP carries traffic on both</text>
    <text x="500" y="258" class="ink">equal-cost paths (RFC 2328 §16.1)</text>
  </g>

  <!-- Area hierarchy -->
  <text x="40" y="400" class="ink sec">Areas · DR · message types</text>
  <g class="mono small">
    <text x="40" y="426" class="ink">Backbone (area 0) ── ABR ─ Area 1</text>
    <text x="40" y="444" class="ink">                    \__ ABR ─ Area 2 (stub)</text>
    <text x="40" y="470" class="ink">DR (broadcast LAN): collapses N routers</text>
    <text x="40" y="488" class="ink">  into one pseudo-node so adjacencies = N not N(N-1)/2</text>
    <text x="40" y="514" class="ink">Msgs (IP proto 89): HELLO · DBDESC · LSREQ · LSUPDATE · LSACK</text>
    <text x="40" y="532" class="ink">Timers: HELLO 10s, dead 40s, LSA refresh 30min</text>
  </g>
</svg>
