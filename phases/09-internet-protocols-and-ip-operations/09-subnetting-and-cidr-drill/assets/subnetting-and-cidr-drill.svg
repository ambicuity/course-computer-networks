<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560">
  <rect width="880" height="560" fill="#FFF7EC"/>
  <style>
    .ink { fill:#2A1A2E; font-family:Inter, ui-sans-serif, system-ui, sans-serif; }
    .berry { fill:#E2557A; }
    .stroke-ink { stroke:#2A1A2E; fill:none; }
    .mono { font-family: ui-monospace, Menlo, Consolas, monospace; fill:#2A1A2E; }
    .small { font-size:11px; }
    .sec { font-size:18px; font-weight:700; }
    .tag { font-size:10px; font-weight:700; fill:#FFF7EC; }
  </style>
  <text x="440" y="32" text-anchor="middle" class="ink sec">Subnetting a /16 and CIDR longest-prefix match</text>

  <!-- Subnet split tree -->
  <g stroke="#2A1A2E" stroke-width="1.4" fill="none">
    <rect x="40" y="80" width="220" height="50"/>
    <line x1="150" y1="130" x2="80" y2="170"/>
    <line x1="150" y1="130" x2="260" y2="170"/>
    <line x1="150" y1="130" x2="440" y2="170"/>
    <line x1="150" y1="130" x2="620" y2="170"/>
    <rect x="40" y="170" width="80" height="50"/>
    <rect x="220" y="170" width="80" height="50"/>
    <rect x="400" y="170" width="80" height="50"/>
    <rect x="580" y="170" width="220" height="50"/>
  </g>
  <g class="mono small">
    <text x="150" y="112" text-anchor="middle" class="ink">128.208.0.0/16</text>
    <text x="80" y="195" text-anchor="middle" class="ink">/17 CS</text>
    <text x="80" y="212" text-anchor="middle" class="ink">32766</text>
    <text x="260" y="195" text-anchor="middle" class="ink">/18 EE</text>
    <text x="260" y="212" text-anchor="middle" class="ink">16382</text>
    <text x="440" y="195" text-anchor="middle" class="ink">/19 Art</text>
    <text x="440" y="212" text-anchor="middle" class="ink">8190</text>
    <text x="690" y="195" text-anchor="middle" fill="#E2557A">unallocated</text>
    <text x="690" y="212" text-anchor="middle" fill="#E2557A">8190</text>
  </g>

  <text x="40" y="270" class="ink sec">AND the destination to find the prefix</text>
  <g class="mono small">
    <text x="40" y="298" class="ink">128.208.2.151 binary:</text>
    <text x="40" y="316" class="ink">10000000 11010000 00000010 10010111</text>
    <text x="40" y="340" class="ink">/17 mask 255.255.128.0 → AND → 128.208.128.0?</text>
    <text x="40" y="358" fill="#E2557A">No: 128.208.0.0/17 → CS match (first 17 bits = 0x80 0xD0 0|0...).</text>
    <text x="40" y="386" class="ink">/18 mask 255.255.192.0 → AND → 128.208.0.0/18 (EE).</text>
    <text x="40" y="410" fill="#E2557A">Longest-prefix: /18 wins over /17. EE subnet.</text>
  </g>

  <text x="40" y="450" class="ink sec">CIDR sizes (RFC 4632)</text>
  <g class="mono small">
    <text x="40" y="476" class="ink">/30 = 4 addrs (2 usable) — point-to-point</text>
    <text x="40" y="494" class="ink">/31 = 2 addrs (RFC 3021 both usable) PtP</text>
    <text x="40" y="512" class="ink">/24 = 256 addrs (254 hosts)</text>
    <text x="40" y="530" class="ink">/0  = default route — global fallback</text>
  </g>
  <text x="500" y="476" class="ink small">Leaked /0 = global blackhole.</text>
  <text x="500" y="494" class="ink small">/32 only host route, used for protect / loopback.</text>
</svg>
