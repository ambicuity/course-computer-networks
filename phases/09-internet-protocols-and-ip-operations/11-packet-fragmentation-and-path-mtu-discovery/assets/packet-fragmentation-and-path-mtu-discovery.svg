<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720" font-family="ui-monospace,Menlo,monospace"><rect width="1100" height="720" fill="#FFF7EC"/><rect x="32" y="20" width="1036" height="50" fill="#2A1A2E"/><text x="50" y="50" font-size="22" font-weight="700" fill="#FFF7EC">Packet Fragmentation and Path MTU Discovery</text><text x="50" y="66" font-size="11" fill="#FFF7EC" opacity="0.8">IPv4 MF/DF/offset + RFC 1191 PMTUD / IPv6 PTB + RFC 8201</text><text x="50" y="100" font-size="13" font-weight="700" fill="#2A1A2E">Fragmentation at MTU 1500: 4000 B datagram, header 20 B, ID 0xBEEF</text><g transform="translate(50,110)"><rect width="940" height="30" fill="#FFE3CB" stroke="#2A1A2E"/><line x1="20" y1="0" x2="20" y2="30" stroke="#2A1A2E"/><line x1="140" y1="0" x2="140" y2="30" stroke="#2A1A2E"/><line x1="660" y1="0" x2="660" y2="30" stroke="#2A1A2E"/><text x="6" y="20" font-size="11" fill="#2A1A2E">hdr 20</text><text x="76" y="20" font-size="11" fill="#2A1A2E">bytes 0..1479</text><text x="376" y="20" font-size="11" fill="#2A1A2E">bytes 1480..2959</text><text x="796" y="20" font-size="11" fill="#2A1A2E">bytes 2960..3999</text></g><path d="M520 154 L520 166" stroke="#E2557A" stroke-width="2" marker-end="url(#a)"/><rect x="380" y="166" width="280" height="22" fill="#2A1A2E"/><text x="400" y="182" font-size="11" fill="#FFF7EC">Ethernet link / MTU = 1500</text><g transform="translate(50,200)"><rect width="460" height="58" fill="#FFF" stroke="#2A1A2E"/><rect width="38" height="58" fill="#2A1A2E"/><text x="19" y="34" font-size="10" fill="#FFF7EC" text-anchor="middle">hdr</text><text x="48" y="14" font-size="11" fill="#2A1A2E">ID 0xBEEF MF=1 DF=0</text><text x="48" y="30" font-size="11" fill="#2A1A2E">frag_offset = 0</text><text x="48" y="48" font-size="11" fill="#2A1A2E">payload 1480 B</text><text x="240" y="34" font-size="10" fill="#E2557A" text-anchor="middle">frag #1 / total 1500</text></g><g transform="translate(530,200)"><rect width="460" height="58" fill="#FFF" stroke="#2A1A2E"/><rect width="38" height="58" fill="#2A1A2E"/><text x="19" y="34" font-size="10" fill="#FFF7EC" text-anchor="middle">hdr</text><text x="48" y="14" font-size="11" fill="#2A1A2E">ID 0xBEEF MF=0 DF=0</text><text x="48" y="30" font-size="11" fill="#2A1A2E">frag_offset = 370 (x8=2960)</text><text x="48" y="48" font-size="11" fill="#2A1A2E">payload 1040 B</text><text x="240" y="34" font-size="10" fill="#E2557A" text-anchor="middle">frag #3 / total 1060</text></g><text x="50" y="278" font-size="11" fill="#2A1A2E">frag #2: offset 185 (x8=1480), payload 1480 B, MF=1, total 1500. reassembly: 370 x 8 + (1060 - 20) = 4000 B</text><text x="50" y="318" font-size="13" font-weight="700" fill="#2A1A2E">Path MTU Discovery timeline (RFC 1191 / RFC 8201)</text><g transform="translate(50,332)"><rect width="990" height="48" fill="#FFE3CB" stroke="#2A1A2E"/><circle cx="38" cy="22" r="13" fill="#2A1A2E"/><text x="38" y="26" font-size="10" fill="#FFF7EC" text-anchor="middle">src</text><text x="38" y="64" font-size="10" fill="#2A1A2E" text-anchor="middle">10.0.0.1</text><rect x="190" y="4" width="78" height="32" fill="#FFF7EC" stroke="#2A1A2E"/><text x="229" y="24" font-size="11" fill="#2A1A2E" text-anchor="middle">R1 1500</text><rect x="430" y="4" width="78" height="32" fill="#FFF7EC" stroke="#2A1A2E"/><text x="469" y="24" font-size="11" fill="#2A1A2E" text-anchor="middle">R2 1492</text><rect x="670" y="4" width="78" height="32" fill="#FFF7EC" stroke="#2A1A2E"/><text x="709" y="24" font-size="11" fill="#2A1A2E" text-anchor="middle">R3 1476</text><circle cx="950" cy="22" r="13" fill="#2A1A2E"/><text x="950" y="26" font-size="10" fill="#FFF7EC" text-anchor="middle">dst</text><line x1="51" y1="22" x2="190" y2="22" stroke="#2A1A2E"/><line x1="268" y1="22" x2="430" y2="22" stroke="#2A1A2E"/><line x1="508" y1="22" x2="670" y2="22" stroke="#2A1A2E"/><line x1="748" y1="22" x2="937" y2="22" stroke="#2A1A2E"/></g><g transform="translate(50,414)"><rect width="990" height="32" fill="#FFF" stroke="#2A1A2E"/><circle cx="18" cy="16" r="8" fill="#E2557A"/><text x="36" y="13" font-size="12" font-weight="700" fill="#2A1A2E">probe 4000 B DF=1 -&gt; R1 drops, ICMP Type 3 Code 4 / PTB next-hop MTU = 1500</text><text x="36" y="26" font-size="11" fill="#2A1A2E">PMTU black hole = a router that drops the ICMP; the source keeps waiting on the old estimate.</text></g><g transform="translate(50,454)"><rect width="990" height="32" fill="#FFF" stroke="#2A1A2E"/><circle cx="18" cy="16" r="8" fill="#E2557A"/><text x="36" y="13" font-size="12" font-weight="700" fill="#2A1A2E">probe 1500 / 1492 B DF=1 -&gt; R3 rejects (GRE 1476), estimate -&gt; 1476</text><text x="36" y="26" font-size="11" fill="#2A1A2E">RFC 1191 plateau values: 1500, 1492, 1480, 1006, 576 -- host converges even with all ICMP filtered.</text></g><g transform="translate(50,494)"><rect width="990" height="32" fill="#FFF" stroke="#2A1A2E"/><circle cx="18" cy="16" r="8" fill="#E2557A"/><text x="36" y="13" font-size="12" font-weight="700" fill="#2A1A2E">final PMTU = 1476</text><text x="36" y="26" font-size="11" fill="#2A1A2E">Path MTU = min(1500, 1492, 1476) = 1476. Cache for at least 10 minutes per RFC 1191.</text></g><text x="50" y="558" font-size="11" fill="#2A1A2E">IPv6 rule: routers never fragment. The source uses a Fragment extension header with 8-byte aligned offsets (RFC 8200).</text><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L8 5 L0 10 z" fill="#E2557A"/></marker></defs></svg>