<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="760" height="480" fill="#FFF7EC"/>
  <g fill="#2A1A2E">
    <text x="380" y="30" text-anchor="middle" font-size="20" font-weight="bold">AIMD and the Chiu-Jain Convergence</text>
    <text x="380" y="50" text-anchor="middle" font-size="11" font-weight="bold">x_1 vs x_2 plane · AIAD/MIMD/MIAD oscillate, only AIMD converges</text>
  </g>

  <!-- Convergence plane -->
  <g>
    <rect x="80" y="90" width="320" height="320" fill="none" stroke="#2A1A2E" stroke-width="2"/>
    <text x="240" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#2A1A2E">x_2 (user 2 bandwidth)</text>
    <text x="92" y="105" font-size="11" fill="#2A1A2E">x_1 →</text>

    <!-- axes -->
    <line x1="100" y1="400" x2="100" y2="100" stroke="#2A1A2E" stroke-width="1.5"/>
    <line x1="100" y1="400" x2="400" y2="400" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="100" y="412" text-anchor="end" font-size="10" fill="#2A1A2E">0</text>
    <text x="100" y="412" font-size="10" fill="#2A1A2E" dx="100">x_1 (user 1 bandwidth) →</text>

    <!-- fairness line x = y -->
    <line x1="100" y1="400" x2="400" y2="100" stroke="#E2557A" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="285" y="232" font-size="10" fill="#E2557A" transform="rotate(-45 285 232)">fairness  x_1 = x_2</text>

    <!-- efficiency line x + y = 100% -->
    <line x1="100" y1="100" x2="400" y2="400" stroke="#2A1A2E" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="190" y="380" font-size="10" fill="#2A1A2E">efficiency  x_1 + x_2 = 100%</text>

    <!-- optimum point -->
    <circle cx="250" cy="250" r="6" fill="#E2557A"/>
    <text x="260" y="244" font-size="10" fill="#2A1A2E" font-weight="bold">optimum (50,50)</text>

    <!-- AIAD line -->
    <line x1="120" y1="370" x2="370" y2="120" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="320" y="365" font-size="10" fill="#2A1A2E">AIAD: 45°</text>

    <!-- MIMD rays -->
    <line x1="150" y1="380" x2="240" y2="120" stroke="#2A1A2E" stroke-width="0.5"/>
    <text x="160" y="200" font-size="10" fill="#2A1A2E">MIMD</text>

    <!-- AIMD trajectory: corner → zigzag to optimum -->
    <polyline points="115,395 380,125 130,380 350,140 145,365 330,155 160,355 305,170 180,340 280,200 210,310 255,250 230,270 250,250"
              fill="none" stroke="#E2557A" stroke-width="1.8"/>
    <text x="320" y="170" font-size="10" fill="#E2557A" font-weight="bold">AIMD trajectory</text>
  </g>

  <!-- Right side: cwnd sawtooth -->
  <g>
    <rect x="430" y="90" width="300" height="180" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="580" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#2A1A2E">cwnd over RTT (TCP-NewReno)</text>
    <text x="430" y="270" font-size="9" fill="#2A1A2E">0                          time →</text>
    <!-- cwnd graph -->
    <line x1="450" y1="240" x2="710" y2="240" stroke="#2A1A2E" stroke-width="1"/>
    <polyline points="450,250 470,240 480,200 500,200 510,160 530,160 540,120 560,120 570,180 590,180 600,140 620,140 630,100 650,100 660,150 680,150 700,120 710,120"
              fill="none" stroke="#E2557A" stroke-width="1.5"/>
    <text x="660" y="170" font-size="9" fill="#E2557A" font-weight="bold">cwnd += 1/RTT (AIM)</text>
    <text x="660" y="190" font-size="9" fill="#2A1A2E">cwnd /= 2 on triple-dup-ACK (MD)</text>
    <text x="430" y="262" font-size="9" fill="#2A1A2E">ssthresh</text>
  </g>

  <!-- Right side: Chiu-Jain signal table -->
  <g>
    <rect x="430" y="290" width="300" height="160" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="580" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="#2A1A2E">Signal taxonomy (Fig 6-23)</text>
    <g fill="#2A1A2E" font-size="9">
      <text x="440" y="332">                  precise       imprecise</text>
      <text x="440" y="350">explicit     XCP          ECN-aware TCP</text>
      <text x="440" y="370">implicit     FAST TCP     CUBIC, classic</text>
    </g>
    <text x="430" y="404" font-size="10" fill="#2A1A2E">AIMD is the only one of 4 control laws</text>
    <text x="430" y="420" font-size="10" fill="#2A1A2E">(AI, AI, MD, MD combos) that converges to</text>
    <text x="430" y="436" font-size="10" fill="#2A1A2E">the intersection of fairness and efficiency.</text>
  </g>

  <text x="380" y="470" text-anchor="middle" font-size="10" fill="#2A1A2E">Eq sending rate = cwnd / RTT  ·  RTT bias: closer peers get more bandwidth  ·  CUBIC / BBR fix it</text>
</svg>
