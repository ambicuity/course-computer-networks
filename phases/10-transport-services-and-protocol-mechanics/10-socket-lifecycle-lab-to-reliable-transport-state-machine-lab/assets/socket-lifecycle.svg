<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-label="Socket lifecycle and stop-and-wait state machine">
  <defs>
    <style>
      .bg { fill: #FFF7EC; }
      .ink { fill: #2A1A2E; }
      .accent { fill: #E2557A; }
      .stroke-ink { stroke: #2A1A2E; fill: none; stroke-width: 1.6; }
      .stroke-accent { stroke: #E2557A; fill: none; stroke-width: 2.0; }
      .stroke-dash { stroke: #2A1A2E; fill: none; stroke-width: 1.2; stroke-dasharray: 4 3; }
      .label { font: 600 12px ui-sans-serif, system-ui, sans-serif; fill: #2A1A2E; }
      .label-accent { font: 700 12px ui-sans-serif, system-ui, sans-serif; fill: #E2557A; }
      .title { font: 700 22px ui-sans-serif, system-ui, sans-serif; fill: #2A1A2E; }
      .sub { font: 500 11px ui-sans-serif, system-ui, sans-serif; fill: #2A1A2E; }
      .mono { font: 500 11px ui-monospace, Menlo, monospace; fill: #2A1A2E; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="620"/>

  <text class="title" x="36" y="44">Socket Lifecycle + Stop-and-Wait FSM</text>
  <text class="sub" x="36" y="64">RFC 793 has 11 states; BSD socket API exposes ~5; user-space stop-and-wait exposes 2</text>

  <!-- Top half: visible TCP socket lifecycle -->
  <g transform="translate(36, 92)">
    <text class="label" x="0" y="0">VISIBLE TCP LIFECYCLE (BSD socket API)</text>

    <g>
      <rect class="stroke-ink" x="20"  y="20" width="100" height="36" rx="6"/>
      <text class="label" x="70" y="42" text-anchor="middle">CLOSED</text>
      <rect class="stroke-ink" x="170" y="20" width="100" height="36" rx="6"/>
      <text class="label" x="220" y="42" text-anchor="middle">BOUND</text>
      <rect class="stroke-ink" x="320" y="20" width="100" height="36" rx="6"/>
      <text class="label" x="370" y="42" text-anchor="middle">LISTEN</text>
      <rect class="stroke-accent" x="470" y="20" width="120" height="36" rx="6"/>
      <text class="label-accent" x="530" y="42" text-anchor="middle">ESTABLISHED</text>
      <rect class="stroke-ink" x="640" y="20" width="120" height="36" rx="6"/>
      <text class="label" x="700" y="42" text-anchor="middle">CLOSE_WAIT</text>
      <rect class="stroke-ink" x="640" y="100" width="120" height="36" rx="6"/>
      <text class="label" x="700" y="122" text-anchor="middle">TIME_WAIT</text>
    </g>

    <line class="stroke-ink" x1="120" y1="38" x2="170" y2="38"/>
    <text class="mono" x="145" y="32" text-anchor="middle">bind()</text>
    <line class="stroke-ink" x1="270" y1="38" x2="320" y2="38"/>
    <text class="mono" x="295" y="32" text-anchor="middle">listen()</text>
    <line class="stroke-ink" x1="420" y1="38" x2="470" y2="38"/>
    <text class="mono" x="445" y="32" text-anchor="middle">accept()</text>
    <line class="stroke-ink" x1="590" y1="38" x2="640" y2="38"/>
    <text class="mono" x="615" y="32" text-anchor="middle">shutdown(WR)</text>
    <path class="stroke-accent" d="M700,56 Q700,80 700,100"/>
    <text class="label-accent" x="730" y="84">close() (FIN-ACK)</text>
    <line class="stroke-dash" x1="700" y1="136" x2="700" y2="160"/>
    <text class="mono" x="730" y="150">2*MSL (60s)</text>
    <line class="stroke-dash" x1="700" y1="160" x2="500" y2="180"/>
    <line class="stroke-dash" x1="500" y1="180" x2="70" y2="180"/>
    <text class="mono" x="280" y="172" text-anchor="middle">garbage collected</text>

    <g transform="translate(20, 220)">
      <rect class="stroke-dash" x="0" y="0" width="800" height="50" rx="6"/>
      <text class="label" x="14" y="22">Hidden by the kernel</text>
      <text class="sub" x="14" y="38">SYN_SENT, SYN_RECEIVED, FIN_WAIT_1, FIN_WAIT_2, CLOSING, LAST_ACK - all complete before the app observes state changes</text>
    </g>
  </g>

  <!-- Bottom half: stop-and-wait FSM -->
  <g transform="translate(36, 380)">
    <text class="label" x="0" y="0">STOP-AND-WAIT RELIABLE TRANSPORT (user-space over UDP)</text>

    <rect class="stroke-ink" x="60"  y="20" width="160" height="48" rx="6"/>
    <text class="label" x="140" y="46" text-anchor="middle">S0 (READY, seq=0)</text>
    <rect class="stroke-accent" x="320" y="20" width="200" height="48" rx="6"/>
    <text class="label-accent" x="420" y="46" text-anchor="middle">S1 (WAIT_ACK, seq=0)</text>
    <rect class="stroke-ink" x="620" y="20" width="160" height="48" rx="6"/>
    <text class="label" x="700" y="46" text-anchor="middle">S0' (seq=1)</text>
    <rect class="stroke-ink" x="320" y="120" width="200" height="48" rx="6"/>
    <text class="label" x="420" y="146" text-anchor="middle">S1' (WAIT_ACK, seq=1)</text>

    <line class="stroke-ink" x1="220" y1="44" x2="320" y2="44"/>
    <text class="mono" x="270" y="38" text-anchor="middle">send DATA seq=0</text>
    <line class="stroke-ink" x1="520" y1="44" x2="620" y2="44"/>
    <text class="mono" x="570" y="38" text-anchor="middle">ACK seq=0</text>
    <path class="stroke-ink" d="M420,68 L420,120"/>
    <text class="mono" x="430" y="100">timeout -> retransmit</text>
    <path class="stroke-dash" d="M620,44 L780,44 L780,160 L420,168"/>
    <text class="mono" x="700" y="160" text-anchor="middle">alternating bit flips</text>
  </g>
</svg>
