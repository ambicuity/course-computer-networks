<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <rect width="800" height="560" fill="#FFF7EC"/>
  <g font-family="Menlo, Consolas, monospace" fill="#2A1A2E">
    <text x="32" y="40" font-size="22" font-weight="700">Berkeley Sockets — primitives, states, and bytes</text>
    <text x="32" y="62" font-size="13" fill="#7A5478">Tanenbaum 6.1.3, Fig. 6-5 — eight primitives drive a seven-state machine per socket</text>
  </g>

  <!-- Server column -->
  <g font-family="Menlo, Consolas, monospace" fill="#2A1A2E">
    <rect x="60" y="100" width="180" height="38" rx="6" fill="#FFE0D2" stroke="#E2557A" stroke-width="1.5"/>
    <text x="74" y="124" font-size="14" font-weight="700">SOCKET() — fd=N</text>

    <rect x="60" y="148" width="180" height="38" rx="6" fill="#FFD2C2" stroke="#E2557A" stroke-width="1.5"/>
    <text x="74" y="172" font-size="14" font-weight="700">BIND(host, port)</text>

    <rect x="60" y="196" width="180" height="38" rx="6" fill="#FFC2B0" stroke="#E2557A" stroke-width="1.5"/>
    <text x="74" y="220" font-size="14" font-weight="700">LISTEN(backlog=N)</text>

    <rect x="60" y="244" width="180" height="38" rx="6" fill="#FFB19D" stroke="#E2557A" stroke-width="1.5"/>
    <text x="74" y="268" font-size="14" font-weight="700">ACCEPT() — blocks</text>

    <rect x="60" y="292" width="180" height="38" rx="6" fill="#E2557A" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="74" y="316" font-size="14" font-weight="700" fill="#FFF7EC">SEND / RECEIVE / CLOSE</text>

    <text x="60" y="92" font-size="12" fill="#7A5478">SERVER (passive open)</text>
  </g>

  <!-- Arrows between server states -->
  <g stroke="#E2557A" stroke-width="2" fill="none">
    <line x1="150" y1="138" x2="150" y2="146"/>
    <polygon points="150,148 146,142 154,142" fill="#E2557A"/>
    <line x1="150" y1="186" x2="150" y2="194"/>
    <polygon points="150,196 146,190 154,190" fill="#E2557A"/>
    <line x1="150" y1="234" x2="150" y2="242"/>
    <polygon points="150,244 146,238 154,238" fill="#E2557A"/>
    <line x1="150" y1="282" x2="150" y2="290"/>
    <polygon points="150,292 146,286 154,286" fill="#E2557A"/>
  </g>

  <!-- Client column -->
  <g font-family="Menlo, Consolas, monospace" fill="#2A1A2E">
    <text x="560" y="92" font-size="12" fill="#7A5478">CLIENT (active open)</text>

    <rect x="560" y="100" width="180" height="38" rx="6" fill="#FFE0D2" stroke="#E2557A" stroke-width="1.5"/>
    <text x="574" y="124" font-size="14" font-weight="700">SOCKET() — fd=M</text>

    <rect x="560" y="196" width="180" height="38" rx="6" fill="#FFC2B0" stroke="#E2557A" stroke-width="1.5"/>
    <text x="574" y="220" font-size="14" font-weight="700">CONNECT(host, port)</text>

    <rect x="560" y="244" width="180" height="38" rx="6" fill="#FFB19D" stroke="#E2557A" stroke-width="1.5"/>
    <text x="574" y="268" font-size="14" font-weight="700">3-way handshake (SYN…)</text>

    <rect x="560" y="292" width="180" height="38" rx="6" fill="#E2557A" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="574" y="316" font-size="14" font-weight="700" fill="#FFF7EC">SEND / RECEIVE / CLOSE</text>

    <!-- arrow connector SOCKET -> CONNECT -->
    <line x1="650" y1="138" x2="650" y2="194" stroke="#E2557A" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="660" y="170" font-size="11" fill="#7A5478">BIND() optional</text>

    <line x1="650" y1="234" x2="650" y2="242" stroke="#E2557A" stroke-width="2"/>
    <polygon points="650,244 646,238 654,238" fill="#E2557A"/>

    <line x1="650" y1="282" x2="650" y2="290" stroke="#E2557A" stroke-width="2"/>
    <polygon points="650,292 646,286 654,286" fill="#E2557A"/>
  </g>

  <!-- State labels (right side) -->
  <g font-family="Menlo, Consolas, monospace" fill="#2A1A2E" font-size="11">
    <text x="252" y="124" fill="#7A5478">→ UNCONNECTED</text>
    <text x="252" y="172" fill="#7A5478">→ BOUND</text>
    <text x="252" y="220" fill="#7A5478">→ LISTENING</text>
    <text x="252" y="268" fill="#7A5478">→ ESTABLISHED</text>
    <text x="252" y="316" fill="#7A5478">→ CLOSING → CLOSED</text>

    <text x="452" y="124" fill="#7A5478">→ UNCONNECTED</text>
    <text x="452" y="220" fill="#7A5478">→ ESTABLISHED</text>
    <text x="452" y="316" fill="#7A5478">→ CLOSING → CLOSED</text>
  </g>

  <!-- Wire-equivalent (3-way handshake) on bottom -->
  <g font-family="Menlo, Consolas, monospace" fill="#2A1A2E">
    <text x="32" y="372" font-size="14" font-weight="700">What the API hides — TCP wire equivalents</text>

    <line x1="120" y1="412" x2="120" y2="492" stroke="#2A1A2E" stroke-width="1.5"/>
    <line x1="650" y1="412" x2="650" y2="492" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="406" font-size="12" font-weight="700">client</text>
    <text x="610" y="406" font-size="12" font-weight="700">server</text>

    <line x1="120" y1="426" x2="650" y2="426" stroke="#E2557A" stroke-width="2"/>
    <polygon points="650,426 640,422 640,430" fill="#E2557A"/>
    <text x="350" y="422" font-size="11" fill="#2A1A2E">SYN, seq=x   (CONNECT)</text>

    <line x1="650" y1="446" x2="120" y2="446" stroke="#E2557A" stroke-width="2"/>
    <polygon points="120,446 130,442 130,450" fill="#E2557A"/>
    <text x="350" y="442" font-size="11" fill="#2A1A2E">SYN+ACK, seq=y, ack=x   (kernel accept)</text>

    <line x1="120" y1="466" x2="650" y2="466" stroke="#E2557A" stroke-width="2"/>
    <polygon points="650,466 640,462 640,470" fill="#E2557A"/>
    <text x="350" y="462" font-size="11" fill="#2A1A2E">ACK, seq=x+1, ack=y+1   (CONNECT returns)</text>

    <line x1="120" y1="488" x2="650" y2="488" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="120" y="504" font-size="11" fill="#7A5478">ESTABLISHED — bytes flow as a stream; SEND/RECV are decoupled from segment boundaries</text>
  </g>

  <!-- Footer: failure modes -->
  <g font-family="Menlo, Consolas, monospace" fill="#2A1A2E" font-size="11">
    <rect x="32" y="514" width="736" height="36" fill="#FFE9D6" stroke="#E2557A" stroke-width="1"/>
    <text x="44" y="530" font-weight="700">Failure modes the app sees:</text>
    <text x="44" y="544">errno 111 (refused) = no listener / RST —  errno 110 (timeout) = SYN never ACKed —  backlog full = kernel drops new SYNs</text>
  </g>
</svg>
