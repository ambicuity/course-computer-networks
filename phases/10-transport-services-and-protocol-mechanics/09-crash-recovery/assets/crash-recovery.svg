<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-label="Crash recovery seven cases and sender state machine">
  <defs>
    <style>
      .bg { fill: #FFF7EC; }
      .ink { fill: #2A1A2E; }
      .accent { fill: #E2557A; }
      .stroke-ink { stroke: #2A1A2E; fill: none; stroke-width: 1.6; }
      .stroke-accent { stroke: #E2557A; fill: none; stroke-width: 2.0; }
      .stroke-dash { stroke: #2A1A2E; fill: none; stroke-width: 1.2; stroke-dasharray: 4 3; }
      .label { font: 600 12px ui-sans-serif, system-ui, sans-serif; fill: #2A1A2E; }
      .label-accent { font: 700 12px ui-sans-serif, system-ui, sans-serif; fill: #E2557A; }
      .title { font: 700 22px ui-sans-serif, system-ui, sans-serif; fill: #2A1A2E; }
      .sub { font: 500 11px ui-sans-serif, system-ui, sans-serif; fill: #2A1A2E; }
      .mono { font: 500 11px ui-monospace, Menlo, monospace; fill: #2A1A2E; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="620"/>

  <text class="title" x="36" y="44">Crash Recovery: Seven Cases + Sender FSM</text>
  <text class="sub" x="36" y="64">Two-Army Problem: no finite ACK proves final delivery; TCP escapes with timeouts + dup drops by seq#</text>

  <!-- Top half: seven-case matrix -->
  <g transform="translate(36, 92)">
    <text class="label" x="0" y="0">SEVEN CASES (Tanenbaum &amp; Wetherall 5e, Sec 6.6)</text>
    <rect class="stroke-ink" x="0" y="10" width="888" height="200"/>
    <line class="stroke-ink" x1="0" y1="40" x2="888" y2="40"/>
    <line class="stroke-ink" x1="0" y1="100" x2="888" y2="100"/>
    <line class="stroke-ink" x1="120" y1="10" x2="120" y2="210"/>
    <line class="stroke-ink" x1="280" y1="10" x2="280" y2="210"/>
    <line class="stroke-ink" x1="500" y1="10" x2="500" y2="210"/>
    <line class="stroke-ink" x1="680" y1="10" x2="680" y2="210"/>

    <text class="label" x="60" y="30" text-anchor="middle">Case</text>
    <text class="label" x="200" y="30" text-anchor="middle">Last sent by</text>
    <text class="label" x="390" y="30" text-anchor="middle">Crashed</text>
    <text class="label" x="590" y="30" text-anchor="middle">Survivor's dilemma</text>
    <text class="label" x="784" y="30" text-anchor="middle">Action</text>

    <text class="mono" x="60" y="70" text-anchor="middle">1</text>
    <text class="mono" x="60" y="130" text-anchor="middle">2</text>
    <text class="mono" x="60" y="160" text-anchor="middle">3</text>
    <text class="mono" x="60" y="190" text-anchor="middle">4</text>
    <text class="mono" x="60" y="220" text-anchor="middle">5/6</text>

    <text class="mono" x="200" y="70" text-anchor="middle">client</text>
    <text class="mono" x="200" y="130" text-anchor="middle">server</text>
    <text class="mono" x="200" y="160" text-anchor="middle">client</text>
    <text class="mono" x="200" y="190" text-anchor="middle">server</text>
    <text class="mono" x="200" y="220" text-anchor="middle">either</text>

    <text class="mono" x="390" y="70" text-anchor="middle">server</text>
    <text class="mono" x="390" y="130" text-anchor="middle">server</text>
    <text class="mono" x="390" y="160" text-anchor="middle">client</text>
    <text class="mono" x="390" y="190" text-anchor="middle">client</text>
    <text class="mono" x="390" y="220" text-anchor="middle">server</text>

    <text class="mono" x="510" y="70">server lost unacked state</text>
    <text class="mono" x="510" y="130">dupes on retransmit</text>
    <text class="mono" x="510" y="160">server still open, client gone</text>
    <text class="mono" x="510" y="190">server mid-send, client gone</text>
    <text class="mono" x="510" y="220">both: cold restart + checkpoint</text>

    <text class="mono" x="700" y="70">RST + retransmit</text>
    <text class="mono" x="700" y="130">seq# discards dupes</text>
    <text class="mono" x="700" y="160">keep-alive probe</text>
    <text class="mono" x="700" y="190">RTO drives retransmit</text>
    <text class="mono" x="700" y="220">app-level WAL</text>
  </g>

  <!-- Bottom half: sender-side FSM -->
  <g transform="translate(36, 332)">
    <text class="label" x="0" y="0">SENDER-SIDE STATE MACHINE</text>

    <!-- States as rounded rects -->
    <g>
      <rect class="stroke-ink" x="20"  y="20" width="100" height="40" rx="6"/>
      <text class="label" x="70" y="46" text-anchor="middle">IDLE</text>
      <rect class="stroke-ink" x="170" y="20" width="100" height="40" rx="6"/>
      <text class="label" x="220" y="46" text-anchor="middle">OPENED</text>
      <rect class="stroke-accent" x="320" y="20" width="110" height="40" rx="6"/>
      <text class="label-accent" x="375" y="46" text-anchor="middle">SENT_X</text>
      <rect class="stroke-ink" x="480" y="20" width="120" height="40" rx="6"/>
      <text class="label" x="540" y="46" text-anchor="middle">DELIVERED</text>
      <rect class="stroke-ink" x="650" y="100" width="100" height="40" rx="6"/>
      <text class="label" x="700" y="126" text-anchor="middle">DOWN</text>
      <rect class="stroke-ink" x="650" y="180" width="100" height="40" rx="6"/>
      <text class="label" x="700" y="206" text-anchor="middle">RST_SENT</text>
    </g>

    <!-- Edges -->
    <line class="stroke-ink" x1="120" y1="40" x2="170" y2="40"/>
    <text class="mono" x="145" y="34" text-anchor="middle">OPEN</text>
    <line class="stroke-ink" x1="270" y1="40" x2="320" y2="40"/>
    <text class="mono" x="295" y="34" text-anchor="middle">SEND</text>
    <line class="stroke-ink" x1="430" y1="40" x2="480" y2="40"/>
    <text class="mono" x="455" y="34" text-anchor="middle">ACK</text>
    <path class="stroke-ink" d="M540,60 Q540,90 700,100"/>
    <text class="mono" x="610" y="86">SEND</text>
    <path class="stroke-ink" d="M120,55 Q120,120 650,120"/>
    <text class="mono" x="380" y="115" text-anchor="middle">CRASH (peer)</text>
    <path class="stroke-ink" d="M650,140 Q540,160 380,60"/>
    <text class="mono" x="500" y="160" text-anchor="middle">RESTART + dupes by seq#</text>
    <path class="stroke-accent" d="M700,140 L700,180"/>
    <text class="label-accent" x="740" y="164" text-anchor="start">user-timeout</text>
    <text class="label-accent" x="740" y="178" text-anchor="start">(RFC 5482)</text>

    <!-- Two-Army corner note -->
    <g transform="translate(20, 230)">
      <rect class="stroke-dash" x="0" y="0" width="800" height="60" rx="6"/>
      <text class="label" x="14" y="22">Two-Army Problem</text>
      <text class="sub" x="14" y="40">For any finite round count k, the sender of the last message cannot prove it was received.</text>
      <text class="sub" x="14" y="55">TCP escapes the impossibility with retransmission timeouts (RFC 6298) + duplicate drops by sequence number.</text>
    </g>
  </g>
</svg>
