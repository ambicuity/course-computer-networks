<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560">
  <rect width="920" height="560" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .title { font-size: 24px; font-weight: 700; }
    .sub { font-size: 13px; fill: #6b5560; }
    .h { font-size: 16px; font-weight: 700; }
    .mono { font-family: monospace; font-size: 13px; fill: #2A1A2E; }
    .accent { fill: #E2557A; }
    .dim { fill: #6b5560; font-size: 12px; }
    .box { fill: #fff; stroke: #2A1A2E; stroke-width: 1.5; }
    .fbox { fill: #FFF0F4; stroke: #E2557A; stroke-width: 1.5; }
  </style>

  <text x="40" y="46" class="title">DES Round Function and Triple-DES</text>
  <text x="40" y="68" class="sub">16 Feistel rounds, 8 S-boxes, 56-bit key. 3DES adds EDE for 112-bit security.</text>

  <!-- DES round diagram -->
  <rect x="40" y="100" width="500" height="280" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="60" y="128" class="h">One Feistel round (DES section 8.2.1)</text>

  <text x="60" y="170" class="mono">L_{i-1} (32 bits)</text>
  <text x="60" y="220" class="mono">R_{i-1} (32 bits)</text>
  <text x="60" y="270" class="mono">L_i  = R_{i-1}</text>
  <text x="60" y="290" class="mono">R_i  = L_{i-1} XOR f(R_{i-1}, K_i)</text>

  <rect x="280" y="200" width="160" height="60" class="fbox" rx="6"/>
  <text x="360" y="222" text-anchor="middle" class="h accent">f(R, K)</text>
  <text x="360" y="244" text-anchor="middle" class="dim">expand, XOR, 8 S-boxes, P</text>

  <line x1="200" y1="220" x2="280" y2="220" stroke="#2A1A2E" stroke-width="2"/>
  <line x1="440" y1="220" x2="600" y2="220" stroke="#E2557A" stroke-width="2"/>
  <circle cx="600" cy="220" r="6" fill="#E2557A"/>
  <text x="612" y="216" class="mono">XOR</text>

  <!-- S-boxes and key schedule -->
  <rect x="40" y="400" width="240" height="140" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="60" y="424" class="h">8 S-boxes (6 -> 4 bits)</text>
  <text x="60" y="446" class="dim">Each: row = (b1 b6), col = (b2..b5)</text>
  <text x="60" y="466" class="mono">S1, S2, S3, S4, S5, S6, S7, S8</text>
  <text x="60" y="494" class="dim accent">Only nonlinear component of DES.</text>
  <text x="60" y="514" class="dim">Strength rests on the table choice.</text>

  <rect x="300" y="400" width="240" height="140" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="320" y="424" class="h">Key schedule</text>
  <text x="320" y="446" class="dim">64 -> 56 (drop parity)</text>
  <text x="320" y="466" class="dim">Split C, D (28 bits each)</text>
  <text x="320" y="486" class="dim">Rotate left 1 or 2 / round</text>
  <text x="320" y="506" class="dim">PC2 compresses 56 -> 48</text>
  <text x="320" y="524" class="mono accent">16 round keys</text>

  <!-- 3DES diagram on the right -->
  <rect x="560" y="100" width="320" height="440" rx="10" fill="#fff" stroke="#E2557A" stroke-width="2"/>
  <text x="580" y="128" class="h accent">Triple-DES (EDE)</text>
  <text x="580" y="148" class="dim">C = E_K3(D_K2(E_K1(P)))</text>

  <rect x="600" y="180" width="100" height="40" class="box" rx="6"/>
  <text x="650" y="206" text-anchor="middle" class="mono">E_K1</text>

  <rect x="720" y="180" width="100" height="40" class="box" rx="6"/>
  <text x="770" y="206" text-anchor="middle" class="mono">D_K2</text>

  <rect x="600" y="260" width="100" height="40" class="box" rx="6"/>
  <text x="650" y="286" text-anchor="middle" class="mono">E_K3</text>

  <text x="650" y="156" text-anchor="middle" class="dim">Plaintext</text>
  <text x="650" y="330" text-anchor="middle" class="dim accent">Ciphertext</text>

  <text x="600" y="360" class="dim">Backward compatible:</text>
  <text x="600" y="380" class="mono">if K1 = K2: middle D cancels.</text>

  <text x="600" y="420" class="dim">Effective security:</text>
  <text x="600" y="440" class="mono">2-key: 112 bits</text>
  <text x="600" y="460" class="mono">3-key: 168 bits</text>
  <text x="600" y="500" class="dim accent">NIST deprecated 2024.</text>
  <text x="600" y="520" class="dim">Migrate to AES.</text>
</svg>