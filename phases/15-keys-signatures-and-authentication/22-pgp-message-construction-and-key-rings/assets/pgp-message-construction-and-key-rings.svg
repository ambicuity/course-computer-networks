<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <rect width="900" height="560" fill="#FFF7EC"/>
  <g font-family="Georgia, serif" fill="#2A1A2E">
    <text x="40" y="44" font-size="22" font-weight="bold">PGP message construction</text>
    <text x="40" y="68" font-size="13" fill="#7a5a6a">Hash, sign, encrypt, wrap key, ASCII-armor</text>

    <g transform="translate(40,110)">
      <rect width="200" height="60" rx="6" fill="#fde2c8" stroke="#E2557A" stroke-width="1.5"/>
      <text x="100" y="26" text-anchor="middle" font-size="13" font-weight="bold">Plaintext P</text>
      <text x="100" y="46" text-anchor="middle" font-size="11">"shipment at pier 7"</text>
    </g>

    <g stroke="#2A1A2E" stroke-width="1.4" fill="none">
      <path d="M240 140 L320 140"/>
      <path d="M240 170 L320 170"/>
    </g>
    <polygon points="320,140 312,136 312,144" fill="#2A1A2E"/>
    <polygon points="320,170 312,166 312,174" fill="#2A1A2E"/>

    <g transform="translate(320,120)">
      <rect width="180" height="100" rx="6" fill="#fff" stroke="#E2557A" stroke-width="1.5"/>
      <text x="90" y="24" text-anchor="middle" font-size="13" font-weight="bold">Sender side</text>
      <text x="90" y="48" text-anchor="middle" font-size="11">1. SHA-256(P) = D</text>
      <text x="90" y="66" text-anchor="middle" font-size="11">2. Sig = D^d mod n</text>
      <text x="90" y="84" text-anchor="middle" font-size="11">3. K_S random 128 bit</text>
    </g>

    <g stroke="#2A1A2E" stroke-width="1.4" fill="none">
      <path d="M500 130 L600 110"/>
      <path d="M500 160 L600 130"/>
      <path d="M500 190 L600 200"/>
    </g>
    <polygon points="600,110 591,109 593,117" fill="#2A1A2E"/>
    <polygon points="600,130 591,129 593,137" fill="#2A1A2E"/>
    <polygon points="600,200 591,196 593,204" fill="#2A1A2E"/>

    <g transform="translate(600,80)">
      <rect width="260" height="270" rx="6" fill="#fde2c8" stroke="#E2557A" stroke-width="1.5"/>
      <text x="130" y="24" text-anchor="middle" font-size="13" font-weight="bold">PGP packet stream</text>
      <text x="130" y="58" text-anchor="middle" font-size="11">tag 02: Signature S</text>
      <text x="130" y="84" text-anchor="middle" font-size="11">tag 01: K_S wrapped (RSA)</text>
      <text x="130" y="110" text-anchor="middle" font-size="11">tag 09: Sym. enc. C</text>
      <text x="130" y="136" text-anchor="middle" font-size="11">tag 11: Literal data</text>
      <text x="130" y="170" text-anchor="middle" font-size="11">-----BEGIN PGP MESSAGE-----</text>
      <text x="130" y="190" text-anchor="middle" font-size="11">base64 (S | K_S' | C)</text>
      <text x="130" y="210" text-anchor="middle" font-size="11">CRC-24</text>
      <text x="130" y="240" text-anchor="middle" font-size="11">-----END PGP MESSAGE-----</text>
    </g>

    <g transform="translate(40,300)">
      <rect width="320" height="220" rx="6" fill="#fff" stroke="#E2557A" stroke-width="1.5"/>
      <text x="160" y="24" text-anchor="middle" font-size="13" font-weight="bold">Key rings on Alice's disk</text>
      <text x="160" y="50" text-anchor="middle" font-size="11" font-weight="bold">Public-key ring (pubring.gpg)</text>
      <text x="20" y="74" font-size="10">user-ID</text>
      <text x="160" y="74" font-size="10">key-ID</text>
      <text x="280" y="74" font-size="10">ownertrust</text>
      <text x="20" y="94" font-size="10">alice@…</text>
      <text x="160" y="94" font-size="10">0xA1F2…</text>
      <text x="280" y="94" font-size="10">ultimate</text>
      <text x="20" y="114" font-size="10">bob@…</text>
      <text x="160" y="114" font-size="10">0xB9C3…</text>
      <text x="280" y="114" font-size="10">full</text>
      <text x="20" y="134" font-size="10">carol@…</text>
      <text x="160" y="134" font-size="10">0x7E01…</text>
      <text x="280" y="134" font-size="10">marginal</text>
      <text x="160" y="170" text-anchor="middle" font-size="11" font-weight="bold">Private-key ring (secring.gpg)</text>
      <text x="20" y="192" font-size="10">alice@…  (passphrase: yes)</text>
    </g>

    <g transform="translate(420,300)">
      <rect width="440" height="220" rx="6" fill="#fff" stroke="#E2557A" stroke-width="1.5"/>
      <text x="220" y="24" text-anchor="middle" font-size="13" font-weight="bold">Web of trust: validity from ownertrust</text>
      <text x="20" y="60" font-size="11">Bob signed by Alice (ultimate) and Carol (full).</text>
      <text x="20" y="80" font-size="11">Validity(Bob) = 3 + 2 = 5 → "full".</text>
      <text x="20" y="100" font-size="11">Carol signed by Dave (marginal) only.</text>
      <text x="20" y="120" font-size="11">Validity(Carol) = 1 → "marginal".</text>
      <text x="20" y="150" font-size="11">Threshold: 2 marginal or 1 full.</text>
      <text x="20" y="178" font-size="11">Eve is a Sybil: signs herself with 10 disposable</text>
      <text x="20" y="196" font-size="11">marginal keys. PGP defends via pairwise signing</text>
      <text x="20" y="214" font-size="11">parties + introducer trust limits.</text>
    </g>
  </g>
</svg>