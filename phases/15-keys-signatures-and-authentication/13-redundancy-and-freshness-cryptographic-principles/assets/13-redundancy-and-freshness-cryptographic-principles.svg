<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560">
  <rect width="920" height="560" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .title { font-size: 24px; font-weight: 700; }
    .sub { font-size: 13px; fill: #6b5560; }
    .h { font-size: 16px; font-weight: 700; }
    .mono { font-family: monospace; font-size: 13px; fill: #2A1A2E; }
    .accent { fill: #E2557A; }
    .dim { fill: #6b5560; font-size: 12px; }
    .frame { fill: #fff; stroke: #2A1A2E; stroke-width: 1.5; }
    .field { fill: #FFF0F4; stroke: #E2557A; stroke-width: 1; }
  </style>

  <text x="40" y="46" class="title">Two Cryptographic Principles</text>
  <text x="40" y="68" class="sub">Encryption stops Eve. It does not stop Trudy. Redundancy and freshness do.</text>

  <!-- The Couch Potato frame -->
  <rect x="40" y="110" width="840" height="200" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="60" y="138" class="h">Order frame on the wire</text>
  <text x="60" y="158" class="dim">Each field below is exactly what the chapter prescribes.</text>

  <!-- field boxes -->
  <g transform="translate(60,180)">
    <rect x="0" y="0" width="100" height="80" class="field" rx="4"/>
    <text x="50" y="22" text-anchor="middle" class="h accent">9 zero bytes</text>
    <text x="50" y="42" text-anchor="middle" class="dim">redundancy</text>
    <text x="50" y="58" text-anchor="middle" class="mono">00 00 00 ...</text>
    <text x="50" y="74" text-anchor="middle" class="dim">2^-72 forgery rate</text>

    <rect x="110" y="0" width="80" height="80" class="field" rx="4"/>
    <text x="150" y="22" text-anchor="middle" class="h accent">timestamp</text>
    <text x="150" y="42" text-anchor="middle" class="dim">freshness</text>
    <text x="150" y="58" text-anchor="middle" class="mono">8 bytes</text>
    <text x="150" y="74" text-anchor="middle" class="dim">+/- 10 s window</text>

    <rect x="200" y="0" width="80" height="80" class="field" rx="4"/>
    <text x="240" y="22" text-anchor="middle" class="h accent">nonce</text>
    <text x="240" y="42" text-anchor="middle" class="dim">uniqueness</text>
    <text x="240" y="58" text-anchor="middle" class="mono">8 bytes</text>
    <text x="240" y="74" text-anchor="middle" class="dim">replay filter</text>

    <rect x="290" y="0" width="160" height="80" class="field" rx="4"/>
    <text x="370" y="22" text-anchor="middle" class="h accent">payload</text>
    <text x="370" y="42" text-anchor="middle" class="dim">customer, qty, product</text>
    <text x="370" y="58" text-anchor="middle" class="mono">19 bytes</text>
    <text x="370" y="74" text-anchor="middle" class="dim">16 + 1 + 2</text>

    <rect x="460" y="0" width="120" height="80" class="field" rx="4"/>
    <text x="520" y="22" text-anchor="middle" class="h accent">HMAC-SHA256</text>
    <text x="520" y="42" text-anchor="middle" class="dim">authentication</text>
    <text x="520" y="58" text-anchor="middle" class="mono">32 bytes</text>
    <text x="520" y="74" text-anchor="middle" class="dim">keyed hash</text>
  </g>

  <!-- Receiver checks -->
  <rect x="40" y="340" width="400" height="200" rx="10" fill="#fff" stroke="#E2557A" stroke-width="2"/>
  <text x="60" y="368" class="h">Receiver checks (in order)</text>
  <text x="60" y="392" class="mono">1. Zero prefix == 9 bytes of 0x00?</text>
  <text x="60" y="412" class="mono">2. HMAC-SHA256 matches?</text>
  <text x="60" y="432" class="mono">3. Timestamp within 10 s?</text>
  <text x="60" y="452" class="mono">4. Nonce not seen before?</text>
  <text x="60" y="478" class="dim accent">Reject at first failure.</text>
  <text x="60" y="500" class="dim">No silent acceptance, no error oracle.</text>

  <!-- Real-world parallels -->
  <rect x="480" y="340" width="400" height="200" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="500" y="368" class="h">Where the principles live</text>
  <text x="500" y="392" class="dim">TLS record:    seq + nonce + AEAD tag</text>
  <text x="500" y="412" class="dim">IPsec ESP:     seq + IV + MAC trailer</text>
  <text x="500" y="432" class="dim">Kerberos:      timestamp + nonce inside authenticator</text>
  <text x="500" y="452" class="dim">OAuth JWT:     iat + exp + jti claims</text>
  <text x="500" y="478" class="dim accent">Different names, same two principles.</text>
</svg>