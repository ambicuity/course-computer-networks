<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="880" height="620" fill="#FFF7EC"/>
  <rect x="0" y="0" width="880" height="50" fill="#2A1A2E"/>
  <text x="20" y="32" font-size="18" font-weight="700" fill="#FFF7EC">DNS Works but HTTP Fails</text>
  <text x="20" y="74" font-size="13" fill="#2A1A2E" font-style="italic">Three failure classes that all look like "DNS works but HTTP fails" - and the seven-command chain that disambiguates them.</text>

  <!-- client / resolver / target -->
  <g>
    <rect x="60" y="110" width="160" height="80" rx="8" fill="#F2E0CE" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="140" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#2A1A2E">client</text>
    <text x="140" y="158" text-anchor="middle" font-size="11" fill="#2A1A2E">curl / nc / ss</text>
    <text x="140" y="176" text-anchor="middle" font-size="11" fill="#2A1A2E">local cache</text>
  </g>
  <g>
    <rect x="320" y="110" width="160" height="80" rx="8" fill="#F2E0CE" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="400" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#2A1A2E">network</text>
    <text x="400" y="158" text-anchor="middle" font-size="11" fill="#2A1A2E">firewall? NAT?</text>
    <text x="400" y="176" text-anchor="middle" font-size="11" fill="#2A1A2E">routing</text>
  </g>
  <g>
    <rect x="580" y="110" width="160" height="80" rx="8" fill="#F2E0CE" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="660" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#2A1A2E">target</text>
    <text x="660" y="158" text-anchor="middle" font-size="11" fill="#2A1A2E">service?</text>
    <text x="660" y="176" text-anchor="middle" font-size="11" fill="#2A1A2E">port 443</text>
  </g>

  <!-- arrows between -->
  <g stroke="#2A1A2E" stroke-width="1.5" fill="none">
    <line x1="220" y1="150" x2="320" y2="150" marker-end="url(#arrow)"/>
    <line x1="480" y1="150" x2="580" y2="150" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2A1A2E"/>
    </marker>
  </defs>

  <!-- three failure classes -->
  <g>
    <rect x="40" y="220" width="260" height="160" rx="8" fill="#F2E0CE" stroke="#E2557A" stroke-width="2"/>
    <text x="60" y="244" font-size="13" font-weight="700" fill="#E2557A">A. refused</text>
    <text x="60" y="266" font-size="11" fill="#2A1A2E">Service is down.</text>
    <text x="60" y="284" font-size="11" fill="#2A1A2E">nc -vz: "Connection refused"</text>
    <text x="60" y="302" font-size="11" fill="#2A1A2E">Returns in milliseconds.</text>
    <text x="60" y="324" font-size="11" font-weight="700" fill="#2A1A2E">First decisive cmd: nc -vz</text>
    <text x="60" y="344" font-size="11" fill="#2A1A2E">Layer: L4 (SYN got RST)</text>
    <text x="60" y="362" font-size="11" fill="#2A1A2E">Fix: restart service</text>
  </g>
  <g>
    <rect x="310" y="220" width="260" height="160" rx="8" fill="#F2E0CE" stroke="#E2557A" stroke-width="2"/>
    <text x="330" y="244" font-size="13" font-weight="700" fill="#E2557A">B. timeout</text>
    <text x="330" y="266" font-size="11" fill="#2A1A2E">Firewall/NAT/routing drop SYN.</text>
    <text x="330" y="284" font-size="11" fill="#2A1A2E">nc -vz: "Operation timed out"</text>
    <text x="330" y="302" font-size="11" fill="#2A1A2E">Hangs for full backoff.</text>
    <text x="330" y="324" font-size="11" font-weight="700" fill="#2A1A2E">First decisive cmd: traceroute</text>
    <text x="330" y="344" font-size="11" fill="#2A1A2E">Layer: L3 (hop 9 silent)</text>
    <text x="330" y="362" font-size="11" fill="#2A1A2E">Fix: ACL / NAT pool / route</text>
  </g>
  <g>
    <rect x="580" y="220" width="260" height="160" rx="8" fill="#F2E0CE" stroke="#E2557A" stroke-width="2"/>
    <text x="600" y="244" font-size="13" font-weight="700" fill="#E2557A">C. slow_backend</text>
    <text x="600" y="266" font-size="11" fill="#2A1A2E">TCP+TLS succeed, no response.</text>
    <text x="600" y="284" font-size="11" fill="#2A1A2E">curl -v: stops after request line</text>
    <text x="600" y="302" font-size="11" fill="#2A1A2E">ss -ti: retrans climbing.</text>
    <text x="600" y="324" font-size="11" font-weight="700" fill="#2A1A2E">First decisive cmd: ss -ti</text>
    <text x="600" y="344" font-size="11" fill="#2A1A2E">Layer: L4-L7 (kernel OK, app not)</text>
    <text x="600" y="362" font-size="11" fill="#2A1A2E">Fix: backend health, GC, DB</text>
  </g>

  <!-- seven-command chain -->
  <g>
    <rect x="40" y="400" width="800" height="190" rx="8" fill="#F2E0CE" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="424" font-size="13" font-weight="700" fill="#2A1A2E">Seven-command diagnostic chain (in order; stop at first decisive evidence)</text>
    <g font-size="11" fill="#2A1A2E">
      <text x="60"  y="448">1.  dig +short <name>                       - what does the resolver say?</text>
      <text x="60"  y="468">2.  getent ahosts <name>                    - same, but through libc</text>
      <text x="60"  y="488">3.  ping -c 3 -W 2 <ip>                     - ICMP reachability</text>
      <text x="60"  y="508">4.  traceroute -T -p 443 <ip>               - L3 path and the failing hop</text>
      <text x="60"  y="528">5.  nc -vz -w 5 <ip> 443                    - TCP open/closed/filtered</text>
      <text x="60"  y="548">6.  curl -v --max-time 10 <url>             - full stack; identifies sub-step</text>
      <text x="60"  y="568">7.  ss -ti dst <ip>                         - kernel TCP retrans/RTO/cwnd</text>
    </g>
    <text x="60" y="586" font-size="11" font-style="italic" fill="#E2557A">First decisive evidence = the command whose output is unambiguous AND points to a single layer.</text>
  </g>
</svg>
