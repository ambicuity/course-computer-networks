<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="880" height="620" fill="#FFF7EC"/>
  <rect x="0" y="0" width="880" height="50" fill="#2A1A2E"/>
  <text x="20" y="32" font-size="18" font-weight="700" fill="#FFF7EC">Physical-to-Application Outage Trace</text>
  <text x="20" y="74" font-size="13" fill="#2A1A2E" font-style="italic">A single fiber cut propagates upward through five layers, each reporting in its own dialect.</text>

  <!-- layers -->
  <g>
    <rect x="40" y="100" width="800" height="58" rx="6" fill="#F2E0CE" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="124" font-size="14" font-weight="700" fill="#2A1A2E">L1 - Physical</text>
    <text x="60" y="144" font-size="12" fill="#2A1A2E">SFP+ rx_power drops from -3.0 dBm to -40.0 dBm; DOM alarm asserts; kernel flags NO-CARRIER</text>
  </g>
  <g>
    <rect x="40" y="170" width="800" height="58" rx="6" fill="#F2E0CE" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="194" font-size="14" font-weight="700" fill="#2A1A2E">L2 - Data Link</text>
    <text x="60" y="214" font-size="12" fill="#2A1A2E">eth0 oper_state=DOWN, ifInErrors increments, bridge FDB flushes the MAC</text>
  </g>
  <g>
    <rect x="40" y="240" width="800" height="58" rx="6" fill="#F2E0CE" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="264" font-size="14" font-weight="700" fill="#2A1A2E">L3 - Network</text>
    <text x="60" y="284" font-size="12" fill="#2A1A2E">ospfd sees BFD neighbor down, withdraws 0.0.0.0/0, sends BGP UPDATE; convergence ~240 ms</text>
  </g>
  <g>
    <rect x="40" y="310" width="800" height="58" rx="6" fill="#F2E0CE" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="334" font-size="14" font-weight="700" fill="#2A1A2E">L4 - Transport (TCP)</text>
    <text x="60" y="354" font-size="12" fill="#2A1A2E">Retransmissions climb: RTO 50, 100, 200, 400, 800 ms; retrans:N/N grows each second</text>
  </g>
  <g>
    <rect x="40" y="380" width="800" height="58" rx="6" fill="#F2E0CE" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="404" font-size="14" font-weight="700" fill="#2A1A2E">L7 - Application</text>
    <text x="60" y="424" font-size="12" fill="#2A1A2E">nginx returns 503; load-balancer health check fails; user sees "This site can't be reached"</text>
  </g>

  <!-- timeline arrows -->
  <g stroke="#E2557A" stroke-width="2" fill="none">
    <line x1="160" y1="158" x2="160" y2="170"/>
    <line x1="160" y1="228" x2="160" y2="240"/>
    <line x1="160" y1="298" x2="160" y2="310"/>
    <line x1="160" y1="368" x2="160" y2="380"/>
  </g>
  <g fill="#E2557A" font-size="11">
    <text x="170" y="167">+1.2 ms</text>
    <text x="170" y="237">+240 ms</text>
    <text x="170" y="307">+2 s</text>
    <text x="170" y="377">+3 s</text>
  </g>

  <!-- timing axis -->
  <g>
    <line x1="40" y1="470" x2="840" y2="470" stroke="#2A1A2E" stroke-width="1.5"/>
    <g fill="#2A1A2E" font-size="11">
      <text x="60" y="490">0 ms</text>
      <text x="200" y="490">1.2 ms</text>
      <text x="350" y="490">240 ms</text>
      <text x="510" y="490">2 s</text>
      <text x="640" y="490">3 s</text>
      <text x="800" y="490">5 s</text>
    </g>
    <g fill="#E2557A">
      <circle cx="60" cy="470" r="5"/>
      <circle cx="200" cy="470" r="5"/>
      <circle cx="350" cy="470" r="5"/>
      <circle cx="510" cy="470" r="5"/>
      <circle cx="640" cy="470" r="5"/>
      <circle cx="800" cy="470" r="5"/>
    </g>
    <text x="40" y="514" font-size="12" font-weight="700" fill="#2A1A2E">Diagnostic chain (bottom-up, evidence at each timestamp):</text>
    <g font-size="11" fill="#2A1A2E">
      <text x="40" y="536">  T=0  : SFP+ rx_power=below threshold; DOM alarm</text>
      <text x="40" y="554">  T=0.0012 s : eth0 NO-CARRIER, FDB flush</text>
      <text x="40" y="572">  T=0.24 s  : default route withdrawn, BGP UPDATE</text>
      <text x="40" y="590">  T=2 s  : TCP retrans climbing; RTO cascade 50/100/200 ms</text>
      <text x="40" y="608">  T=3 s  : HTTP 503, load-balancer marks backend down</text>
    </g>
  </g>
</svg>
