<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" width="860" height="600">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; fill: #2A1A2E; }
    .title { font-size: 20px; font-weight: 700; }
    .sub { font-size: 13px; font-weight: 600; fill: #E2557A; }
    .field { font-size: 12px; font-weight: 600; }
    .note { font-size: 11px; fill: #4a3a4e; }
    .mono { font-family: monospace; font-size: 11px; }
    .box { fill: #FFFFFF; stroke: #2A1A2E; stroke-width: 1.4; }
    .accent { fill: #FBE3EA; stroke: #E2557A; stroke-width: 1.6; }
    .arrow { stroke: #2A1A2E; stroke-width: 1.4; fill: none; }
    .earrow { stroke: #E2557A; stroke-width: 1.8; fill: none; }
  </style>
  <rect x="0" y="0" width="860" height="600" fill="#FFF7EC"/>

  <text class="title" x="30" y="38">ARP Spoofing and Duplicate-IP Conflict</text>
  <text class="note" x="30" y="58">RFC 826 / 5227  -  gratuitous ARP, cache flip, flip-flop signature</text>

  <!-- Switch in the middle -->
  <rect class="box" x="340" y="260" width="180" height="100" rx="6"/>
  <text class="field" x="430" y="290" text-anchor="middle">L2 Switch</text>
  <text class="note" x="430" y="310" text-anchor="middle">(VLAN 10)</text>
  <text class="note" x="430" y="328" text-anchor="middle">ARP cache per port</text>
  <text class="note" x="430" y="346" text-anchor="middle">DAI: not enabled</text>

  <!-- Gateway -->
  <rect class="box" x="60" y="100" width="180" height="80" rx="6"/>
  <text class="field" x="150" y="125" text-anchor="middle">Gateway</text>
  <text class="mono" x="150" y="145" text-anchor="middle">10.0.0.1</text>
  <text class="mono" x="150" y="162" text-anchor="middle">aa:bb:cc:dd:ee:ff</text>

  <!-- Server (legit) -->
  <rect class="box" x="60" y="430" width="180" height="80" rx="6"/>
  <text class="field" x="150" y="455" text-anchor="middle">Server (legit)</text>
  <text class="mono" x="150" y="475" text-anchor="middle">10.0.0.50</text>
  <text class="mono" x="150" y="492" text-anchor="middle">aa:bb:cc:11:22:33</text>

  <!-- Attacker -->
  <rect class="accent" x="620" y="100" width="180" height="80" rx="6"/>
  <text class="field" x="710" y="125" text-anchor="middle">Attacker</text>
  <text class="mono" x="710" y="145" text-anchor="middle">10.0.0.66</text>
  <text class="mono" x="710" y="162" text-anchor="middle">aa:bb:cc:00:11:22</text>

  <!-- Rogue duplicate -->
  <rect class="accent" x="620" y="430" width="180" height="80" rx="6"/>
  <text class="field" x="710" y="455" text-anchor="middle">Rogue Laptop</text>
  <text class="mono" x="710" y="475" text-anchor="middle">10.0.0.50  (dupe!)</text>
  <text class="mono" x="710" y="492" text-anchor="middle">aa:bb:cc:44:55:66</text>

  <!-- Victim -->
  <rect class="box" x="340" y="440" width="180" height="80" rx="6"/>
  <text class="field" x="430" y="465" text-anchor="middle">Victim</text>
  <text class="mono" x="430" y="485" text-anchor="middle">10.0.0.7</text>
  <text class="mono" x="430" y="502" text-anchor="middle">aa:bb:cc:00:00:07</text>

  <!-- Links to switch -->
  <line class="arrow" x1="150" y1="180" x2="380" y2="260"/>
  <line class="arrow" x1="150" y1="430" x2="380" y2="360"/>
  <line class="earrow" x1="710" y1="180" x2="480" y2="260"/>
  <line class="earrow" x1="710" y1="430" x2="480" y2="360"/>
  <line class="arrow" x1="430" y1="440" x2="430" y2="360"/>

  <!-- Gratuitous ARP arrows from attacker -->
  <path class="earrow" d="M 660 138 Q 540 200 380 290" stroke-dasharray="4 3"/>
  <text class="sub" x="445" y="225">gratuitous ARP: 10.0.0.1 = attacker_mac</text>

  <!-- Dupe flaps -->
  <path class="earrow" d="M 660 470 Q 540 420 380 340" stroke-dasharray="4 3"/>
  <text class="sub" x="430" y="412">10.0.0.50 moved from ..33 to ..66</text>

  <!-- Footer legend -->
  <text class="sub" x="30" y="560">Detections</text>
  <text class="note" x="30" y="578">arpwatch: 'changed ethernet address' (one flip) -&gt; graceful failover</text>
  <text class="note" x="30" y="594">arpwatch: 'flip flop' (two+ flips) -&gt; duplicate IP or active spoof</text>
  <text class="note" x="500" y="578">tcpdump -ni eth0 -e 'arp' | grep 'is-at'</text>
  <text class="note" x="500" y="594">journalctl -k -g 'arp.*moved'  -&gt;  kernel: arp: ...</text>
</svg>
