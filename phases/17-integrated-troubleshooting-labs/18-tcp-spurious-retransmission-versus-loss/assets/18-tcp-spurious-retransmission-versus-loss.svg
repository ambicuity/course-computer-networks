<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560">
  <rect width="920" height="560" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .title { font-size: 24px; font-weight: 700; }
    .sub { font-size: 13px; fill: #6b5560; }
    .node { font-size: 15px; font-weight: 700; }
    .mono { font-family: monospace; font-size: 12px; fill: #2A1A2E; }
    .accent { fill: #E2557A; }
    .label { font-size: 12px; fill: #6b5560; }
  </style>

  <text x="40" y="46" class="title">Spurious Retransmit vs Genuine Loss</text>
  <text x="40" y="68" class="sub">The differential is whether the ACK for the original arrives after the retransmit</text>

  <rect x="40" y="120" width="160" height="80" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="120" y="148" text-anchor="middle" class="node">Sender</text>
  <text x="120" y="170" text-anchor="middle" class="mono">cwnd:42  rtt:0.4</text>
  <text x="120" y="190" text-anchor="middle" class="label">tcp_rto_min=200ms</text>

  <rect x="380" y="100" width="200" height="160" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="480" y="130" text-anchor="middle" class="node">ECMP re-convergence</text>
  <text x="480" y="150" text-anchor="middle" class="mono">leaf-spine fabric</text>
  <text x="480" y="172" text-anchor="middle" class="label">220ms output buffer hold</text>
  <text x="480" y="192" text-anchor="middle" class="label">no packet drop, just delay</text>
  <text x="480" y="220" text-anchor="middle" class="label accent">sender's RTO=200ms fires first</text>
  <text x="480" y="240" text-anchor="middle" class="label">original is forwarded later</text>

  <rect x="700" y="120" width="180" height="80" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="790" y="148" text-anchor="middle" class="node">Receiver</text>
  <text x="790" y="170" text-anchor="middle" class="mono">dup-ACKs: 0</text>
  <text x="790" y="190" text-anchor="middle" class="label">no fast retransmit signal</text>

  <line x1="200" y1="160" x2="380" y2="160" stroke="#2A1A2E" stroke-width="2.5"/>
  <line x1="580" y1="200" x2="700" y2="160" stroke="#2A1A2E" stroke-width="2.5" stroke-dasharray="6 4"/>
  <line x1="200" y1="190" x2="380" y2="200" stroke="#E2557A" stroke-width="2.5" stroke-dasharray="2 3"/>
  <line x1="580" y1="220" x2="700" y2="180" stroke="#E2557A" stroke-width="2.5" stroke-dasharray="2 3"/>

  <text x="290" y="155" text-anchor="middle" class="label">data SEQ=1000 (delayed)</text>
  <text x="290" y="195" text-anchor="middle" class="label accent">data SEQ=1000 (retransmit at 200ms)</text>
  <text x="640" y="195" text-anchor="middle" class="label accent">ACK for original arrives at 220ms</text>

  <rect x="40" y="320" width="840" height="220" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="60" y="348" class="node">Differential in Wireshark</text>

  <text x="60" y="378" class="mono">tcp.analysis.fast_retransmission         3+ dup-ACKs precede retransmit   (RFC 5681)</text>
  <text x="60" y="398" class="mono">tcp.analysis.spurious_retransmission    ACK-for-original arrives after retransmit</text>
  <text x="60" y="418" class="mono">tcp.analysis.retransmission (other)     RTO fired, no dup-ACKs                (RFC 6298)</text>
  <text x="60" y="438" class="mono">tcp.analysis.duplicate_ack              SACK block points at the original     (RFC 2883 DSACK)</text>

  <text x="60" y="468" class="node">Fix</text>
  <text x="60" y="490" class="mono">  sysctl -w net.ipv4.tcp_rack=1                                       (RFC 8985, kernel 4.19+)</text>
  <text x="60" y="510" class="mono">  sysctl -w net.ipv4.tcp_dsack=1                                      (RFC 2883)</text>
  <text x="60" y="530" class="mono">  sysctl -w net.ipv4.tcp_rto_min=200                                  (was 200 already; do not lower further)</text>
</svg>
