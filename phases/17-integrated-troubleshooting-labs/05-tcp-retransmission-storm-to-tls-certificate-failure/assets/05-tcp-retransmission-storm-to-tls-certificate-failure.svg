<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="880" height="620" fill="#FFF7EC"/>
  <rect x="0" y="0" width="880" height="50" fill="#2A1A2E"/>
  <text x="20" y="32" font-size="18" font-weight="700" fill="#FFF7EC">TCP Retransmission Storm + TLS Certificate Failure</text>
  <text x="20" y="74" font-size="13" fill="#2A1A2E" font-style="italic">Two unrelated failures can coexist: Layer 4 retrans storms and Layer 6 missing intermediate CA both produce "TLS fails."</text>

  <!-- TCP retrans timeline -->
  <g>
    <rect x="40" y="100" width="810" height="160" rx="6" fill="#F2E0CE" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="124" font-size="14" font-weight="700" fill="#2A1A2E">TCP handshake with retransmission storm</text>
    <g font-size="11" fill="#2A1A2E" font-family="ui-monospace, monospace">
      <text x="60"  y="150">T=0     cli -> srv   SYN          seq=1000</text>
      <text x="60"  y="170">T=50ms  srv -> cli   SYN-ACK [LOST IN MICRO-BURST]</text>
      <text x="60"  y="190">T=1050  cli -> srv   SYN (retrans 1)   RTO=1s</text>
      <text x="60"  y="210">T=3050  cli -> srv   SYN (retrans 2)   RTO=2s</text>
      <text x="60"  y="230">T=7050  cli -> srv   SYN (retrans 3)   RTO=4s</text>
      <text x="60"  y="250">T=15s   curl: Connection timed out</text>
    </g>
  </g>

  <!-- TLS handshake -->
  <g>
    <rect x="40" y="280" width="810" height="200" rx="6" fill="#F2E0CE" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="60" y="304" font-size="14" font-weight="700" fill="#2A1A2E">TLS 1.2 handshake (when TCP completes) - missing intermediate CA</text>
    <g font-size="11" fill="#2A1A2E" font-family="ui-monospace, monospace">
      <text x="60"  y="330">T=0     cli -> srv   ClientHello           (SNI=api.example.com)</text>
      <text x="60"  y="350">T=50ms  srv -> cli   ServerHello            TLSv1.2 selected</text>
      <text x="60"  y="370">                    Certificate            chain=[LEAF ONLY] - intermediate MISSING</text>
      <text x="60"  y="390">T=100ms cli -> srv   ClientKeyExchange       pre-master secret</text>
      <text x="60"  y="410">                    ChangeCipherSpec</text>
      <text x="60"  y="430">                    Finished               verify_data</text>
      <text x="60"  y="450">T=150ms srv <- cli   Alert: certificate_unknown (fatal)</text>
    </g>
  </g>

  <!-- diagnostic chain -->
  <g>
    <rect x="40" y="500" width="810" height="100" rx="6" fill="#F2E0CE" stroke="#E2557A" stroke-width="2"/>
    <text x="60" y="524" font-size="14" font-weight="700" fill="#E2557A">Four-step diagnostic chain</text>
    <g font-size="11" fill="#2A1A2E" font-family="ui-monospace, monospace">
      <text x="60"  y="546">  1. ss -ti dst <ip>            -> retrans:3, timer:(on,2s)         L4 storm</text>
      <text x="60"  y="566">  2. tcpdump -tttt              -> 4 SYNs at 0/1/3/7 s              L4 backoff visible</text>
      <text x="60"  y="586">  3. openssl s_client            -> Verify return code: 21            L6 cert chain</text>
      <text x="60"  y="606">  4. curl -v --max-time 10       -> TLS Alert: certificate_unknown    L6 fatal</text>
    </g>
  </g>
</svg>
