<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560">
  <rect width="920" height="560" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .title { font-size: 24px; font-weight: 700; }
    .sub { font-size: 13px; fill: #6b5560; }
    .node { font-size: 15px; font-weight: 700; }
    .mono { font-family: monospace; font-size: 12px; fill: #2A1A2E; }
    .accent { fill: #E2557A; }
    .label { font-size: 12px; fill: #6b5560; }
  </style>

  <text x="40" y="46" class="title">WireGuard Handshake &amp; Roaming</text>
  <text x="40" y="68" class="sub">Cached endpoint goes stale after a NAT rebind; persistentkeepalive fixes it</text>

  <rect x="40" y="120" width="180" height="100" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="130" y="148" text-anchor="middle" class="node">Client</text>
  <text x="130" y="170" text-anchor="middle" class="mono">vpn.corp.example:51820</text>
  <text x="130" y="190" text-anchor="middle" class="label">pubkey Abc123...</text>

  <rect x="380" y="120" width="200" height="120" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="480" y="148" text-anchor="middle" class="node">Endpoint</text>
  <text x="480" y="170" text-anchor="middle" class="mono">vpn.corp.example:51820</text>
  <text x="480" y="190" text-anchor="middle" class="mono">pubkey Xyz789...</text>
  <text x="480" y="212" text-anchor="middle" class="label">AllowedIPs 0.0.0.0/0</text>

  <rect x="640" y="120" width="200" height="100" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="740" y="148" text-anchor="middle" class="node">Corporate Net</text>
  <text x="740" y="170" text-anchor="middle" class="mono">10.0.0.0/24</text>
  <text x="740" y="190" text-anchor="middle" class="label">ssh corp-internal</text>

  <line x1="220" y1="170" x2="380" y2="170" stroke="#2A1A2E" stroke-width="2.5"/>
  <text x="300" y="166" text-anchor="middle" class="label">Noise IKpsk2 handshake</text>
  <line x1="580" y1="180" x2="640" y2="170" stroke="#2A1A2E" stroke-width="2.5" stroke-dasharray="6 4"/>

  <rect x="40" y="280" width="200" height="80" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="140" y="308" text-anchor="middle" class="node">Old source</text>
  <text x="140" y="330" text-anchor="middle" class="mono">203.0.113.42:43210</text>

  <rect x="40" y="400" width="200" height="80" rx="10" fill="#fff" stroke="#E2557A" stroke-width="2.5"/>
  <text x="140" y="428" text-anchor="middle" class="node accent">New source</text>
  <text x="140" y="450" text-anchor="middle" class="mono accent">198.51.100.91:55001</text>

  <line x1="140" y1="360" x2="140" y2="400" stroke="#2A1A2E" stroke-width="2.5" stroke-dasharray="4 3"/>
  <text x="160" y="380" class="label accent">NAT rebind, no keepalive</text>

  <line x1="240" y1="440" x2="380" y2="200" stroke="#E2557A" stroke-width="2.5" stroke-dasharray="4 3"/>
  <text x="320" y="320" class="label accent">packet from new source to cached endpoint</text>

  <rect x="380" y="280" width="460" height="200" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="400" y="308" class="node">Fix: persistentkeepalive</text>
  <text x="400" y="332" class="mono">wg set wg0 peer Xyz789... persistentkeepalive 25</text>
  <text x="400" y="356" class="mono">  every 25 s, an empty transport packet is sent</text>
  <text x="400" y="380" class="mono">  server's view of the client source is refreshed</text>
  <text x="400" y="404" class="mono">  when the client moves, the next keepalive updates the endpoint</text>
  <text x="400" y="436" class="node">WireGuard transport header (16 bytes)</text>
  <text x="400" y="460" class="mono">  type(1) | reserved(1) | receiver_index(4) | sender_index(4) | nonce(8)</text>
</svg>
