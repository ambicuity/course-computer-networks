<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560">
  <rect width="920" height="560" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .title { font-size: 24px; font-weight: 700; }
    .sub { font-size: 13px; fill: #6b5560; }
    .node { font-size: 15px; font-weight: 700; }
    .mono { font-family: monospace; font-size: 12px; fill: #2A1A2E; }
    .accent { fill: #E2557A; }
    .label { font-size: 12px; fill: #6b5560; }
  </style>

  <text x="40" y="46" class="title">VRF / Namespace Conntrack Blackhole</text>
  <text x="40" y="68" class="sub">Reply egress != original ingress; conntrack marks INVALID; connection stalls</text>

  <rect x="40" y="120" width="180" height="100" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="130" y="148" text-anchor="middle" class="node">Public client</text>
  <text x="130" y="170" text-anchor="middle" class="mono">198.51.100.42</text>
  <text x="130" y="190" text-anchor="middle" class="label">SYN to 198.51.100.42:443</text>

  <rect x="280" y="100" width="180" height="160" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="370" y="128" text-anchor="middle" class="node">Host</text>
  <text x="370" y="150" text-anchor="middle" class="mono">eth0 203.0.113.10</text>
  <text x="370" y="170" text-anchor="middle" class="mono">br-cust-a 192.168.100.1</text>
  <text x="370" y="190" text-anchor="middle" class="label">conntrack: NEW, ingress eth0</text>
  <text x="370" y="216" text-anchor="middle" class="label accent">DNAT to 192.168.100.42</text>
  <text x="370" y="236" text-anchor="middle" class="label">reply egress: br-cust-a</text>

  <rect x="520" y="120" width="180" height="100" rx="10" fill="#fff" stroke="#E2557A" stroke-width="2.5"/>
  <text x="610" y="148" text-anchor="middle" class="node accent">ns-cust-a pod</text>
  <text x="610" y="170" text-anchor="middle" class="mono accent">192.168.100.42</text>
  <text x="610" y="190" text-anchor="middle" class="label">reply: SYN-ACK, data</text>

  <line x1="220" y1="170" x2="280" y2="170" stroke="#2A1A2E" stroke-width="2.5"/>
  <line x1="460" y1="180" x2="520" y2="160" stroke="#2A1A2E" stroke-width="2.5"/>
  <line x1="520" y1="190" x2="460" y2="220" stroke="#E2557A" stroke-width="2.5" stroke-dasharray="4 3"/>
  <text x="490" y="244" text-anchor="middle" class="label accent">egress br-cust-a (not eth0!)</text>
  <line x1="280" y1="220" x2="220" y2="200" stroke="#E2557A" stroke-width="2.5" stroke-dasharray="4 3"/>

  <rect x="40" y="300" width="840" height="240" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="60" y="328" class="node">conntrack state machine</text>
  <text x="60" y="358" class="mono">NEW           -- first packet of a flow, no entry yet</text>
  <text x="60" y="378" class="mono">ESTABLISHED   -- both directions seen; interface matches</text>
  <text x="60" y="398" class="mono accent">INVALID       -- reply egress != original ingress; conntrack drops the packet</text>
  <text x="60" y="418" class="mono">RELATED       -- ICMP error matching an existing flow</text>

  <text x="60" y="456" class="node">Fix</text>
  <text x="60" y="478" class="mono">Option A: ip vrf exec vrf-cust-a ...   (the customer has its own routing table)</text>
  <text x="60" y="498" class="mono">Option B: iptables -t raw -A PREROUTING -s 198.51.100.42 -j NOTRACK</text>
  <text x="60" y="518" class="mono">Option C: ip rule add from 192.168.100.0/24 lookup 100 prio 100</text>
</svg>
