<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560">
  <rect width="920" height="560" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .title { font-size: 24px; font-weight: 700; }
    .sub { font-size: 13px; fill: #6b5560; }
    .node { font-size: 15px; font-weight: 700; }
    .mono { font-family: monospace; font-size: 12px; fill: #2A1A2E; }
    .accent { fill: #E2557A; }
    .label { font-size: 12px; fill: #6b5560; }
  </style>

  <text x="40" y="46" class="title">TLS SNI / ALPN / Certificate Chain</text>
  <text x="40" y="68" class="sub">Shared IP, three hostnames, default cert returned when SNI is missing or wrong</text>

  <rect x="40" y="120" width="180" height="100" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="130" y="150" text-anchor="middle" class="node">Client (Java 17)</text>
  <text x="130" y="172" text-anchor="middle" class="mono">api.example.com</text>
  <text x="130" y="194" text-anchor="middle" class="label">SNI = api.example.com</text>

  <rect x="370" y="100" width="200" height="180" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="470" y="130" text-anchor="middle" class="node">Server (203.0.113.10)</text>
  <text x="470" y="152" text-anchor="middle" class="mono">SNI routing table</text>
  <text x="470" y="172" text-anchor="middle" class="mono">app.example.com  -&gt; leaf 0</text>
  <text x="470" y="192" text-anchor="middle" class="mono">api.example.com  -&gt; leaf 1</text>
  <text x="470" y="212" text-anchor="middle" class="mono">legacy.example.com -&gt; leaf 2</text>
  <text x="470" y="234" text-anchor="middle" class="label accent">no SNI -&gt; default (leaf 0)</text>
  <text x="470" y="252" text-anchor="middle" class="label">ALPN: h2 / http/1.1</text>

  <line x1="220" y1="170" x2="370" y2="180" stroke="#2A1A2E" stroke-width="2.5"/>
  <text x="295" y="166" text-anchor="middle" class="label">ClientHello (SNI, ALPN)</text>

  <line x1="570" y1="200" x2="770" y2="200" stroke="#2A1A2E" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="670" y="194" text-anchor="middle" class="label">Certificate record</text>

  <rect x="770" y="160" width="120" height="100" rx="10" fill="#fff" stroke="#E2557A" stroke-width="2.5"/>
  <text x="830" y="190" text-anchor="middle" class="node accent">Leaf</text>
  <text x="830" y="212" text-anchor="middle" class="mono accent">CN=app.example.com</text>
  <text x="830" y="234" text-anchor="middle" class="label">SAN: app.example.com</text>

  <rect x="40" y="320" width="840" height="220" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="60" y="348" class="node">openssl s_client -connect 203.0.113.10:443 -servername api.example.com</text>
  <text x="60" y="372" class="mono">  0 s:CN = api.example.com           &lt;-- with -servername: right leaf</text>
  <text x="60" y="392" class="mono">    i:CN = DigiCert Global G2</text>
  <text x="60" y="412" class="mono">    SAN: api.example.com, *.example.com</text>
  <text x="60" y="436" class="mono accent">  same command, no -servername:    &lt;-- wrong leaf returned</text>
  <text x="60" y="456" class="mono accent">  0 s:CN = app.example.com            SAN: app.example.com, *.app.example.com</text>
  <text x="60" y="480" class="mono">  Verify return code: 62 (hostname mismatch)</text>
  <text x="60" y="510" class="mono">ALPN protocol: h2     &lt;-- negotiated; ALPN offered = h2, http/1.1</text>
</svg>
