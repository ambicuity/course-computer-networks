<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="760" height="520" fill="#FFF7EC"/>

  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#2A1A2E">Interleaved column parity detects a burst of length n</text>
  <text x="380" y="56" text-anchor="middle" font-size="12" fill="#2A1A2E">7&#215;7 data matrix, parity computed down each column, transmitted row by row (Tanenbaum &amp; Wetherall, Fig. 3-8)</text>

  <!-- Column headers -->
  <g font-size="11" fill="#2A1A2E" text-anchor="middle">
    <text x="190" y="92">col 1</text>
    <text x="220" y="92">col 2</text>
    <text x="250" y="92">col 3</text>
    <text x="280" y="92">col 4</text>
    <text x="310" y="92">col 5</text>
    <text x="340" y="92">col 6</text>
    <text x="370" y="92">col 7</text>
    <text x="412" y="92" fill="#E2557A" font-weight="700">parity</text>
  </g>

  <!-- Row label and cell grid: data bits of "Network" (7-bit ASCII) -->
  <g font-size="13" fill="#2A1A2E" text-anchor="middle">
    <!-- row 0 N 1001110 -->
    <text x="160" y="118" text-anchor="end" font-weight="600">N</text>
    <text x="190" y="118">1</text><text x="220" y="118">0</text><text x="250" y="118">0</text>
    <text x="280" y="118">1</text><text x="310" y="118">1</text><text x="340" y="118">1</text><text x="370" y="118">0</text>
    <text x="412" y="118" fill="#E2557A" font-weight="700">1</text>
    <!-- row 1 e 1100101 -->
    <text x="160" y="144" text-anchor="end" font-weight="600">e</text>
    <text x="190" y="144">1</text><text x="220" y="144">1</text><text x="250" y="144">0</text>
    <text x="280" y="144">0</text><text x="310" y="144">1</text><text x="340" y="144">0</text><text x="370" y="144">1</text>
    <text x="412" y="144" fill="#E2557A" font-weight="700">0</text>
    <!-- row 2 t 1110100 -->
    <text x="160" y="170" text-anchor="end" font-weight="600">t</text>
    <text x="190" y="170">1</text><text x="220" y="170">1</text><text x="250" y="170">1</text>
    <text x="280" y="170">0</text><text x="310" y="170">1</text><text x="340" y="170">0</text><text x="370" y="170">0</text>
    <text x="412" y="170" fill="#E2557A" font-weight="700">1</text>
    <!-- row 3 w 1110111 -->
    <text x="160" y="196" text-anchor="end" font-weight="600">w</text>
    <text x="190" y="196">1</text><text x="220" y="196">1</text><text x="250" y="196">1</text>
    <text x="280" y="196">0</text><text x="310" y="196">1</text><text x="340" y="196">1</text><text x="370" y="196">1</text>
    <text x="412" y="196" fill="#E2557A" font-weight="700">1</text>
    <!-- row 4 o 1101111 -->
    <text x="160" y="222" text-anchor="end" font-weight="600">o</text>
    <text x="190" y="222">1</text><text x="220" y="222">1</text><text x="250" y="222">0</text>
    <text x="280" y="222">1</text><text x="310" y="222">1</text><text x="340" y="222">1</text><text x="370" y="222">1</text>
    <text x="412" y="222" fill="#E2557A" font-weight="700">1</text>
    <!-- row 5 r 1110010 -->
    <text x="160" y="248" text-anchor="end" font-weight="600">r</text>
    <text x="190" y="248">1</text><text x="220" y="248">1</text><text x="250" y="248">1</text>
    <text x="280" y="248">0</text><text x="310" y="248">0</text><text x="340" y="248">1</text><text x="370" y="248">0</text>
    <text x="412" y="248" fill="#E2557A" font-weight="700">1</text>
    <!-- row 6 k 1101011 -->
    <text x="160" y="274" text-anchor="end" font-weight="600">k</text>
    <text x="190" y="274">1</text><text x="220" y="274">1</text><text x="250" y="274">0</text>
    <text x="280" y="274">1</text><text x="310" y="274">0</text><text x="340" y="274">1</text><text x="370" y="274">1</text>
    <text x="412" y="274" fill="#E2557A" font-weight="700">0</text>
  </g>

  <!-- Grid lines -->
  <g stroke="#2A1A2E" stroke-width="1" fill="none">
    <rect x="175" y="100" width="210" height="182"/>
    <line x1="205" y1="100" x2="205" y2="282"/>
    <line x1="235" y1="100" x2="235" y2="282"/>
    <line x1="265" y1="100" x2="265" y2="282"/>
    <line x1="295" y1="100" x2="295" y2="282"/>
    <line x1="325" y1="100" x2="325" y2="282"/>
    <line x1="355" y1="100" x2="355" y2="282"/>
    <line x1="385" y1="100" x2="385" y2="282"/>
    <line x1="175" y1="126" x2="385" y2="126"/>
    <line x1="175" y1="152" x2="385" y2="152"/>
    <line x1="175" y1="178" x2="385" y2="178"/>
    <line x1="175" y1="204" x2="385" y2="204"/>
    <line x1="175" y1="230" x2="385" y2="230"/>
    <line x1="175" y1="256" x2="385" y2="256"/>
    <rect x="395" y="100" width="35" height="182" stroke="#E2557A"/>
  </g>

  <!-- Burst highlight: 7 cells flipped, one per column, across the matrix -->
  <g>
    <circle cx="190" cy="114" r="11" fill="none" stroke="#E2557A" stroke-width="2"/>
    <circle cx="220" cy="166" r="11" fill="none" stroke="#E2557A" stroke-width="2"/>
    <circle cx="250" cy="166" r="11" fill="none" stroke="#E2557A" stroke-width="2"/>
    <circle cx="280" cy="218" r="11" fill="none" stroke="#E2557A" stroke-width="2"/>
    <circle cx="310" cy="244" r="11" fill="none" stroke="#E2557A" stroke-width="2"/>
    <circle cx="340" cy="244" r="11" fill="none" stroke="#E2557A" stroke-width="2"/>
    <circle cx="370" cy="270" r="11" fill="none" stroke="#E2557A" stroke-width="2"/>
  </g>
  <text x="470" y="200" font-size="12" fill="#E2557A" font-weight="600">burst of length 7</text>
  <text x="470" y="216" font-size="12" fill="#E2557A">one flip per column</text>

  <!-- Transmission order arrow on the left -->
  <g stroke="#2A1A2E" stroke-width="1.5" fill="none">
    <path d="M 120 110 L 140 110" marker-end="url(#arr)"/>
    <path d="M 120 270 L 140 270" marker-end="url(#arr)"/>
    <path d="M 110 278 L 110 116" marker-end="url(#arr)"/>
  </g>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L6,4 L0,8 z" fill="#2A1A2E"/>
    </marker>
  </defs>
  <text x="92" y="200" font-size="11" fill="#2A1A2E" text-anchor="middle" transform="rotate(-90 92 200)">transmit rows top&#8594;bottom, then parity</text>

  <!-- Parity check marks: each touched column flags bad -->
  <g font-size="12" fill="#E2557A" font-weight="700" text-anchor="middle">
    <text x="190" y="304">!</text>
    <text x="220" y="304">!</text>
    <text x="250" y="304">!</text>
    <text x="280" y="304">!</text>
    <text x="310" y="304">!</text>
    <text x="340" y="304">!</text>
    <text x="370" y="304">!</text>
  </g>
  <text x="280" y="322" font-size="11" fill="#2A1A2E" text-anchor="middle">column parity errors: all 7 columns flag &#8594; burst DETECTED</text>

  <!-- n+1 hole panel -->
  <g transform="translate(60 360)">
    <rect x="0" y="0" width="640" height="140" fill="none" stroke="#2A1A2E" stroke-width="1" rx="6"/>
    <text x="16" y="24" font-size="13" font-weight="700" fill="#2A1A2E">The n+1 hole: interleaved parity misses exactly one pattern</text>
    <text x="16" y="46" font-size="11" fill="#2A1A2E">A burst of length n+1 passes undetected when only the first and last bits flip and the interior is correct:</text>

    <!-- burst of 8 cells, only endpoints flipped -->
    <g font-size="12" text-anchor="middle">
      <text x="60" y="86" fill="#E2557A" font-weight="700">1</text>
      <text x="100" y="86" fill="#2A1A2E">0</text>
      <text x="140" y="86" fill="#2A1A2E">0</text>
      <text x="180" y="86" fill="#2A1A2E">0</text>
      <text x="220" y="86" fill="#2A1A2E">0</text>
      <text x="260" y="86" fill="#2A1A2E">0</text>
      <text x="300" y="86" fill="#2A1A2E">0</text>
      <text x="340" y="86" fill="#E2557A" font-weight="700">1</text>
    </g>
    <g stroke="#2A1A2E" stroke-width="1" fill="none">
      <path d="M 45 96 L 355 96" marker-end="url(#arr2)"/>
    </g>
    <defs>
      <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
        <path d="M0,0 L6,4 L0,8 z" fill="#2A1A2E"/>
      </marker>
    </defs>
    <text x="200" y="116" font-size="11" fill="#2A1A2E" text-anchor="middle">length 8 = n+1 spans all 7 columns plus one</text>
    <text x="420" y="86" font-size="11" fill="#2A1A2E">&#8594; each column sees 0 or 2 flips</text>
    <text x="420" y="104" font-size="11" fill="#E2557A" font-weight="600">&#8594; every column parity matches</text>
    <text x="420" y="122" font-size="11" fill="#2A1A2E">residual for longer bursts = 2&#8315;&#8319;</text>
  </g>
</svg>