<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520">
  <rect width="760" height="520" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #2A1A2E; }
    .title { font-size: 20px; font-weight: 700; }
    .sub { font-size: 13px; fill: #6B5563; }
    .lbl { font-size: 12px; }
    .mono { font-family: ui-monospace, "SF Mono", monospace; font-size: 14px; }
    .cell { stroke: #2A1A2E; stroke-width: 1.5; fill: #FFFFFF; }
    .check { fill: #FBE4EC; }
    .err { fill: #E2557A; }
    .errtxt { fill: #FFFFFF; font-weight: 700; }
    .arrow { stroke: #2A1A2E; stroke-width: 1.5; fill: none; }
    .accent { stroke: #E2557A; stroke-width: 2; fill: none; }
  </style>

  <text x="32" y="40" class="title">(11,7) Hamming Code — Single-Error Correction</text>
  <text x="32" y="60" class="sub">Powers-of-two positions (1,2,4,8) are check bits · distance 3 · ASCII 'A' = 1000001</text>

  <!-- Codeword cells -->
  <g>
    <!-- positions 1..11; check at 1,2,4,8 -->
    <!-- pos1 -->
    <rect x="32"  y="90" width="56" height="44" class="cell check"/>
    <rect x="88"  y="90" width="56" height="44" class="cell check"/>
    <rect x="144" y="90" width="56" height="44" class="cell"/>
    <rect x="200" y="90" width="56" height="44" class="cell check"/>
    <rect x="256" y="90" width="56" height="44" class="cell err"/>
    <rect x="312" y="90" width="56" height="44" class="cell"/>
    <rect x="368" y="90" width="56" height="44" class="cell"/>
    <rect x="424" y="90" width="56" height="44" class="cell check"/>
    <rect x="480" y="90" width="56" height="44" class="cell"/>
    <rect x="536" y="90" width="56" height="44" class="cell"/>
    <rect x="592" y="90" width="56" height="44" class="cell"/>
  </g>

  <!-- position numbers -->
  <g class="lbl" text-anchor="middle" fill="#6B5563">
    <text x="60"  y="82">1</text><text x="116" y="82">2</text><text x="172" y="82">3</text>
    <text x="228" y="82">4</text><text x="284" y="82">5</text><text x="340" y="82">6</text>
    <text x="396" y="82">7</text><text x="452" y="82">8</text><text x="508" y="82">9</text>
    <text x="564" y="82">10</text><text x="620" y="82">11</text>
  </g>

  <!-- role labels -->
  <g class="lbl" text-anchor="middle" fill="#6B5563">
    <text x="60"  y="150">p1</text><text x="116" y="150">p2</text><text x="172" y="150">m3</text>
    <text x="228" y="150">p4</text><text x="284" y="150">m5</text><text x="340" y="150">m6</text>
    <text x="396" y="150">m7</text><text x="452" y="150">p8</text><text x="508" y="150">m9</text>
    <text x="564" y="150">m10</text><text x="620" y="150">m11</text>
  </g>

  <!-- bit values (received, with error at pos 5) -->
  <g class="mono" text-anchor="middle">
    <text x="60"  y="118">0</text><text x="116" y="118">0</text><text x="172" y="118">1</text>
    <text x="228" y="118">0</text><text x="284" y="118" class="errtxt">1</text><text x="340" y="118">0</text>
    <text x="396" y="118">0</text><text x="452" y="118">1</text><text x="508" y="118">0</text>
    <text x="564" y="118">0</text><text x="620" y="118">1</text>
  </g>

  <text x="256" y="172" class="lbl" fill="#E2557A">channel flipped this bit (0 → 1)</text>

  <!-- Parity coverage rows -->
  <text x="32" y="216" class="sub">Even-parity coverage (a position k is checked by the powers of 2 in its expansion):</text>

  <g class="mono" font-size="13">
    <text x="32" y="244">p1  covers 1,3,5,7,9,11      parity = 0  ✗  → +1</text>
    <text x="32" y="270">p2  covers 2,3,6,7,10,11     parity = 0  ✓</text>
    <text x="32" y="296">p4  covers 4,5,6,7           parity = 1  ✗  → +4</text>
    <text x="32" y="322">p8  covers 8,9,10,11         parity = 0  ✓</text>
  </g>

  <!-- Syndrome box -->
  <rect x="430" y="232" width="298" height="104" rx="10" class="accent"/>
  <text x="446" y="258" class="lbl" font-weight="700">Syndrome = p8 p4 p2 p1</text>
  <text x="446" y="284" class="mono" font-size="16">0 1 0 1  =  4 + 1  =  5</text>
  <text x="446" y="312" class="lbl" fill="#E2557A" font-weight="700">→ bit 5 is in error: flip it.</text>
  <text x="446" y="330" class="lbl" fill="#6B5563">Discard check bits → recover 'A'.</text>

  <!-- Decision flow -->
  <text x="32" y="376" class="sub">Decode rule:</text>
  <rect x="32"  y="392" width="150" height="48" rx="8" class="cell"/>
  <text x="107" y="421" class="lbl" text-anchor="middle">recompute parity</text>

  <path d="M182 416 H224" class="arrow" marker-end="url(#a)"/>
  <rect x="224" y="392" width="170" height="48" rx="8" class="cell"/>
  <text x="309" y="415" class="lbl" text-anchor="middle">syndrome = 0 ?</text>
  <text x="309" y="431" class="lbl" text-anchor="middle" fill="#6B5563">all checks even</text>

  <path d="M394 404 H436" class="arrow" marker-end="url(#a)"/>
  <text x="415" y="398" class="lbl" fill="#6B5563">yes</text>
  <rect x="436" y="380" width="130" height="40" rx="8" class="cell"/>
  <text x="501" y="405" class="lbl" text-anchor="middle">accept frame</text>

  <path d="M394 428 H436" class="arrow" marker-end="url(#a)"/>
  <text x="415" y="448" class="lbl" fill="#6B5563">no</text>
  <rect x="436" y="436" width="290" height="40" rx="8" class="cell err"/>
  <text x="581" y="461" class="lbl errtxt" text-anchor="middle">flip bit at position = syndrome, accept</text>

  <text x="32" y="500" class="sub">Distance 3 ⇒ corrects 1-bit errors, detects 2-bit errors. Two errors give a wrong (but non-zero) syndrome.</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#2A1A2E"/>
    </marker>
  </defs>
</svg>
