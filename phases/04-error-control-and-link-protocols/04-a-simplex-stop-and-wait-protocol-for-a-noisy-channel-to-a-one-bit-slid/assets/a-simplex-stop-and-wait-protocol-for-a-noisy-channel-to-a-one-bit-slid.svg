<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" height="560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2A1A2E"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E2557A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="560" fill="#FFF7EC"/>

  <text x="30" y="40" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#2A1A2E">Stop-and-Wait ARQ (PAR) — the lost-ACK case</text>
  <text x="30" y="62" font-family="Inter, sans-serif" font-size="13" fill="#2A1A2E">1-bit sequence number + retransmission timer. A lost ACK becomes a duplicate that the receiver drops, not delivers.</text>

  <!-- Lifelines -->
  <text x="150" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#2A1A2E">Sender A</text>
  <text x="150" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">next_frame_to_send</text>
  <line x1="150" y1="128" x2="150" y2="520" stroke="#2A1A2E" stroke-width="2"/>

  <text x="610" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#2A1A2E">Receiver B</text>
  <text x="610" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">frame_expected</text>
  <line x1="610" y1="128" x2="610" y2="520" stroke="#2A1A2E" stroke-width="2"/>

  <!-- Step 1: DATA seq=0 delivered -->
  <line x1="150" y1="150" x2="610" y2="180" stroke="#2A1A2E" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="380" y="158" text-anchor="middle" font-family="monospace" font-size="12" fill="#2A1A2E">DATA seq=0  'A0'</text>
  <circle cx="150" cy="150" r="4" fill="#2A1A2E"/>
  <text x="120" y="146" text-anchor="end" font-family="monospace" font-size="11" fill="#2A1A2E">start_timer</text>
  <text x="640" y="184" font-family="monospace" font-size="11" fill="#2A1A2E">seq==0 ✓ DELIVER, exp:=1</text>

  <!-- ACK 0 returns -->
  <line x1="610" y1="200" x2="150" y2="230" stroke="#E2557A" stroke-width="2" marker-end="url(#arrowB)"/>
  <text x="380" y="208" text-anchor="middle" font-family="monospace" font-size="12" fill="#E2557A">ACK ack=0</text>
  <text x="120" y="234" text-anchor="end" font-family="monospace" font-size="11" fill="#2A1A2E">ack==0 ✓ advance</text>

  <!-- Step 2: DATA seq=1 delivered, ACK LOST -->
  <line x1="150" y1="262" x2="610" y2="292" stroke="#2A1A2E" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="380" y="270" text-anchor="middle" font-family="monospace" font-size="12" fill="#2A1A2E">DATA seq=1  'A1'</text>
  <text x="640" y="296" font-family="monospace" font-size="11" fill="#2A1A2E">seq==1 ✓ DELIVER, exp:=0</text>

  <!-- ACK 1 lost -->
  <line x1="610" y1="312" x2="400" y2="326" stroke="#E2557A" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="470" y="318" text-anchor="middle" font-family="monospace" font-size="12" fill="#E2557A">ACK ack=1</text>
  <text x="372" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#E2557A">✗ LOST</text>

  <!-- Timeout -->
  <rect x="92" y="344" width="116" height="22" rx="4" fill="#E2557A" opacity="0.16"/>
  <text x="150" y="359" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#E2557A">TIMEOUT</text>

  <!-- Step 3: retransmit seq=1 -> DUP-DROP -->
  <line x1="150" y1="386" x2="610" y2="416" stroke="#2A1A2E" stroke-width="2" stroke-dasharray="2 3" marker-end="url(#arrow)"/>
  <text x="380" y="394" text-anchor="middle" font-family="monospace" font-size="12" fill="#2A1A2E">DATA seq=1  'A1'  (retransmit)</text>
  <text x="640" y="420" font-family="monospace" font-size="11" fill="#E2557A">seq=1 ≠ exp=0  DUP-DROP</text>

  <!-- ACK 1 re-sent -->
  <line x1="610" y1="436" x2="150" y2="466" stroke="#E2557A" stroke-width="2" marker-end="url(#arrowB)"/>
  <text x="380" y="444" text-anchor="middle" font-family="monospace" font-size="12" fill="#E2557A">ACK ack=1  (re-ack last good)</text>
  <text x="120" y="470" text-anchor="end" font-family="monospace" font-size="11" fill="#2A1A2E">ack==1 ✓ advance</text>

  <!-- Key insight box -->
  <rect x="92" y="488" width="576" height="56" rx="8" fill="#2A1A2E"/>
  <text x="108" y="510" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFF7EC">Why 1 bit is enough:</text>
  <text x="108" y="530" font-family="Inter, sans-serif" font-size="12.5" fill="#FFF7EC">the only ambiguity is between frame m and m+1 — never m−1 and m+1 — so seq ∈ {0,1} and ack = 1 − frame_expected suffice.</text>
</svg>
