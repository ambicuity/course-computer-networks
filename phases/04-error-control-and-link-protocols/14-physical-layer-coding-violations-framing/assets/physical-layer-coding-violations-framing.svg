<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" width="880" height="470">
  <rect width="880" height="470" fill="#FFF7EC"/>
  <style>
    .ink { fill: #2A1A2E; }
    .berry { fill: #E2557A; }
    .muted { fill: #6B5B6B; }
    text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  </style>

  <text x="40" y="42" class="ink" font-size="20" font-weight="700">FDDI frame delimited by 4B/5B coding violations</text>
  <text x="40" y="64" class="muted" font-size="12">Reserved symbols J,K (start) and T,R (end) cannot appear in data — no stuffing required.</text>

  <!-- timeline baseline -->
  <line x1="40" y1="150" x2="840" y2="150" stroke="#2A1A2E" stroke-width="1.5"/>
  <polygon points="840,150 832,146 832,154" fill="#2A1A2E"/>
  <text x="844" y="154" class="muted" font-size="11">time</text>

  <!-- segments -->
  <g font-size="12">
    <rect x="40"  y="120" width="90"  height="60" fill="#EEE3D2" stroke="#2A1A2E"/>
    <text x="85"  y="148" class="ink" text-anchor="middle">I I I I</text>
    <text x="85"  y="200" class="muted" text-anchor="middle">Idle</text>

    <rect x="130" y="120" width="46"  height="60" fill="#E2557A" stroke="#2A1A2E"/>
    <text x="153" y="148" class="ink" text-anchor="middle" font-weight="700">J K</text>
    <text x="153" y="200" class="berry" text-anchor="middle" font-weight="600">SD</text>

    <rect x="176" y="120" width="520" height="60" fill="#F7E6C8" stroke="#2A1A2E"/>
    <text x="436" y="148" class="ink" text-anchor="middle">payload  (4B/5B encoded data nibbles)</text>
    <text x="436" y="200" class="muted" text-anchor="middle">FC · DA · SA · INFO · FCS</text>

    <rect x="696" y="120" width="46"  height="60" fill="#E2557A" stroke="#2A1A2E"/>
    <text x="719" y="148" class="ink" text-anchor="middle" font-weight="700">T R</text>
    <text x="719" y="200" class="berry" text-anchor="middle" font-weight="600">ED</text>

    <rect x="742" y="120" width="90"  height="60" fill="#EEE3D2" stroke="#2A1A2E"/>
    <text x="787" y="148" class="ink" text-anchor="middle">I I I I</text>
    <text x="787" y="200" class="muted" text-anchor="middle">Idle</text>
  </g>

  <!-- 5B bit detail under timeline -->
  <text x="40" y="240" class="ink" font-size="13" font-weight="600">5B line codes for the delimiters</text>
  <g font-size="12">
    <text x="40"  y="266" class="berry" font-weight="700">J = 11000</text>
    <text x="40"  y="284" class="muted">not in data table (no nibble maps here)</text>

    <text x="280" y="266" class="berry" font-weight="700">K = 10001</text>
    <text x="280" y="284" class="muted">not in data table (no nibble maps here)</text>

    <text x="520" y="266" class="berry" font-weight="700">T = 01101</text>
    <text x="520" y="284" class="muted">reserved end symbol — also absent from data</text>

    <text x="40"  y="312" class="ink">I = 11111  (idle)  ·  R = 00111  (reset)  ·  Q = 00000  (quiet)</text>
  </g>

  <!-- comparison table -->
  <text x="40" y="350" class="ink" font-size="13" font-weight="600">Why coding violations need no stuffing</text>
  <g font-size="11">
    <rect x="40" y="362" width="800" height="24" fill="#EEE3D2" stroke="#2A1A2E"/>
    <text x="50"  y="378" class="ink" font-weight="600">Method</text>
    <text x="240" y="378" class="ink" font-weight="600">Delimiter</text>
    <text x="430" y="378" class="ink" font-weight="600">Stuffing?</text>
    <text x="560" y="378" class="ink" font-weight="600">Worst-case overhead</text>

    <text x="50"  y="402" class="ink">Byte count</text>
    <text x="240" y="402" class="muted">length field</text>
    <text x="430" y="402" class="muted">no</text>
    <text x="560" y="402" class="muted">0% — but one bit flip desyncs all later frames</text>

    <text x="50"  y="420" class="ink">Flag + byte stuffing (PPP)</text>
    <text x="240" y="420" class="muted">0x7E / 0x7D</text>
    <text x="430" y="420" class="muted">yes</text>
    <text x="560" y="420" class="muted">up to 100% on 0x7E payload</text>

    <text x="50"  y="438" class="ink">Flag + bit stuffing (HDLC)</text>
    <text x="240" y="438" class="muted">01111110</text>
    <text x="430" y="438" class="muted">yes</text>
    <text x="560" y="438" class="muted">~12.5% (1 bit per 5 ones)</text>

    <text x="50"  y="456" class="berry" font-weight="700">Coding violation (4B/5B / 8B/10B)</text>
    <text x="240" y="456" class="berry">J,K / T,R</text>
    <text x="430" y="456" class="berry" font-weight="700">no</text>
    <text x="560" y="456" class="berry">0% framing; line code ~25% flat</text>
  </g>
</svg>
