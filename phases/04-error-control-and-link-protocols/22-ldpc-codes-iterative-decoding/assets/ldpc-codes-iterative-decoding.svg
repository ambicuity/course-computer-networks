<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" height="560" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="760" height="560" fill="#FFF7EC"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#2A1A2E">LDPC Tanner graph &amp; sum-product message passing</text>
  <text x="380" y="56" text-anchor="middle" font-size="13" fill="#2A1A2E">(7,4,3) Hamming code — 7 variable (bit) nodes, 3 check nodes</text>

  <!-- Layer labels -->
  <text x="40" y="150" font-size="12" font-weight="600" fill="#2A1A2E">Check nodes</text>
  <text x="40" y="150" font-size="11" fill="#E2557A" dy="16">(parity equations)</text>
  <text x="40" y="400" font-size="12" font-weight="600" fill="#2A1A2E">Bit nodes</text>
  <text x="40" y="400" font-size="11" fill="#E2557A" dy="16">(codeword bits)</text>

  <!-- Edges: bit_i -> check_j per H matrix
       p1: c1 c2 c3 c5   p2: c1 c2 c4 c6   p3: c1 c3 c4 c7 -->
  <g stroke="#2A1A2E" stroke-width="1.1" opacity="0.55">
    <!-- p1 (cx 200) -->
    <line x1="200" y1="150" x2="120" y2="400"/>
    <line x1="200" y1="150" x2="220" y2="400"/>
    <line x1="200" y1="150" x2="320" y2="400"/>
    <line x1="200" y1="150" x2="540" y2="400"/>
    <!-- p2 (cx 400) -->
    <line x1="400" y1="150" x2="120" y2="400"/>
    <line x1="400" y1="150" x2="220" y2="400"/>
    <line x1="400" y1="150" x2="420" y2="400"/>
    <line x1="400" y1="150" x2="640" y2="400"/>
    <!-- p3 (cx 600) -->
    <line x1="600" y1="150" x2="120" y2="400"/>
    <line x1="600" y1="150" x2="320" y2="400"/>
    <line x1="600" y1="150" x2="420" y2="400"/>
    <line x1="600" y1="150" x2="740" y2="400" stroke="#E2557A" stroke-width="1.6" opacity="0.9"/>
  </g>

  <!-- Check nodes (squares) -->
  <g>
    <rect x="178" y="132" width="44" height="36" rx="4" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.6"/>
    <text x="200" y="155" text-anchor="middle" font-size="13" font-weight="600" fill="#2A1A2E">p1</text>

    <rect x="378" y="132" width="44" height="36" rx="4" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.6"/>
    <text x="400" y="155" text-anchor="middle" font-size="13" font-weight="600" fill="#2A1A2E">p2</text>

    <rect x="578" y="132" width="44" height="36" rx="4" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.6"/>
    <text x="600" y="155" text-anchor="middle" font-size="13" font-weight="600" fill="#2A1A2E">p3</text>
  </g>

  <!-- Bit nodes (circles) -->
  <g>
    <circle cx="120" cy="400" r="18" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.6"/>
    <text x="120" y="405" text-anchor="middle" font-size="12" fill="#2A1A2E">c1</text>

    <circle cx="220" cy="400" r="18" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.6"/>
    <text x="220" y="405" text-anchor="middle" font-size="12" fill="#2A1A2E">c2</text>

    <circle cx="320" cy="400" r="18" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.6"/>
    <text x="320" y="405" text-anchor="middle" font-size="12" fill="#2A1A2E">c3</text>

    <circle cx="420" cy="400" r="18" fill="#E2557A" stroke="#2A1A2E" stroke-width="2.2"/>
    <text x="420" y="405" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF7EC">c4</text>

    <circle cx="540" cy="400" r="18" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.6"/>
    <text x="540" y="405" text-anchor="middle" font-size="12" fill="#2A1A2E">c5</text>

    <circle cx="640" cy="400" r="18" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.6"/>
    <text x="640" y="405" text-anchor="middle" font-size="12" fill="#2A1A2E">c6</text>

    <circle cx="740" cy="400" r="18" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.6"/>
    <text x="740" y="405" text-anchor="middle" font-size="12" fill="#2A1A2E">c7</text>
  </g>

  <!-- Channel LLR arrows into bit nodes -->
  <g stroke="#E2557A" stroke-width="1.2" fill="none" marker-end="url(#arrow)">
    <line x1="120" y1="470" x2="120" y2="422"/>
    <line x1="220" y1="470" x2="220" y2="422"/>
    <line x1="320" y1="470" x2="320" y2="422"/>
    <line x1="420" y1="470" x2="420" y2="422"/>
    <line x1="540" y1="470" x2="540" y2="422"/>
    <line x1="640" y1="470" x2="640" y2="422"/>
    <line x1="740" y1="470" x2="740" y2="422"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#E2557A"/>
    </marker>
  </defs>
  <text x="380" y="496" text-anchor="middle" font-size="12" fill="#2A1A2E">channel LLR  L_ch(i) = 2y / σ²   (BPSK + AWGN)</text>

  <!-- Message flow labels on a sample edge (c4 -> p2) -->
  <text x="300" y="265" font-size="11" fill="#E2557A" font-style="italic">q : bit→check</text>
  <text x="300" y="282" font-size="11" fill="#2A1A2E" font-style="italic">r : check→bit</text>

  <!-- Legend box -->
  <g>
    <rect x="470" y="90" width="270" height="64" rx="6" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1" opacity="0.95"/>
    <text x="482" y="110" font-size="11" font-weight="600" fill="#2A1A2E">Per iteration</text>
    <text x="482" y="126" font-size="11" fill="#2A1A2E">1. check update: r = 2·atanh(∏ tanh(q/2))</text>
    <text x="482" y="142" font-size="11" fill="#2A1A2E">2. bit update: L = L_ch + Σr ; halt if Hcᵀ=0</text>
  </g>

  <!-- Footer note -->
  <text x="380" y="540" text-anchor="middle" font-size="11" fill="#2A1A2E">Highlighted bit c4 = flipped bit; edges show which checks contribute evidence to correct it.</text>
</svg>
