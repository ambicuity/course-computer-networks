<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="800" height="600" fill="#FFF7EC"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2A1A2E"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E2557A"/>
    </marker>
  </defs>

  <text x="400" y="34" text-anchor="middle" font-size="22" fill="#2A1A2E" font-weight="700">Kerberos V5: AS + TGS + AP</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#2A1A2E">Single sign-on via ticket-granting tickets</text>

  <line x1="100" y1="100" x2="100" y2="580" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="380" y1="100" x2="380" y2="580" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="680" y1="100" x2="680" y2="580" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="100" y="95" text-anchor="middle" font-size="13" fill="#2A1A2E" font-weight="700">Client (C)</text>
  <text x="380" y="95" text-anchor="middle" font-size="13" fill="#2A1A2E" font-weight="700">KDC (AS+TGS)</text>
  <text x="680" y="95" text-anchor="middle" font-size="13" fill="#2A1A2E" font-weight="700">Service (S)</text>

  <!-- 1. AS-REQ -->
  <line x1="110" y1="135" x2="370" y2="135" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="240" y="128" text-anchor="middle" font-size="10" fill="#2A1A2E">1. AS-REQ: C, TGS, n1</text>

  <line x1="110" y1="160" x2="370" y2="160" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="240" y="153" text-anchor="middle" font-size="10" fill="#2A1A2E">1b. preauth: K_C(t_C)</text>

  <!-- 2. AS-REP -->
  <line x1="370" y1="190" x2="110" y2="190" stroke="#E2557A" stroke-width="1.5" marker-end="url(#arrA)"/>
  <text x="240" y="183" text-anchor="middle" font-size="10" fill="#E2557A" font-weight="700">2. AS-REP: K_C(K_C-TGS, TGT)</text>

  <!-- 3. TGS-REQ -->
  <line x1="110" y1="260" x2="370" y2="260" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="240" y="253" text-anchor="middle" font-size="10" fill="#2A1A2E">3. TGS-REQ: TGT, K_C-TGS(S, t_C, n2)</text>

  <!-- 4. TGS-REP -->
  <line x1="370" y1="290" x2="110" y2="290" stroke="#E2557A" stroke-width="1.5" marker-end="url(#arrA)"/>
  <text x="240" y="283" text-anchor="middle" font-size="10" fill="#E2557A" font-weight="700">4. TGS-REP: K_C-TGS(K_C-S, svc-tkt)</text>

  <!-- 5. AP-REQ -->
  <line x1="110" y1="380" x2="670" y2="380" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="390" y="373" text-anchor="middle" font-size="10" fill="#2A1A2E">5. AP-REQ: svc-tkt, K_C-S(C, t_C)</text>

  <!-- 6. AP-REP (optional) -->
  <line x1="670" y1="420" x2="110" y2="420" stroke="#E2557A" stroke-width="1.5" marker-end="url(#arrA)"/>
  <text x="390" y="413" text-anchor="middle" font-size="10" fill="#E2557A" font-weight="700">6. AP-REP: K_C-S(t_S) -- mutual auth</text>

  <!-- Notes -->
  <text x="40" y="500" font-size="11" fill="#2A1A2E" font-weight="700">Encryption keys</text>
  <text x="40" y="518" font-size="10" fill="#2A1A2E">K_C      -- user's long-term key (password-derived)</text>
  <text x="40" y="534" font-size="10" fill="#2A1A2E">K_TGS    -- TGS long-term key (TGT encryption)</text>
  <text x="40" y="550" font-size="10" fill="#2A1A2E">K_S      -- service's long-term key (service ticket encryption)</text>
  <text x="40" y="566" font-size="10" fill="#2A1A2E">K_C-TGS  -- session key for TGS-REQ (encrypted under K_C)</text>
  <text x="40" y="582" font-size="10" fill="#2A1A2E">K_C-S    -- session key for AP-REQ (encrypted under K_C-TGS)</text>
</svg>