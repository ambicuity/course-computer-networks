<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <rect width="900" height="560" fill="#FFF7EC"/>
  <text x="450" y="44" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#2A1A2E">Revocation: CRL vs. OCSP vs. Stapling</text>
  <text x="450" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2A1A2E">RFC 5280 §5  /  RFC 6960  /  RFC 6961  /  RFC 7633.</text>

  <!-- CRL block -->
  <rect x="60" y="110" width="240" height="380" fill="#FFE7C9" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="180" y="136" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#2A1A2E">CRL (RFC 5280)</text>
  <text x="80" y="160" font-family="monospace" font-size="11" fill="#2A1A2E">CertificateList ::= SEQUENCE {</text>
  <text x="80" y="178" font-family="monospace" font-size="11" fill="#2A1A2E">  tbsCertList,</text>
  <text x="80" y="196" font-family="monospace" font-size="11" fill="#2A1A2E">  signatureAlgorithm,</text>
  <text x="80" y="214" font-family="monospace" font-size="11" fill="#2A1A2E">  signatureValue</text>
  <text x="80" y="232" font-family="monospace" font-size="11" fill="#2A1A2E">}</text>

  <text x="80" y="260" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#2A1A2E">Distribution</text>
  <text x="80" y="278" font-family="monospace" font-size="10" fill="#2A1A2E">http://ca.example.com/crl/inter.crl</text>
  <text x="80" y="296" font-family="monospace" font-size="10" fill="#2A1A2E">fetched via HTTP, cached until</text>
  <text x="80" y="312" font-family="monospace" font-size="10" fill="#2A1A2E">nextUpdate.</text>

  <text x="80" y="340" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#2A1A2E">Reason codes (RFC 5280 §5.3.1)</text>
  <text x="80" y="358" font-family="monospace" font-size="10" fill="#2A1A2E">0 unspecified</text>
  <text x="80" y="372" font-family="monospace" font-size="10" fill="#2A1A2E">1 keyCompromise</text>
  <text x="80" y="386" font-family="monospace" font-size="10" fill="#2A1A2E">2 cACompromise</text>
  <text x="80" y="400" font-family="monospace" font-size="10" fill="#2A1A2E">4 superseded</text>
  <text x="80" y="414" font-family="monospace" font-size="10" fill="#2A1A2E">5 cessationOfOperation</text>
  <text x="80" y="428" font-family="monospace" font-size="10" fill="#2A1A2E">6 certificateHold</text>

  <text x="80" y="460" font-family="Georgia, serif" font-size="12" font-weight="700" fill="#E2557A">+  Simple, offline-capable</text>
  <text x="80" y="476" font-family="Georgia, serif" font-size="12" fill="#E2557A">-  Big downloads, stale data</text>

  <!-- OCSP block -->
  <rect x="330" y="110" width="240" height="380" fill="#FFE7C9" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="450" y="136" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#2A1A2E">OCSP (RFC 6960)</text>
  <text x="350" y="160" font-family="monospace" font-size="11" fill="#2A1A2E">Request := SEQUENCE {</text>
  <text x="350" y="178" font-family="monospace" font-size="11" fill="#2A1A2E">  hashAlgorithm,</text>
  <text x="350" y="196" font-family="monospace" font-size="11" fill="#2A1A2E">  issuerNameHash,</text>
  <text x="350" y="214" font-family="monospace" font-size="11" fill="#2A1A2E">  issuerKeyHash,</text>
  <text x="350" y="232" font-family="monospace" font-size="11" fill="#2A1A2E">  serialNumber</text>
  <text x="350" y="250" font-family="monospace" font-size="11" fill="#2A1A2E">}</text>

  <text x="350" y="278" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#2A1A2E">Response</text>
  <text x="350" y="296" font-family="monospace" font-size="10" fill="#2A1A2E">certStatus ::= CHOICE {</text>
  <text x="350" y="312" font-family="monospace" font-size="10" fill="#2A1A2E">  good [0],</text>
  <text x="350" y="328" font-family="monospace" font-size="10" fill="#2A1A2E">  revoked [1],</text>
  <text x="350" y="344" font-family="monospace" font-size="10" fill="#2A1A2E">  unknown [2]</text>
  <text x="350" y="360" font-family="monospace" font-size="10" fill="#2A1A2E">}</text>

  <text x="350" y="396" font-family="Georgia, serif" font-size="12" font-weight="700" fill="#E2557A">+  Real-time, small</text>
  <text x="350" y="412" font-family="Georgia, serif" font-size="12" fill="#E2557A">-  Privacy leak (CA sees browsing)</text>
  <text x="350" y="428" font-family="Georgia, serif" font-size="12" fill="#E2557A">-  Responder availability</text>

  <!-- Stapling block -->
  <rect x="600" y="110" width="240" height="380" fill="#E2557A" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="720" y="136" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#FFF7EC">OCSP Stapling</text>
  <text x="620" y="160" font-family="monospace" font-size="11" fill="#FFF7EC">RFC 6066 §11.3 / RFC 6961</text>
  <text x="620" y="180" font-family="monospace" font-size="11" fill="#FFF7EC">server staples a recent</text>
  <text x="620" y="196" font-family="monospace" font-size="11" fill="#FFF7EC">OCSP response during the</text>
  <text x="620" y="212" font-family="monospace" font-size="11" fill="#FFF7EC">TLS handshake.</text>

  <text x="620" y="248" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#FFF7EC">Must-staple (RFC 7633)</text>
  <text x="620" y="266" font-family="monospace" font-size="11" fill="#FFF7EC">cert refuses connection</text>
  <text x="620" y="282" font-family="monospace" font-size="11" fill="#FFF7EC">without a stapled OCSP</text>
  <text x="620" y="298" font-family="monospace" font-size="11" fill="#FFF7EC">response.</text>

  <text x="620" y="334" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#FFF7EC">Timeline</text>
  <text x="620" y="354" font-family="monospace" font-size="11" fill="#FFF7EC">0s  TLS ClientHello</text>
  <text x="620" y="370" font-family="monospace" font-size="11" fill="#FFF7EC">+   Certificate</text>
  <text x="620" y="386" font-family="monospace" font-size="11" fill="#FFF7EC">+   CertificateStatus</text>
  <text x="620" y="402" font-family="monospace" font-size="11" fill="#FFF7EC">+   ServerHelloDone</text>

  <text x="620" y="436" font-family="Georgia, serif" font-size="12" font-weight="700" fill="#FFF7EC">+  Fast, private</text>
  <text x="620" y="452" font-family="Georgia, serif" font-size="12" fill="#FFF7EC">+  No CA traffic per visit</text>
  <text x="620" y="468" font-family="Georgia, serif" font-size="12" fill="#FFF7EC">-  Requires server support</text>

  <text x="450" y="528" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2A1A2E">Lesson 17-19 used a chain validator; this lesson adds revocation as a separate check.</text>
</svg>