<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <rect width="900" height="560" fill="#FFF7EC"/>
  <text x="450" y="44" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#2A1A2E">IPsec AH Header (RFC 4302) and ICV Region</text>
  <text x="450" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2A1A2E">Integrity covers IP pseudo-header (mutable fields zeroed) + AH + payload.</text>

  <!-- Transport mode layout -->
  <rect x="60" y="120" width="780" height="80" fill="#FFE7C9" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="450" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#2A1A2E">Transport Mode</text>

  <rect x="60" y="150" width="120" height="40" fill="#2A1A2E"/>
  <text x="120" y="174" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFF7EC">IP hdr</text>
  <rect x="180" y="150" width="180" height="40" fill="#E2557A"/>
  <text x="270" y="174" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFF7EC">AH (integrity)</text>
  <rect x="360" y="150" width="180" height="40" fill="#FFE7C9" stroke="#2A1A2E"/>
  <text x="450" y="174" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">TCP / UDP / ICMP</text>
  <rect x="540" y="150" width="300" height="40" fill="#FFE7C9" stroke="#2A1A2E"/>
  <text x="690" y="174" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">data</text>

  <!-- Tunnel mode layout -->
  <rect x="60" y="220" width="780" height="80" fill="#FFE7C9" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="450" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#2A1A2E">Tunnel Mode</text>

  <rect x="60" y="250" width="100" height="40" fill="#2A1A2E"/>
  <text x="110" y="274" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFF7EC">NEW IP</text>
  <rect x="160" y="250" width="160" height="40" fill="#E2557A"/>
  <text x="240" y="274" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFF7EC">AH</text>
  <rect x="320" y="250" width="100" height="40" fill="#2A1A2E"/>
  <text x="370" y="274" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFF7EC">Inner IP</text>
  <rect x="420" y="250" width="160" height="40" fill="#FFE7C9" stroke="#2A1A2E"/>
  <text x="500" y="274" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">TCP</text>
  <rect x="580" y="250" width="260" height="40" fill="#FFE7C9" stroke="#2A1A2E"/>
  <text x="710" y="274" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">data</text>

  <!-- AH header byte layout -->
  <rect x="60" y="320" width="780" height="100" fill="#FFE7C9" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="450" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#2A1A2E">AH Header Byte Layout (12 bytes header + ICV)</text>

  <rect x="80" y="356" width="60" height="48" fill="#E2557A" stroke="#2A1A2E"/>
  <text x="110" y="384" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFF7EC">Next Hdr</text>
  <text x="110" y="396" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFF7EC">8 bits</text>

  <rect x="140" y="356" width="60" height="48" fill="#E2557A" stroke="#2A1A2E"/>
  <text x="170" y="384" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFF7EC">Pay Len</text>
  <text x="170" y="396" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFF7EC">8 bits</text>

  <rect x="200" y="356" width="80" height="48" fill="#FFE7C9" stroke="#2A1A2E"/>
  <text x="240" y="384" text-anchor="middle" font-family="monospace" font-size="10" fill="#2A1A2E">Reserved</text>
  <text x="240" y="396" text-anchor="middle" font-family="monospace" font-size="9" fill="#2A1A2E">16 bits</text>

  <rect x="280" y="356" width="120" height="48" fill="#FFE7C9" stroke="#2A1A2E"/>
  <text x="340" y="384" text-anchor="middle" font-family="monospace" font-size="10" fill="#2A1A2E">SPI</text>
  <text x="340" y="396" text-anchor="middle" font-family="monospace" font-size="9" fill="#2A1A2E">32 bits</text>

  <rect x="400" y="356" width="120" height="48" fill="#FFE7C9" stroke="#2A1A2E"/>
  <text x="460" y="384" text-anchor="middle" font-family="monospace" font-size="10" fill="#2A1A2E">Seq Num</text>
  <text x="460" y="396" text-anchor="middle" font-family="monospace" font-size="9" fill="#2A1A2E">32 bits</text>

  <rect x="520" y="356" width="280" height="48" fill="#2A1A2E"/>
  <text x="660" y="384" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFF7EC">ICV (HMAC, 96-256 bits)</text>
  <text x="660" y="396" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFF7EC">sha256-128 / sha512-256 / gmac</text>

  <!-- Notes -->
  <rect x="60" y="440" width="780" height="100" fill="#FFE7C9" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="450" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#2A1A2E">ICV Computation</text>
  <text x="80" y="478" font-family="monospace" font-size="11" fill="#2A1A2E">ICV = HMAC[alg](SA_key, IP_pseudo_zeroed || AH_no_ICV || payload)</text>
  <text x="80" y="496" font-family="monospace" font-size="10" fill="#2A1A2E">Pseudo-header fields zeroed for ICV: Total Length, Flags/Frag Offset, Header Checksum.</text>
  <text x="80" y="512" font-family="monospace" font-size="10" fill="#2A1A2E">Replay window: typical 32 packets; receivers reject seq outside [last-N, last].</text>
  <text x="80" y="528" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#E2557A">AH does NOT encrypt. ESP is preferred; ESP-NULL (integrity-only) replaces AH in practice.</text>
</svg>