<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <rect width="900" height="560" fill="#FFF7EC"/>
  <text x="450" y="44" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#2A1A2E">Birthday Attack: k vs. Collision Probability</text>
  <text x="450" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2A1A2E">For an n-bit hash, 1.177 &#183; 2^(n/2) draws give a 50% chance of a collision.</text>

  <!-- Axes -->
  <line x1="100" y1="450" x2="820" y2="450" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="100" y1="110" x2="100" y2="450" stroke="#2A1A2E" stroke-width="1.5"/>

  <text x="460" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2A1A2E">number of draws k (log scale, in units of 2^(n/2))</text>
  <text x="40" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2A1A2E" transform="rotate(-90 40 280)">P(collision)</text>

  <!-- Curve: P = 1 - exp(-x^2 / 2) where x = k / 2^(n/2) -->
  <path d="M 100 449
           Q 180 449 220 445
           T 280 430
           T 340 400
           T 400 350
           T 460 295
           T 520 240
           T 580 195
           T 640 165
           T 700 145
           T 760 132
           T 820 124"
        fill="none" stroke="#E2557A" stroke-width="3"/>

  <!-- 50% line -->
  <line x1="100" y1="280" x2="820" y2="280" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="828" y="284" font-family="Georgia, serif" font-size="11" fill="#2A1A2E">50%</text>

  <!-- 1.177 mark -->
  <line x1="320" y1="110" x2="320" y2="450" stroke="#E2557A" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="324" y="124" font-family="Georgia, serif" font-size="11" fill="#E2557A">x = 1.177 (k = 1.177 &#183; 2^(n/2))</text>

  <!-- X axis labels -->
  <text x="100" y="468" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">0</text>
  <text x="200" y="468" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">0.25</text>
  <text x="320" y="468" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">0.5</text>
  <text x="460" y="468" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">0.75</text>
  <text x="640" y="468" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">1.0</text>
  <text x="820" y="468" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">1.25</text>

  <!-- Y axis labels -->
  <text x="92" y="450" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">0.0</text>
  <text x="92" y="365" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">0.25</text>
  <text x="92" y="280" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">0.50</text>
  <text x="92" y="195" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">0.75</text>
  <text x="92" y="110" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">1.00</text>

  <!-- Algorithm table -->
  <rect x="80" y="510" width="740" height="40" fill="#FFE7C9" stroke="#2A1A2E" stroke-width="1"/>
  <text x="100" y="528" font-family="monospace" font-size="11" fill="#2A1A2E">MD5 (128): 2^64  |  SHA-1 (160): 2^80  |  SHA-256: 2^128  |  SHA-512: 2^256</text>
  <text x="100" y="544" font-family="monospace" font-size="11" fill="#E2557A">SHAttered 2017 broke SHA-1 in practice; MD5 collisions are routine since 2004.</text>
</svg>