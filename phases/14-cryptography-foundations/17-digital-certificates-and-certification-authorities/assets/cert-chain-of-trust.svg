<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <rect width="900" height="560" fill="#FFF7EC"/>
  <text x="450" y="44" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#2A1A2E">X.509 Certificate Chain of Trust (RFC 5280)</text>
  <text x="450" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2A1A2E">Root CA self-signs; intermediates are signed by parent; leaf is signed by intermediate.</text>

  <!-- Root CA -->
  <rect x="320" y="100" width="260" height="100" fill="#E2557A" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="450" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#FFF7EC">Root CA</text>
  <text x="450" y="150" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFF7EC">CN=Acme Root CA</text>
  <text x="450" y="170" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFF7EC">self-signed (sig over own TBS)</text>
  <text x="450" y="188" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFF7EC">in OS trust store</text>

  <!-- Arrow down to intermediate -->
  <line x1="450" y1="200" x2="450" y2="240" stroke="#2A1A2E" stroke-width="2"/>
  <polygon points="450,240 444,232 456,232" fill="#2A1A2E"/>
  <text x="460" y="226" font-family="monospace" font-size="11" fill="#2A1A2E">signs</text>

  <!-- Intermediate -->
  <rect x="280" y="240" width="340" height="110" fill="#FFE7C9" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="450" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#2A1A2E">Intermediate CA</text>
  <text x="450" y="288" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">CN=Acme Intermediate CA</text>
  <text x="450" y="306" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">issuer=Acme Root CA</text>
  <text x="450" y="324" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">pathLenConstraint=0</text>
  <text x="450" y="340" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">validity: 5 years</text>

  <line x1="450" y1="350" x2="450" y2="390" stroke="#2A1A2E" stroke-width="2"/>
  <polygon points="450,390 444,382 456,382" fill="#2A1A2E"/>
  <text x="460" y="376" font-family="monospace" font-size="11" fill="#2A1A2E">signs</text>

  <!-- Leaf -->
  <rect x="220" y="390" width="460" height="120" fill="#FFE7C9" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="450" y="418" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#2A1A2E">Leaf Certificate</text>
  <text x="450" y="438" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">CN=example.com   SAN=DNS:example.com, *.example.com</text>
  <text x="450" y="456" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">issuer=Acme Intermediate CA</text>
  <text x="450" y="474" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">validity: 90 days</text>
  <text x="450" y="492" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">keyUsage=digitalSignature, keyEncipherment</text>

  <!-- Verification flow at bottom -->
  <rect x="60" y="520" width="780" height="32" fill="#2A1A2E"/>
  <text x="450" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FFF7EC" font-weight="700">verify leaf.sig with inter.pub -&gt; verify inter.sig with root.pub -&gt; root in trust store -&gt; chain OK</text>
</svg>