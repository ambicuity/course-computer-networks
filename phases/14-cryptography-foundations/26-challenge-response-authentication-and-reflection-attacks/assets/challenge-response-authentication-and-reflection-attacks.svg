<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="800" height="520" fill="#FFF7EC"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2A1A2E"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E2557A"/>
    </marker>
  </defs>

  <text x="400" y="34" text-anchor="middle" font-size="22" fill="#2A1A2E" font-weight="700">Challenge-Response &amp; Reflection Attack</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#2A1A2E">Two-message CR, naive vs per-direction-key defenses</text>

  <!-- Honest flow -->
  <text x="40" y="100" font-size="14" fill="#2A1A2E" font-weight="700">Honest flow (no attack)</text>
  <line x1="160" y1="130" x2="160" y2="220" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="640" y1="130" x2="640" y2="220" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="160" y="125" text-anchor="middle" font-size="13" fill="#2A1A2E" font-weight="700">Alice (prover)</text>
  <text x="640" y="125" text-anchor="middle" font-size="13" fill="#2A1A2E" font-weight="700">Bob (verifier)</text>

  <line x1="170" y1="160" x2="630" y2="160" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="400" y="153" text-anchor="middle" font-size="11" fill="#2A1A2E">R (16-byte nonce)</text>

  <line x1="630" y1="190" x2="170" y2="190" stroke="#E2557A" stroke-width="1.5" marker-end="url(#arrA)"/>
  <text x="400" y="184" text-anchor="middle" font-size="11" fill="#E2557A" font-weight="700">f(K_AB, R) = HMAC-SHA256</text>

  <!-- Reflection attack -->
  <text x="40" y="260" font-size="14" fill="#2A1A2E" font-weight="700">Reflection attack (naive CR)</text>
  <line x1="160" y1="290" x2="160" y2="490" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="380" y1="290" x2="380" y2="490" stroke="#E2557A" stroke-width="1.5"/>
  <line x1="640" y1="290" x2="640" y2="490" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="160" y="285" text-anchor="middle" font-size="13" fill="#2A1A2E" font-weight="700">Bob (Conn1)</text>
  <text x="380" y="285" text-anchor="middle" font-size="13" fill="#E2557A" font-weight="700">Trudy</text>
  <text x="640" y="285" text-anchor="middle" font-size="13" fill="#2A1A2E" font-weight="700">Bob (Conn2)</text>

  <line x1="170" y1="320" x2="370" y2="320" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="270" y="313" text-anchor="middle" font-size="10" fill="#2A1A2E">R1 (challenge)</text>

  <line x1="390" y1="350" x2="630" y2="350" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="510" y="343" text-anchor="middle" font-size="10" fill="#E2557A" font-weight="700">Trudy reflects R1 back</text>

  <line x1="630" y1="385" x2="390" y2="385" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="510" y="378" text-anchor="middle" font-size="10" fill="#2A1A2E">f(K_AB, R1) — Bob as prover</text>

  <line x1="370" y1="420" x2="170" y2="420" stroke="#E2557A" stroke-width="1.5" marker-end="url(#arrA)"/>
  <text x="270" y="413" text-anchor="middle" font-size="10" fill="#E2557A" font-weight="700">Trudy forwards f(K_AB, R1)</text>

  <line x1="170" y1="460" x2="370" y2="460" stroke="#E2557A" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrA)"/>
  <text x="270" y="453" text-anchor="middle" font-size="11" fill="#E2557A" font-weight="700">Bob ACCEPTS Trudy as Alice</text>

  <text x="40" y="510" font-size="11" fill="#2A1A2E">Defense: derive K_AB_in, K_AB_out from K_AB so Conn 1 and Conn 2 use different keys.</text>
</svg>