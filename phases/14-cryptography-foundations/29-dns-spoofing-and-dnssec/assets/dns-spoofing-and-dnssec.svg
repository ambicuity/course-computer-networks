<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="800" height="560" fill="#FFF7EC"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2A1A2E"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E2557A"/>
    </marker>
  </defs>

  <text x="400" y="34" text-anchor="middle" font-size="22" fill="#2A1A2E" font-weight="700">DNS Cache Poisoning &amp; DNSSEC Chain</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#2A1A2E">Kaminsky attack vs signed RRset chain-of-trust</text>

  <!-- Poisoning attack -->
  <text x="40" y="100" font-size="14" fill="#2A1A2E" font-weight="700">Cache poisoning (no DNSSEC)</text>
  <line x1="120" y1="130" x2="120" y2="270" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="400" y1="130" x2="400" y2="270" stroke="#E2557A" stroke-width="1.5"/>
  <line x1="680" y1="130" x2="680" y2="270" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="120" y="125" text-anchor="middle" font-size="13" fill="#2A1A2E" font-weight="700">Resolver</text>
  <text x="400" y="125" text-anchor="middle" font-size="13" fill="#E2557A" font-weight="700">Trudy</text>
  <text x="680" y="125" text-anchor="middle" font-size="13" fill="#2A1A2E" font-weight="700">Auth server</text>

  <line x1="130" y1="160" x2="670" y2="160" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="400" y="153" text-anchor="middle" font-size="10" fill="#2A1A2E">A? 12345.evil.com (forces re-query)</text>

  <line x1="670" y1="190" x2="130" y2="190" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="400" y="183" text-anchor="middle" font-size="10" fill="#2A1A2E">Real response (slower path)</text>

  <line x1="390" y1="220" x2="130" y2="220" stroke="#E2557A" stroke-width="1.5" marker-end="url(#arrA)"/>
  <text x="260" y="213" text-anchor="middle" font-size="10" fill="#E2557A" font-weight="700">Forged: 198.51.100.66 (arrives first)</text>

  <text x="120" y="255" text-anchor="middle" font-size="10" fill="#E2557A" font-weight="700">Cached for TTL; every subsequent query returns the attacker's IP</text>

  <!-- DNSSEC chain -->
  <text x="40" y="310" font-size="14" fill="#2A1A2E" font-weight="700">DNSSEC chain-of-trust</text>
  <rect x="120" y="340" width="120" height="40" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="180" y="365" text-anchor="middle" font-size="12" fill="#2A1A2E" font-weight="700">. (root)</text>
  <text x="180" y="395" text-anchor="middle" font-size="10" fill="#2A1A2E">KSK trust anchor</text>

  <rect x="290" y="340" width="120" height="40" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="350" y="365" text-anchor="middle" font-size="12" fill="#2A1A2E" font-weight="700">.com</text>

  <rect x="460" y="340" width="120" height="40" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="520" y="365" text-anchor="middle" font-size="12" fill="#2A1A2E" font-weight="700">example.com</text>

  <rect x="630" y="340" width="120" height="40" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="690" y="365" text-anchor="middle" font-size="12" fill="#2A1A2E" font-weight="700">www</text>

  <line x1="240" y1="360" x2="290" y2="360" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="265" y="354" text-anchor="middle" font-size="9" fill="#2A1A2E">DS</text>

  <line x1="410" y1="360" x2="460" y2="360" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="435" y="354" text-anchor="middle" font-size="9" fill="#2A1A2E">DS</text>

  <line x1="580" y1="360" x2="630" y2="360" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="605" y="354" text-anchor="middle" font-size="9" fill="#2A1A2E">A+sig</text>

  <text x="40" y="430" font-size="11" fill="#2A1A2E">Each DS record hashes the child zone's KSK; each RRSIG is signed by the parent's ZSK.</text>
  <text x="40" y="450" font-size="11" fill="#2A1A2E">Validation: trust anchor -> root -> TLD -> SLD -> leaf; one bad signature fails the chain.</text>
  <text x="40" y="475" font-size="11" fill="#E2557A" font-weight="700">Trudy cannot forge a valid chain because each link requires the zone's private key.</text>

  <!-- Algorithms -->
  <text x="40" y="510" font-size="11" fill="#2A1A2E">DNSSEC algorithms: RSA-SHA256 (5), ECDSA P-256 (13), Ed25519 (15) -- all NIST-approved in 2026.</text>
  <text x="40" y="528" font-size="11" fill="#2A1A2E">Encryption: DNS-over-TLS (RFC 7858) and DNS-over-HTTPS (RFC 8484) provide confidentiality alongside DNSSEC.</text>
</svg>