<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560">
  <rect width="920" height="560" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .title { font-size: 22px; font-weight: 700; }
    .sub { font-size: 12px; fill: #6b5560; }
    .node { font-size: 14px; font-weight: 700; }
    .small { font-family: monospace; font-size: 11px; }
    .accent { fill: #E2557A; }
    .label { font-size: 11px; fill: #6b5560; }
    .head { font-size: 12px; font-weight: 700; }
  </style>
  <text x="40" y="40" class="title">VPN built on IPsec ESP tunnel mode</text>
  <text x="40" y="60" class="sub">security gateways run IKEv2 to install a child SA; every private packet is wrapped in an outer IP header (proto 50) + ESP</text>

  <rect x="40" y="100" width="220" height="170" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="150" y="124" text-anchor="middle" class="node">London site</text>
  <text x="150" y="142" text-anchor="middle" class="small">10.10.0.0/16</text>
  <rect x="58" y="156" width="184" height="38" rx="5" fill="#FFF0F4" stroke="#E2557A" stroke-width="1.5"/>
  <text x="150" y="180" text-anchor="middle" class="small">host 10.10.0.50</text>
  <rect x="58" y="204" width="184" height="50" rx="5" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="150" y="222" text-anchor="middle" class="head">Security gateway</text>
  <text x="150" y="238" text-anchor="middle" class="small">public 203.0.113.5</text>

  <rect x="660" y="100" width="220" height="170" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="770" y="124" text-anchor="middle" class="node">Paris site</text>
  <text x="770" y="142" text-anchor="middle" class="small">10.10.1.0/16</text>
  <rect x="678" y="156" width="184" height="38" rx="5" fill="#FFF0F4" stroke="#E2557A" stroke-width="1.5"/>
  <text x="770" y="180" text-anchor="middle" class="small">host 10.10.1.50</text>
  <rect x="678" y="204" width="184" height="50" rx="5" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="770" y="222" text-anchor="middle" class="head">Security gateway</text>
  <text x="770" y="238" text-anchor="middle" class="small">public 198.51.100.7</text>

  <ellipse cx="460" cy="220" rx="180" ry="80" fill="#fff" stroke="#E2557A" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="460" y="214" text-anchor="middle" class="node accent">Public Internet</text>
  <text x="460" y="232" text-anchor="middle" class="label">sees only ESP packets (proto 50); no 10.10.x.y visible</text>
  <text x="460" y="248" text-anchor="middle" class="label">NAT-T may wrap in UDP/4500</text>
  <line x1="240" y1="220" x2="280" y2="220" stroke="#2A1A2E" stroke-width="2"/>
  <line x1="640" y1="220" x2="680" y2="220" stroke="#2A1A2E" stroke-width="2"/>
  <text x="460" y="318" text-anchor="middle" class="small">IKEv2 SA (RFC 7296) -- 4-message handshake, then periodic rekey via CREATE_CHILD_SA</text>

  <text x="40" y="358" class="head">ESP tunnel-mode packet (RFC 4303 §3.1):</text>
  <g transform="translate(40, 368)">
    <rect x="0"   y="0" width="160" height="32" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="80"  y="20" text-anchor="middle" class="small">Outer IP hdr (proto 50)</text>
    <rect x="160" y="0" width="36"  height="32" fill="#FFE0EA" stroke="#E2557A" stroke-width="1.5"/>
    <text x="178" y="20" text-anchor="middle" class="small">SPI</text>
    <rect x="196" y="0" width="36"  height="32" fill="#FFE0EA" stroke="#E2557A" stroke-width="1.5"/>
    <text x="214" y="20" text-anchor="middle" class="small">Seq</text>
    <rect x="232" y="0" width="56"  height="32" fill="#FFE0EA" stroke="#E2557A" stroke-width="1.5"/>
    <text x="260" y="20" text-anchor="middle" class="small">IV</text>
    <rect x="288" y="0" width="280" height="32" fill="#2A1A2E"/>
    <text x="428" y="20" text-anchor="middle" class="small" fill="#FFE0EA">Encrypted inner IP + TCP + payload (10.10.x hidden)</text>
    <rect x="568" y="0" width="60"  height="32" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="598" y="20" text-anchor="middle" class="small">Pad + PLen + NH</text>
    <rect x="628" y="0" width="100" height="32" fill="#FFE0EA" stroke="#E2557A" stroke-width="1.5"/>
    <text x="678" y="20" text-anchor="middle" class="small">ICV (HMAC-SHA-256)</text>
  </g>

  <text x="40" y="430" class="head">IKEv2 child SA (RFC 7296):</text>
  <g transform="translate(40, 440)">
    <rect x="0"   y="0" width="190" height="62" rx="5" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="95"  y="18" text-anchor="middle" class="small">IKE_SA_INIT</text>
    <text x="95" y="34" text-anchor="middle" class="label">SA proposal, nonces,</text>
    <text x="95" y="48" text-anchor="middle" class="label">Diffie-Hellman</text>
    <rect x="200" y="0" width="190" height="62" rx="5" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="295" y="18" text-anchor="middle" class="small">IKE_AUTH</text>
    <text x="295" y="34" text-anchor="middle" class="label">IDi/IDr, AUTH,</text>
    <text x="295" y="48" text-anchor="middle" class="label">first CHILD_SA</text>
    <rect x="400" y="0" width="190" height="62" rx="5" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="495" y="18" text-anchor="middle" class="small">CREATE_CHILD_SA</text>
    <text x="495" y="34" text-anchor="middle" class="label">rekey with fresh DH</text>
    <text x="495" y="48" text-anchor="middle" class="label">(Perfect Forward Secrecy)</text>
    <rect x="600" y="0" width="190" height="62" rx="5" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="695" y="18" text-anchor="middle" class="small">INFORMATIONAL</text>
    <text x="695" y="34" text-anchor="middle" class="label">liveness, DPD,</text>
    <text x="695" y="48" text-anchor="middle" class="label">delete notifications</text>
  </g>
</svg>
