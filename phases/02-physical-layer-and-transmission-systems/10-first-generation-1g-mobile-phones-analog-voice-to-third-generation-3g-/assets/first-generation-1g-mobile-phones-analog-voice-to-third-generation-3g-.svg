<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <rect x="0" y="0" width="860" height="560" fill="#FFF7EC"/>
  <style>
    .h    { font-family: Inter, sans-serif; font-weight: 700; fill: #2A1A2E; }
    .lbl  { font-family: Inter, sans-serif; font-weight: 600; fill: #2A1A2E; }
    .sm   { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .mono { font-family: monospace; fill: #2A1A2E; }
    .acc  { fill: #E2557A; }
  </style>
  <text x="30" y="38" class="h" font-size="22">Sharing the air: 1G FDMA &#8594; 2G TDMA &#8594; 3G CDMA</text>
  <text x="30" y="58" class="sm" font-size="12">Same spectrum, three ways to fit many calls into it.</text>
  <text x="30" y="92" class="lbl" font-size="14">1G AMPS &#183; FDMA / FDD &#183; 30 kHz channels, analog voice</text>
  <line x1="40" y1="200" x2="40" y2="110" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="40" y1="200" x2="270" y2="200" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="14" y="160" class="sm" font-size="10" transform="rotate(-90 14 160)">freq</text>
  <text x="250" y="216" class="sm" font-size="10">time</text>
  <rect x="42" y="170" width="226" height="26" fill="#E2557A" opacity="0.85"/>
  <rect x="42" y="142" width="226" height="26" fill="#2A1A2E" opacity="0.30"/>
  <rect x="42" y="114" width="226" height="26" fill="#E2557A" opacity="0.55"/>
  <text x="52" y="188" class="mono" font-size="10" fill="#FFF7EC">user 1</text>
  <text x="52" y="160" class="mono" font-size="10">user 2</text>
  <text x="52" y="132" class="mono" font-size="10">user 3</text>
  <text x="40" y="234" class="sm" font-size="10">Each user keeps one frequency forever.</text>
  <text x="310" y="92" class="lbl" font-size="14">2G GSM &#183; TDMA &#183; 200 kHz / 8 slots</text>
  <line x1="320" y1="200" x2="320" y2="110" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="320" y1="200" x2="560" y2="200" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="294" y="160" class="sm" font-size="10" transform="rotate(-90 294 160)">freq</text>
  <text x="540" y="216" class="sm" font-size="10">time</text>
  <g>
    <rect x="322" y="120" width="28" height="76" fill="#E2557A" opacity="0.85"/>
    <rect x="350" y="120" width="28" height="76" fill="#2A1A2E" opacity="0.25"/>
    <rect x="378" y="120" width="28" height="76" fill="#E2557A" opacity="0.55"/>
    <rect x="406" y="120" width="28" height="76" fill="#2A1A2E" opacity="0.25"/>
    <rect x="434" y="120" width="28" height="76" fill="#E2557A" opacity="0.85"/>
    <rect x="462" y="120" width="28" height="76" fill="#2A1A2E" opacity="0.25"/>
    <rect x="490" y="120" width="28" height="76" fill="#E2557A" opacity="0.55"/>
    <rect x="518" y="120" width="28" height="76" fill="#2A1A2E" opacity="0.25"/>
  </g>
  <text x="324" y="234" class="sm" font-size="10">8 slots per 200 kHz carrier, 577 &#181;s each.</text>
  <text x="324" y="248" class="mono" font-size="9">slot 0  1  2  3  4  5  6  7</text>
  <text x="600" y="92" class="lbl" font-size="14">3G W-CDMA &#183; 5 MHz shared</text>
  <line x1="610" y1="200" x2="610" y2="110" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="610" y1="200" x2="840" y2="200" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="584" y="160" class="sm" font-size="10" transform="rotate(-90 584 160)">freq</text>
  <text x="820" y="216" class="sm" font-size="10">time</text>
  <rect x="612" y="114" width="226" height="82" fill="#2A1A2E" opacity="0.14"/>
  <text x="622" y="138" class="mono" font-size="10" fill="#E2557A">code A (+ - + -)</text>
  <text x="622" y="158" class="mono" font-size="10" fill="#2A1A2E">code B (+ + - -)</text>
  <text x="622" y="178" class="mono" font-size="10" fill="#E2557A">code C (+ - - +)</text>
  <text x="612" y="234" class="sm" font-size="10">All users, full band, all the time &#8212;</text>
  <text x="612" y="248" class="sm" font-size="10">separated by orthogonal chip codes.</text>
  <line x1="30" y1="278" x2="830" y2="278" stroke="#2A1A2E" stroke-width="1" opacity="0.4"/>
  <text x="30" y="312" class="lbl" font-size="14">GSM TDMA burst &#8212; 148 bits in a 577 &#181;s slot (incl. 30 &#181;s guard)</text>
  <g>
    <rect x="40" y="330" width="40" height="48" fill="#2A1A2E" opacity="0.30"/>
    <text x="60" y="359" class="mono" font-size="11" text-anchor="middle">000</text>
    <rect x="80" y="330" width="200" height="48" fill="#E2557A" opacity="0.55"/>
    <text x="180" y="359" class="mono" font-size="11" text-anchor="middle">Information (57)</text>
    <rect x="280" y="330" width="18" height="48" fill="#2A1A2E" opacity="0.55"/>
    <rect x="298" y="330" width="110" height="48" fill="#E2557A" opacity="0.95"/>
    <text x="353" y="354" class="mono" font-size="11" text-anchor="middle" fill="#FFF7EC">Sync</text>
    <text x="353" y="368" class="mono" font-size="10" text-anchor="middle" fill="#FFF7EC">training (26)</text>
    <rect x="408" y="330" width="18" height="48" fill="#2A1A2E" opacity="0.55"/>
    <rect x="426" y="330" width="200" height="48" fill="#E2557A" opacity="0.55"/>
    <text x="526" y="359" class="mono" font-size="11" text-anchor="middle">Information (57)</text>
    <rect x="626" y="330" width="40" height="48" fill="#2A1A2E" opacity="0.30"/>
    <text x="646" y="359" class="mono" font-size="11" text-anchor="middle">000</text>
    <rect x="666" y="330" width="60" height="48" fill="none" stroke="#2A1A2E" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="696" y="356" class="sm" font-size="10" text-anchor="middle">guard</text>
    <text x="696" y="370" class="sm" font-size="10" text-anchor="middle">8.25 b</text>
  </g>
  <text x="60"  y="396" class="sm" font-size="10" text-anchor="middle">3</text>
  <text x="180" y="396" class="sm" font-size="10" text-anchor="middle">57</text>
  <text x="289" y="396" class="acc" font-size="10" text-anchor="middle">1</text>
  <text x="353" y="396" class="sm" font-size="10" text-anchor="middle">26</text>
  <text x="417" y="396" class="acc" font-size="10" text-anchor="middle">1</text>
  <text x="526" y="396" class="sm" font-size="10" text-anchor="middle">57</text>
  <text x="646" y="396" class="sm" font-size="10" text-anchor="middle">3</text>
  <text x="289" y="412" class="sm" font-size="9" text-anchor="middle">steal</text>
  <text x="417" y="412" class="sm" font-size="9" text-anchor="middle">steal</text>
  <text x="30" y="448" class="lbl" font-size="13">Framing: 8 bursts &#8594; 4.615 ms TDM frame &#8594; 26 frames &#8594; 120 ms multiframe</text>
  <g class="mono" font-size="11">
    <rect x="40" y="462" width="180" height="30" fill="#E2557A" opacity="0.55"/>
    <text x="130" y="481" text-anchor="middle">burst 148 b / 577 &#181;s</text>
    <text x="232" y="481">&#8594;</text>
    <rect x="248" y="462" width="190" height="30" fill="#2A1A2E" opacity="0.25"/>
    <text x="343" y="481" text-anchor="middle">8 slots = 4.615 ms</text>
    <text x="450" y="481">&#8594;</text>
    <rect x="466" y="462" width="230" height="30" fill="#E2557A" opacity="0.55"/>
    <text x="581" y="481" text-anchor="middle">26 frames = 120 ms multiframe</text>
  </g>
  <text x="40" y="516" class="sm" font-size="11">Gross 270.833 kbit/s per carrier &#247; 8 users &#8594; 13 kbit/s speech after FEC.</text>
  <text x="40" y="534" class="sm" font-size="11">Slot 12 = control, slot 25 = reserved &#8594; 24 traffic frames per multiframe.</text>
</svg>
