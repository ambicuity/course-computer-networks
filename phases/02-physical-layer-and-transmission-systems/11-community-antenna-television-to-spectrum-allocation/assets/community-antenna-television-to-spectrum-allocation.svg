<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" width="860" height="560">
  <rect width="860" height="560" fill="#FFF7EC"/>
  <style>
    .t { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .m { font-family: monospace; fill: #2A1A2E; }
    .accent { fill: #E2557A; }
    .stroke { stroke: #2A1A2E; fill: none; }
    .berry { stroke: #E2557A; fill: none; }
  </style>

  <text x="30" y="40" class="t" font-size="22" font-weight="700">HFC Topology and Cable Spectrum Allocation</text>
  <text x="30" y="62" class="t" font-size="13">Fiber trunk to a node, shared coax to homes; TV and Internet coexist via FDM.</text>

  <text x="30" y="100" class="t" font-size="14" font-weight="700">Topology (Hybrid Fiber Coax)</text>

  <rect x="30" y="115" width="120" height="56" rx="6" class="stroke" stroke-width="2" fill="#fff"/>
  <text x="90" y="138" class="t" font-size="13" font-weight="700" text-anchor="middle">Headend</text>
  <text x="90" y="156" class="t" font-size="11" text-anchor="middle">(CMTS)</text>

  <line x1="150" y1="143" x2="270" y2="143" class="berry" stroke-width="3" stroke-dasharray="2 4"/>
  <text x="210" y="135" class="accent t" font-size="11" text-anchor="middle">fiber</text>

  <rect x="270" y="115" width="110" height="56" rx="6" class="stroke" stroke-width="2" fill="#fff"/>
  <text x="325" y="140" class="t" font-size="12" font-weight="700" text-anchor="middle">Fiber node</text>
  <text x="325" y="157" class="t" font-size="10" text-anchor="middle">E/O convert</text>

  <line x1="380" y1="143" x2="500" y2="143" class="stroke" stroke-width="3"/>
  <text x="440" y="135" class="t" font-size="11" text-anchor="middle">coax</text>

  <line x1="500" y1="143" x2="820" y2="143" class="stroke" stroke-width="3"/>
  <text x="660" y="135" class="t" font-size="11" text-anchor="middle">shared coax (500-2000 homes)</text>

  <g class="stroke" stroke-width="1.5">
    <line x1="540" y1="143" x2="540" y2="178"/>
    <line x1="620" y1="143" x2="620" y2="178"/>
    <line x1="700" y1="143" x2="700" y2="178"/>
    <line x1="780" y1="143" x2="780" y2="178"/>
  </g>
  <g class="t" font-size="18" text-anchor="middle">
    <text x="540" y="196">&#127968;</text>
    <text x="620" y="196">&#127968;</text>
    <text x="700" y="196">&#127968;</text>
    <text x="780" y="196">&#127968;</text>
  </g>
  <text x="660" y="218" class="t" font-size="10" text-anchor="middle">cable modems (contend for upstream)</text>

  <text x="30" y="262" class="t" font-size="14" font-weight="700">North American spectrum (FDM): MHz</text>

  <rect x="60" y="280" width="37.7" height="44" class="accent" opacity="0.85"/>
  <rect x="97.7" y="280" width="12.2" height="44" fill="#2A1A2E" opacity="0.12"/>
  <rect x="110" y="280" width="505.7" height="44" fill="#2A1A2E" opacity="0.20"/>
  <rect x="144.6" y="280" width="20.4" height="44" fill="#2A1A2E" opacity="0.45"/>
  <rect x="615.7" y="280" width="204" height="44" class="accent" opacity="0.45"/>
  <rect x="60" y="280" width="760" height="44" class="stroke" stroke-width="1.5"/>

  <text x="79" y="306" class="t" font-size="9" text-anchor="middle" fill="#fff" font-weight="700">UP</text>
  <text x="155" y="306" class="t" font-size="9" text-anchor="middle">FM</text>
  <text x="360" y="306" class="t" font-size="12" text-anchor="middle" font-weight="700">TV channels (6 MHz each)</text>
  <text x="717" y="306" class="t" font-size="11" text-anchor="middle" font-weight="700">Downstream data</text>

  <g class="stroke">
    <line x1="60" y1="324" x2="60" y2="332"/>
    <line x1="97.7" y1="324" x2="97.7" y2="332"/>
    <line x1="110" y1="324" x2="110" y2="332"/>
    <line x1="144.6" y1="324" x2="144.6" y2="332"/>
    <line x1="165" y1="324" x2="165" y2="332"/>
    <line x1="615.7" y1="324" x2="615.7" y2="332"/>
    <line x1="819.7" y1="324" x2="819.7" y2="332"/>
  </g>
  <g class="m" font-size="10" text-anchor="middle">
    <text x="60" y="346">5</text>
    <text x="97.7" y="346">42</text>
    <text x="112" y="358">54</text>
    <text x="146" y="346">88</text>
    <text x="168" y="358">108</text>
    <text x="615.7" y="346">550</text>
    <text x="819.7" y="346">750</text>
  </g>

  <text x="79" y="375" class="accent t" font-size="10" text-anchor="middle" font-weight="700">&#8592; upstream</text>
  <text x="717" y="375" class="accent t" font-size="10" text-anchor="middle" font-weight="700">downstream &#8594;</text>

  <text x="30" y="412" class="t" font-size="14" font-weight="700">Upstream sharing = FDM + TDM + CDMA</text>

  <rect x="30" y="424" width="250" height="110" rx="6" class="berry" stroke-width="1.5" fill="#fff"/>
  <text x="42" y="446" class="t" font-size="12" font-weight="700">Minislots + ranging</text>
  <text x="42" y="466" class="t" font-size="11">Time sliced into minislots</text>
  <text x="42" y="483" class="t" font-size="11">(~8B payload). Modem times</text>
  <text x="42" y="500" class="t" font-size="11">round trip (ranging) to align</text>
  <text x="42" y="517" class="t" font-size="11">to the headend's slot grid.</text>

  <rect x="300" y="424" width="270" height="110" rx="6" class="berry" stroke-width="1.5" fill="#fff"/>
  <text x="312" y="446" class="t" font-size="12" font-weight="700">Slotted ALOHA + backoff</text>
  <text x="312" y="466" class="t" font-size="11">Collisions -&gt; no ACK; retry</text>
  <text x="312" y="483" class="t" font-size="11">after random delay, window</text>
  <text x="312" y="500" class="m" font-size="11">= 1,2,4,8 ...</text>
  <text x="312" y="517" class="t" font-size="11">No CSMA/CD: cannot sense peers.</text>

  <rect x="590" y="424" width="240" height="110" rx="6" class="berry" stroke-width="1.5" fill="#fff"/>
  <text x="602" y="446" class="t" font-size="12" font-weight="700">Downstream (one sender)</text>
  <text x="602" y="466" class="t" font-size="11">204-byte MPEG-2 frame,</text>
  <text x="602" y="483" class="t" font-size="11">184B payload + Reed-Solomon.</text>
  <text x="602" y="500" class="m" font-size="11">QAM-64 ~27 Mbps net</text>
  <text x="602" y="517" class="m" font-size="11">QAM-256 ~39 Mbps net</text>
</svg>
