<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="760" height="540" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="760" height="540" fill="#FFF7EC"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#2A1A2E">Fiber Optic Modes and Attenuation Windows</text>
  <line x1="40" y1="48" x2="720" y2="48" stroke="#2A1A2E" stroke-width="1"/>

  <!-- ============== LEFT: total internal reflection / modes ============== -->
  <text x="40" y="76" font-size="14" font-weight="600" fill="#2A1A2E">Total internal reflection and fiber modes</text>

  <!-- cladding band -->
  <rect x="80" y="110" width="240" height="90" rx="6" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
  <rect x="96" y="126" width="208" height="58" rx="3" fill="none" stroke="#E2557A" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="320" y="120" font-size="11" fill="#2A1A2E">cladding (n_clad)</text>
  <text x="320" y="158" font-size="11" fill="#E2557A">core (n_core &gt; n_clad)</text>

  <!-- single-mode ray: straight -->
  <line x1="100" y1="155" x2="300" y2="155" stroke="#2A1A2E" stroke-width="2"/>
  <text x="100" y="148" font-size="10" fill="#2A1A2E">single-mode ray (axial, no bounce)</text>

  <!-- multimode rays: bouncing -->
  <polyline points="110,190 150,130 200,190 250,130 295,190" fill="none" stroke="#E2557A" stroke-width="1.6"/>
  <polyline points="110,135 165,185 215,135 270,185 295,150" fill="none" stroke="#E2557A" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="110" y="206" font-size="10" fill="#E2557A">multimode rays (different modes, different paths)</text>

  <!-- critical angle annotation -->
  <path d="M 80 155 L 96 155" stroke="#2A1A2E" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="80" y="234" font-size="10" fill="#2A1A2E">theta &gt; theta_c = arcsin(n_clad/n_core) ~ 84 deg</text>
  <text x="80" y="250" font-size="10" fill="#2A1A2E">NA = sqrt(n_core^2 - n_clad^2) ~ 0.14 (G.652)</text>
  <text x="80" y="266" font-size="10" fill="#2A1A2E">V = (2*pi*a/lambda)*NA ; V &lt; 2.405 =&gt; single mode</text>

  <!-- cutoff table -->
  <text x="80" y="296" font-size="12" font-weight="600" fill="#2A1A2E">V-number at 1.55 um</text>
  <line x1="80" y1="304" x2="340" y2="304" stroke="#2A1A2E" stroke-width="0.8"/>
  <text x="86" y="320" font-size="11" fill="#2A1A2E">Single-mode G.652 (a=4.1um)</text>
  <text x="318" y="320" font-size="11" font-weight="600" fill="#E2557A">V = 2.33</text>
  <text x="86" y="338" font-size="11" fill="#2A1A2E">Multimode OM4 (a=25um)</text>
  <text x="318" y="338" font-size="11" font-weight="600" fill="#E2557A">V = 20.25</text>
  <text x="80" y="360" font-size="10" fill="#2A1A2E">Cutoff (G.652) ~ 1.50 um: only LP01 below cutoff survives at 1550 nm.</text>

  <!-- ============== RIGHT: attenuation curve + windows ============== -->
  <text x="420" y="76" font-size="14" font-weight="600" fill="#2A1A2E">Attenuation (dB/km) vs wavelength</text>

  <!-- axes -->
  <line x1="440" y1="300" x2="720" y2="300" stroke="#2A1A2E" stroke-width="1.2"/>
  <line x1="440" y1="110" x2="440" y2="300" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="580" y="324" font-size="10" fill="#2A1A2E" text-anchor="middle">wavelength (um)</text>
  <text x="420" y="205" font-size="10" fill="#2A1A2E" transform="rotate(-90 420 205)" text-anchor="middle">dB/km</text>

  <!-- x ticks: 0.8 0.85 1.0 1.3 1.55 1.8 -->
  <g font-size="9" fill="#2A1A2E" text-anchor="middle">
    <text x="460" y="314">0.8</text>
    <text x="490" y="314">0.85</text>
    <text x="555" y="314">1.0</text>
    <text x="625" y="314">1.30</text>
    <text x="675" y="314">1.55</text>
    <text x="715" y="314">1.8</text>
  </g>

  <!-- attenuation curve (qualitative): high at 0.85, dip at 1.3, deep min at 1.55, OH peak ~1.4 -->
  <path d="M 460 150 Q 485 175 495 185
           Q 540 250 560 230
           Q 600 180 615 175
           Q 635 270 645 260
           Q 660 180 675 170
           Q 695 215 715 230"
        fill="none" stroke="#2A1A2E" stroke-width="2"/>

  <!-- window markers -->
  <line x1="490" y1="110" x2="490" y2="300" stroke="#E2557A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="625" y1="110" x2="625" y2="300" stroke="#E2557A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="675" y1="110" x2="675" y2="300" stroke="#E2557A" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="490" y="104" font-size="9" fill="#E2557A" text-anchor="middle">0.85 um</text>
  <text x="490" y="178" font-size="9" fill="#2A1A2E" text-anchor="middle">2.5 dB/km</text>
  <text x="625" y="104" font-size="9" fill="#E2557A" text-anchor="middle">1.30 um</text>
  <text x="625" y="168" font-size="9" fill="#2A1A2E" text-anchor="middle">0.38 dB/km</text>
  <text x="675" y="104" font-size="9" fill="#E2557A" text-anchor="middle">1.55 um</text>
  <text x="675" y="164" font-size="9" fill="#2A1A2E" text-anchor="middle">0.22 dB/km</text>
  <text x="650" y="282" font-size="8" fill="#2A1A2E" text-anchor="middle">OH peak ~1.4 um</text>

  <!-- ============== BOTTOM: link budget summary ============== -->
  <line x1="40" y1="390" x2="720" y2="390" stroke="#2A1A2E" stroke-width="1"/>
  <text x="40" y="414" font-size="14" font-weight="600" fill="#2A1A2E">Link budget: 40 km, 2 connectors, 0 dBm launch, -28 dBm sensitivity</text>

  <!-- budget bars -->
  <g font-size="10" fill="#2A1A2E">
    <text x="40" y="442">0.85 um window</text>
    <rect x="180" y="432" width="100" height="14" fill="#E2557A" opacity="0.85"/>
    <text x="288" y="442">fiber 100.0 dB + 0.7 conn = 100.7 dB total ; rx -100.7 dBm (FAIL)</text>

    <text x="40" y="466">1.30 um window</text>
    <rect x="180" y="456" width="15" height="14" fill="#E2557A" opacity="0.85"/>
    <text x="202" y="466">fiber 15.2 dB + 0.7 conn = 15.9 dB total ; rx -15.9 dBm (margin +12.1 dB)</text>

    <text x="40" y="490">1.55 um window</text>
    <rect x="180" y="480" width="9" height="14" fill="#E2557A" opacity="0.85"/>
    <text x="196" y="490">fiber 8.8 dB + 0.7 conn = 9.5 dB total ; rx -9.5 dBm (margin +18.5 dB)</text>
  </g>

  <text x="40" y="522" font-size="10" fill="#2A1A2E">Each window is 25,000-30,000 GHz wide; 1.55 um carries EDFA-amplified WDM long-haul traffic. See code/main.py.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#2A1A2E"/>
    </marker>
  </defs>
</svg>
