<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" width="880" height="620" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="880" height="620" fill="#FFF7EC"/>

  <text x="440" y="34" text-anchor="middle" fill="#2A1A2E" font-size="20" font-weight="700">Twisted Pair: Categories, 4-Pair 1000BASE-T, and Auto-Negotiation</text>
  <text x="440" y="56" text-anchor="middle" fill="#2A1A2E" font-size="12">IEEE 802.3 — clauses 28, 40, 55  ·  TIA-568.2-D T568B pinout</text>

  <!-- Left: twisted pair cross section -->
  <g transform="translate(30,86)">
    <text x="120" y="14" text-anchor="middle" fill="#2A1A2E" font-size="13" font-weight="600">Cat 6A U/FTP — 4 twisted pairs</text>
    <rect x="10" y="26" width="220" height="170" rx="10" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="222" y="40" fill="#2A1A2E" font-size="10">sheath</text>

    <g stroke="#E2557A" stroke-width="1.2" fill="none">
      <!-- pair 1 -->
      <circle cx="70" cy="80" r="16"/><circle cx="70" cy="80" r="11"/>
      <circle cx="105" cy="80" r="16"/><circle cx="105" cy="80" r="11"/>
      <!-- pair 2 -->
      <circle cx="150" cy="80" r="16"/><circle cx="150" cy="80" r="11"/>
      <circle cx="185" cy="80" r="16"/><circle cx="185" cy="80" r="11"/>
      <!-- pair 3 -->
      <circle cx="70" cy="140" r="16"/><circle cx="70" cy="140" r="11"/>
      <circle cx="105" cy="140" r="16"/><circle cx="105" cy="140" r="11"/>
      <!-- pair 4 -->
      <circle cx="150" cy="140" r="16"/><circle cx="150" cy="140" r="11"/>
      <circle cx="185" cy="140" r="16"/><circle cx="185" cy="140" r="11"/>
    </g>
    <text x="120" y="220" text-anchor="middle" fill="#2A1A2E" font-size="10">twist pitch varies per pair to defeat structured crosstalk</text>
  </g>

  <!-- Center top: RJ-45 T568B pinout -->
  <g transform="translate(300,86)">
    <text x="140" y="14" text-anchor="middle" fill="#2A1A2E" font-size="13" font-weight="600">RJ-45 T568B pinout</text>
    <g fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1">
      <rect x="20" y="30" width="22" height="40"/><rect x="44" y="30" width="22" height="40"/>
      <rect x="68" y="30" width="22" height="40"/><rect x="92" y="30" width="22" height="40"/>
      <rect x="116" y="30" width="22" height="40"/><rect x="140" y="30" width="22" height="40"/>
      <rect x="164" y="30" width="22" height="40"/><rect x="188" y="30" width="22" height="40"/>
    </g>
    <g fill="#2A1A2E" font-size="10" text-anchor="middle">
      <text x="31" y="48">1</text><text x="55" y="48">2</text><text x="79" y="48">3</text>
      <text x="103" y="48">4</text><text x="127" y="48">5</text><text x="151" y="48">6</text>
      <text x="175" y="48">7</text><text x="199" y="48">8</text>
    </g>
    <g fill="#E2557A" font-size="10" text-anchor="middle">
      <text x="31" y="92">BI_DA+</text><text x="55" y="92">BI_DA-</text>
      <text x="79" y="92">BI_DB+</text><text x="103" y="92">BI_DC+</text>
      <text x="127" y="92">BI_DC-</text><text x="151" y="92">BI_DB-</text>
      <text x="175" y="92">BI_DD+</text><text x="199" y="92">BI_DD-</text>
    </g>
    <text x="31" y="108" text-anchor="middle" fill="#2A1A2E" font-size="9">TX+</text>
    <text x="79" y="108" text-anchor="middle" fill="#2A1A2E" font-size="9">RX+</text>
    <text x="140" y="220" text-anchor="middle" fill="#2A1A2E" font-size="10">10/100BASE-T uses pins 1-2,3-6 only · 1000BASE-T uses all 4 pairs</text>
  </g>

  <!-- Right: category ladder -->
  <g transform="translate(560,86)">
    <text x="140" y="14" text-anchor="middle" fill="#2A1A2E" font-size="13" font-weight="600">Category → bandwidth → 10G reach</text>
    <g font-size="11" fill="#2A1A2E">
      <text x="20" y="44">Cat 5e</text><text x="120" y="44">100 MHz</text><text x="220" y="44">1G/100m</text>
      <text x="20" y="70">Cat 6</text><text x="120" y="70">250 MHz</text><text x="220" y="70">10G/55m</text>
      <text x="20" y="96">Cat 6A</text><text x="120" y="96">500 MHz</text><text x="220" y="96">10G/100m</text>
      <text x="20" y="122">Cat 7</text><text x="120" y="122">600 MHz</text><text x="220" y="122">S/FTP</text>
      <text x="20" y="148">Cat 7A</text><text x="120" y="148">1000 MHz</text><text x="220" y="148">S/FTP</text>
      <text x="20" y="174">Cat 8.2</text><text x="120" y="174">2000 MHz</text><text x="220" y="174">40G/30m</text>
    </g>
    <line x1="10" y1="32" x2="270" y2="32" stroke="#2A1A2E" stroke-width="0.6"/>
    <line x1="10" y1="184" x2="270" y2="184" stroke="#2A1A2E" stroke-width="0.6"/>
  </g>

  <!-- Bottom: 1000BASE-T bidirectional hybrid diagram -->
  <g transform="translate(40,360)">
    <text x="400" y="14" text-anchor="middle" fill="#2A1A2E" font-size="13" font-weight="600">1000BASE-T — 4 pairs, full-duplex, echo cancellation</text>

    <!-- Station A -->
    <rect x="10" y="40" width="90" height="120" rx="6" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="55" y="60" text-anchor="middle" fill="#2A1A2E" font-size="11" font-weight="600">PHY A</text>
    <text x="55" y="80" text-anchor="middle" fill="#2A1A2E" font-size="9">TX: PAM-5</text>
    <text x="55" y="96" text-anchor="middle" fill="#E2557A" font-size="9">echo canceller</text>
    <text x="55" y="112" text-anchor="middle" fill="#2A1A2E" font-size="9">hybrid xfrm</text>
    <text x="55" y="128" text-anchor="middle" fill="#2A1A2E" font-size="9">equalizer</text>

    <!-- Station B -->
    <rect x="700" y="40" width="90" height="120" rx="6" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="745" y="60" text-anchor="middle" fill="#2A1A2E" font-size="11" font-weight="600">PHY B</text>
    <text x="745" y="80" text-anchor="middle" fill="#2A1A2E" font-size="9">TX: PAM-5</text>
    <text x="745" y="96" text-anchor="middle" fill="#E2557A" font-size="9">echo canceller</text>
    <text x="745" y="112" text-anchor="middle" fill="#2A1A2E" font-size="9">hybrid xfrm</text>
    <text x="745" y="128" text-anchor="middle" fill="#2A1A2E" font-size="9">equalizer</text>

    <!-- 4 pairs -->
    <g stroke="#2A1A2E" stroke-width="1.2">
      <line x1="100" y1="60" x2="700" y2="60"/>
      <line x1="100" y1="84" x2="700" y2="84"/>
      <line x1="100" y1="108" x2="700" y2="108"/>
      <line x1="100" y1="132" x2="700" y2="132"/>
    </g>
    <g fill="#E2557A" font-size="9" text-anchor="middle">
      <text x="400" y="56">DA  bidir</text>
      <text x="400" y="80">DB  bidir</text>
      <text x="400" y="104">DC  bidir</text>
      <text x="400" y="128">DD  bidir</text>
    </g>
    <text x="400" y="180" text-anchor="middle" fill="#2A1A2E" font-size="10">each pair carries TX+RX at 125 Mbaud; receiver subtracts own TX via echo canceller before decoding remote symbol</text>
  </g>

  <!-- Auto-neg priority mini-table -->
  <g transform="translate(560,300)">
    <text x="120" y="0" text-anchor="middle" fill="#2A1A2E" font-size="11" font-weight="600">Auto-neg priority (clause 28)</text>
    <g font-size="10" fill="#2A1A2E">
      <text x="20" y="18">1  1000BASE-T full</text>
      <text x="20" y="34">2  1000BASE-T half</text>
      <text x="20" y="50">3  100BASE-TX full</text>
      <text x="20" y="66">4  100BASE-T4</text>
      <text x="20" y="82">5  100BASE-TX half</text>
      <text x="20" y="98">6  10BASE-T full</text>
      <text x="20" y="114">7  10BASE-T half</text>
    </g>
    <rect x="10" y="6" width="230" height="116" fill="none" stroke="#2A1A2E" stroke-width="0.6"/>
  </g>
</svg>
