<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520">
  <rect x="0" y="0" width="760" height="520" fill="#FFF7EC"/>
  <style>
    .t  { fill:#2A1A2E; font-family:Inter, sans-serif; }
    .m  { fill:#2A1A2E; font-family:monospace; }
    .a  { fill:#E2557A; font-family:monospace; }
    .hd { fill:#2A1A2E; font-family:Inter, sans-serif; font-weight:700; }
    .bx { fill:none; stroke:#2A1A2E; stroke-width:1.5; }
    .ac { fill:none; stroke:#E2557A; stroke-width:2; }
  </style>

  <text x="30" y="36" class="hd" font-size="20">Synchronous CDMA: spread, sum, correlate</text>
  <text x="30" y="58" class="t" font-size="12">m = 4 chips/bit · Walsh codes · 1 bit = chip seq, 0 bit = negated seq, silence = zeros</text>

  <!-- Station rows -->
  <text x="30" y="92" class="hd" font-size="13">Per-station transmissions (one bit time)</text>

  <!-- A -->
  <text x="30" y="118" class="m" font-size="13">A code (1 1 1 1)</text>
  <text x="200" y="118" class="t" font-size="12">sends bit 1  -&gt;</text>
  <rect x="300" y="104" width="160" height="22" class="bx"/>
  <text x="312" y="120" class="a" font-size="13">+1 +1 +1 +1</text>

  <!-- B -->
  <text x="30" y="150" class="m" font-size="13">B code (1 -1 1 -1)</text>
  <text x="200" y="150" class="t" font-size="12">sends bit 0  -&gt;</text>
  <rect x="300" y="136" width="160" height="22" class="bx"/>
  <text x="312" y="152" class="a" font-size="13">-1 +1 -1 +1</text>

  <!-- C -->
  <text x="30" y="182" class="m" font-size="13">C code (1 1 -1 -1)</text>
  <text x="200" y="182" class="t" font-size="12">sends bit 1  -&gt;</text>
  <rect x="300" y="168" width="160" height="22" class="bx"/>
  <text x="312" y="184" class="a" font-size="13">+1 +1 -1 -1</text>

  <!-- D -->
  <text x="30" y="214" class="m" font-size="13">D code (1 -1 -1 1)</text>
  <text x="200" y="214" class="t" font-size="12">silent       -&gt;</text>
  <rect x="300" y="200" width="160" height="22" class="bx"/>
  <text x="312" y="216" class="m" font-size="13"> 0  0  0  0</text>

  <!-- Summation arrows -->
  <line x1="480" y1="115" x2="560" y2="160" class="ac"/>
  <line x1="480" y1="147" x2="560" y2="160" class="ac"/>
  <line x1="480" y1="179" x2="560" y2="160" class="ac"/>
  <line x1="480" y1="211" x2="560" y2="160" class="ac"/>
  <text x="492" y="150" class="t" font-size="11">add as voltages</text>

  <!-- Channel sum box -->
  <rect x="560" y="138" width="170" height="44" class="ac"/>
  <text x="568" y="158" class="hd" font-size="12">shared medium</text>
  <text x="568" y="176" class="a" font-size="13">S = +1 +3 -1 +1</text>

  <!-- Recovery section -->
  <line x1="30" y1="248" x2="730" y2="248" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="30" y="278" class="hd" font-size="13">Receiver recovers station C: normalized inner product  S . C = (1/m) S(Si*Ci)</text>

  <!-- correlation table -->
  <rect x="30" y="296" width="700" height="120" class="bx"/>
  <line x1="30" y1="324" x2="730" y2="324" class="bx"/>
  <text x="40" y="316" class="m" font-size="12">chip i</text>
  <text x="160" y="316" class="m" font-size="12">1</text>
  <text x="290" y="316" class="m" font-size="12">2</text>
  <text x="420" y="316" class="m" font-size="12">3</text>
  <text x="550" y="316" class="m" font-size="12">4</text>
  <text x="640" y="316" class="hd" font-size="12">sum</text>

  <text x="40" y="346" class="m" font-size="12">S</text>
  <text x="160" y="346" class="m" font-size="12">+1</text>
  <text x="290" y="346" class="m" font-size="12">+3</text>
  <text x="420" y="346" class="m" font-size="12">-1</text>
  <text x="550" y="346" class="m" font-size="12">+1</text>

  <text x="40" y="370" class="m" font-size="12">C</text>
  <text x="160" y="370" class="m" font-size="12">+1</text>
  <text x="290" y="370" class="m" font-size="12">+1</text>
  <text x="420" y="370" class="m" font-size="12">-1</text>
  <text x="550" y="370" class="m" font-size="12">-1</text>

  <text x="40" y="396" class="a" font-size="12">Si*Ci</text>
  <text x="160" y="396" class="a" font-size="12">+1</text>
  <text x="290" y="396" class="a" font-size="12">+3</text>
  <text x="420" y="396" class="a" font-size="12">+1</text>
  <text x="550" y="396" class="a" font-size="12">-1</text>
  <text x="630" y="396" class="a" font-size="12">+4 / 4 = 1</text>

  <text x="30" y="446" class="t" font-size="13">Result S . C = <tspan class="a" font-family="monospace">+1</tspan>  =&gt;  C sent a <tspan class="hd">1</tspan> bit.  A, B, D cancel because every other code is orthogonal to C (cross-correlation 0).</text>
  <text x="30" y="470" class="t" font-size="12">If codes were not orthogonal, the foreign terms would not vanish and the correlation would land between -1 and +1: interference.</text>
  <text x="30" y="498" class="t" font-size="12">Same Walsh/OVSF code family channelizes real IS-95 cdmaOne and WCDMA forward links.</text>
</svg>
