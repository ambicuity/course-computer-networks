<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" width="880" height="600" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="880" height="600" fill="#FFF7EC"/>

  <text x="40" y="40" font-size="20" font-weight="700" fill="#2A1A2E">T1 (DS1) frame &#x2014; 193 bits every 125 &#xB5;s = 1.544 Mbps</text>
  <text x="40" y="62" font-size="12" fill="#2A1A2E">24 channels &#xD7; 8 bits = 192 payload bits + 1 framing bit (F).  F &#xD7; 8000 = 8 kbps overhead.</text>

  <!-- T1 frame strip: F bit + sample of channel bytes -->
  <g transform="translate(40,90)">
    <rect x="0" y="0" width="22" height="44" fill="#E2557A"/>
    <text x="11" y="20" font-size="11" text-anchor="middle" fill="#FFF7EC" font-weight="700">F</text>
    <text x="11" y="34" font-size="9" text-anchor="middle" fill="#FFF7EC">bit</text>
    <text x="11" y="60" font-size="10" text-anchor="middle" fill="#2A1A2E">1</text>

    <rect x="24" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="46" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="68" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="90" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="112" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="134" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="156" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="178" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <text x="112" y="60" font-size="10" text-anchor="middle" fill="#2A1A2E">Ch 1 (8 bits)</text>

    <text x="282" y="26" font-size="14" text-anchor="middle" fill="#2A1A2E">. . .</text>

    <rect x="360" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="382" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="404" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="426" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="448" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="470" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="492" y="0" width="22" height="44" fill="#2A1A2E" opacity="0.12"/>
    <rect x="514" y="0" width="22" height="44" fill="#E2557A"/>
    <text x="525" y="27" font-size="9" text-anchor="middle" fill="#FFF7EC" font-weight="700">LSB</text>
    <text x="438" y="60" font-size="10" text-anchor="middle" fill="#2A1A2E">Ch 24 (8 bits)</text>

    <text x="290" y="-6" font-size="11" text-anchor="middle" fill="#2A1A2E">192 payload bits &#x2192; 24 &#xD7; 64 kbps = 1.536 Mbps</text>
  </g>

  <!-- Robbed-bit signaling note -->
  <g transform="translate(40,180)">
    <rect x="0" y="0" width="560" height="50" fill="#2A1A2E" opacity="0.05" rx="4"/>
    <text x="12" y="20" font-size="12" font-weight="700" fill="#E2557A">Robbed-bit signaling (RBS)</text>
    <text x="12" y="38" font-size="11" fill="#2A1A2E">D4 superframe: LSB of every channel stolen on frames 6 &amp; 12. Voice tolerates it; data nets 56 kbps/slot.</text>
  </g>

  <!-- ESF F-bit allocation: compact 24-cell row -->
  <text x="40" y="270" font-size="15" font-weight="700" fill="#2A1A2E">Extended Superframe (ESF) &#x2014; 24 frames, the 193rd F-bit split into 3 roles</text>
  <g transform="translate(40,285)" font-size="9" text-anchor="middle">
    <rect x="0" y="0" width="550" height="22" fill="#2A1A2E" opacity="0.05"/>
    <!-- CRC bands (frames 2,6,10,14,18,22 -> indices 1,5,9,13,17,21) -->
    <rect x="22" y="0" width="22" height="22" fill="#2A1A2E" opacity="0.20"/>
    <rect x="110" y="0" width="22" height="22" fill="#2A1A2E" opacity="0.20"/>
    <rect x="198" y="0" width="22" height="22" fill="#2A1A2E" opacity="0.20"/>
    <rect x="286" y="0" width="22" height="22" fill="#2A1A2E" opacity="0.20"/>
    <rect x="374" y="0" width="22" height="22" fill="#2A1A2E" opacity="0.20"/>
    <rect x="462" y="0" width="22" height="22" fill="#2A1A2E" opacity="0.20"/>
    <!-- Framing pattern cells (frames 4,8,12,16,20,24 -> indices 3,7,11,15,19,23) -->
    <rect x="66" y="0" width="22" height="22" fill="#E2557A"/>
    <rect x="154" y="0" width="22" height="22" fill="#E2557A"/>
    <rect x="242" y="0" width="22" height="22" fill="#E2557A"/>
    <rect x="330" y="0" width="22" height="22" fill="#E2557A"/>
    <rect x="418" y="0" width="22" height="22" fill="#E2557A"/>
    <rect x="506" y="0" width="22" height="22" fill="#E2557A"/>
    <!-- frame numbers -->
    <g font-size="8" fill="#FFF7EC">
      <text x="11" y="15">1</text><text x="77" y="15">4</text><text x="165" y="15">8</text>
      <text x="253" y="15">12</text><text x="341" y="15">16</text><text x="429" y="15">20</text>
      <text x="517" y="15">24</text>
    </g>
    <text x="297" y="38" font-size="10" fill="#2A1A2E">24 frames &#x2192; 6 framing (001011), 6 CRC-6, 12 FDL</text>
  </g>
  <g transform="translate(40,345)" font-size="11" fill="#2A1A2E">
    <rect x="0" y="0" width="14" height="14" fill="#E2557A"/><text x="20" y="11">Framing pattern 001011&#x2026; (frames 4,8,12,16,20,24)</text>
    <rect x="300" y="0" width="14" height="14" fill="#2A1A2E" opacity="0.20"/><text x="320" y="11">CRC-6 (frames 2,6,10,14,18,22)</text>
    <rect x="0" y="22" width="14" height="14" fill="#2A1A2E" opacity="0.05" stroke="#2A1A2E" stroke-width="0.5"/><text x="20" y="33">FDL / OAM (remaining 12 frames)</text>
  </g>

  <!-- E1 frame -->
  <text x="40" y="420" font-size="15" font-weight="700" fill="#2A1A2E">E1 frame &#x2014; 32 slots &#xD7; 8 bits = 256 bits / 125 &#xB5;s = 2.048 Mbps</text>
  <g transform="translate(40,435)" font-size="9" text-anchor="middle">
    <rect x="0" y="0" width="26" height="40" fill="#E2557A"/><text x="13" y="18" fill="#FFF7EC" font-weight="700">0</text><text x="13" y="30" fill="#FFF7EC">FAS</text>
    <rect x="26" y="0" width="26" height="40" fill="#2A1A2E" opacity="0.14"/><text x="39" y="24" fill="#FFF7EC">1</text>
    <rect x="52" y="0" width="26" height="40" fill="#2A1A2E" opacity="0.14"/><text x="65" y="24" fill="#FFF7EC">2</text>
    <text x="91" y="24" font-size="11" fill="#2A1A2E">. . .</text>
    <rect x="130" y="0" width="26" height="40" fill="#2A1A2E" opacity="0.14"/><text x="143" y="24" fill="#FFF7EC">15</text>
    <rect x="156" y="0" width="26" height="40" fill="#E2557A" opacity="0.75"/><text x="169" y="18" fill="#FFF7EC" font-weight="700">16</text><text x="169" y="30" fill="#FFF7EC">CAS</text>
    <rect x="182" y="0" width="26" height="40" fill="#2A1A2E" opacity="0.14"/><text x="195" y="24" fill="#FFF7EC">17</text>
    <text x="221" y="24" font-size="11" fill="#2A1A2E">. . .</text>
    <rect x="260" y="0" width="26" height="40" fill="#2A1A2E" opacity="0.14"/><text x="273" y="24" fill="#FFF7EC">31</text>
  </g>
  <text x="40" y="500" font-size="11" fill="#2A1A2E">Slot 0 = frame alignment (FAS 0011011 on odd frames).  Slot 16 = CAS multiframe signaling.  Slots 1&#x2013;15, 17&#x2013;31 = 30 payload channels &#xD7; 64 kbps = 1.920 Mbps.</text>

  <!-- Hierarchy summary -->
  <text x="40" y="540" font-size="15" font-weight="700" fill="#2A1A2E">Plesiochronous hierarchies</text>
  <g transform="translate(40,555)" font-size="11" fill="#2A1A2E">
    <text x="0" y="14">T-carrier (US/Japan):</text>
    <text x="140" y="14" font-family="ui-monospace, monospace">T1 1.544 &#x2192; T2 6.312 &#x2192; T3 44.736 &#x2192; T4 274.176 Mbps  (&#xD7;4, &#xD7;7, &#xD7;6)</text>
    <text x="0" y="32">E-carrier (CEPT/ITU):</text>
    <text x="140" y="32" font-family="ui-monospace, monospace">E1 2.048 &#x2192; E2 8.848 &#x2192; E3 34.368 &#x2192; E4 139.264 Mbps  (&#xD7;4 each level)</text>
    <text x="0" y="50" fill="#E2557A" font-weight="700">DS0 = 64 kbps</text>
    <text x="140" y="50">8 bits/sample &#xD7; 8000 samples/s (Nyquist for 4 kHz) &#x2014; the atom of every level.</text>
  </g>
</svg>
