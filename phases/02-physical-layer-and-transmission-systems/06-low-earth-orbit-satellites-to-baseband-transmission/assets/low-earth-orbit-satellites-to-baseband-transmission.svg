<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560">
  <rect x="0" y="0" width="820" height="560" fill="#FFF7EC"/>
  <text x="32" y="40" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#2A1A2E">LEO Satellites to Baseband: Delay and Capacity</text>
  <text x="32" y="62" font-family="Inter, sans-serif" font-size="13" fill="#2A1A2E" opacity="0.7">Altitude sets one-way delay (d / c); bandwidth and noise set the bit ceiling.</text>

  <!-- Panel A: delay vs altitude -->
  <text x="32" y="98" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#E2557A">A.  One-way delay vs orbit altitude</text>
  <!-- axes -->
  <line x1="70" y1="280" x2="380" y2="280" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="70" y1="280" x2="70" y2="115" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="225" y="305" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E" text-anchor="middle">altitude (km, log-ish)</text>
  <text x="40" y="200" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E" transform="rotate(-90 40 200)" text-anchor="middle">1-way delay (ms)</text>

  <!-- 150 ms voice budget line -->
  <line x1="70" y1="160" x2="380" y2="160" stroke="#E2557A" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="376" y="155" font-family="monospace" font-size="10" fill="#E2557A" text-anchor="end">~150 ms G.114 voice budget</text>

  <!-- data points -->
  <circle cx="100" cy="271" r="5" fill="#E2557A"/>
  <text x="100" y="262" font-family="monospace" font-size="9.5" fill="#2A1A2E" text-anchor="middle">2.5</text>
  <text x="100" y="296" font-family="Inter, sans-serif" font-size="9.5" fill="#2A1A2E" text-anchor="middle">Iridium 750</text>

  <circle cx="150" cy="266" r="5" fill="#E2557A"/>
  <text x="150" y="257" font-family="monospace" font-size="9.5" fill="#2A1A2E" text-anchor="middle">4.7</text>
  <text x="150" y="318" font-family="Inter, sans-serif" font-size="9.5" fill="#2A1A2E" text-anchor="middle">Globalstar 1400</text>

  <circle cx="270" cy="210" r="5" fill="#2A1A2E"/>
  <text x="270" y="201" font-family="monospace" font-size="9.5" fill="#2A1A2E" text-anchor="middle">67</text>
  <text x="270" y="296" font-family="Inter, sans-serif" font-size="9.5" fill="#2A1A2E" text-anchor="middle">GPS 20200</text>

  <circle cx="350" cy="130" r="5" fill="#2A1A2E"/>
  <text x="350" y="121" font-family="monospace" font-size="9.5" fill="#2A1A2E" text-anchor="middle">119</text>
  <text x="350" y="318" font-family="Inter, sans-serif" font-size="9.5" fill="#2A1A2E" text-anchor="middle">GEO 35800</text>

  <path d="M100 271 L150 266 L270 210 L350 130" fill="none" stroke="#2A1A2E" stroke-width="1.2" opacity="0.5"/>

  <!-- Panel B: baseband vs passband -->
  <text x="440" y="98" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#E2557A">B.  Baseband shifted to passband</text>
  <line x1="470" y1="200" x2="790" y2="200" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="470" y1="200" x2="470" y2="115" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="630" y="222" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E" text-anchor="middle">frequency</text>
  <text x="463" y="118" font-family="monospace" font-size="10" fill="#2A1A2E">0</text>

  <!-- baseband lobe at DC -->
  <path d="M470 200 Q500 130 530 200" fill="#E2557A" opacity="0.25" stroke="#E2557A" stroke-width="1.5"/>
  <text x="500" y="240" font-family="Inter, sans-serif" font-size="10" fill="#2A1A2E" text-anchor="middle">baseband (0..B)</text>

  <!-- arrow -->
  <line x1="545" y1="165" x2="640" y2="165" stroke="#2A1A2E" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="592" y="158" font-family="monospace" font-size="9.5" fill="#2A1A2E" text-anchor="middle">mix up</text>

  <!-- passband lobe at carrier -->
  <path d="M680 200 Q710 130 740 200" fill="#E2557A" opacity="0.45" stroke="#E2557A" stroke-width="1.5"/>
  <line x1="710" y1="200" x2="710" y2="210" stroke="#2A1A2E" stroke-width="1"/>
  <text x="710" y="240" font-family="Inter, sans-serif" font-size="10" fill="#2A1A2E" text-anchor="middle">passband (L-band ~1.6 GHz)</text>

  <!-- Panel C: capacity laws -->
  <text x="32" y="365" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#E2557A">C.  The two ceilings — achievable rate = the smaller</text>

  <rect x="32" y="380" width="370" height="150" rx="8" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.3"/>
  <text x="52" y="406" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#2A1A2E">Nyquist — noiseless</text>
  <text x="52" y="430" font-family="monospace" font-size="14" fill="#E2557A">C = 2 · B · log2(V)</text>
  <text x="52" y="454" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">More signal levels V raise the rate;</text>
  <text x="52" y="470" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">sampling below 2B causes aliasing.</text>
  <text x="52" y="500" font-family="monospace" font-size="11" fill="#2A1A2E">3 kHz, V=2  ->  6000 bps</text>
  <text x="52" y="517" font-family="monospace" font-size="11" fill="#2A1A2E">3 kHz, V=16 -> 24000 bps</text>

  <rect x="420" y="380" width="370" height="150" rx="8" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.3"/>
  <text x="440" y="406" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#2A1A2E">Shannon — noisy</text>
  <text x="440" y="430" font-family="monospace" font-size="14" fill="#E2557A">C = B · log2(1 + S/N)</text>
  <text x="440" y="454" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">S/N is linear: convert from dB first</text>
  <text x="440" y="470" font-family="monospace" font-size="11" fill="#2A1A2E">S/N = 10^(dB/10)   40 dB -> 10000</text>
  <text x="440" y="500" font-family="monospace" font-size="11" fill="#2A1A2E">ADSL 1 MHz, 40 dB</text>
  <text x="440" y="517" font-family="monospace" font-size="11" fill="#2A1A2E">  -> ~13.3 Mbps ceiling</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 3 L0 6 z" fill="#2A1A2E"/>
    </marker>
  </defs>
</svg>
