<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" width="640" height="520" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="640" height="520" fill="#FFF7EC"/>

  <text x="320" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#2A1A2E">Gray-Coded QAM-16 Constellation</text>
  <text x="320" y="54" text-anchor="middle" font-size="12" fill="#2A1A2E">When 1101 is sent, every nearest-neighbor slip costs exactly 1 bit</text>

  <!-- Axes -->
  <g stroke="#2A1A2E" stroke-width="1.25">
    <line x1="80" y1="300" x2="560" y2="300"/>
    <line x1="320" y1="80" x2="320" y2="460"/>
  </g>
  <polygon points="560,300 552,296 552,304" fill="#2A1A2E"/>
  <polygon points="320,80 316,88 324,88" fill="#2A1A2E"/>
  <text x="566" y="304" font-size="13" font-weight="600" fill="#2A1A2E">I</text>
  <text x="312" y="76" font-size="13" font-weight="600" fill="#2A1A2E">Q</text>

  <!-- Tick labels I -->
  <g font-size="11" fill="#2A1A2E" text-anchor="middle">
    <text x="160" y="318">-3</text>
    <text x="240" y="318">-1</text>
    <text x="400" y="318">1</text>
    <text x="480" y="318">3</text>
  </g>
  <!-- Tick labels Q -->
  <g font-size="11" fill="#2A1A2E" text-anchor="end">
    <text x="314" y="444">-3</text>
    <text x="314" y="364">-1</text>
    <text x="314" y="204">1</text>
    <text x="314" y="124">3</text>
  </g>

  <!-- Decision boundaries -->
  <g stroke="#2A1A2E" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.35">
    <line x1="200" y1="80" x2="200" y2="460"/>
    <line x1="280" y1="80" x2="280" y2="460"/>
    <line x1="360" y1="80" x2="360" y2="460"/>
    <line x1="440" y1="80" x2="440" y2="460"/>
    <line x1="80" y1="120" x2="560" y2="120"/>
    <line x1="80" y1="200" x2="560" y2="200"/>
    <line x1="80" y1="280" x2="560" y2="280"/>
    <line x1="80" y1="360" x2="560" y2="360"/>
  </g>

  <!-- Points. Grid: x -3=160,-1=240,1=400,3=480 ; y Q=3->120, Q=1->200, Q=-1->360, Q=-3->440 -->
  <!-- Gray grid (from main.py):
       row Q= 3: 0010 0110 1110 1010
       row Q= 1: 0011 0111 1111 1011
       row Q=-1: 0001 0101 1101 1001
       row Q=-3: 0000 0100 1100 1000 -->
  <g font-size="12" font-weight="700" fill="#2A1A2E" text-anchor="middle">
    <!-- Q=3 -->
    <circle cx="160" cy="120" r="7" fill="#2A1A2E"/><text x="160" y="108">0010</text>
    <circle cx="240" cy="120" r="7" fill="#2A1A2E"/><text x="240" y="108">0110</text>
    <circle cx="400" cy="120" r="7" fill="#2A1A2E"/><text x="400" y="108">1110</text>
    <circle cx="480" cy="120" r="7" fill="#2A1A2E"/><text x="480" y="108">1010</text>
    <!-- Q=1 -->
    <circle cx="160" cy="200" r="7" fill="#2A1A2E"/><text x="160" y="188">0011</text>
    <circle cx="240" cy="200" r="7" fill="#2A1A2E"/><text x="240" y="188">0111</text>
    <circle cx="400" cy="200" r="7" fill="#2A1A2E"/><text x="400" y="188">1111</text>
    <circle cx="480" cy="200" r="7" fill="#2A1A2E"/><text x="480" y="188">1011</text>
    <!-- Q=-1 -->
    <circle cx="160" cy="360" r="7" fill="#2A1A2E"/><text x="160" y="348">0001</text>
    <circle cx="240" cy="360" r="7" fill="#2A1A2E"/><text x="240" y="348">0101</text>
    <circle cx="400" cy="360" r="7" fill="#E2557A"/><text x="400" y="348">1101</text>
    <circle cx="480" cy="360" r="7" fill="#2A1A2E"/><text x="480" y="348">1001</text>
    <!-- Q=-3 -->
    <circle cx="160" cy="440" r="7" fill="#2A1A2E"/><text x="160" y="428">0000</text>
    <circle cx="240" cy="440" r="7" fill="#2A1A2E"/><text x="240" y="428">0100</text>
    <circle cx="400" cy="440" r="7" fill="#2A1A2E"/><text x="400" y="428">1100</text>
    <circle cx="480" cy="440" r="7" fill="#2A1A2E"/><text x="480" y="428">1000</text>
  </g>

  <!-- Sent 1101 ring at (400,360) -->
  <circle cx="400" cy="360" r="13" fill="none" stroke="#E2557A" stroke-width="2.5"/>
  <text x="418" y="356" font-size="11" font-weight="700" fill="#E2557A">sent 1101</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#E2557A"/>
    </marker>
  </defs>

  <!-- Error arrows to 4 nearest neighbors of 1101 -->
  <g stroke="#E2557A" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <line x1="388" y1="360" x2="252" y2="360"/>   <!-- left -> 0101 -->
    <line x1="400" y1="348" x2="400" y2="212"/>   <!-- up -> 1111 -->
    <line x1="400" y1="372" x2="400" y2="428"/>   <!-- down -> 1100 -->
    <line x1="412" y1="360" x2="468" y2="360"/>   <!-- right -> 1001 -->
  </g>

  <!-- Neighbor error labels -->
  <g font-size="10.5" fill="#E2557A" font-weight="600">
    <text x="300" y="354">left → 0101 (1 bit)</text>
    <text x="408" y="170">up → 1111 (1 bit)</text>
    <text x="408" y="452">down → 1100 (1 bit)</text>
    <text x="420" y="380">right → 1001 (1 bit)</text>
  </g>

  <!-- Notes -->
  <g font-size="11" fill="#2A1A2E">
    <text x="80" y="492" font-weight="600">Gray property: every horizontal/vertical neighbor differs in exactly 1 bit.</text>
    <text x="80" y="508">A sequential (binary) label would make the vertical slip 1101 → 1001 cost 2 bits.</text>
  </g>
</svg>
