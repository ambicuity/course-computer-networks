<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" height="560">
  <rect x="0" y="0" width="760" height="560" fill="#FFF7EC"/>
  <style>
    .t  { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .mono { font-family: monospace; fill: #2A1A2E; }
    .title { font-family: Inter, sans-serif; fill: #2A1A2E; font-weight: 700; }
    .accent { fill: #E2557A; }
  </style>

  <text x="30" y="38" class="title" font-size="22">Spanning Tree: physical mesh reduced to one loop-free tree</text>
  <text x="30" y="60" class="t" font-size="13">IEEE 802.1D — lowest Bridge ID is root; redundant ports go BLOCKING (dashed) so no frame can loop.</text>

  <!-- ===== Bridge nodes ===== -->
  <!-- Root B1 -->
  <g>
    <circle cx="380" cy="130" r="34" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
    <text x="380" y="128" text-anchor="middle" class="title" font-size="18" fill="#FFF7EC">B1</text>
    <text x="380" y="146" text-anchor="middle" class="mono" font-size="9" fill="#FFF7EC">0x1000</text>
    <text x="380" y="86" text-anchor="middle" class="accent" font-family="Inter, sans-serif" font-size="13" font-weight="700">ROOT</text>
  </g>
  <!-- B2 -->
  <g>
    <circle cx="220" cy="270" r="32" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="220" y="268" text-anchor="middle" class="title" font-size="16">B2</text>
    <text x="220" y="284" text-anchor="middle" class="mono" font-size="9">0x2000</text>
  </g>
  <!-- B3 -->
  <g>
    <circle cx="540" cy="270" r="32" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="540" y="268" text-anchor="middle" class="title" font-size="16">B3</text>
    <text x="540" y="284" text-anchor="middle" class="mono" font-size="9">0x3000</text>
  </g>
  <!-- B4 -->
  <g>
    <circle cx="300" cy="430" r="32" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="300" y="428" text-anchor="middle" class="title" font-size="16">B4</text>
    <text x="300" y="444" text-anchor="middle" class="mono" font-size="9">0x4000</text>
  </g>
  <!-- B5 -->
  <g>
    <circle cx="600" cy="430" r="32" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="600" y="428" text-anchor="middle" class="title" font-size="16">B5</text>
    <text x="600" y="444" text-anchor="middle" class="mono" font-size="9">0x5000</text>
  </g>

  <!-- ===== Tree links (solid) ===== -->
  <!-- B1-B2 -->
  <line x1="356" y1="155" x2="244" y2="246" stroke="#2A1A2E" stroke-width="3"/>
  <!-- B1-B3 -->
  <line x1="404" y1="155" x2="516" y2="246" stroke="#2A1A2E" stroke-width="3"/>
  <!-- B2-B4 -->
  <line x1="237" y1="298" x2="283" y2="402" stroke="#2A1A2E" stroke-width="3"/>
  <!-- B3-B5 -->
  <line x1="557" y1="298" x2="583" y2="402" stroke="#2A1A2E" stroke-width="3"/>

  <!-- ===== Blocked links (dashed, accent) ===== -->
  <!-- B2-B3 redundant mesh link -->
  <line x1="252" y1="270" x2="508" y2="270" stroke="#E2557A" stroke-width="2.5" stroke-dasharray="9 7"/>
  <!-- B3-B4 redundant path to B4 -->
  <line x1="514" y1="290" x2="328" y2="412" stroke="#E2557A" stroke-width="2.5" stroke-dasharray="9 7"/>

  <!-- cost labels -->
  <text x="288" y="195" class="mono" font-size="10" fill="#2A1A2E">19</text>
  <text x="468" y="195" class="mono" font-size="10" fill="#2A1A2E">19</text>
  <text x="244" y="356" class="mono" font-size="10" fill="#2A1A2E">19</text>
  <text x="586" y="356" class="mono" font-size="10" fill="#2A1A2E">19</text>
  <text x="372" y="262" class="mono" font-size="10" fill="#E2557A">BLOCK</text>
  <text x="408" y="372" class="mono" font-size="10" fill="#E2557A">BLOCK</text>

  <!-- ===== Legend ===== -->
  <g transform="translate(30,500)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#2A1A2E" stroke-width="3"/>
    <text x="48" y="4" class="t" font-size="12">Forwarding (tree link)</text>
    <line x1="230" y1="0" x2="270" y2="0" stroke="#E2557A" stroke-width="2.5" stroke-dasharray="9 7"/>
    <text x="278" y="4" class="t" font-size="12">Blocking (loop pruned)</text>
    <circle cx="500" cy="0" r="9" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
    <text x="516" y="4" class="t" font-size="12">Root bridge (lowest ID)</text>
  </g>

  <!-- ===== Port state machine side panel ===== -->
  <g transform="translate(560,470)">
    <text x="0" y="-2" class="title" font-size="12">802.1D port states</text>
    <text x="0" y="18" class="mono" font-size="10">BLOCKING</text>
    <text x="0" y="34" class="mono" font-size="10">  v Listening 15s</text>
    <text x="0" y="50" class="mono" font-size="10">  v Learning 15s</text>
    <text x="0" y="66" class="mono" font-size="10" fill="#E2557A">  v FORWARDING</text>
  </g>
</svg>
