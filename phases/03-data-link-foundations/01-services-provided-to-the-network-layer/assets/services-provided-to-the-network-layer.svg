<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" height="560">
  <rect width="760" height="560" fill="#FFF7EC"/>
  <style>
    .t  { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .h  { font-family: Inter, sans-serif; fill: #2A1A2E; font-weight: 700; }
    .m  { font-family: monospace; fill: #2A1A2E; }
    .acc{ fill: #E2557A; }
    .accs { stroke: #E2557A; }
    .ink { stroke: #2A1A2E; }
  </style>

  <text x="30" y="38" class="h" font-size="22">Three services the data link layer offers the network layer</text>
  <text x="30" y="60" class="t" font-size="13" opacity="0.8">Same one-hop handoff, three reliability levels. The virtual path looks direct; the real path goes down and up.</text>

  <!-- Virtual vs actual path -->
  <text x="160" y="92" class="h" font-size="13">Host 1</text>
  <text x="560" y="92" class="h" font-size="13">Host 2</text>

  <!-- layer stacks -->
  <g font-size="12">
    <rect x="120" y="100" width="120" height="26" fill="none" class="ink" stroke-width="1.4"/>
    <text x="180" y="118" class="t" text-anchor="middle">3  Network</text>
    <rect x="120" y="128" width="120" height="26" fill="#E2557A" fill-opacity="0.16" class="accs" stroke-width="1.6"/>
    <text x="180" y="146" class="h" text-anchor="middle">2  Data link</text>
    <rect x="120" y="156" width="120" height="26" fill="none" class="ink" stroke-width="1.4"/>
    <text x="180" y="174" class="t" text-anchor="middle">1  Physical</text>

    <rect x="520" y="100" width="120" height="26" fill="none" class="ink" stroke-width="1.4"/>
    <text x="580" y="118" class="t" text-anchor="middle">3  Network</text>
    <rect x="520" y="128" width="120" height="26" fill="#E2557A" fill-opacity="0.16" class="accs" stroke-width="1.6"/>
    <text x="580" y="146" class="h" text-anchor="middle">2  Data link</text>
    <rect x="520" y="156" width="120" height="26" fill="none" class="ink" stroke-width="1.4"/>
    <text x="580" y="174" class="t" text-anchor="middle">1  Physical</text>
  </g>

  <!-- virtual path (dashed, link-to-link) -->
  <line x1="240" y1="141" x2="520" y2="141" class="accs" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="380" y="135" class="acc" font-size="11" text-anchor="middle" font-weight="700">virtual data path</text>

  <!-- actual path (down, across, up) -->
  <path d="M180 182 L180 210 L580 210 L580 182" fill="none" class="ink" stroke-width="1.4"/>
  <text x="380" y="226" class="t" font-size="11" text-anchor="middle" opacity="0.8">actual path: down to physical, across the wire, back up</text>

  <!-- divider -->
  <line x1="30" y1="248" x2="730" y2="248" class="ink" stroke-width="1" opacity="0.3"/>

  <!-- Three service-class cards -->
  <!-- Card 1 -->
  <rect x="30" y="266" width="222" height="262" rx="8" fill="#fff" class="ink" stroke-width="1.4"/>
  <text x="44" y="292" class="h" font-size="14">1 · Unacknowledged</text>
  <text x="44" y="310" class="h" font-size="14">connectionless</text>
  <text x="44" y="332" class="acc" font-size="12" font-weight="700">Ethernet / IEEE 802.3</text>
  <line x1="44" y1="342" x2="238" y2="342" class="ink" stroke-width="0.8" opacity="0.3"/>
  <text x="44" y="362" class="t" font-size="11">no setup / no teardown</text>
  <text x="44" y="380" class="t" font-size="11">no ACK, no sequence #</text>
  <text x="44" y="398" class="t" font-size="11">bad frame: FCS fails, dropped</text>
  <text x="44" y="416" class="t" font-size="11">recovery left to higher layers</text>
  <text x="44" y="446" class="t" font-size="11" opacity="0.8">Wire evidence:</text>
  <!-- frames, no ack -->
  <g>
    <rect x="44" y="456" width="34" height="20" fill="#E2557A" fill-opacity="0.18" class="accs"/>
    <rect x="86" y="456" width="34" height="20" fill="#E2557A" fill-opacity="0.18" class="accs"/>
    <rect x="128" y="456" width="34" height="20" fill="none" class="ink" stroke-dasharray="3 3"/>
    <text x="145" y="470" class="t" font-size="9" text-anchor="middle">lost</text>
  </g>
  <text x="44" y="494" class="m" font-size="10">DA | SA | type | data | CRC32</text>
  <text x="44" y="512" class="t" font-size="10" opacity="0.75">use when BER ~ 1e-12, or real-time</text>

  <!-- Card 2 -->
  <rect x="269" y="266" width="222" height="262" rx="8" fill="#fff" class="ink" stroke-width="1.4"/>
  <text x="283" y="292" class="h" font-size="14">2 · Acknowledged</text>
  <text x="283" y="310" class="h" font-size="14">connectionless</text>
  <text x="283" y="332" class="acc" font-size="12" font-weight="700">Wi-Fi / IEEE 802.11</text>
  <line x1="283" y1="342" x2="477" y2="342" class="ink" stroke-width="0.8" opacity="0.3"/>
  <text x="283" y="362" class="t" font-size="11">no logical connection</text>
  <text x="283" y="380" class="t" font-size="11">each frame ACKed (SIFS gap)</text>
  <text x="283" y="398" class="t" font-size="11">retransmit timer on timeout</text>
  <text x="283" y="416" class="t" font-size="11">no ordering across frames</text>
  <text x="283" y="446" class="t" font-size="11" opacity="0.8">Wire evidence:  frame then ACK</text>
  <g>
    <rect x="283" y="456" width="50" height="20" fill="#E2557A" fill-opacity="0.18" class="accs"/>
    <text x="308" y="470" class="t" font-size="9" text-anchor="middle">DATA</text>
    <line x1="333" y1="466" x2="357" y2="466" class="accs" stroke-width="1.4"/>
    <polygon points="357,466 350,462 350,470" class="acc"/>
    <rect x="360" y="456" width="34" height="20" fill="none" class="accs" stroke-width="1.4"/>
    <text x="377" y="470" class="acc" font-size="9" text-anchor="middle">ACK</text>
  </g>
  <text x="283" y="494" class="m" font-size="10">wlan.fc.type_subtype==0x1d</text>
  <text x="283" y="512" class="t" font-size="10" opacity="0.75">use when FER ~ 1-10% (wireless)</text>

  <!-- Card 3 -->
  <rect x="508" y="266" width="222" height="262" rx="8" fill="#fff" class="ink" stroke-width="1.4"/>
  <text x="522" y="292" class="h" font-size="14">3 · Acknowledged</text>
  <text x="522" y="310" class="h" font-size="14">connection-oriented</text>
  <text x="522" y="332" class="acc" font-size="12" font-weight="700">HDLC / PPP numbered</text>
  <line x1="522" y1="342" x2="716" y2="342" class="ink" stroke-width="0.8" opacity="0.3"/>
  <text x="522" y="362" class="t" font-size="11">per-frame sequence numbers</text>
  <text x="522" y="380" class="t" font-size="11">exactly-once, in-order</text>
  <text x="522" y="398" class="t" font-size="11">duplicates suppressed</text>
  <text x="522" y="446" class="t" font-size="11" opacity="0.8">Three phases:</text>
  <g font-size="9">
    <rect x="522" y="408" width="60" height="20" rx="3" fill="#E2557A" fill-opacity="0.18" class="accs"/>
    <text x="552" y="422" class="t" text-anchor="middle">establish</text>
    <rect x="588" y="408" width="60" height="20" rx="3" fill="#E2557A" fill-opacity="0.3" class="accs"/>
    <text x="618" y="422" class="t" text-anchor="middle">transfer</text>
    <rect x="654" y="408" width="60" height="20" rx="3" fill="#E2557A" fill-opacity="0.18" class="accs"/>
    <text x="684" y="422" class="t" text-anchor="middle">release</text>
  </g>
  <g>
    <rect x="522" y="456" width="42" height="20" fill="#E2557A" fill-opacity="0.18" class="accs"/>
    <text x="543" y="470" class="m" font-size="9" text-anchor="middle">seq0</text>
    <rect x="570" y="456" width="42" height="20" fill="#E2557A" fill-opacity="0.18" class="accs"/>
    <text x="591" y="470" class="m" font-size="9" text-anchor="middle">seq1</text>
    <rect x="618" y="456" width="42" height="20" fill="#E2557A" fill-opacity="0.18" class="accs"/>
    <text x="639" y="470" class="m" font-size="9" text-anchor="middle">seq2</text>
  </g>
  <text x="522" y="512" class="t" font-size="10" opacity="0.75">use on long unreliable links (satellite)</text>

  <text x="30" y="550" class="t" font-size="11" opacity="0.7">Link-layer acknowledgement is always an optimization, never a requirement — the network layer can recover end-to-end, only slower.</text>
</svg>
