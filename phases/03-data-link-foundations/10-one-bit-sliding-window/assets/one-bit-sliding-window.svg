<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" width="880" height="620">
  <rect width="880" height="620" fill="#FFF7EC"/>
  <style>
    text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; fill: #2A1A2E; }
    .title { font-size: 20px; font-weight: 700; }
    .sub { font-size: 13px; fill: #6a4a5e; }
    .h { font-size: 14px; font-weight: 700; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 12px; }
    .sm { font-size: 11px; }
    .acc { fill: #E2557A; }
    .box { fill: #FFF7EC; stroke: #2A1A2E; stroke-width: 1.4; }
    .node { fill: #2A1A2E; }
    .arr { stroke: #2A1A2E; stroke-width: 1.4; fill: none; }
    .accarr { stroke: #E2557A; stroke-width: 1.8; fill: none; }
  </style>

  <text x="40" y="38" class="title">One-Bit Sliding Window (Protocol 4)</text>
  <text x="40" y="58" class="sub">Simultaneous start: frames cross in flight. Notation (seq, ack, packet). * = network-layer accept.</text>

  <!-- Two endpoint columns -->
  <text x="120" y="96" class="h" text-anchor="middle">A</text>
  <text x="760" y="96" class="h" text-anchor="middle">B</text>
  <line x1="120" y1="108" x2="120" y2="560" class="arr" stroke-dasharray="3 4"/>
  <line x1="760" y1="108" x2="760" y2="560" class="arr" stroke-dasharray="3 4"/>
  <text x="40" y="112" class="sm">state</text>
  <text x="40" y="128" class="mono">nfs=0 fe=0</text>

  <!-- Step 1: both send -->
  <circle cx="120" cy="150" r="5" class="node"/>
  <circle cx="760" cy="150" r="5" class="node"/>
  <text x="48" y="154" class="mono">t=0</text>
  <path d="M 126 150 C 350 120, 530 120, 754 150" class="accarr" marker-end="url(#ah)"/>
  <path d="M 754 150 C 530 180, 350 180, 126 150" class="accarr" marker-end="url(#ah)"/>
  <text x="300" y="118" class="mono acc">(0,1,A0)</text>
  <text x="480" y="186" class="mono acc">(0,1,B0)</text>
  <text x="48" y="178" class="sm">frames cross</text>

  <!-- Step 2: B receives A0, delivers; A receives B0, delivers -->
  <text x="48" y="214" class="mono">t=1</text>
  <circle cx="760" cy="230" r="5" class="node"/>
  <circle cx="120" cy="230" r="5" class="node"/>
  <text x="610" y="226" class="mono">DELIVER A0*</text>
  <text x="140" y="226" class="mono">DELIVER B0*</text>
  <text x="610" y="242" class="sm">fe 0-&gt;1, ack!=nfs, no advance</text>
  <text x="140" y="242" class="sm">fe 0-&gt;1, ack!=nfs, no advance</text>

  <!-- Step 3: both retransmit (the duplicate phase) -->
  <text x="48" y="282" class="mono">t=2</text>
  <circle cx="120" cy="300" r="5" class="node"/>
  <circle cx="760" cy="300" r="5" class="node"/>
  <path d="M 126 300 C 350 270, 530 270, 754 300" class="arr" marker-end="url(#ahk)"/>
  <path d="M 754 300 C 530 330, 350 330, 126 300" class="arr" marker-end="url(#ahk)"/>
  <text x="300" y="268" class="mono">(0,0,A0)</text>
  <text x="480" y="336" class="mono">(0,0,B0)</text>
  <text x="48" y="304" class="sm">retransmit, ack=0 now</text>

  <!-- Step 4: duplicates rejected, but ack advances send window -->
  <text x="48" y="368" class="mono">t=3</text>
  <circle cx="760" cy="386" r="5" class="node"/>
  <circle cx="120" cy="386" r="5" class="node"/>
  <text x="610" y="382" class="mono">DUPLICATE (drop)</text>
  <text x="140" y="382" class="mono">DUPLICATE (drop)</text>
  <text x="610" y="398" class="sm acc">ack==nfs: nfs 0-&gt;1 (advance)</text>
  <text x="140" y="398" class="sm acc">ack==nfs: nfs 0-&gt;1 (advance)</text>

  <!-- Step 5: resync, fresh data flows -->
  <text x="48" y="436" class="mono">t=4</text>
  <circle cx="120" cy="456" r="5" class="node"/>
  <circle cx="760" cy="456" r="5" class="node"/>
  <path d="M 126 456 C 350 426, 530 426, 754 456" class="accarr" marker-end="url(#ah)"/>
  <text x="300" y="424" class="mono acc">(1,0,A1)</text>
  <text x="48" y="460" class="sm">resynced: fresh frame again</text>

  <!-- Legend / frame layout -->
  <rect x="40" y="500" width="800" height="96" class="box" rx="6"/>
  <text x="56" y="522" class="h">Frame layout on the wire</text>
  <rect x="56" y="534" width="60" height="30" fill="#E2557A"/>
  <text x="86" y="554" class="mono" fill="#FFF7EC" text-anchor="middle">seq</text>
  <rect x="120" y="534" width="60" height="30" fill="#E2557A"/>
  <text x="150" y="554" class="mono" fill="#FFF7EC" text-anchor="middle">ack</text>
  <rect x="184" y="534" width="300" height="30" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="334" y="554" class="mono" text-anchor="middle">info (one packet)</text>
  <text x="500" y="544" class="sm">seq, ack &#8712; {0,1}  &#8226;  window = 1  &#8226;  piggybacked ack = 1 &#8722; frame_expected</text>
  <text x="500" y="562" class="sm">advance rule: r.seq==fe &#8594; deliver; r.ack==nfs &#8594; stop timer, fetch next</text>
  <text x="500" y="580" class="sm acc">Result: every 2nd frame in the crossing phase is a redundant duplicate,</text>
  <text x="500" y="594" class="sm acc">but no packet is ever delivered twice to a network layer.</text>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 z" fill="#E2557A"/>
    </marker>
    <marker id="ahk" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 z" fill="#2A1A2E"/>
    </marker>
  </defs>
</svg>
