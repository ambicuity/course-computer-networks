<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="760" height="540">
  <rect width="760" height="540" fill="#FFF7EC"/>
  <style>
    .ink { fill: #2A1A2E; }
    .berry { fill: #E2557A; }
    .stroke-ink { stroke: #2A1A2E; fill: none; stroke-width: 1.5; }
    .stroke-berry { stroke: #E2557A; fill: none; stroke-width: 1.5; }
    text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  </style>

  <text x="40" y="40" class="ink" font-size="22" font-weight="700">CRC: Polynomial Long Division over GF(2)</text>
  <text x="40" y="62" class="ink" font-size="13">Frame 1101011111 ÷ G(x)=x⁴+x+1 (binary 10011), 4 zero bits appended</text>

  <!-- Frame with appended zeros -->
  <g transform="translate(40,90)">
    <text x="0" y="14" class="ink" font-size="12">xʳ·M(x)  (dividend):</text>
    <g class="mono" font-size="13">
      <rect x="160" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="182" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="204" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="226" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="248" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="270" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="292" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="314" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="336" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="358" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="380" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <rect x="402" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <rect x="424" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <rect x="446" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <text x="171" y="16" text-anchor="middle">1</text><text x="193" y="16" text-anchor="middle">1</text>
      <text x="215" y="16" text-anchor="middle">0</text><text x="237" y="16" text-anchor="middle">1</text>
      <text x="259" y="16" text-anchor="middle">0</text><text x="281" y="16" text-anchor="middle">1</text>
      <text x="303" y="16" text-anchor="middle">1</text><text x="325" y="16" text-anchor="middle">1</text>
      <text x="347" y="16" text-anchor="middle">1</text><text x="369" y="16" text-anchor="middle">1</text>
      <text x="391" y="16" text-anchor="middle" class="berry">0</text>
      <text x="413" y="16" text-anchor="middle" class="berry">0</text>
      <text x="435" y="16" text-anchor="middle" class="berry">0</text>
      <text x="457" y="16" text-anchor="middle" class="berry">0</text>
    </g>
    <text x="160" y="38" class="ink" font-size="11">10 data bits</text>
    <text x="380" y="38" class="berry" font-size="11">r=4 appended zeros</text>
  </g>

  <!-- Division arrow -->
  <g transform="translate(40,150)">
    <text x="0" y="14" class="ink" font-size="12">divide by 10011 (XOR, no carry):</text>
    <path d="M 200 18 L 360 18" class="stroke-berry"/>
    <path d="M 360 18 l -8 -4 l 0 8 z" class="berry"/>
    <text x="370" y="22" class="ink" font-size="12">remainder (r bits)</text>
  </g>

  <!-- Remainder box -->
  <g transform="translate(40,180)">
    <text x="0" y="14" class="ink" font-size="12">remainder R(x):</text>
    <g class="mono" font-size="13">
      <rect x="160" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <rect x="182" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <rect x="204" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <rect x="226" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <text x="171" y="16" text-anchor="middle" class="berry">0</text>
      <text x="193" y="16" text-anchor="middle" class="berry">0</text>
      <text x="215" y="16" text-anchor="middle" class="berry">1</text>
      <text x="237" y="16" text-anchor="middle" class="berry">0</text>
    </g>
    <text x="270" y="16" class="ink" font-size="12">→ transmitted R = 0010</text>
  </g>

  <!-- Transmitted codeword -->
  <g transform="translate(40,230)">
    <text x="0" y="14" class="ink" font-size="12" font-weight="600">T(x) = data || R  (transmitted):</text>
    <g class="mono" font-size="13">
      <rect x="220" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="242" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="264" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="286" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="308" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="330" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="352" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="374" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="396" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="418" y="0" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E"/>
      <rect x="440" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <rect x="462" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <rect x="484" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <rect x="506" y="0" width="22" height="22" fill="#FFE4EA" stroke="#E2557A"/>
      <text x="231" y="16" text-anchor="middle">1</text><text x="253" y="16" text-anchor="middle">1</text>
      <text x="275" y="16" text-anchor="middle">0</text><text x="297" y="16" text-anchor="middle">1</text>
      <text x="319" y="16" text-anchor="middle">0</text><text x="341" y="16" text-anchor="middle">1</text>
      <text x="363" y="16" text-anchor="middle">1</text><text x="385" y="16" text-anchor="middle">1</text>
      <text x="407" y="16" text-anchor="middle">1</text><text x="429" y="16" text-anchor="middle">1</text>
      <text x="451" y="16" text-anchor="middle" class="berry">0</text>
      <text x="473" y="16" text-anchor="middle" class="berry">0</text>
      <text x="495" y="16" text-anchor="middle" class="berry">1</text>
      <text x="517" y="16" text-anchor="middle" class="berry">0</text>
    </g>
    <text x="220" y="40" class="ink" font-size="11">M(x) unchanged</text>
    <text x="440" y="40" class="berry" font-size="11">CRC replaces zeros</text>
  </g>

  <!-- Receiver check -->
  <g transform="translate(40,300)">
    <rect x="0" y="0" width="680" height="70" fill="none" stroke="#2A1A2E" stroke-dasharray="5 4" rx="6"/>
    <text x="14" y="22" class="ink" font-size="13" font-weight="600">Receiver</text>
    <text x="14" y="42" class="ink" font-size="12">Divide received T(x) by G(x). Remainder = 0 → accept. Remainder ≠ 0 → error (E(x) not divisible by G(x)).</text>
    <text x="14" y="60" class="berry" font-size="12">If T(x)+E(x) arrives: [T(x)+E(x)] mod G(x) = E(x) mod G(x). G(x) with ≥2 terms catches all single-bit errors.</text>
  </g>

  <!-- Detection guarantees table -->
  <g transform="translate(40,395)">
    <text x="0" y="0" class="ink" font-size="14" font-weight="600">What a degree-r CRC detects</text>
    <line x1="0" y1="10" x2="680" y2="10" class="stroke-ink"/>
    <g class="ink" font-size="12">
      <text x="0" y="30">Single-bit error</text>
      <text x="300" y="30">Always, if G(x) has ≥ 2 terms</text>
      <text x="0" y="52">Two isolated bit errors</text>
      <text x="300" y="52">If G(x) does not divide xᵏ+1 up to frame length</text>
      <text x="0" y="74">Odd number of errors</text>
      <text x="300" y="74">Always, if (x+1) is a factor of G(x)</text>
      <text x="0" y="96">Burst of length ≤ r</text>
      <text x="300" y="96" class="berry" font-weight="600">Always — this is CRC's core strength</text>
      <text x="0" y="118">Burst of length r+1</text>
      <text x="300" y="118">Misses with prob 2⁻⁽ʳ⁻¹⁾ (burst == G(x) exactly)</text>
    </g>
  </g>
</svg>
