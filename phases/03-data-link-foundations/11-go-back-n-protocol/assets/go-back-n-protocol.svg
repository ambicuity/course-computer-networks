<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="760" height="520" fill="#FFF7EC"/>
  <text x="380" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#2A1A2E">Go-Back-N ARQ — sender window W=7, receiver window = 1</text>
  <text x="380" y="54" text-anchor="middle" font-size="12" fill="#2A1A2E">3-bit sequence space 0..7. Frame 2 lost; receiver drops 3,4,5,6; sender times out and resends 2..6.</text>

  <!-- Sequence ring 0..7 -->
  <g font-size="12">
    <text x="40" y="92" fill="#2A1A2E" font-weight="600">seq ring:</text>
    <g>
      <rect x="100" y="78" width="44" height="26" rx="4" fill="#FFFFFF" stroke="#2A1A2E"/><text x="122" y="96" text-anchor="middle" fill="#2A1A2E">0</text>
      <rect x="146" y="78" width="44" height="26" rx="4" fill="#FFFFFF" stroke="#2A1A2E"/><text x="168" y="96" text-anchor="middle" fill="#2A1A2E">1</text>
      <rect x="192" y="78" width="44" height="26" rx="4" fill="#E2557A" stroke="#2A1A2E"/><text x="214" y="96" text-anchor="middle" fill="#FFF7EC" font-weight="700">2</text>
      <rect x="238" y="78" width="44" height="26" rx="4" fill="#FFE7B0" stroke="#2A1A2E"/><text x="260" y="96" text-anchor="middle" fill="#2A1A2E">3</text>
      <rect x="284" y="78" width="44" height="26" rx="4" fill="#FFE7B0" stroke="#2A1A2E"/><text x="306" y="96" text-anchor="middle" fill="#2A1A2E">4</text>
      <rect x="330" y="78" width="44" height="26" rx="4" fill="#FFE7B0" stroke="#2A1A2E"/><text x="352" y="96" text-anchor="middle" fill="#2A1A2E">5</text>
      <rect x="376" y="78" width="44" height="26" rx="4" fill="#FFE7B0" stroke="#2A1A2E"/><text x="398" y="96" text-anchor="middle" fill="#2A1A2E">6</text>
      <rect x="422" y="78" width="44" height="26" rx="4" fill="#F2EDE4" stroke="#2A1A2E" stroke-dasharray="3 2"/><text x="444" y="96" text-anchor="middle" fill="#2A1A2E">7</text>
    </g>
    <!-- window bracket -->
    <path d="M100 112 L100 120 L420 120 L420 112" fill="none" stroke="#E2557A" stroke-width="2"/>
    <text x="260" y="134" text-anchor="middle" fill="#E2557A" font-weight="600">sender window [ack_expected=0 .. next_frame_to_send=7)</text>
  </g>

  <!-- Timing diagram -->
  <g stroke="#2A1A2E" stroke-width="1.2">
    <line x1="120" y1="170" x2="120" y2="470"/>
    <line x1="640" y1="170" x2="640" y2="470"/>
  </g>
  <text x="120" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#2A1A2E">Sender</text>
  <text x="640" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#2A1A2E">Receiver</text>

  <!-- Data frames 0,1 -->
  <g font-size="11">
    <line x1="124" y1="190" x2="636" y2="205" stroke="#2A1A2E" stroke-width="1.4"/>
    <text x="380" y="194" text-anchor="middle" fill="#2A1A2E">seq=0  data</text>
    <line x1="124" y1="215" x2="636" y2="230" stroke="#2A1A2E" stroke-width="1.4"/>
    <text x="380" y="219" text-anchor="middle" fill="#2A1A2E">seq=1  data</text>

    <!-- frame 2 LOST -->
    <line x1="124" y1="240" x2="380" y2="252" stroke="#E2557A" stroke-width="1.8" stroke-dasharray="6 4"/>
    <text x="250" y="244" text-anchor="middle" fill="#E2557A" font-weight="700">seq=2  LOST</text>
    <text x="430" y="244" text-anchor="middle" fill="#E2557A" font-weight="700">✕</text>

    <!-- frames 3,4,5,6 arrive but are dropped (out of order) -->
    <line x1="124" y1="265" x2="636" y2="280" stroke="#9A8A7A" stroke-width="1.2"/>
    <text x="380" y="269" text-anchor="middle" fill="#9A8A7A">seq=3  → DROP (expected 2)</text>
    <line x1="124" y1="290" x2="636" y2="305" stroke="#9A8A7A" stroke-width="1.2"/>
    <text x="380" y="294" text-anchor="middle" fill="#9A8A7A">seq=4  → DROP</text>
    <line x1="124" y1="315" x2="636" y2="330" stroke="#9A8A7A" stroke-width="1.2"/>
    <text x="380" y="319" text-anchor="middle" fill="#9A8A7A">seq=5  → DROP</text>
    <line x1="124" y1="340" x2="636" y2="355" stroke="#9A8A7A" stroke-width="1.2"/>
    <text x="380" y="344" text-anchor="middle" fill="#9A8A7A">seq=6  → DROP</text>

    <!-- cumulative ACK 2 (ack=2 means "0,1 ok, want 2") -->
    <line x1="636" y1="370" x2="124" y2="385" stroke="#2A1A2E" stroke-width="1.2" stroke-dasharray="2 3"/>
    <text x="380" y="374" text-anchor="middle" fill="#2A1A2E">ACK 2 (cumulative, repeated)</text>

    <!-- TIMEOUT -->
    <text x="124" y="408" text-anchor="start" fill="#E2557A" font-weight="700">⏱ TIMEOUT seq=2</text>

    <!-- resend 2..6 -->
    <line x1="124" y1="425" x2="636" y2="440" stroke="#E2557A" stroke-width="1.6"/>
    <text x="380" y="429" text-anchor="middle" fill="#E2557A" font-weight="700">resend seq=2,3,4,5,6  (go back N)</text>

    <line x1="636" y1="458" x2="124" y2="473" stroke="#2A1A2E" stroke-width="1.2" stroke-dasharray="2 3"/>
    <text x="380" y="462" text-anchor="middle" fill="#2A1A2E">ACK 7 (all delivered in order)</text>
  </g>

  <!-- Legend -->
  <g font-size="11" fill="#2A1A2E">
    <rect x="40" y="490" width="14" height="12" fill="#E2557A" stroke="#2A1A2E"/><text x="60" y="500">lost / resent</text>
    <rect x="150" y="490" width="14" height="12" fill="#FFE7B0" stroke="#2A1A2E"/><text x="170" y="500">in-flight, unacked</text>
    <rect x="285" y="490" width="14" height="12" fill="#FFFFFF" stroke="#2A1A2E"/><text x="305" y="500">delivered / acked</text>
    <rect x="410" y="490" width="14" height="12" fill="#F2EDE4" stroke="#2A1A2E" stroke-dasharray="3 2"/><text x="430" y="500">outside window</text>
  </g>
</svg>
