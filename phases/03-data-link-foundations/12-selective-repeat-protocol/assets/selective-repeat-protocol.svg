<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#FFF7EC"/>
  <text x="440" y="32" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="700" fill="#2A1A2E" text-anchor="middle">Selective Repeat ARQ — per-frame timers, NAK, and the window-overlap hazard</text>

  <text x="30" y="64" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#2A1A2E">Timing (MAX_SEQ=7, W=4, frames 1 &amp; 4 lost)</text>
  <line x1="110" y1="90" x2="110" y2="400" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="540" y1="90" x2="540" y2="400" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="110" y="84" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#2A1A2E" text-anchor="middle">Sender</text>
  <text x="540" y="84" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#2A1A2E" text-anchor="middle">Receiver</text>

  <g stroke="#E2557A" stroke-opacity="0.15" stroke-width="1">
    <line x1="110" y1="120" x2="540" y2="120"/>
    <line x1="110" y1="165" x2="540" y2="165"/>
    <line x1="110" y1="210" x2="540" y2="210"/>
    <line x1="110" y1="250" x2="540" y2="250"/>
    <line x1="110" y1="290" x2="540" y2="290"/>
    <line x1="110" y1="330" x2="540" y2="330"/>
    <line x1="110" y1="370" x2="540" y2="370"/>
  </g>

  <line x1="115" y1="120" x2="535" y2="150" stroke="#2A1A2E" stroke-width="1.6"/>
  <polygon points="535,150 527,145 527,155" fill="#2A1A2E"/>
  <text x="320" y="138" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#2A1A2E">DATA 0</text>

  <line x1="115" y1="160" x2="320" y2="182" stroke="#E2557A" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="220" y="178" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#E2557A">DATA 1 (lost) ✕</text>

  <line x1="115" y1="200" x2="535" y2="220" stroke="#2A1A2E" stroke-width="1.6"/>
  <polygon points="535,220 527,215 527,225" fill="#2A1A2E"/>
  <text x="320" y="215" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#2A1A2E">DATA 2 → buffered</text>

  <line x1="115" y1="240" x2="535" y2="258" stroke="#2A1A2E" stroke-width="1.6"/>
  <polygon points="535,258 527,253 527,263" fill="#2A1A2E"/>
  <text x="320" y="253" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#2A1A2E">DATA 3 → buffered</text>

  <line x1="535" y1="285" x2="120" y2="302" stroke="#E2557A" stroke-width="1.6"/>
  <polygon points="120,302 128,297 128,307" fill="#E2557A"/>
  <text x="315" y="297" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#E2557A">NAK 1 (gap; no_nak gate)</text>

  <line x1="115" y1="320" x2="535" y2="338" stroke="#2A1A2E" stroke-width="1.6"/>
  <polygon points="535,338 527,333 527,343" fill="#2A1A2E"/>
  <text x="320" y="335" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#2A1A2E">DATA 1 retransmit (only 1)</text>

  <line x1="535" y1="365" x2="120" y2="383" stroke="#2A1A2E" stroke-width="1.6"/>
  <polygon points="120,383 128,378 128,388" fill="#2A1A2E"/>
  <text x="320" y="380" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#2A1A2E">ACK 3 (drain 1,2,3)</text>

  <text x="585" y="64" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#2A1A2E">Why W ≤ (MAX_SEQ+1)/2</text>

  <text x="585" y="90" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#2A1A2E">Legal W=4: old [0..3], new [4..7] disjoint ✓</text>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#2A1A2E" text-anchor="middle">
    <rect x="585" y="98" width="28" height="20" fill="#E2557A" fill-opacity="0.25" stroke="#2A1A2E"/><text x="599" y="112">0</text>
    <rect x="613" y="98" width="28" height="20" fill="#E2557A" fill-opacity="0.25" stroke="#2A1A2E"/><text x="627" y="112">1</text>
    <rect x="641" y="98" width="28" height="20" fill="#E2557A" fill-opacity="0.25" stroke="#2A1A2E"/><text x="655" y="112">2</text>
    <rect x="669" y="98" width="28" height="20" fill="#E2557A" fill-opacity="0.25" stroke="#2A1A2E"/><text x="683" y="112">3</text>
    <rect x="697" y="98" width="28" height="20" fill="#FFF7EC" stroke="#2A1A2E"/><text x="711" y="112">4</text>
    <rect x="725" y="98" width="28" height="20" fill="#FFF7EC" stroke="#2A1A2E"/><text x="739" y="112">5</text>
    <rect x="753" y="98" width="28" height="20" fill="#FFF7EC" stroke="#2A1A2E"/><text x="767" y="112">6</text>
    <rect x="781" y="98" width="28" height="20" fill="#FFF7EC" stroke="#2A1A2E"/><text x="795" y="112">7</text>
  </g>

  <text x="585" y="146" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#2A1A2E">Illegal W=5, ACK lost, sender retransmits 0:</text>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#2A1A2E" text-anchor="middle">
    <rect x="585" y="154" width="28" height="20" fill="#E2557A" fill-opacity="0.55" stroke="#2A1A2E"/><text x="599" y="168">0</text>
    <rect x="613" y="154" width="28" height="20" fill="#FFF7EC" stroke="#2A1A2E"/><text x="627" y="168">1</text>
    <rect x="641" y="154" width="28" height="20" fill="#FFF7EC" stroke="#2A1A2E"/><text x="655" y="168">2</text>
    <rect x="669" y="154" width="28" height="20" fill="#FFF7EC" stroke="#2A1A2E"/><text x="683" y="168">3</text>
    <rect x="697" y="154" width="28" height="20" fill="#FFF7EC" stroke="#2A1A2E"/><text x="711" y="168">4</text>
    <rect x="725" y="154" width="28" height="20" fill="#E2557A" fill-opacity="0.25" stroke="#2A1A2E"/><text x="739" y="168">5</text>
    <rect x="753" y="154" width="28" height="20" fill="#E2557A" fill-opacity="0.25" stroke="#2A1A2E"/><text x="767" y="168">6</text>
    <rect x="781" y="154" width="28" height="20" fill="#E2557A" fill-opacity="0.25" stroke="#2A1A2E"/><text x="795" y="168">7</text>
  </g>
  <text x="585" y="190" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#E2557A">new window [5,6,7,0,1] overlaps old [0..4]</text>
  <text x="585" y="204" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#E2557A">→ retransmitted 0 accepted as fresh: duplicate ✗</text>

  <rect x="585" y="222" width="270" height="74" fill="none" stroke="#2A1A2E" stroke-width="1" rx="4"/>
  <text x="595" y="240" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2A1A2E">between(a,b,c) — circular range</text>
  <text x="595" y="257" font-family="ui-monospace, monospace" font-size="10" fill="#2A1A2E">((a≤b)&amp;(b&lt;c))||((c&lt;a)&amp;(a≤b))||((b&lt;c)&amp;(c&lt;a))</text>
  <text x="595" y="274" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#2A1A2E">true ⇒ b is inside rx window [a, c) on the ring</text>

  <rect x="585" y="308" width="270" height="92" fill="none" stroke="#2A1A2E" stroke-width="1" rx="4"/>
  <text x="595" y="326" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2A1A2E">Protocol 6 events</text>
  <text x="595" y="343" font-family="ui-monospace, monospace" font-size="10" fill="#2A1A2E">network_layer_ready → send new</text>
  <text x="595" y="357" font-family="ui-monospace, monospace" font-size="10" fill="#2A1A2E">frame_arrival       → data/ack/nak</text>
  <text x="595" y="371" font-family="ui-monospace, monospace" font-size="10" fill="#2A1A2E">cksum_err           → NAK (no_nak)</text>
  <text x="595" y="385" font-family="ui-monospace, monospace" font-size="10" fill="#2A1A2E">timeout             → resend ONE</text>
  <text x="595" y="395" font-family="ui-monospace, monospace" font-size="10" fill="#2A1A2E">ack_timeout         → standalone ack</text>

  <text x="440" y="500" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#2A1A2E" text-anchor="middle" opacity="0.7">Selective retransmit saves bandwidth; per-frame timer + W ≤ (MAX_SEQ+1)/2 preserves correctness</text>
</svg>
