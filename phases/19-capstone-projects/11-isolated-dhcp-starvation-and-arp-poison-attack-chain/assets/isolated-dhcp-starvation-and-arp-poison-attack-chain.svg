<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" width="920" height="640" font-family="Helvetica, Arial, sans-serif">
  <rect width="920" height="640" fill="#FFF7EC"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2A1A2E">DHCP Starvation and ARP Poison Attack Chain</text>
  <text x="460" y="52" text-anchor="middle" font-size="12" fill="#2A1A2E">two-phase L2 attack, detection signals, and three layered mitigations</text>

  <!-- LAN boundary -->
  <rect x="60" y="80" width="800" height="220" fill="none" stroke="#2A1A2E" stroke-width="1.2" stroke-dasharray="6 4" rx="6"/>
  <text x="70" y="98" font-size="11" font-weight="bold" fill="#2A1A2E">LAN 10.0.0.0/24</text>

  <!-- DHCP Server -->
  <rect x="100" y="130" width="120" height="60" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.5" rx="4"/>
  <text x="160" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#2A1A2E">DHCP Server</text>
  <text x="160" y="168" text-anchor="middle" font-size="10" fill="#2A1A2E">10.0.0.2</text>
  <text x="160" y="182" text-anchor="middle" font-size="9" fill="#2A1A2E">pool: .10..254</text>

  <!-- Gateway -->
  <rect x="100" y="220" width="120" height="60" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.5" rx="4"/>
  <text x="160" y="242" text-anchor="middle" font-size="11" font-weight="bold" fill="#2A1A2E">Gateway</text>
  <text x="160" y="258" text-anchor="middle" font-size="10" fill="#2A1A2E">10.0.0.1</text>
  <text x="160" y="272" text-anchor="middle" font-size="9" fill="#2A1A2E">00:00:00:00:00:01</text>

  <!-- Legitimate clients -->
  <rect x="430" y="130" width="90" height="40" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.2" rx="3"/>
  <text x="475" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#2A1A2E">Client 1</text>
  <text x="475" y="162" text-anchor="middle" font-size="9" fill="#2A1A2E">10.0.0.10</text>

  <rect x="430" y="180" width="90" height="40" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.2" rx="3"/>
  <text x="475" y="198" text-anchor="middle" font-size="10" font-weight="bold" fill="#2A1A2E">Client 2</text>
  <text x="475" y="212" text-anchor="middle" font-size="9" fill="#2A1A2E">10.0.0.11</text>

  <rect x="430" y="230" width="90" height="40" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.2" rx="3"/>
  <text x="475" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="#2A1A2E">Client 3</text>
  <text x="475" y="262" text-anchor="middle" font-size="9" fill="#2A1A2E">10.0.0.12</text>

  <rect x="540" y="130" width="90" height="40" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.2" rx="3"/>
  <text x="585" y="148" text-anchor="middle" font-size="10" fill="#2A1A2E">... +7 more</text>
  <text x="585" y="162" text-anchor="middle" font-size="9" fill="#2A1A2E">10.0.0.13-.19</text>

  <!-- Attacker -->
  <rect x="700" y="180" width="130" height="80" fill="#FFF7EC" stroke="#E2557A" stroke-width="2" rx="4"/>
  <text x="765" y="204" text-anchor="middle" font-size="11" font-weight="bold" fill="#E2557A">ATTACKER</text>
  <text x="765" y="220" text-anchor="middle" font-size="10" fill="#2A1A2E">AA:AA:AA:AA:AA:AA</text>
  <text x="765" y="234" text-anchor="middle" font-size="9" fill="#2A1A2E">forged MACs</text>
  <text x="765" y="248" text-anchor="middle" font-size="9" fill="#2A1A2E">gratuitous ARP</text>

  <!-- DORA flow arrows (top) -->
  <line x1="220" y1="160" x2="430" y2="150" stroke="#2A1A2E" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="430" y1="160" x2="220" y2="170" stroke="#2A1A2E" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="325" y="140" text-anchor="middle" font-size="9" fill="#2A1A2E">DORA</text>
  <text x="325" y="180" text-anchor="middle" font-size="9" fill="#2A1A2E">Discover/Offer/Request/Ack</text>

  <!-- Starvation flood arrows -->
  <line x1="700" y1="200" x2="220" y2="155" stroke="#E2557A" stroke-width="1.5" marker-end="url(#berry)"/>
  <line x1="700" y1="210" x2="220" y2="160" stroke="#E2557A" stroke-width="1.5" marker-end="url(#berry)"/>
  <line x1="700" y1="220" x2="220" y2="165" stroke="#E2557A" stroke-width="1.5" marker-end="url(#berry)"/>
  <line x1="700" y1="230" x2="220" y2="170" stroke="#E2557A" stroke-width="1.5" marker-end="url(#berry)"/>
  <text x="460" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#E2557A">Forged Discover flood (300 in &lt;1s)</text>

  <!-- Gratuitous ARP arrows -->
  <line x1="700" y1="240" x2="475" y2="155" stroke="#E2557A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#berry)"/>
  <line x1="700" y1="245" x2="475" y2="205" stroke="#E2557A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#berry)"/>
  <line x1="700" y1="250" x2="475" y2="255" stroke="#E2557A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#berry)"/>
  <text x="600" y="278" text-anchor="middle" font-size="10" font-weight="bold" fill="#E2557A">Gratuitous ARP: 10.0.0.1 -&gt; AA:AA:AA:AA:AA:AA</text>

  <!-- Phase 2: Pool utilization timeline -->
  <text x="80" y="340" font-size="13" font-weight="bold" fill="#2A1A2E">Pool utilization over time</text>
  <line x1="80" y1="430" x2="880" y2="430" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="80" y1="350" x2="80" y2="430" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="480" y="460" text-anchor="middle" font-size="11" fill="#2A1A2E">time (seconds)</text>
  <text x="40" y="390" text-anchor="middle" font-size="11" fill="#2A1A2E" transform="rotate(-90 40 390)">addresses allocated</text>

  <!-- Gridlines -->
  <line x1="80" y1="355" x2="880" y2="355" stroke="#2A1A2E" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="80" y1="385" x2="880" y2="385" stroke="#2A1A2E" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="80" y1="415" x2="880" y2="415" stroke="#2A1A2E" stroke-width="0.3" stroke-dasharray="2 2"/>
  <text x="74" y="358" text-anchor="end" font-size="9" fill="#2A1A2E">245</text>
  <text x="74" y="388" text-anchor="end" font-size="9" fill="#2A1A2E">122</text>
  <text x="74" y="418" text-anchor="end" font-size="9" fill="#2A1A2E">0</text>

  <!-- Normal clients ramp -->
  <polyline points="80,418 130,416 180,414 230,412 280,410 330,408 380,406 430,404 480,402 530,400 580,398" fill="none" stroke="#2A1A2E" stroke-width="2"/>
  <text x="330" y="395" font-size="9" fill="#2A1A2E">10 legitimate clients (legit)</text>

  <!-- Starvation ramp (steep) -->
  <polyline points="580,398 600,395 620,392 640,388 660,380 680,372 700,360 720,348 740,336 760,320 780,300 800,275 820,250 840,225 860,200 880,180" fill="none" stroke="#E2557A" stroke-width="2.5"/>
  <text x="740" y="345" font-size="9" font-weight="bold" fill="#E2557A">starvation ramp</text>
  <text x="740" y="358" font-size="9" fill="#E2557A">pool exhausted ~1.3s</text>

  <!-- Threshold line -->
  <line x1="80" y1="358" x2="880" y2="358" stroke="#E2557A" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="884" y="362" font-size="9" fill="#E2557A">90% threshold</text>

  <!-- Mitigation panel -->
  <rect x="60" y="490" width="800" height="130" fill="none" stroke="#2A1A2E" stroke-width="1" rx="6"/>
  <text x="80" y="510" font-size="13" font-weight="bold" fill="#2A1A2E">Defense-in-Depth: three layered mitigations</text>

  <!-- DHCP Snooping -->
  <rect x="80" y="525" width="240" height="80" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1" rx="4"/>
  <text x="200" y="545" text-anchor="middle" font-size="11" font-weight="bold" fill="#2A1A2E">DHCP Snooping</text>
  <text x="90" y="563" font-size="10" fill="#2A1A2E">trusted: Fa0/1 (DHCP server)</text>
  <text x="90" y="577" font-size="10" fill="#2A1A2E">untrusted: Fa0/2, Fa0/3</text>
  <text x="90" y="591" font-size="10" fill="#2A1A2E">rate-limit: 10 Discovers/s</text>
  <text x="90" y="603" font-size="9" fill="#E2557A">blocks 100 fake offers</text>

  <!-- DAI -->
  <rect x="340" y="525" width="240" height="80" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1" rx="4"/>
  <text x="460" y="545" text-anchor="middle" font-size="11" font-weight="bold" fill="#2A1A2E">Dynamic ARP Inspection</text>
  <text x="350" y="563" font-size="10" fill="#2A1A2E">binding table: ip -&gt; mac</text>
  <text x="350" y="577" font-size="10" fill="#2A1A2E">validates ARP sender pair</text>
  <text x="350" y="591" font-size="10" fill="#2A1A2E">drops IP-MAC mismatches</text>
  <text x="350" y="603" font-size="9" fill="#E2557A">drops 10 gratuitous ARPs</text>

  <!-- Port Security -->
  <rect x="600" y="525" width="240" height="80" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1" rx="4"/>
  <text x="720" y="545" text-anchor="middle" font-size="11" font-weight="bold" fill="#2A1A2E">Port Security</text>
  <text x="610" y="563" font-size="10" fill="#2A1A2E">MAC limit: 1 per port</text>
  <text x="610" y="577" font-size="10" fill="#2A1A2E">violation action: shutdown</text>
  <text x="610" y="591" font-size="10" fill="#2A1A2E">attacker port: err-disabled</text>
  <text x="610" y="603" font-size="9" fill="#E2557A">port Fa0/3 shut down</text>

  <!-- Arrowheads -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2A1A2E"/>
    </marker>
    <marker id="berry" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E2557A"/>
    </marker>
  </defs>
</svg>