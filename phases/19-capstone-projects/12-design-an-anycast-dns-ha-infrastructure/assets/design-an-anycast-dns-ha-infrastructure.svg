<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" width="920" height="620" font-family="Helvetica, Arial, sans-serif">
  <rect width="920" height="620" fill="#FFF7EC"/>

  <!-- Title -->
  <text x="460" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2A1A2E">Anycast DNS High-Availability Infrastructure</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#2A1A2E">4-node VIP advertisement, ECMP distribution, health-check-driven BGP withdrawal, failover timing</text>

  <!-- Client regions (left column) -->
  <g font-size="11" fill="#2A1A2E">
    <rect x="40" y="100" width="120" height="44" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.2" rx="4"/>
    <text x="100" y="120" text-anchor="middle" font-weight="bold">US-East clients</text>
    <text x="100" y="136" text-anchor="middle" font-size="10">AS65001, 5000 hosts</text>

    <rect x="40" y="200" width="120" height="44" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.2" rx="4"/>
    <text x="100" y="220" text-anchor="middle" font-weight="bold">US-West clients</text>
    <text x="100" y="236" text-anchor="middle" font-size="10">AS65002, 3000 hosts</text>

    <rect x="40" y="300" width="120" height="44" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.2" rx="4"/>
    <text x="100" y="320" text-anchor="middle" font-weight="bold">EU-West clients</text>
    <text x="100" y="336" text-anchor="middle" font-size="10">AS65003, 4000 hosts</text>

    <rect x="40" y="400" width="120" height="44" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.2" rx="4"/>
    <text x="100" y="420" text-anchor="middle" font-weight="bold">AP-South clients</text>
    <text x="100" y="436" text-anchor="middle" font-size="10">AS65004, 2000 hosts</text>
  </g>

  <!-- Client to node arrows (ECMP / shortest AS-path) -->
  <g stroke="#2A1A2E" stroke-width="1" fill="none" stroke-dasharray="4 3">
    <line x1="160" y1="122" x2="320" y2="122"/>
    <line x1="160" y1="222" x2="320" y2="222"/>
    <line x1="160" y1="322" x2="320" y2="322"/>
    <line x1="160" y1="422" x2="320" y2="422"/>
  </g>

  <!-- 4 DNS nodes (column 2) -->
  <g>
    <rect x="320" y="100" width="160" height="44" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.5" rx="4"/>
    <text x="400" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#2A1A2E">DNS-US-EAST</text>
    <text x="400" y="136" text-anchor="middle" font-size="10" fill="#2A1A2E">AS64501, healthy, advertising</text>

    <rect x="320" y="200" width="160" height="44" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.5" rx="4"/>
    <text x="400" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#2A1A2E">DNS-US-WEST</text>
    <text x="400" y="236" text-anchor="middle" font-size="10" fill="#2A1A2E">AS64502, healthy, advertising</text>

    <rect x="320" y="300" width="160" height="44" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.5" rx="4"/>
    <text x="400" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#2A1A2E">DNS-EU-WEST</text>
    <text x="400" y="336" text-anchor="middle" font-size="10" fill="#2A1A2E">AS64503, healthy, advertising</text>

    <rect x="320" y="400" width="160" height="44" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.5" rx="4"/>
    <text x="400" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#2A1A2E">DNS-AP-SOUTH</text>
    <text x="400" y="436" text-anchor="middle" font-size="10" fill="#2A1A2E">AS64504, healthy, advertising</text>
  </g>

  <!-- VIP advertisement arrows (BGP, all 4 nodes advertising 192.0.2.53) -->
  <g stroke="#E2557A" stroke-width="1.6" fill="none">
    <line x1="480" y1="122" x2="640" y2="270"/>
    <line x1="480" y1="222" x2="640" y2="270"/>
    <line x1="480" y1="322" x2="640" y2="270"/>
    <line x1="480" y1="422" x2="640" y2="270"/>
  </g>

  <!-- VIP advertisement box -->
  <g>
    <rect x="640" y="240" width="220" height="60" fill="#FFF7EC" stroke="#E2557A" stroke-width="2" rx="6"/>
    <text x="750" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#E2557A">Anycast VIP 192.0.2.53/32</text>
    <text x="750" y="280" text-anchor="middle" font-size="10" fill="#2A1A2E">advertised from AS64501..AS64504</text>
    <text x="750" y="294" text-anchor="middle" font-size="10" fill="#2A1A2E">RFC 4786 anycast service</text>
  </g>

  <!-- ECMP fan-out from VIP to all nodes (showing equal-cost paths) -->
  <g stroke="#2A1A2E" stroke-width="0.8" fill="none" stroke-dasharray="2 2" opacity="0.5">
    <line x1="640" y1="270" x2="480" y2="122"/>
    <line x1="640" y1="270" x2="480" y2="222"/>
    <line x1="640" y1="270" x2="480" y2="322"/>
    <line x1="640" y1="270" x2="480" y2="422"/>
  </g>

  <!-- Failover timeline (lower section) -->
  <text x="460" y="478" text-anchor="middle" font-size="13" font-weight="bold" fill="#2A1A2E">Failover Timeline: DNS-US-EAST node goes dark</text>

  <!-- Time axis -->
  <line x1="60" y1="555" x2="880" y2="555" stroke="#2A1A2E" stroke-width="1.2"/>
  <g font-size="9" fill="#2A1A2E">
    <line x1="80" y1="551" x2="80" y2="559" stroke="#2A1A2E"/>
    <line x1="180" y1="551" x2="180" y2="559" stroke="#2A1A2E"/>
    <line x1="280" y1="551" x2="280" y2="559" stroke="#2A1A2E"/>
    <line x1="380" y1="551" x2="380" y2="559" stroke="#2A1A2E"/>
    <line x1="480" y1="551" x2="480" y2="559" stroke="#2A1A2E"/>
    <line x1="580" y1="551" x2="580" y2="559" stroke="#2A1A2E"/>
    <line x1="680" y1="551" x2="680" y2="559" stroke="#2A1A2E"/>
    <line x1="780" y1="551" x2="780" y2="559" stroke="#2A1A2E"/>
    <line x1="880" y1="551" x2="880" y2="559" stroke="#2A1A2E"/>
    <text x="80" y="572" text-anchor="middle">t=0</text>
    <text x="180" y="572" text-anchor="middle">t=5s</text>
    <text x="280" y="572" text-anchor="middle">t=10s</text>
    <text x="380" y="572" text-anchor="middle">t=15s</text>
    <text x="480" y="572" text-anchor="middle">t=15.5s</text>
    <text x="780" y="572" text-anchor="middle">t=15.5s</text>
  </g>

  <!-- Event markers along the timeline -->
  <g>
    <circle cx="80" cy="555" r="5" fill="#2A1A2E"/>
    <text x="80" y="540" text-anchor="middle" font-size="9" fill="#2A1A2E">node crash</text>

    <circle cx="180" cy="555" r="5" fill="#E2557A"/>
    <text x="180" y="540" text-anchor="middle" font-size="9" fill="#2A1A2E">HC fail #1</text>

    <circle cx="280" cy="555" r="5" fill="#E2557A"/>
    <text x="280" y="540" text-anchor="middle" font-size="9" fill="#2A1A2E">HC fail #2</text>

    <circle cx="380" cy="555" r="7" fill="#E2557A" stroke="#FFF7EC" stroke-width="2"/>
    <text x="380" y="538" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">HC fail #3</text>
    <text x="380" y="526" text-anchor="middle" font-size="9" fill="#2A1A2E">BGP withdraw</text>

    <polygon points="480,549 490,555 480,561 470,555" fill="#E2557A"/>
    <text x="480" y="540" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">converge</text>
    <text x="480" y="528" text-anchor="middle" font-size="9" fill="#2A1A2E">+0.5s</text>

    <polygon points="780,549 790,555 780,561 770,555" fill="#2A1A2E"/>
    <text x="780" y="540" text-anchor="middle" font-size="9" fill="#2A1A2E">EU-West reroutes</text>
  </g>

  <!-- Latency comparison strip (bottom) -->
  <text x="460" y="600" text-anchor="middle" font-size="11" fill="#2A1A2E">anycast failover ~15.5s (3x5s health check + 0.5s BGP)  vs.  unicast &gt;= 5s/client timeout</text>
</svg>
