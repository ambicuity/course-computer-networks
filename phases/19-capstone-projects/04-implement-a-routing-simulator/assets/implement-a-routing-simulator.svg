<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <rect width="800" height="540" fill="#FFF7EC"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" fill="#2A1A2E">

    <text x="400" y="32" text-anchor="middle" font-size="22" font-weight="700">Capstone 04: Routing Simulator — DV vs LS convergence</text>
    <text x="400" y="54" text-anchor="middle" font-size="13" fill="#5a4a5e">12-router NetCove topology with two protocol families and the same failure scenario</text>

    <g stroke="#2A1A2E" stroke-width="1.4" fill="none">
      <line x1="160" y1="160" x2="320" y2="160"/>
      <line x1="160" y1="160" x2="240" y2="280"/>
      <line x1="320" y1="160" x2="480" y2="160"/>
      <line x1="320" y1="160" x2="400" y2="280"/>
      <line x1="480" y1="160" x2="640" y2="160"/>
      <line x1="240" y1="280" x2="400" y2="280"/>
      <line x1="240" y1="280" x2="320" y2="400"/>
      <line x1="400" y1="280" x2="560" y2="280"/>
      <line x1="400" y1="280" x2="480" y2="400"/>
      <line x1="320" y1="400" x2="480" y2="400"/>
      <line x1="560" y1="280" x2="640" y2="400"/>
      <line x1="480" y1="400" x2="640" y2="400"/>
      <line x1="560" y1="280" x2="640" y2="160"/>
    </g>

    <g stroke="#E2557A" stroke-width="2.4" stroke-dasharray="6 4" fill="none">
      <line x1="320" y1="160" x2="400" y2="280"/>
      <line x1="240" y1="280" x2="320" y2="400"/>
    </g>

    <g>
      <circle cx="160" cy="160" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
      <text x="160" y="165" text-anchor="middle" font-size="12" font-weight="700">SFO-1</text>
      <circle cx="320" cy="160" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
      <text x="320" y="165" text-anchor="middle" font-size="12" font-weight="700">NYC-1</text>
      <circle cx="480" cy="160" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
      <text x="480" y="165" text-anchor="middle" font-size="12" font-weight="700">LON-1</text>
      <circle cx="640" cy="160" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
      <text x="640" y="165" text-anchor="middle" font-size="12" font-weight="700">FRA-1</text>
      <circle cx="240" cy="280" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
      <text x="240" y="285" text-anchor="middle" font-size="12" font-weight="700">SFO-2</text>
      <circle cx="400" cy="280" r="24" fill="#FFE8C7" stroke="#E2557A" stroke-width="2.4"/>
      <text x="400" y="285" text-anchor="middle" font-size="12" font-weight="700">AMS-1</text>
      <circle cx="560" cy="280" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
      <text x="560" y="285" text-anchor="middle" font-size="12" font-weight="700">FRA-2</text>
      <circle cx="320" cy="400" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
      <text x="320" y="405" text-anchor="middle" font-size="12" font-weight="700">ATL-1</text>
      <circle cx="480" cy="400" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
      <text x="480" y="405" text-anchor="middle" font-size="12" font-weight="700">DXB-1</text>
      <circle cx="640" cy="400" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
      <text x="640" y="405" text-anchor="middle" font-size="12" font-weight="700">BOM-1</text>
    </g>

    <g font-size="11" fill="#5a4a5e">
      <text x="240" y="148" text-anchor="middle">cost 4</text>
      <text x="240" y="225" text-anchor="middle">cost 3</text>
      <text x="200" y="245" text-anchor="end">cost 2</text>
      <text x="400" y="148" text-anchor="middle">cost 5</text>
      <text x="360" y="225" text-anchor="end">cost 2</text>
      <text x="560" y="148" text-anchor="middle">cost 3</text>
      <text x="320" y="345" text-anchor="middle">cost 4</text>
      <text x="280" y="345" text-anchor="end">cost 2</text>
      <text x="480" y="285" text-anchor="middle">cost 3</text>
      <text x="440" y="345" text-anchor="end">cost 2</text>
      <text x="400" y="395" text-anchor="middle">cost 3</text>
      <text x="600" y="345" text-anchor="middle">cost 4</text>
      <text x="560" y="395" text-anchor="middle">cost 4</text>
      <text x="600" y="225" text-anchor="middle">cost 1</text>
    </g>

    <g>
      <rect x="40" y="450" width="220" height="70" fill="#FFE8C7" stroke="#E2557A" stroke-width="1.6" rx="6"/>
      <text x="50" y="470" font-size="12" font-weight="700" fill="#2A1A2E">Distance Vector (RIP-style)</text>
      <text x="50" y="488" font-size="11" fill="#2A1A2E">Bellman-Ford, split-horizon, poison-reverse</text>
      <text x="50" y="504" font-size="11" fill="#2A1A2E">Convergence: 8-12 rounds naive, 4-6 hardened</text>
      <text x="50" y="518" font-size="11" fill="#2A1A2E">Failure: count-to-infinity up to metric 16</text>

      <rect x="290" y="450" width="220" height="70" fill="#FFE8C7" stroke="#E2557A" stroke-width="1.6" rx="6"/>
      <text x="300" y="470" font-size="12" font-weight="700" fill="#2A1A2E">Link State (OSPF-style)</text>
      <text x="300" y="488" font-size="11" fill="#2A1A2E">Dijkstra over synchronized LSDB</text>
      <text x="300" y="504" font-size="11" fill="#2A1A2E">Convergence: 3-4 rounds, predictable</text>
      <text x="300" y="518" font-size="11" fill="#2A1A2E">Failure: SPF throttle dampens flaps</text>

      <rect x="540" y="450" width="220" height="70" fill="#FFE8C7" stroke="#E2557A" stroke-width="1.6" rx="6"/>
      <text x="550" y="470" font-size="12" font-weight="700" fill="#2A1A2E">Failure scenario</text>
      <text x="550" y="488" font-size="11" fill="#2A1A2E">Cut NYC-1 ↔ AMS-1 and SFO-2 ↔ ATL-1</text>
      <text x="550" y="504" font-size="11" fill="#2A1A2E">(red dashed links)</text>
      <text x="550" y="518" font-size="11" fill="#2A1A2E">Compare DV vs LS round-by-round</text>
    </g>

    <text x="160" y="135" text-anchor="middle" font-size="10" fill="#5a4a5e">(SFO backbone)</text>
    <text x="480" y="135" text-anchor="middle" font-size="10" fill="#5a4a5e">(EU backbone)</text>
    <text x="400" y="265" text-anchor="middle" font-size="10" fill="#5a4a5e">(AMS hub)</text>

  </g>
</svg>
