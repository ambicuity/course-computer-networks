<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640" font-family="Helvetica, Arial, sans-serif">
  <rect width="960" height="640" fill="#FFF7EC"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2A1A2E">BGP Route Reflector Topology (12-router AS 65001)</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#2A1A2E">two RRs in cluster 10.0.0.255, eight clients, two non-clients, three eBGP neighbors</text>

  <!-- Cluster boundary box -->
  <rect x="40" y="80" width="640" height="430" fill="none" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="5 3" rx="6"/>
  <text x="50" y="74" font-size="11" font-weight="bold" fill="#2A1A2E">AS 65001 (iBGP)</text>
  <text x="170" y="74" font-size="10" fill="#2A1A2E">cluster_id = 10.0.0.255</text>

  <!-- RR1 (R1) at center-left -->
  <circle cx="170" cy="200" r="22" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
  <text x="170" y="204" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFF7EC">RR1</text>
  <text x="170" y="240" text-anchor="middle" font-size="10" fill="#2A1A2E">10.0.0.1</text>
  <text x="170" y="254" text-anchor="middle" font-size="9" fill="#2A1A2E">Route Reflector</text>

  <!-- RR2 (R2) at center-right -->
  <circle cx="540" cy="200" r="22" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
  <text x="540" y="204" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFF7EC">RR2</text>
  <text x="540" y="240" text-anchor="middle" font-size="10" fill="#2A1A2E">10.0.0.2</text>
  <text x="540" y="254" text-anchor="middle" font-size="9" fill="#2A1A2E">Route Reflector</text>

  <!-- RR-to-RR link -->
  <line x1="192" y1="200" x2="518" y2="200" stroke="#2A1A2E" stroke-width="2"/>
  <text x="355" y="194" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">RR-to-RR</text>
  <text x="355" y="216" text-anchor="middle" font-size="8" fill="#2A1A2E">(non-client rule)</text>

  <!-- Clients row 1 (R3, R4, R5, R6) -->
  <circle cx="100" cy="340" r="16" fill="#FFF7EC" stroke="#E2557A" stroke-width="2"/>
  <text x="100" y="344" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">C1</text>
  <text x="100" y="370" text-anchor="middle" font-size="8" fill="#2A1A2E">R3</text>

  <circle cx="190" cy="340" r="16" fill="#FFF7EC" stroke="#E2557A" stroke-width="2"/>
  <text x="190" y="344" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">C2</text>
  <text x="190" y="370" text-anchor="middle" font-size="8" fill="#2A1A2E">R4</text>

  <circle cx="280" cy="340" r="16" fill="#FFF7EC" stroke="#E2557A" stroke-width="2"/>
  <text x="280" y="344" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">C3</text>
  <text x="280" y="370" text-anchor="middle" font-size="8" fill="#2A1A2E">R5</text>

  <circle cx="370" cy="340" r="16" fill="#FFF7EC" stroke="#E2557A" stroke-width="2"/>
  <text x="370" y="344" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">C4</text>
  <text x="370" y="370" text-anchor="middle" font-size="8" fill="#2A1A2E">R6</text>

  <!-- Clients row 2 (R7, R8, R9, R10) -->
  <circle cx="460" cy="340" r="16" fill="#FFF7EC" stroke="#E2557A" stroke-width="2"/>
  <text x="460" y="344" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">C5</text>
  <text x="460" y="370" text-anchor="middle" font-size="8" fill="#2A1A2E">R7</text>

  <circle cx="550" cy="340" r="16" fill="#FFF7EC" stroke="#E2557A" stroke-width="2"/>
  <text x="550" y="344" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">C6</text>
  <text x="550" y="370" text-anchor="middle" font-size="8" fill="#2A1A2E">R8</text>

  <circle cx="640" cy="340" r="16" fill="#FFF7EC" stroke="#E2557A" stroke-width="2"/>
  <text x="640" y="344" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">C7</text>
  <text x="640" y="370" text-anchor="middle" font-size="8" fill="#2A1A2E">R9</text>

  <circle cx="640" cy="430" r="16" fill="#FFF7EC" stroke="#E2557A" stroke-width="2"/>
  <text x="640" y="434" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">C8</text>
  <text x="640" y="460" text-anchor="middle" font-size="8" fill="#2A1A2E">R10</text>

  <!-- Non-clients (R11, R12) -->
  <circle cx="280" cy="440" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
  <text x="280" y="444" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">N1</text>
  <text x="280" y="470" text-anchor="middle" font-size="8" fill="#2A1A2E">R11</text>

  <circle cx="460" cy="440" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
  <text x="460" y="444" text-anchor="middle" font-size="9" font-weight="bold" fill="#2A1A2E">N2</text>
  <text x="460" y="470" text-anchor="middle" font-size="8" fill="#2A1A2E">R12</text>

  <!-- RR-to-client lines (RR1) -->
  <line x1="155" y1="218" x2="110" y2="324" stroke="#E2557A" stroke-width="1"/>
  <line x1="160" y1="220" x2="190" y2="324" stroke="#E2557A" stroke-width="1"/>
  <line x1="165" y1="220" x2="280" y2="324" stroke="#E2557A" stroke-width="1"/>
  <line x1="170" y1="220" x2="370" y2="324" stroke="#E2557A" stroke-width="1"/>

  <!-- RR1 to non-clients -->
  <line x1="160" y1="218" x2="280" y2="424" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="170" y1="220" x2="460" y2="424" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- RR-to-client lines (RR2) -->
  <line x1="535" y1="220" x2="460" y2="324" stroke="#E2557A" stroke-width="1"/>
  <line x1="540" y1="220" x2="550" y2="324" stroke="#E2557A" stroke-width="1"/>
  <line x1="548" y1="218" x2="640" y2="324" stroke="#E2557A" stroke-width="1"/>
  <line x1="555" y1="218" x2="640" y2="414" stroke="#E2557A" stroke-width="1"/>

  <!-- RR2 to non-clients -->
  <line x1="530" y1="220" x2="460" y2="424" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="540" y1="220" x2="280" y2="424" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- eBGP peers outside AS -->
  <circle cx="800" cy="160" r="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
  <text x="800" y="164" text-anchor="middle" font-size="10" font-weight="bold" fill="#2A1A2E">AS 65002</text>
  <text x="800" y="195" text-anchor="middle" font-size="8" fill="#2A1A2E">eBGP</text>

  <circle cx="800" cy="240" r="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
  <text x="800" y="244" text-anchor="middle" font-size="10" font-weight="bold" fill="#2A1A2E">AS 65003</text>
  <text x="800" y="275" text-anchor="middle" font-size="8" fill="#2A1A2E">eBGP</text>

  <circle cx="800" cy="430" r="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
  <text x="800" y="434" text-anchor="middle" font-size="10" font-weight="bold" fill="#2A1A2E">AS 65099</text>
  <text x="800" y="465" text-anchor="middle" font-size="8" fill="#2A1A2E">eBGP</text>

  <!-- eBGP peering lines -->
  <line x1="192" y1="190" x2="780" y2="160" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="192" y1="210" x2="780" y2="240" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="476" y1="440" x2="780" y2="430" stroke="#2A1A2E" stroke-width="1.5"/>

  <!-- Right-side legend: three RR rules -->
  <rect x="700" y="80" width="240" height="220" fill="none" stroke="#2A1A2E" stroke-width="1" rx="4"/>
  <text x="710" y="100" font-size="12" font-weight="bold" fill="#2A1A2E">Three RR Advertisement Rules</text>
  <text x="710" y="124" font-size="10" fill="#2A1A2E">Rule 1 (eBGP):</text>
  <text x="710" y="138" font-size="9" fill="#2A1A2E">  advertise to ALL iBGP peers</text>
  <text x="710" y="156" font-size="10" fill="#2A1A2E">Rule 2 (client):</text>
  <text x="710" y="170" font-size="9" fill="#2A1A2E">  reflect to other clients +</text>
  <text x="710" y="182" font-size="9" fill="#2A1A2E">  non-clients + RRs</text>
  <text x="710" y="200" font-size="10" fill="#2A1A2E">Rule 3 (non-client):</text>
  <text x="710" y="214" font-size="9" fill="#2A1A2E">  reflect ONLY to clients</text>
  <text x="710" y="232" font-size="10" fill="#2A1A2E">  (not to other non-clients)</text>
  <text x="710" y="252" font-size="10" fill="#2A1A2E">Loop guard:</text>
  <text x="710" y="266" font-size="9" fill="#2A1A2E">  originator_id, cluster_list</text>
  <text x="710" y="284" font-size="9" fill="#2A1A2E">  (RFC 4456)</text>

  <!-- Session-count comparison panel -->
  <rect x="40" y="530" width="880" height="80" fill="none" stroke="#2A1A2E" stroke-width="1" rx="4"/>
  <text x="50" y="550" font-size="12" font-weight="bold" fill="#2A1A2E">Session-count comparison (n = 12 routers)</text>

  <!-- Full-mesh bar -->
  <text x="50" y="572" font-size="10" fill="#2A1A2E">Full-mesh iBGP</text>
  <rect x="170" y="562" width="495" height="14" fill="#2A1A2E"/>
  <text x="670" y="572" font-size="10" font-weight="bold" fill="#2A1A2E">66 sessions  (n*(n-1)/2)</text>

  <!-- Route-reflector bar -->
  <text x="50" y="594" font-size="10" fill="#2A1A2E">Route Reflector</text>
  <rect x="170" y="584" width="165" height="14" fill="#E2557A"/>
  <text x="340" y="594" font-size="10" font-weight="bold" fill="#2A1A2E">22 sessions  (8 client + 2 RR-to-RR + 2 non-client + 10 eBGP)</text>

  <text x="50" y="608" font-size="9" font-style="italic" fill="#2A1A2E">67% session reduction; convergence 3 rounds (RR) vs. 5 rounds (full-mesh)</text>

  <!-- Bottom legend: link types -->
  <line x1="700" y1="320" x2="730" y2="320" stroke="#E2557A" stroke-width="2"/>
  <text x="736" y="324" font-size="9" fill="#2A1A2E">client peer (reflected)</text>
  <line x1="700" y1="340" x2="730" y2="340" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="736" y="344" font-size="9" fill="#2A1A2E">non-client peer</text>
  <line x1="700" y1="360" x2="730" y2="360" stroke="#2A1A2E" stroke-width="2"/>
  <text x="736" y="364" font-size="9" fill="#2A1A2E">eBGP peering</text>
  <line x1="700" y1="380" x2="730" y2="380" stroke="#2A1A2E" stroke-width="1"/>
  <text x="736" y="384" font-size="9" fill="#2A1A2E">RR-to-RR iBGP</text>
</svg>
