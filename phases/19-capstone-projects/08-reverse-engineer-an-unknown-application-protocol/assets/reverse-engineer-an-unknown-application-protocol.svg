<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" width="920" height="640" font-family="Helvetica, Arial, sans-serif">
  <rect width="920" height="640" fill="#FFF7EC"/>

  <!-- Title -->
  <text x="460" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2A1A2E">Reverse Engineering an Unknown Application Protocol</text>
  <text x="460" y="56" text-anchor="middle" font-size="13" fill="#2A1A2E">port 7331, magic 0x4B4D, 15-byte header, 6 opcodes, request-response state machine</text>

  <!-- =========================== -->
  <!-- Top: byte stream with offset markers -->
  <!-- =========================== -->
  <text x="40" y="86" font-size="12" font-weight="bold" fill="#2A1A2E">Sample byte stream (client -&gt; server, hex)</text>
  <rect x="40" y="92" width="840" height="40" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6" rx="3"/>
  <g font-size="11" fill="#2A1A2E" font-family="Courier New, monospace">
    <text x="48" y="116">4B 4D 01 02 00 07 00 00 00 0B 6E 75 73 65 72 6E 61 6D 65 00 00 00 00</text>
  </g>
  <!-- Offset markers -->
  <g font-size="9" fill="#E2557A" font-family="Helvetica, Arial, sans-serif">
    <text x="48" y="106">| magic |v|op|  seq  |fl| key_len | val_len | cs |</text>
  </g>

  <!-- =========================== -->
  <!-- Left: 15-byte header layout -->
  <!-- =========================== -->
  <text x="40" y="160" font-size="13" font-weight="bold" fill="#2A1A2E">The 15-byte KM header</text>
  <g font-size="10" fill="#2A1A2E">
    <!-- Header row -->
    <rect x="40" y="170" width="22" height="22" fill="#FFF7EC" stroke="#E2557A" stroke-width="1.2"/>
    <rect x="62" y="170" width="22" height="22" fill="#FFF7EC" stroke="#E2557A" stroke-width="1.2"/>
    <rect x="84" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="106" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="128" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="150" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="172" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="194" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="216" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="238" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="260" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="282" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="304" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="326" y="170" width="22" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6"/>
    <rect x="348" y="170" width="22" height="22" fill="#FFF7EC" stroke="#E2557A" stroke-width="1.2"/>
    <!-- Field labels -->
    <text x="51" y="207" text-anchor="middle">magic</text>
    <text x="73" y="207" text-anchor="middle">ver</text>
    <text x="95" y="207" text-anchor="middle">op</text>
    <text x="139" y="207" text-anchor="middle">seq</text>
    <text x="161" y="207" text-anchor="middle">flags</text>
    <text x="205" y="207" text-anchor="middle">key_len</text>
    <text x="271" y="207" text-anchor="middle">val_len</text>
    <text x="359" y="207" text-anchor="middle">csum</text>
    <!-- Sizes below -->
    <text x="51" y="222" text-anchor="middle" font-size="9" fill="#E2557A">2B</text>
    <text x="73" y="222" text-anchor="middle" font-size="9" fill="#2A1A2E">1B</text>
    <text x="95" y="222" text-anchor="middle" font-size="9" fill="#2A1A2E">1B</text>
    <text x="139" y="222" text-anchor="middle" font-size="9" fill="#2A1A2E">2B</text>
    <text x="161" y="222" text-anchor="middle" font-size="9" fill="#2A1A2E">1B</text>
    <text x="205" y="222" text-anchor="middle" font-size="9" fill="#2A1A2E">2B</text>
    <text x="271" y="222" text-anchor="middle" font-size="9" fill="#2A1A2E">4B</text>
    <text x="359" y="222" text-anchor="middle" font-size="9" fill="#E2557A">1B</text>
    <!-- offset markers -->
    <text x="40" y="166" font-size="8" fill="#E2557A">0</text>
    <text x="84" y="166" font-size="8" fill="#E2557A">2</text>
    <text x="106" y="166" font-size="8" fill="#E2557A">3</text>
    <text x="128" y="166" font-size="8" fill="#E2557A">4</text>
    <text x="150" y="166" font-size="8" fill="#E2557A">6</text>
    <text x="172" y="166" font-size="8" fill="#E2557A">7</text>
    <text x="238" y="166" font-size="8" fill="#E2557A">9</text>
    <text x="348" y="166" font-size="8" fill="#E2557A">13</text>
    <text x="370" y="166" font-size="8" fill="#E2557A">14</text>
  </g>

  <!-- Variable payload area -->
  <g font-size="10" fill="#2A1A2E">
    <rect x="370" y="170" width="60" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6" stroke-dasharray="3 2"/>
    <text x="400" y="207" text-anchor="middle">key (key_len B)</text>
    <text x="400" y="222" text-anchor="middle" font-size="9">variable</text>
    <rect x="430" y="170" width="80" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6" stroke-dasharray="3 2"/>
    <text x="470" y="207" text-anchor="middle">value (val_len B)</text>
    <text x="470" y="222" text-anchor="middle" font-size="9">variable</text>
  </g>

  <!-- Notes -->
  <g font-size="10" fill="#2A1A2E">
    <text x="40" y="245">All integers are network order (big-endian). Magic 0x4B4D = "KM".</text>
    <text x="40" y="260">Checksum covers header bytes only (sum mod 256), present on HEARTBEAT and ERROR.</text>
    <text x="40" y="275">Flags: 0x01=success, 0x02=heartbeat-ack, 0xFF=error.</text>
  </g>

  <!-- =========================== -->
  <!-- Right: Opcode table (6 opcodes) -->
  <!-- =========================== -->
  <text x="560" y="160" font-size="13" font-weight="bold" fill="#2A1A2E">Opcode catalog (6 message types)</text>
  <g font-size="10" fill="#2A1A2E">
    <rect x="560" y="170" width="60" height="20" fill="#E2557A"/>
    <text x="590" y="184" text-anchor="middle" font-weight="bold" fill="#FFF7EC">Opcode</text>
    <rect x="620" y="170" width="80" height="20" fill="#E2557A"/>
    <text x="660" y="184" text-anchor="middle" font-weight="bold" fill="#FFF7EC">Name</text>
    <rect x="700" y="170" width="180" height="20" fill="#E2557A"/>
    <text x="790" y="184" text-anchor="middle" font-weight="bold" fill="#FFF7EC">Direction / semantics</text>

    <rect x="560" y="190" width="60" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="590" y="204" text-anchor="middle">0x01</text>
    <rect x="620" y="190" width="80" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="660" y="204" text-anchor="middle">PUT</text>
    <rect x="700" y="190" width="180" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="710" y="204">c2s/s2c - write key=value</text>

    <rect x="560" y="210" width="60" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="590" y="224" text-anchor="middle">0x02</text>
    <rect x="620" y="210" width="80" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="660" y="224" text-anchor="middle">GET</text>
    <rect x="700" y="210" width="180" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="710" y="224">c2s - request; s2c - value</text>

    <rect x="560" y="230" width="60" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="590" y="244" text-anchor="middle">0x03</text>
    <rect x="620" y="230" width="80" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="660" y="244" text-anchor="middle">DELETE</text>
    <rect x="700" y="230" width="180" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="710" y="244">c2s/s2c - remove by key</text>

    <rect x="560" y="250" width="60" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="590" y="264" text-anchor="middle">0x04</text>
    <rect x="620" y="250" width="80" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="660" y="264" text-anchor="middle">LIST</text>
    <rect x="700" y="250" width="180" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="710" y="264">c2s/s2c - enumerate keys</text>

    <rect x="560" y="270" width="60" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="590" y="284" text-anchor="middle">0x10</text>
    <rect x="620" y="270" width="80" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="660" y="284" text-anchor="middle">HEARTBEAT</text>
    <rect x="700" y="270" width="180" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="710" y="284">c2s/s2c - keepalive (cksum)</text>

    <rect x="560" y="290" width="60" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="590" y="304" text-anchor="middle">0xFF</text>
    <rect x="620" y="290" width="80" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="660" y="304" text-anchor="middle">ERROR</text>
    <rect x="700" y="290" width="180" height="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.4"/>
    <text x="710" y="304">s2c - error reply (cksum)</text>
  </g>

  <!-- =========================== -->
  <!-- Framing taxonomy -->
  <!-- =========================== -->
  <text x="40" y="332" font-size="13" font-weight="bold" fill="#2A1A2E">Framing taxonomy (how candidates are scored)</text>
  <g font-size="10" fill="#2A1A2E">
    <rect x="40" y="342" width="270" height="58" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6" rx="3"/>
    <text x="50" y="358" font-weight="bold">Length-prefix</text>
    <text x="50" y="372">2-byte BE length at offset 0; consumed</text>
    <text x="50" y="386">messages must match payload bytes</text>

    <rect x="320" y="342" width="270" height="58" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6" rx="3"/>
    <text x="330" y="358" font-weight="bold">Fixed header + variable payload</text>
    <text x="330" y="372">15-byte header, then key_len + val_len.</text>
    <text x="330" y="386">Strong signal: magic + opcode invariants.</text>

    <rect x="600" y="342" width="280" height="58" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6" rx="3"/>
    <text x="610" y="358" font-weight="bold">Delimiter</text>
    <text x="610" y="372">Scan for 0x00, 0x0A, 0xFF. Often a</text>
    <text x="610" y="386">false-positive when payload is text.</text>
  </g>

  <!-- =========================== -->
  <!-- State machine (bottom) -->
  <!-- =========================== -->
  <text x="40" y="430" font-size="13" font-weight="bold" fill="#2A1A2E">Request-response state machine</text>
  <!-- OPEN -->
  <rect x="60" y="450" width="80" height="34" fill="#FFF7EC" stroke="#E2557A" stroke-width="1.6" rx="14"/>
  <text x="100" y="471" text-anchor="middle" font-size="11" font-weight="bold">OPEN</text>
  <!-- READY -->
  <rect x="200" y="450" width="80" height="34" fill="#FFF7EC" stroke="#E2557A" stroke-width="1.6" rx="14"/>
  <text x="240" y="471" text-anchor="middle" font-size="11" font-weight="bold">READY</text>
  <!-- PENDING_PUT -->
  <rect x="340" y="430" width="120" height="34" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1" rx="6"/>
  <text x="400" y="451" text-anchor="middle" font-size="11">PUT_PENDING</text>
  <!-- PENDING_GET -->
  <rect x="340" y="470" width="120" height="34" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1" rx="6"/>
  <text x="400" y="491" text-anchor="middle" font-size="11">GET_PENDING</text>
  <!-- PENDING_DELETE -->
  <rect x="340" y="510" width="120" height="34" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1" rx="6"/>
  <text x="400" y="531" text-anchor="middle" font-size="11">DELETE_PENDING</text>
  <!-- PENDING_LIST -->
  <rect x="340" y="550" width="120" height="34" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1" rx="6"/>
  <text x="400" y="571" text-anchor="middle" font-size="11">LIST_PENDING</text>
  <!-- ERROR state -->
  <rect x="520" y="430" width="120" height="34" fill="#E2557A" stroke="#E2557A" stroke-width="1" rx="6"/>
  <text x="580" y="451" text-anchor="middle" font-size="11" fill="#FFF7EC" font-weight="bold">ERROR</text>
  <!-- CLOSE -->
  <rect x="700" y="450" width="80" height="34" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1" rx="14"/>
  <text x="740" y="471" text-anchor="middle" font-size="11">CLOSE</text>

  <!-- arrows -->
  <g stroke="#2A1A2E" stroke-width="1.2" fill="none">
    <line x1="140" y1="467" x2="200" y2="467"/>
    <polyline points="195,463 200,467 195,471"/>
    <line x1="280" y1="467" x2="340" y2="447"/>
    <polyline points="335,442 340,447 335,452"/>
    <line x1="280" y1="467" x2="340" y2="487"/>
    <polyline points="335,482 340,487 335,492"/>
    <line x1="280" y1="467" x2="340" y2="527"/>
    <polyline points="335,522 340,527 335,532"/>
    <line x1="280" y1="467" x2="340" y2="567"/>
    <polyline points="335,562 340,567 335,572"/>
    <line x1="460" y1="447" x2="520" y2="447"/>
    <polyline points="515,442 520,447 515,452"/>
    <line x1="460" y1="487" x2="520" y2="447"/>
    <polyline points="515,442 520,447 515,452"/>
    <line x1="460" y1="487" x2="700" y2="467"/>
    <polyline points="695,463 700,467 695,471"/>
    <line x1="460" y1="527" x2="700" y2="467"/>
    <polyline points="695,463 700,467 695,471"/>
    <line x1="460" y1="567" x2="700" y2="467"/>
    <polyline points="695,463 700,467 695,471"/>
  </g>
  <g font-size="9" fill="#2A1A2E">
    <text x="160" y="461">SYN</text>
    <text x="290" y="442">PUT</text>
    <text x="290" y="482">GET</text>
    <text x="285" y="522">DELETE</text>
    <text x="290" y="562">LIST</text>
    <text x="476" y="441">err</text>
    <text x="475" y="486">ok</text>
    <text x="540" y="481">FIN</text>
  </g>

  <!-- Legend / pipeline -->
  <rect x="40" y="600" width="840" height="32" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.6" rx="3"/>
  <text x="50" y="616" font-size="10" font-weight="bold" fill="#2A1A2E">Pipeline:</text>
  <text x="100" y="616" font-size="10" fill="#2A1A2E">capture -&gt; reassemble(c2s|s2c) -&gt; discover_framing -&gt; parse_messages -&gt; classify(opcode) -&gt; checksum_verify -&gt; state_machine -&gt; generate_spec</text>
  <text x="50" y="628" font-size="9" fill="#E2557A">A faithful spec is one where encoding a synthetic PUT under it round-trips through the parser without checksum or magic errors.</text>
</svg>