<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560">
  <rect width="920" height="560" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .title { font-size: 24px; font-weight: 700; }
    .sub { font-size: 13px; fill: #6b5560; }
    .node { font-size: 14px; font-weight: 700; }
    .mono { font-family: monospace; font-size: 11px; fill: #2A1A2E; }
    .accent { fill: #E2557A; }
    .label { font-size: 11px; fill: #6b5560; }
    .hex { font-family: monospace; font-size: 12px; fill: #2A1A2E; }
  </style>

  <text x="40" y="46" class="title">DNS Message Format and UDP Transport</text>
  <text x="40" y="68" class="sub">12-byte header, four sections, length-prefix labels, OPT pseudo-RR for EDNS(0)</text>

  <!-- Header layout (12 bytes) -->
  <rect x="40" y="100" width="840" height="100" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="60" y="124" class="node">Fixed Header  --  12 bytes (RFC 1035 &#167;4.1.1)</text>

  <rect x="60"  y="138" width="80" height="46" rx="4" fill="#FFF0F4" stroke="#E2557A" stroke-width="1.2"/>
  <text x="100" y="156" text-anchor="middle" class="mono">ID</text>
  <text x="100" y="172" text-anchor="middle" class="label">2 B</text>

  <rect x="142" y="138" width="120" height="46" rx="4" fill="#FFF0F4" stroke="#E2557A" stroke-width="1.2"/>
  <text x="202" y="152" text-anchor="middle" class="mono">QR OPCODE AA TC RD</text>
  <text x="202" y="170" text-anchor="middle" class="mono">RA Z AD CD RCODE</text>

  <rect x="264" y="138" width="60" height="46" rx="4" fill="#fff" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="294" y="156" text-anchor="middle" class="mono">QD</text>
  <text x="294" y="172" text-anchor="middle" class="label">2 B</text>

  <rect x="326" y="138" width="60" height="46" rx="4" fill="#fff" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="356" y="156" text-anchor="middle" class="mono">AN</text>
  <text x="356" y="172" text-anchor="middle" class="label">2 B</text>

  <rect x="388" y="138" width="60" height="46" rx="4" fill="#fff" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="418" y="156" text-anchor="middle" class="mono">NS</text>
  <text x="418" y="172" text-anchor="middle" class="label">2 B</text>

  <rect x="450" y="138" width="60" height="46" rx="4" fill="#fff" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="480" y="156" text-anchor="middle" class="mono">AR</text>
  <text x="480" y="172" text-anchor="middle" class="label">2 B</text>

  <text x="540" y="158" class="mono accent">QR=0 query / 1 response</text>
  <text x="540" y="174" class="mono accent">RCODE 0..5 (RFC 1035)  extended via OPT</text>

  <!-- Sections -->
  <rect x="40" y="220" width="200" height="240" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="140" y="244" text-anchor="middle" class="node">Question</text>
  <text x="140" y="262" text-anchor="middle" class="label">QDCOUNT entries</text>
  <text x="56" y="288" class="mono">QNAME  example.com</text>
  <text x="56" y="306" class="mono">        \x07example\x03com\x00</text>
  <text x="56" y="332" class="mono">QTYPE  A = 1</text>
  <text x="56" y="350" class="mono">       AAAA = 28</text>
  <text x="56" y="368" class="mono">       MX  = 15</text>
  <text x="56" y="386" class="mono">QCLASS IN = 1</text>
  <text x="56" y="412" class="label accent">Always the same shape</text>
  <text x="56" y="430" class="label accent">on the wire, regardless</text>
  <text x="56" y="448" class="label accent">of query type.</text>

  <rect x="260" y="220" width="200" height="240" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="360" y="244" text-anchor="middle" class="node">Answer / Authority / Additional</text>
  <text x="360" y="262" text-anchor="middle" class="label">ANCOUNT NSCOUNT ARCOUNT</text>
  <text x="276" y="290" class="mono">NAME  (label seq or 0xC0 ptr)</text>
  <text x="276" y="308" class="mono">TYPE  2 B</text>
  <text x="276" y="326" class="mono">CLASS 2 B (IN=1)</text>
  <text x="276" y="344" class="mono">TTL   4 B (seconds)</text>
  <text x="276" y="362" class="mono">RDLEN 2 B</text>
  <text x="276" y="380" class="mono">RDATA RDLEN bytes</text>
  <text x="276" y="412" class="label accent">A record RDATA = 4-byte IPv4</text>
  <text x="276" y="430" class="label accent">AAAA RDATA   = 16-byte IPv6</text>
  <text x="276" y="448" class="label accent">MX RDATA    = 2-byte pref + name</text>

  <rect x="480" y="220" width="400" height="240" rx="8" fill="#fff" stroke="#E2557A" stroke-width="1.5"/>
  <text x="680" y="244" text-anchor="middle" class="node accent">OPT pseudo-RR (RFC 6891 EDNS(0))</text>
  <text x="496" y="270" class="mono">Owner name:    root (.)  -- special case</text>
  <text x="496" y="288" class="mono">TYPE:          41 (OPT)</text>
  <text x="496" y="306" class="mono">CLASS:         UDP payload size (re-used!)</text>
  <text x="496" y="324" class="mono">TTL:           extended-RCODE | version | flags</text>
  <text x="496" y="342" class="mono">                high bit 15 = DO (DNSSEC OK, RFC 4033)</text>
  <text x="496" y="360" class="mono">                high bit 14 = AD (Authenticated Data, RFC 3655)</text>
  <text x="496" y="378" class="mono">RDLEN:         length of OPT options</text>
  <text x="496" y="396" class="mono">RDATA:         TLV-encoded EDNS options</text>
  <text x="496" y="422" class="label">Common buffer sizes: 1232 (IPv6-safe), 4096.</text>
  <text x="496" y="440" class="label">Without OPT, RFC 1035 caps responses at 512 B;</text>
  <text x="496" y="458" class="label">TC=1 forces TCP retry per RFC 7766.</text>

  <!-- Transport diagram -->
  <rect x="40" y="480" width="840" height="56" rx="8" fill="#FFF0F4" stroke="#E2557A" stroke-width="1.2"/>
  <text x="60" y="506" class="node">Transport</text>
  <text x="60" y="528" class="mono">client --UDP 53--&gt; resolver   (response &lt;= UDP buffer)  |  if TC=1 or AXFR or large DNSSEC --TCP 53--&gt; server (RFC 7766)</text>
</svg>
