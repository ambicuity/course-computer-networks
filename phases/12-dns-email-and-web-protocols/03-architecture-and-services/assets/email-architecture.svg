<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720">
  <rect width="1100" height="720" fill="#FFF7EC"/>
  <g font-family="ui-monospace, Menlo, Consolas, monospace">
    <text x="40" y="44" font-size="28" font-weight="700" fill="#2A1A2E">Email Architecture (RFC 5321 / 3501)</text>
    <text x="40" y="70" font-size="14" fill="#2A1A2E">Two subsystems (UA + MTA), three steps (submission, transfer, final delivery), four port numbers.</text>
  </g>

  <!-- Top row: Sender UA, Sender MSA/MTA, Recipient MTA, Recipient UA -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12">
    <!-- Sender UA -->
    <g transform="translate(60,110)">
      <rect width="180" height="100" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
      <text x="14" y="26" font-weight="700" fill="#E2557A">Sender UA (MUA)</text>
      <text x="14" y="50" fill="#2A1A2E">Outlook, Gmail web,</text>
      <text x="14" y="68" fill="#2A1A2E">Thunderbird, mutt</text>
      <text x="14" y="90" fill="#2A1A2E" opacity="0.7">lifetime: user session</text>
    </g>
    <!-- Sender MSA/MTA -->
    <g transform="translate(360,110)">
      <rect width="180" height="100" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
      <text x="14" y="26" font-weight="700" fill="#E2557A">Sender MSA / MTA</text>
      <text x="14" y="50" fill="#2A1A2E">Postfix, Exim, Sendmail</text>
      <text x="14" y="68" fill="#2A1A2E">listens 587 (AUTH) + 25</text>
      <text x="14" y="90" fill="#2A1A2E" opacity="0.7">lifetime: always-on daemon</text>
    </g>
    <!-- Recipient MTA -->
    <g transform="translate(660,110)">
      <rect width="180" height="100" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
      <text x="14" y="26" font-weight="700" fill="#E2557A">Recipient MTA</text>
      <text x="14" y="50" fill="#2A1A2E">Postfix / Exchange</text>
      <text x="14" y="68" fill="#2A1A2E">listens 25, queues mail</text>
      <text x="14" y="90" fill="#2A1A2E" opacity="0.7">lifetime: always-on daemon</text>
    </g>
    <!-- Recipient UA -->
    <g transform="translate(960,110)">
      <rect width="120" height="100" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
      <text x="14" y="26" font-weight="700" fill="#E2557A">Recipient UA</text>
      <text x="14" y="50" fill="#2A1A2E">IMAP/POP3</text>
      <text x="14" y="68" fill="#2A1A2E">or webmail</text>
      <text x="14" y="90" fill="#2A1A2E" opacity="0.7">port 143/993</text>
    </g>
  </g>

  <!-- Arrows with port labels -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" fill="#E2557A">
    <!-- Submission -->
    <line x1="240" y1="160" x2="358" y2="160" stroke="#E2557A" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="244" y="150" fill="#2A1A2E" font-weight="700">1. submission</text>
    <text x="244" y="180" fill="#2A1A2E">SMTP AUTH :587</text>
    <!-- Transfer -->
    <line x1="540" y1="160" x2="658" y2="160" stroke="#E2557A" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="544" y="150" fill="#2A1A2E" font-weight="700">2. transfer</text>
    <text x="544" y="180" fill="#2A1A2E">SMTP :25 (RFC 5321)</text>
    <!-- IMAP -->
    <line x1="840" y1="160" x2="958" y2="160" stroke="#E2557A" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="844" y="150" fill="#2A1A2E" font-weight="700">3. final delivery</text>
    <text x="844" y="180" fill="#2A1A2E">IMAP :143 / POP3 :110</text>
  </g>
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#E2557A"/>
    </marker>
  </defs>

  <!-- Mailbox storage -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12">
    <rect x="660" y="260" width="180" height="80" fill="#2A1A2E"/>
    <text x="674" y="284" font-weight="700" fill="#FFF7EC">Mailbox</text>
    <text x="674" y="306" fill="#FFF7EC">mbox / Maildir</text>
    <text x="674" y="324" fill="#FFF7EC" opacity="0.7">per-user storage</text>
    <line x1="750" y1="210" x2="750" y2="258" stroke="#2A1A2E" stroke-width="2" marker-end="url(#arr3)"/>
    <text x="760" y="240" fill="#2A1A2E">MDA writes</text>
  </g>
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2A1A2E"/>
    </marker>
  </defs>

  <!-- DNS involvement box -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12">
    <rect x="360" y="260" width="180" height="80" fill="#FFFFFF" stroke="#E2557A" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="374" y="284" font-weight="700" fill="#E2557A">DNS lookup (step 2)</text>
    <text x="374" y="306" fill="#2A1A2E">1. MX cs.vu.nl</text>
    <text x="374" y="324" fill="#2A1A2E">2. A zephyr.cs.vu.nl</text>
    <line x1="450" y1="210" x2="450" y2="258" stroke="#E2557A" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arr4)"/>
  </g>
  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#E2557A"/>
    </marker>
  </defs>

  <!-- Envelope vs header panel -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13" transform="translate(60,400)">
    <text x="0" y="0" font-size="20" font-weight="700" fill="#2A1A2E">Envelope vs Header (RFC 5322)</text>
    <g transform="translate(0,20)">
      <rect width="500" height="220" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
      <text x="14" y="26" font-weight="700" fill="#E2557A">Envelope (SMTP-only, MTA-visible)</text>
      <text x="14" y="56" fill="#2A1A2E">MAIL FROM:&lt;alice@cs.example.edu&gt;</text>
      <text x="14" y="76" fill="#2A1A2E">RCPT TO:&lt;bob@ee.example.org&gt;</text>
      <text x="14" y="106" fill="#2A1A2E">Used for: routing, bounces, SPF checks,</text>
      <text x="14" y="126" fill="#2A1A2E">DKIM alignment, return-path.</text>
      <text x="14" y="156" fill="#2A1A2E" opacity="0.7">Recipient UA does NOT see envelope.</text>
      <text x="14" y="186" fill="#2A1A2E" opacity="0.7">Can be hidden by mailing-list expansion.</text>
    </g>
    <g transform="translate(520,20)">
      <rect width="500" height="220" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
      <text x="14" y="26" font-weight="700" fill="#E2557A">Header (RFC 5322, UA-visible)</text>
      <text x="14" y="56" fill="#2A1A2E">From: Alice &lt;alice@cs.example.edu&gt;</text>
      <text x="14" y="76" fill="#2A1A2E">To: Bob &lt;bob@ee.example.org&gt;</text>
      <text x="14" y="96" fill="#2A1A2E">Cc: carol@ee.example.org</text>
      <text x="14" y="116" fill="#2A1A2E">Subject: Lunch on Tuesday</text>
      <text x="14" y="136" fill="#2A1A2E">Date: Tue, 24 Jun 2026 12:34:56 -0700</text>
      <text x="14" y="156" fill="#2A1A2E">Message-Id: &lt;20240624123456.7@cs.example.edu&gt;</text>
      <text x="14" y="186" fill="#2A1A2E" opacity="0.7">Each MTA along the path prepends a</text>
      <text x="14" y="206" fill="#2A1A2E" opacity="0.7">Received: line — top of header = last hop.</text>
    </g>
  </g>

  <!-- Port assignments legend -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" transform="translate(60,660)">
    <rect width="1000" height="40" fill="#2A1A2E"/>
    <text x="14" y="26" fill="#FFF7EC" font-weight="700">Ports:</text>
    <text x="80" y="26" fill="#FFF7EC">25 SMTP relay</text>
    <text x="220" y="26" fill="#FFF7EC">587 submission+AUTH</text>
    <text x="400" y="26" fill="#FFF7EC">465 SMTPS</text>
    <text x="510" y="26" fill="#FFF7EC">110 POP3 / 995 POP3S</text>
    <text x="700" y="26" fill="#FFF7EC">143 IMAP / 993 IMAPS</text>
    <text x="880" y="26" fill="#FFF7EC" opacity="0.7">RFC 5321/6409/3501/1939/8314</text>
  </g>
</svg>
