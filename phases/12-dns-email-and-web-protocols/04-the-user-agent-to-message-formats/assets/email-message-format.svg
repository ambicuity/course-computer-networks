<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720">
  <rect width="1100" height="720" fill="#FFF7EC"/>
  <g font-family="ui-monospace, Menlo, Consolas, monospace">
    <text x="40" y="44" font-size="28" font-weight="700" fill="#2A1A2E">RFC 5322 Message + MIME</text>
    <text x="40" y="70" font-size="14" fill="#2A1A2E">Envelope + header + blank line + body. MIME adds 5 headers and a typed body tree.</text>
  </g>

  <!-- RFC 5322 structure panel -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13" transform="translate(40,100)">
    <rect width="500" height="380" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
    <text x="14" y="26" font-weight="700" fill="#E2557A">RFC 5322 message on the wire</text>
    <text x="14" y="56" fill="#2A1A2E">[envelope: SMTP MAIL FROM/RCPT TO -- not bytes]</text>
    <text x="14" y="80" fill="#2A1A2E">From: Alice &lt;alice@cs.example.edu&gt;</text>
    <text x="14" y="100" fill="#2A1A2E">To: Bob &lt;bob@ee.example.org&gt;</text>
    <text x="14" y="120" fill="#2A1A2E">Cc: carol@ee.example.org</text>
    <text x="14" y="140" fill="#2A1A2E">Subject: Lunch on Tuesday</text>
    <text x="14" y="160" fill="#2A1A2E">Date: Tue, 24 Jun 2026 12:34:56 -0700</text>
    <text x="14" y="180" fill="#2A1A2E">Message-Id: &lt;20240624123456.7@cs.example.edu&gt;</text>
    <text x="14" y="200" fill="#2A1A2E">In-Reply-To: &lt;20240620120000.3@example.org&gt;</text>
    <text x="14" y="220" fill="#2A1A2E">References: &lt;20240620120000.3@example.org&gt;</text>
    <text x="14" y="240" fill="#2A1A2E">Received: from ... by mail.cs.example.edu ...</text>
    <line x1="14" y1="256" x2="486" y2="256" stroke="#E2557A" stroke-width="2"/>
    <text x="14" y="278" fill="#2A1A2E">Dear Bob,</text>
    <text x="14" y="296" fill="#2A1A2E">  Tuesday works for lunch. See you at noon.</text>
    <text x="14" y="316" fill="#2A1A2E">--</text>
    <text x="14" y="334" fill="#2A1A2E">Alice</text>
    <text x="14" y="360" fill="#2A1A2E" opacity="0.7">Lines end CRLF, max 998 octets.</text>
  </g>

  <!-- MIME multipart structure panel -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13" transform="translate(560,100)">
    <rect width="500" height="380" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="2"/>
    <text x="14" y="26" font-weight="700" fill="#E2557A">MIME multipart/alternative</text>
    <text x="14" y="50" fill="#2A1A2E">Content-Type: multipart/alternative;</text>
    <text x="14" y="66" fill="#2A1A2E">  boundary="qwertyuiop"</text>
    <text x="14" y="90" fill="#2A1A2E">--qwertyuiop</text>
    <text x="14" y="108" fill="#2A1A2E">Content-Type: text/plain</text>
    <text x="14" y="128" fill="#2A1A2E">Happy birthday to you, Bob.</text>
    <text x="14" y="150" fill="#2A1A2E">--qwertyuiop</text>
    <text x="14" y="168" fill="#2A1A2E">Content-Type: text/html</text>
    <text x="14" y="188" fill="#2A1A2E">&lt;p&gt;Happy &lt;b&gt;birthday&lt;/b&gt;, Bob!&lt;/p&gt;</text>
    <text x="14" y="210" fill="#2A1A2E">--qwertyuiop</text>
    <text x="14" y="228" fill="#2A1A2E">Content-Type: message/external-body;</text>
    <text x="14" y="244" fill="#2A1A2E">  access-type="anon-ftp";</text>
    <text x="14" y="260" fill="#2A1A2E">  site="bicycle.cs.example.edu";</text>
    <text x="14" y="276" fill="#2A1A2E">  name="birthday.snd"</text>
    <text x="14" y="296" fill="#2A1A2E">--qwertyuiop--</text>
    <text x="14" y="320" fill="#2A1A2E" opacity="0.7">UA picks best alternative it can render.</text>
    <text x="14" y="338" fill="#2A1A2E" opacity="0.7">Order: simplest (text/plain) first.</text>
    <text x="14" y="356" fill="#2A1A2E" opacity="0.7">MIME per RFC 2045/2046/4288.</text>
  </g>

  <!-- MIME content type matrix -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13" transform="translate(40,510)">
    <text x="0" y="0" font-size="20" font-weight="700" fill="#2A1A2E">Seven top-level MIME types</text>
    <g transform="translate(0,16)">
      <rect width="1020" height="36" fill="#2A1A2E"/>
      <text x="14" y="24" fill="#FFF7EC" font-weight="700">Type</text>
      <text x="160" y="24" fill="#FFF7EC" font-weight="700">Example subtypes</text>
      <text x="540" y="24" fill="#FFF7EC" font-weight="700">RFC</text>
    </g>
    <g transform="translate(0,52)">
      <rect width="1020" height="28" fill="#FFFFFF" stroke="#2A1A2E"/>
      <text x="14" y="20" fill="#2A1A2E">text</text>
      <text x="160" y="20" fill="#2A1A2E">plain, html (2854), xml (3023), css, csv</text>
      <text x="540" y="20" fill="#2A1A2E">2046</text>
    </g>
    <g transform="translate(0,80)">
      <rect width="1020" height="28" fill="#FFFFFF" stroke="#2A1A2E"/>
      <text x="14" y="20" fill="#2A1A2E">image</text>
      <text x="160" y="20" fill="#2A1A2E">gif, jpeg, png, tiff, svg+xml</text>
      <text x="540" y="20" fill="#2A1A2E">2046 / 4288</text>
    </g>
    <g transform="translate(0,108)">
      <rect width="1020" height="28" fill="#FFFFFF" stroke="#2A1A2E"/>
      <text x="14" y="20" fill="#2A1A2E">audio</text>
      <text x="160" y="20" fill="#2A1A2E">basic, mpeg, mp4 (3003), ogg</text>
      <text x="540" y="20" fill="#2A1A2E">2046</text>
    </g>
    <g transform="translate(0,136)">
      <rect width="1020" height="28" fill="#FFFFFF" stroke="#2A1A2E"/>
      <text x="14" y="20" fill="#2A1A2E">video</text>
      <text x="160" y="20" fill="#2A1A2E">mpeg, mp4, quicktime, webm</text>
      <text x="540" y="20" fill="#2A1A2E">2046</text>
    </g>
    <g transform="translate(0,164)">
      <rect width="1020" height="28" fill="#FFFFFF" stroke="#2A1A2E"/>
      <text x="14" y="20" fill="#2A1A2E">multipart</text>
      <text x="160" y="20" fill="#2A1A2E">mixed, alternative, parallel, digest</text>
      <text x="540" y="20" fill="#2A1A2E">2046</text>
    </g>
  </g>
</svg>
