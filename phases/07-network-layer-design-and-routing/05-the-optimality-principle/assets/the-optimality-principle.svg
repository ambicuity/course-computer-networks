<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <rect x="0" y="0" width="760" height="460" fill="#FFF7EC"/>
  <style>
    .t  { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .h  { font-family: Inter, sans-serif; fill: #2A1A2E; font-weight: 700; }
    .m  { font-family: monospace; fill: #2A1A2E; }
    .ma { font-family: monospace; fill: #E2557A; }
  </style>

  <text x="30" y="34" class="h" font-size="20">The Optimality Principle &#8594; Sink Tree</text>
  <text x="30" y="56" class="t" font-size="13">If J is on the optimal I&#8594;K path, the J&#8594;K suffix is itself optimal. All optimal routes to D form a loop-free tree rooted at D.</text>

  <!-- divider -->
  <line x1="30" y1="74" x2="730" y2="74" stroke="#2A1A2E" stroke-width="1" opacity="0.25"/>

  <!-- LEFT: weighted topology -->
  <text x="60" y="100" class="h" font-size="14">Weighted topology</text>

  <!-- edges (left graph) -->
  <g stroke="#2A1A2E" stroke-width="2" opacity="0.45">
    <line x1="80"  y1="150" x2="180" y2="150"/>  <!-- A-B -->
    <line x1="180" y1="150" x2="280" y2="150"/>  <!-- B-C -->
    <line x1="80"  y1="150" x2="120" y2="260"/>  <!-- A-G -->
    <line x1="180" y1="150" x2="180" y2="260"/>  <!-- B-E -->
    <line x1="280" y1="150" x2="280" y2="260"/>  <!-- C-F -->
    <line x1="120" y1="260" x2="180" y2="260"/>  <!-- G-E -->
    <line x1="180" y1="260" x2="280" y2="260"/>  <!-- E-F -->
    <line x1="280" y1="260" x2="300" y2="350"/>  <!-- F-D -->
  </g>

  <!-- edge weights -->
  <g class="m" font-size="12">
    <text x="120" y="142">2</text>
    <text x="225" y="142">7</text>
    <text x="85"  y="210">6</text>
    <text x="188" y="210">3</text>
    <text x="288" y="210">2</text>
    <text x="146" y="278">1</text>
    <text x="222" y="252">2</text>
    <text x="300" y="312">3</text>
  </g>

  <!-- nodes (left graph) -->
  <g>
    <circle cx="80"  cy="150" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="180" cy="150" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="280" cy="150" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="120" cy="260" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="180" cy="260" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="280" cy="260" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="300" cy="350" r="18" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
  </g>
  <g class="h" font-size="13" text-anchor="middle">
    <text x="80"  y="155">A</text>
    <text x="180" y="155">B</text>
    <text x="280" y="155">C</text>
    <text x="120" y="265">G</text>
    <text x="180" y="265">E</text>
    <text x="280" y="265">F</text>
    <text x="300" y="355" fill="#FFF7EC">D</text>
  </g>
  <text x="300" y="392" class="ma" font-size="11" text-anchor="middle">destination</text>

  <!-- RIGHT: sink tree rooted at D -->
  <text x="470" y="100" class="h" font-size="14">Sink tree rooted at D</text>

  <!-- sink-tree edges (berry = chosen next hops) -->
  <g stroke="#E2557A" stroke-width="3">
    <line x1="490" y1="150" x2="590" y2="150"/>  <!-- A-B -->
    <line x1="590" y1="150" x2="590" y2="260"/>  <!-- B-E -->
    <line x1="530" y1="260" x2="590" y2="260"/>  <!-- G-E -->
    <line x1="590" y1="260" x2="690" y2="260"/>  <!-- E-F -->
    <line x1="690" y1="150" x2="690" y2="260"/>  <!-- C-F -->
    <line x1="690" y1="260" x2="660" y2="350"/>  <!-- F-D -->
  </g>

  <!-- nodes (sink tree) -->
  <g>
    <circle cx="490" cy="150" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="590" cy="150" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="690" cy="150" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="530" cy="260" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="590" cy="260" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="690" cy="260" r="16" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <circle cx="660" cy="350" r="18" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
  </g>
  <g class="h" font-size="13" text-anchor="middle">
    <text x="490" y="155">A</text>
    <text x="590" y="155">B</text>
    <text x="690" y="155">C</text>
    <text x="530" y="265">G</text>
    <text x="590" y="265">E</text>
    <text x="690" y="265">F</text>
    <text x="660" y="355" fill="#FFF7EC">D</text>
  </g>

  <!-- next-hop annotations -->
  <g class="ma" font-size="10" text-anchor="middle">
    <text x="540" y="138">A&#8594;B</text>
    <text x="612" y="210">B&#8594;E</text>
    <text x="560" y="278">G&#8594;E</text>
    <text x="640" y="252">E&#8594;F</text>
    <text x="710" y="210">C&#8594;F</text>
    <text x="688" y="312">F&#8594;D</text>
  </g>

  <!-- footer: properties -->
  <line x1="30" y1="412" x2="730" y2="412" stroke="#2A1A2E" stroke-width="1" opacity="0.25"/>
  <text x="30"  y="434" class="t" font-size="12"><tspan class="h">Loop-free</tspan>: a tree has no cycles &#8226; <tspan class="h">Bounded hops</tspan>: &#8804; N&#8722;1 &#8226; <tspan class="h">One parent</tspan>: store only dest &#8594; next-hop</text>
  <text x="30"  y="452" class="t" font-size="12">Equal-cost ties promote the tree to a <tspan class="ma">DAG (ECMP)</tspan> &#8212; a router keeps multiple next hops and hashes flows across them.</text>
</svg>
