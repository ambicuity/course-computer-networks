<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="900" height="560" fill="#FFF7EC"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#2A1A2E">
    Count-to-Infinity: A-B-C line, A-B link fails
  </text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#6B5B4E">
    Distance-vector: bad news climbs 1 hop per round toward metric 16
  </text>

  <!-- ===== Topology row ===== -->
  <g transform="translate(0,86)">
    <!-- links -->
    <line x1="200" y1="22" x2="380" y2="22" stroke="#2A1A2E" stroke-width="3"/>
    <line x1="520" y1="22" x2="700" y2="22" stroke="#2A1A2E" stroke-width="3"/>
    <!-- failed link A-B (dashed red) -->
    <line x1="380" y1="22" x2="520" y2="22" stroke="#E2557A" stroke-width="3" stroke-dasharray="10,8"/>
    <text x="450" y="14" text-anchor="middle" font-size="12" fill="#E2557A" font-weight="600">link fails ✗</text>

    <!-- routers -->
    <circle cx="180" cy="22" r="26" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2.5"/>
    <text x="180" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2A1A2E">A</text>
    <circle cx="450" cy="22" r="26" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2.5"/>
    <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2A1A2E">B</text>
    <circle cx="720" cy="22" r="26" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2.5"/>
    <text x="720" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2A1A2E">C</text>

    <text x="290" y="52" text-anchor="middle" font-size="11" fill="#6B5B4E">cost 1 (down)</text>
    <text x="610" y="52" text-anchor="middle" font-size="11" fill="#6B5B4E">cost 1</text>
  </g>

  <!-- ===== Staircase chart ===== -->
  <g transform="translate(70,170)">
    <text x="380" y="-6" text-anchor="middle" font-size="14" font-weight="600" fill="#2A1A2E">
      B and C cost-to-A vs. round
    </text>

    <!-- axes -->
    <line x1="0" y1="0" x2="0" y2="280" stroke="#2A1A2E" stroke-width="1.5"/>
    <line x1="0" y1="280" x2="660" y2="280" stroke="#2A1A2E" stroke-width="1.5"/>

    <!-- y-axis labels: 1,2,3,...,16 -->
    <g font-size="10" fill="#6B5B4E" text-anchor="end">
      <text x="-8" y="284">1</text>
      <text x="-8" y="234">4</text>
      <text x="-8" y="184">7</text>
      <text x="-8" y="134">10</text>
      <text x="-8" y="84">13</text>
      <text x="-8" y="34">16</text>
    </g>
    <!-- y gridlines -->
    <g stroke="#E8D9C4" stroke-width="1" stroke-dasharray="3,4">
      <line x1="0" y1="30" x2="660" y2="30"/>
      <line x1="0" y1="80" x2="660" y2="80"/>
      <line x1="0" y1="130" x2="660" y2="130"/>
      <line x1="0" y1="180" x2="660" y2="180"/>
      <line x1="0" y1="230" x2="660" y2="230"/>
    </g>

    <!-- infinity line -->
    <line x1="0" y1="30" x2="660" y2="30" stroke="#E2557A" stroke-width="1.5" stroke-dasharray="6,5"/>
    <text x="668" y="34" font-size="11" fill="#E2557A" font-weight="600">16 = ∞</text>

    <!-- x-axis labels -->
    <g font-size="10" fill="#6B5B4E" text-anchor="middle">
      <text x="0" y="298">R0</text>
      <text x="94" y="298">R1</text>
      <text x="188" y="298">R2</text>
      <text x="282" y="298">R3</text>
      <text x="376" y="298">R4</text>
      <text x="470" y="298">R5</text>
      <text x="564" y="298">…</text>
      <text x="620" y="298">R∞</text>
    </g>
    <text x="380" y="318" text-anchor="middle" font-size="11" fill="#6B5B4E">update round (30 s each)</text>

    <!-- B staircase (ink) -->
    <polyline fill="none" stroke="#2A1A2E" stroke-width="2.5"
      points="0,280 0,260 94,260 94,210 188,210 188,160 282,160 282,110 376,110 376,60 470,60 470,30 620,30"/>
    <g fill="#2A1A2E">
      <circle cx="0" cy="260" r="3"/>
      <circle cx="94" cy="210" r="3"/>
      <circle cx="188" cy="160" r="3"/>
      <circle cx="282" cy="110" r="3"/>
      <circle cx="376" cy="60" r="3"/>
      <circle cx="470" cy="30" r="3"/>
    </g>

    <!-- C staircase (berry) -->
    <polyline fill="none" stroke="#E2557A" stroke-width="2.5"
      points="0,230 0,235 94,235 94,185 188,185 188,135 282,135 282,85 376,85 376,35 470,35 470,30 620,30"/>
    <g fill="#E2557A">
      <circle cx="0" cy="235" r="3"/>
      <circle cx="94" cy="185" r="3"/>
      <circle cx="188" cy="135" r="3"/>
      <circle cx="282" cy="85" r="3"/>
      <circle cx="376" cy="35" r="3"/>
    </g>

    <!-- legend -->
    <g transform="translate(430,360)" font-size="11" fill="#2A1A2E">
      <rect x="0" y="0" width="14" height="3" fill="#2A1A2E"/>
      <text x="20" y="4">B cost to A (via C)</text>
      <rect x="0" y="16" width="14" height="3" fill="#E2557A"/>
      <text x="20" y="20">C cost to A (via B)</text>
    </g>
  </g>

  <!-- ===== Annotations ===== -->
  <g transform="translate(60,480)" font-size="11" fill="#2A1A2E">
    <text x="0" y="0" font-weight="600">Round 0:</text>
    <text x="0" y="16">A-B fails. B marks A=∞. But C still advertises "A=2 via B".</text>
    <text x="0" y="32">B believes C → installs A=3 via C. Each round both +1 → climb to 16.</text>
    <text x="440" y="0" font-weight="600" fill="#E2557A">Fixes:</text>
    <text x="440" y="16">split horizon: C omits A when talking to B</text>
    <text x="440" y="32">poisoned reverse: C advertises A=16 to B explicitly</text>
  </g>
</svg>