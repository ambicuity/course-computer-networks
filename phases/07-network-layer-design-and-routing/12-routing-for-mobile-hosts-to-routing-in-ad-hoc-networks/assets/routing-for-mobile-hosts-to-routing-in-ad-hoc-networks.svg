<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520">
  <rect width="760" height="520" fill="#FFF7EC"/>
  <style>
    text { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; fill: #2A1A2E; }
    .title { font-size: 18px; font-weight: 700; }
    .sub { font-size: 11px; fill: #5A4A5A; }
    .node { font-size: 13px; font-weight: 600; }
    .lbl { font-size: 10px; fill: #2A1A2E; }
    .step { font-size: 10px; fill: #E2557A; font-weight: 700; }
    .pkt { font-size: 9px; fill: #2A1A2E; font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
    .accent { stroke: #E2557A; }
    .ink { stroke: #2A1A2E; }
  </style>

  <text x="20" y="30" class="title">Mobile IP Handoff — Triangle Routing</text>
  <text x="20" y="48" class="sub">RFC 5944 (IPv4) / RFC 6275 (IPv6) · IP-in-IP tunnel protocol 4 · RFC 2003</text>

  <rect x="20" y="65" width="220" height="90" rx="8" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="130" y="85" class="node" text-anchor="middle">Correspondent</text>
  <text x="130" y="102" class="pkt" text-anchor="middle">203.0.113.9</text>
  <text x="130" y="122" class="lbl" text-anchor="middle">sends to home address</text>
  <text x="130" y="138" class="pkt" text-anchor="middle">dst=198.51.100.7</text>

  <rect x="290" y="65" width="180" height="90" rx="8" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="380" y="85" class="node" text-anchor="middle">Home Network</text>
  <text x="380" y="102" class="pkt" text-anchor="middle">Home Agent (HA)</text>
  <text x="380" y="120" class="lbl" text-anchor="middle">198.51.100.1</text>
  <text x="380" y="138" class="step" text-anchor="middle">intercept (proxy ARP)</text>

  <rect x="520" y="65" width="220" height="90" rx="8" fill="none" stroke="#E2557A" stroke-width="1.5"/>
  <text x="630" y="85" class="node" text-anchor="middle">Visited Network</text>
  <text x="630" y="102" class="pkt" text-anchor="middle">Mobile Host @ CoA</text>
  <text x="630" y="120" class="lbl" text-anchor="middle">192.0.2.50</text>
  <text x="630" y="138" class="step" text-anchor="middle">decapsulate</text>

  <line x1="240" y1="110" x2="290" y2="110" class="ink" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="265" y="103" class="step" text-anchor="middle">2</text>
  <text x="265" y="125" class="pkt" text-anchor="middle">inner</text>

  <line x1="470" y1="110" x2="520" y2="110" class="accent" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrR)"/>
  <text x="495" y="103" class="step" text-anchor="middle">3</text>
  <text x="495" y="125" class="pkt" text-anchor="middle">tunnel</text>

  <path d="M 630 155 Q 630 250 400 250 Q 130 250 130 155" fill="none" class="accent" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrR)"/>
  <text x="380" y="245" class="step" text-anchor="middle">4 — direct reply (triangle routing)</text>

  <rect x="20" y="285" width="720" height="220" rx="8" fill="none" stroke="#2A1A2E" stroke-width="1"/>
  <text x="380" y="305" class="title" text-anchor="middle">AODV Route Discovery (RFC 3561)</text>
  <text x="380" y="322" class="sub" text-anchor="middle">RREQ flood → reverse-path state → unicast RREP → forward routes installed</text>

  <line x1="20" y1="335" x2="740" y2="335" stroke="#E2557A" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="30" y="330" class="step">t = 0</text>
  <text x="730" y="330" class="step" text-anchor="end">t = discovery complete</text>

  <text x="60" y="360" class="node">A</text>
  <text x="180" y="360" class="node">D</text>
  <text x="300" y="360" class="node">G</text>
  <text x="420" y="360" class="node">I</text>
  <text x="540" y="360" class="node">B</text>
  <text x="660" y="360" class="node">C</text>

  <line x1="80" y1="358" x2="165" y2="358" class="ink" stroke-width="1.5"/>
  <line x1="200" y1="358" x2="285" y2="358" class="ink" stroke-width="1.5"/>
  <line x1="320" y1="358" x2="405" y2="358" class="ink" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="40" y="375" width="80" height="35" rx="4" fill="none" stroke="#E2557A" stroke-width="1"/>
  <text x="80" y="390" class="pkt" text-anchor="middle">RREQ bc</text>
  <text x="80" y="403" class="step" text-anchor="middle">t=1</text>

  <rect x="160" y="375" width="80" height="35" rx="4" fill="none" stroke="#E2557A" stroke-width="1"/>
  <text x="200" y="390" class="pkt" text-anchor="middle">fwd RREQ</text>
  <text x="200" y="403" class="step" text-anchor="middle">t=2</text>

  <rect x="280" y="375" width="80" height="35" rx="4" fill="none" stroke="#E2557A" stroke-width="1"/>
  <text x="320" y="390" class="pkt" text-anchor="middle">fwd RREQ</text>
  <text x="320" y="403" class="step" text-anchor="middle">t=3</text>

  <rect x="400" y="375" width="80" height="35" rx="4" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="440" y="390" class="pkt" text-anchor="middle">RREP</text>
  <text x="440" y="403" class="step" text-anchor="middle">dest_seq++</text>

  <path d="M 440 375 L 320 375 L 200 375 L 80 375" fill="none" class="ink" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="260" y="430" class="lbl" text-anchor="middle">RREP unicast along reverse path — installs forward route at each hop</text>

  <rect x="40" y="450" width="120" height="20" rx="3" fill="#E2557A" opacity="0.12"/>
  <text x="100" y="464" class="pkt" text-anchor="middle">A: I via D, h=3</text>
  <rect x="160" y="450" width="120" height="20" rx="3" fill="#E2557A" opacity="0.12"/>
  <text x="220" y="464" class="pkt" text-anchor="middle">D: I via G, h=2</text>
  <rect x="280" y="450" width="120" height="20" rx="3" fill="#E2557A" opacity="0.12"/>
  <text x="340" y="464" class="pkt" text-anchor="middle">G: I via I, h=1</text>
  <text x="460" y="464" class="lbl">discovered path: A → D → G → I</text>

  <text x="30" y="495" class="sub">Expanding-ring search: TTL=1 → no RREP → TTL=2 → no RREP → TTL=3 → RREP returned. Cost ≈ 36 vs full flood ≈ 18.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#2A1A2E"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#E2557A"/>
    </marker>
  </defs>
</svg>