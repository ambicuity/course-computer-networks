<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect x="0" y="0" width="880" height="520" fill="#FFF7EC"/>
  <style>
    .t { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .m { font-family: 'SFMono-Regular', Consolas, monospace; fill: #2A1A2E; }
    .acc { fill: #E2557A; }
    .lbl { font-family: Inter, sans-serif; fill: #2A1A2E; font-size: 12px; }
  </style>

  <text x="40" y="44" class="t" font-size="24" font-weight="700">Store-and-Forward Packet Switching</text>
  <text x="40" y="68" class="t" font-size="14">Each router buffers the whole frame, verifies it, rewrites TTL + checksum, then forwards one hop.</text>

  <!-- Host H1 -->
  <rect x="34" y="120" width="96" height="56" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="82" y="146" class="t" font-size="14" font-weight="600" text-anchor="middle">Host H1</text>
  <text x="82" y="164" class="lbl" text-anchor="middle">TTL=64</text>

  <!-- Router boxes -->
  <g>
    <rect x="190" y="104" width="150" height="88" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
    <text x="265" y="126" class="t" font-size="15" font-weight="700" text-anchor="middle">Router A</text>
    <rect x="204" y="138" width="122" height="40" rx="6" fill="#FCE6EC" stroke="#E2557A" stroke-width="1.5"/>
    <text x="265" y="155" class="lbl" text-anchor="middle">buffer (store)</text>
    <text x="265" y="171" class="m" font-size="11" text-anchor="middle">[ pkt 3 2 1 ]</text>
  </g>
  <g>
    <rect x="400" y="104" width="150" height="88" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
    <text x="475" y="126" class="t" font-size="15" font-weight="700" text-anchor="middle">Router C</text>
    <rect x="414" y="138" width="122" height="40" rx="6" fill="#FCE6EC" stroke="#E2557A" stroke-width="1.5"/>
    <text x="475" y="155" class="lbl" text-anchor="middle">buffer (store)</text>
    <text x="475" y="171" class="m" font-size="11" text-anchor="middle">[ queue depth 3 ]</text>
  </g>
  <g>
    <rect x="610" y="104" width="150" height="88" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
    <text x="685" y="126" class="t" font-size="15" font-weight="700" text-anchor="middle">Router E</text>
    <rect x="624" y="138" width="122" height="40" rx="6" fill="#FCE6EC" stroke="#E2557A" stroke-width="1.5"/>
    <text x="685" y="155" class="lbl" text-anchor="middle">buffer (store)</text>
    <text x="685" y="171" class="m" font-size="11" text-anchor="middle">[ pkt 1 ]</text>
  </g>

  <!-- Host H2 -->
  <rect x="788" y="120" width="60" height="56" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="818" y="152" class="t" font-size="13" font-weight="600" text-anchor="middle">H2</text>

  <!-- Links with checksum gates -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E2557A"/>
    </marker>
  </defs>
  <line x1="130" y1="148" x2="186" y2="148" stroke="#E2557A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="148" x2="396" y2="148" stroke="#E2557A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="148" x2="606" y2="148" stroke="#E2557A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="148" x2="784" y2="148" stroke="#E2557A" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="265" y="214" class="m" font-size="11" fill="#E2557A" text-anchor="middle">CRC OK -> fwd</text>
  <text x="475" y="214" class="m" font-size="11" fill="#E2557A" text-anchor="middle">TTL--, csum recompute</text>
  <text x="685" y="214" class="m" font-size="11" fill="#E2557A" text-anchor="middle">CRC fail -> DROP</text>

  <!-- Per-hop delay breakdown panel -->
  <rect x="40" y="252" width="800" height="158" rx="12" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="60" y="280" class="t" font-size="16" font-weight="700">One hop = four delays summed</text>

  <g class="m" font-size="13">
    <rect x="60" y="296" width="14" height="14" fill="#E2557A"/>
    <text x="82" y="308" class="t" font-size="13" font-weight="600">transmission</text>
    <text x="82" y="326" class="lbl">packet_bits / link_rate</text>
    <text x="82" y="344" class="lbl">12000b / 10Mbps = 1.200 ms</text>

    <rect x="290" y="296" width="14" height="14" fill="#2A1A2E"/>
    <text x="312" y="308" class="t" font-size="13" font-weight="600">propagation</text>
    <text x="312" y="326" class="lbl">distance / 2e8 m/s</text>
    <text x="312" y="344" class="lbl">100 km = 0.500 ms</text>

    <rect x="520" y="296" width="14" height="14" fill="#E2557A"/>
    <text x="542" y="308" class="t" font-size="13" font-weight="600">processing</text>
    <text x="542" y="326" class="lbl">lookup + checksum</text>
    <text x="542" y="344" class="lbl">~0.020 ms</text>

    <rect x="700" y="296" width="14" height="14" fill="#2A1A2E"/>
    <text x="722" y="308" class="t" font-size="13" font-weight="600">queuing</text>
    <text x="722" y="326" class="lbl">depth x tx_time</text>
    <text x="722" y="344" class="lbl">3 x 1.2 = 3.600 ms</text>
  </g>

  <line x1="60" y1="364" x2="820" y2="364" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="60" y="390" class="t" font-size="14" font-weight="600">Serialization is paid once per hop -></text>
  <text x="360" y="390" class="m" font-size="14" fill="#E2557A" font-weight="700">N-hop tx delay = N x (bits / rate)</text>

  <!-- Footnote -->
  <text x="40" y="448" class="t" font-size="13" font-weight="600">vs cut-through:</text>
  <text x="150" y="448" class="t" font-size="13">forwards after the 14-byte dest-MAC header — lower latency, but cannot verify the FCS or rate-adapt.</text>
  <text x="40" y="474" class="lbl">IPv4 RFC 791 · checksum RFC 1071 · router rules RFC 1812 · FCS IEEE 802.3 · Tanenbaum §5.1.1</text>
</svg>
