<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2A1A2E"/>
    </marker>
    <marker id="arrowB" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E2557A"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="560" fill="#FFF7EC"/>
  <text x="460" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#2A1A2E">Connectionless (Datagram) vs Connection-Oriented (Virtual Circuit)</text>

  <!-- ===================== LEFT: DATAGRAM ===================== -->
  <text x="230" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#E2557A">Datagram network — per-packet routing</text>
  <text x="230" y="88" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">each packet carries a full destination address (IP)</text>

  <!-- routers -->
  <g font-family="Inter, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2A1A2E">
    <circle cx="80"  cy="170" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/><text x="80"  y="175">A</text>
    <circle cx="200" cy="120" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/><text x="200" y="125">C</text>
    <circle cx="330" cy="120" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/><text x="330" y="125">E</text>
    <circle cx="200" cy="250" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/><text x="200" y="255">B</text>
    <circle cx="330" cy="250" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/><text x="330" y="255">D</text>
    <circle cx="420" cy="185" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/><text x="420" y="190">F</text>
  </g>

  <!-- path packets 1-3: A->C->E->F (ink) -->
  <line x1="100" y1="158" x2="180" y2="132" stroke="#2A1A2E" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="222" y1="120" x2="308" y2="120" stroke="#2A1A2E" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="350" y1="132" x2="402" y2="170" stroke="#2A1A2E" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="150" y="100" font-family="monospace" font-size="11" font-weight="700" fill="#2A1A2E">pkts 1,2,3</text>

  <!-- path packet 4: A->B->D->F (berry, after table update) -->
  <line x1="100" y1="182" x2="180" y2="238" stroke="#E2557A" stroke-width="2.6" stroke-dasharray="6 4" marker-end="url(#arrowB)"/>
  <line x1="222" y1="250" x2="308" y2="250" stroke="#E2557A" stroke-width="2.6" stroke-dasharray="6 4" marker-end="url(#arrowB)"/>
  <line x1="350" y1="238" x2="402" y2="200" stroke="#E2557A" stroke-width="2.6" stroke-dasharray="6 4" marker-end="url(#arrowB)"/>
  <text x="150" y="300" font-family="monospace" font-size="11" font-weight="700" fill="#E2557A">pkt 4 (rerouted)</text>

  <!-- host markers -->
  <text x="40"  y="175" font-family="monospace" font-size="11" fill="#2A1A2E">H1</text>
  <text x="448" y="190" font-family="monospace" font-size="11" fill="#2A1A2E">H2</text>

  <!-- A's table before/after -->
  <rect x="30" y="340" width="180" height="170" rx="8" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="120" y="362" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#2A1A2E">A's forwarding table</text>
  <text x="48" y="386" font-family="monospace" font-size="11" fill="#2A1A2E">dest   initial   later</text>
  <line x1="42" y1="392" x2="198" y2="392" stroke="#2A1A2E" stroke-width="1"/>
  <text x="48" y="410" font-family="monospace" font-size="11" fill="#2A1A2E">F  ->    C       B</text>
  <text x="160" y="410" font-family="monospace" font-size="11" font-weight="700" fill="#E2557A">*</text>
  <text x="48" y="430" font-family="monospace" font-size="11" fill="#2A1A2E">E  ->    C       B</text>
  <text x="48" y="450" font-family="monospace" font-size="11" fill="#2A1A2E">C  ->    C       B</text>
  <text x="48" y="470" font-family="monospace" font-size="11" fill="#2A1A2E">D  ->    B       B</text>
  <text x="48" y="490" font-family="monospace" font-size="11" fill="#2A1A2E">B  ->    B       B</text>

  <!-- divider -->
  <line x1="460" y1="60" x2="460" y2="520" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- ===================== RIGHT: VIRTUAL CIRCUIT ===================== -->
  <text x="690" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#E2557A">Virtual-circuit network — pinned route + label swap</text>
  <text x="690" y="88" text-anchor="middle" font-family="monospace" font-size="11" fill="#2A1A2E">each packet carries a short VC id (MPLS: 20-bit label)</text>

  <g font-family="Inter, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2A1A2E">
    <circle cx="540" cy="180" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/><text x="540" y="185">A</text>
    <circle cx="650" cy="180" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/><text x="650" y="185">C</text>
    <circle cx="760" cy="180" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/><text x="760" y="185">E</text>
    <circle cx="860" cy="180" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/><text x="860" y="185">F</text>
  </g>
  <text x="505" y="185" font-family="monospace" font-size="11" fill="#2A1A2E">H1</text>
  <text x="505" y="232" font-family="monospace" font-size="11" fill="#2A1A2E">H3</text>

  <!-- conn1 link ids (ink, all id 1) -->
  <line x1="562" y1="180" x2="628" y2="180" stroke="#2A1A2E" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="672" y1="180" x2="738" y2="180" stroke="#2A1A2E" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="782" y1="180" x2="838" y2="180" stroke="#2A1A2E" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="595" y="172" font-family="monospace" font-size="11" font-weight="700" fill="#2A1A2E">id 1</text>
  <text x="705" y="172" font-family="monospace" font-size="11" font-weight="700" fill="#2A1A2E">id 1</text>
  <text x="805" y="172" font-family="monospace" font-size="11" font-weight="700" fill="#2A1A2E">id 1</text>

  <!-- conn2 enters A from H3 with id 1, swapped to id 2 onward (berry) -->
  <line x1="510" y1="222" x2="525" y2="196" stroke="#E2557A" stroke-width="2.6" marker-end="url(#arrowB)"/>
  <line x1="562" y1="198" x2="628" y2="198" stroke="#E2557A" stroke-width="2.6" marker-end="url(#arrowB)"/>
  <line x1="672" y1="198" x2="738" y2="198" stroke="#E2557A" stroke-width="2.6" marker-end="url(#arrowB)"/>
  <line x1="782" y1="198" x2="838" y2="198" stroke="#E2557A" stroke-width="2.6" marker-end="url(#arrowB)"/>
  <text x="505" y="215" font-family="monospace" font-size="11" font-weight="700" fill="#E2557A">id 1</text>
  <text x="595" y="216" font-family="monospace" font-size="11" font-weight="700" fill="#E2557A">id 2</text>
  <text x="705" y="216" font-family="monospace" font-size="11" font-weight="700" fill="#E2557A">id 2</text>
  <text x="805" y="216" font-family="monospace" font-size="11" font-weight="700" fill="#E2557A">id 2</text>
  <text x="540" y="255" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#E2557A">A swaps 1 -&gt; 2 (avoid C collision)</text>

  <!-- A's VC table -->
  <rect x="510" y="300" width="360" height="150" rx="8" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="690" y="322" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#2A1A2E">A's VC table  (in line, id) -&gt; (out line, id)</text>
  <line x1="522" y1="332" x2="858" y2="332" stroke="#2A1A2E" stroke-width="1"/>
  <text x="528" y="356" font-family="monospace" font-size="12" fill="#2A1A2E">(H1, 1)  ->  (C, 1)</text>
  <text x="528" y="384" font-family="monospace" font-size="12" fill="#E2557A">(H3, 1)  ->  (C, 2)   swap</text>
  <text x="528" y="418" font-family="monospace" font-size="11" fill="#2A1A2E">id is link-local: meaning only on one hop,</text>
  <text x="528" y="434" font-family="monospace" font-size="11" fill="#2A1A2E">indexed + rewritten at every router.</text>

  <!-- footer contrast -->
  <text x="230" y="538" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">No setup · no router state · survives crashes · QoS hard</text>
  <text x="690" y="538" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#2A1A2E">Setup required · per-VC state · crash aborts VCs · QoS easy</text>
</svg>
