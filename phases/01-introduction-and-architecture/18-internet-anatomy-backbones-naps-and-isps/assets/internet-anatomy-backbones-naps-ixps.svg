<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" height="560" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="760" height="560" fill="#FFF7EC"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#2A1A2E">Valley-Free Path Through the Internet</text>
  <text x="380" y="56" text-anchor="middle" font-size="13" fill="#2A1A2E" opacity="0.7">Access ISP A to content network C, climbing to a tier-1, peering at an IXP, then descending</text>

  <!-- ===== TIER BANDS (background) ===== -->
  <rect x="40" y="90" width="680" height="70" fill="#2A1A2E" opacity="0.04"/>
  <rect x="40" y="180" width="680" height="70" fill="#2A1A2E" opacity="0.04"/>
  <rect x="40" y="270" width="680" height="70" fill="#2A1A2E" opacity="0.04"/>
  <rect x="40" y="360" width="680" height="80" fill="#2A1A2E" opacity="0.04"/>

  <text x="52" y="120" font-size="11" font-weight="600" fill="#2A1A2E" opacity="0.6">ACCESS (tier-3)</text>
  <text x="52" y="210" font-size="11" font-weight="600" fill="#2A1A2E" opacity="0.6">REGIONAL (tier-2)</text>
  <text x="52" y="300" font-size="11" font-weight="600" fill="#2A1A2E" opacity="0.6">TIER-1 BACKBONE</text>
  <text x="52" y="390" font-size="11" font-weight="600" fill="#2A1A2E" opacity="0.6">CONTENT / DESTINATION</text>

  <!-- ===== TIER-1 PEERING FABRIC (IXP) ===== -->
  <rect x="300" y="288" width="160" height="34" rx="6" fill="#E2557A" opacity="0.12" stroke="#E2557A" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="380" y="309" text-anchor="middle" font-size="11" font-weight="600" fill="#E2557A">IXP switch fabric</text>

  <!-- ===== NODES ===== -->
  <!-- Access tier -->
  <g>
    <circle cx="150" cy="125" r="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="150" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#2A1A2E">A</text>
    <text x="150" y="160" text-anchor="middle" font-size="10" fill="#2A1A2E" opacity="0.7">access ISP</text>

    <circle cx="610" cy="125" r="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="610" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#2A1A2E">B</text>
    <text x="610" y="160" text-anchor="middle" font-size="10" fill="#2A1A2E" opacity="0.7">access ISP</text>
  </g>

  <!-- Regional tier -->
  <g>
    <circle cx="240" cy="215" r="20" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="240" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#2A1A2E">R</text>
    <text x="240" y="250" text-anchor="middle" font-size="10" fill="#2A1A2E" opacity="0.7">regional provider</text>
  </g>

  <!-- Tier-1 backbone -->
  <g>
    <circle cx="320" cy="305" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2.5"/>
    <text x="320" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#2A1A2E">T1</text>
    <text x="320" y="345" text-anchor="middle" font-size="10" fill="#2A1A2E" opacity="0.7">tier-1 (buys no transit)</text>

    <circle cx="440" cy="305" r="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2.5"/>
    <text x="440" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#2A1A2E">T2</text>
    <text x="440" y="345" text-anchor="middle" font-size="10" fill="#2A1A2E" opacity="0.7">tier-1 (buys no transit)</text>
  </g>

  <!-- Content / destination -->
  <g>
    <circle cx="440" cy="395" r="20" fill="#E2557A" stroke="#E2557A" stroke-width="2"/>
    <text x="440" y="400" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF7EC">C</text>
    <text x="440" y="430" text-anchor="middle" font-size="10" fill="#2A1A2E" opacity="0.7">content network (dest)</text>
  </g>

  <!-- ===== EDGES ===== -->
  <!-- Transit (c2p): solid, paid. The valid path edges drawn in berry. -->
  <!-- A -> R  (up) -->
  <line x1="163" y1="138" x2="227" y2="202" stroke="#E2557A" stroke-width="2.4"/>
  <!-- R -> T1 (up) -->
  <line x1="253" y1="228" x2="307" y2="289" stroke="#E2557A" stroke-width="2.4"/>
  <!-- T1 - T2 peering (across) -->
  <line x1="342" y1="305" x2="418" y2="305" stroke="#E2557A" stroke-width="2.4" stroke-dasharray="6 3"/>
  <!-- T2 -> C (down) -->
  <line x1="440" y1="327" x2="440" y2="375" stroke="#E2557A" stroke-width="2.4"/>

  <!-- Forbidden shortcut A <-> B (peer), shown greyed -->
  <line x1="170" y1="125" x2="590" y2="125" stroke="#2A1A2E" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.35"/>
  <!-- Forbidden A->B->T2 (B -> T2 transit) drawn greyed short -->
  <line x1="610" y1="145" x2="455" y2="290" stroke="#2A1A2E" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.35"/>

  <!-- Edge labels -->
  <text x="180" y="172" font-size="10" fill="#E2557A" font-weight="600">up (transit)</text>
  <text x="262" y="262" font-size="10" fill="#E2557A" font-weight="600">up (transit)</text>
  <text x="345" y="296" font-size="10" fill="#E2557A" font-weight="600">across (peering, free)</text>
  <text x="450" y="355" font-size="10" fill="#E2557A" font-weight="600">down (transit)</text>

  <text x="380" y="118" text-anchor="middle" font-size="10" fill="#2A1A2E" opacity="0.5">A&#8596;B peer (forbidden: valley)</text>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(60,470)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#2A1A2E">Legend</text>
    <line x1="0" y1="20" x2="40" y2="20" stroke="#E2557A" stroke-width="2.4"/>
    <text x="50" y="24" font-size="11" fill="#2A1A2E">valley-free path (up, across, down)</text>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#E2557A" stroke-width="2.4" stroke-dasharray="6 3"/>
    <text x="50" y="44" font-size="11" fill="#2A1A2E">peering (settlement-free, at IXP)</text>
    <line x1="0" y1="60" x2="40" y2="60" stroke="#2A1A2E" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.5"/>
    <text x="50" y="64" font-size="11" fill="#2A1A2E">forbidden shortcut (down-then-up = valley)</text>
  </g>

  <!-- Path summary box -->
  <g transform="translate(470,470)">
    <rect x="0" y="0" width="250" height="60" rx="6" fill="#2A1A2E" opacity="0.06"/>
    <text x="12" y="22" font-size="11" font-weight="700" fill="#2A1A2E">Valid AS path (Gao 2001):</text>
    <text x="12" y="42" font-size="12" fill="#E2557A" font-weight="600">A &#8594; R &#8594; T1 &#8594; T2 &#8594; C</text>
    <text x="12" y="56" font-size="10" fill="#2A1A2E" opacity="0.7">up, up, across, down</text>
  </g>
</svg>
