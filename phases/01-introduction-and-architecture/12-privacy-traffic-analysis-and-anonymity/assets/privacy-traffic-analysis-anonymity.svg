<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" width="880" height="600" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="880" height="600" fill="#FFF7EC"/>

  <text x="440" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#2A1A2E">Tor Onion Circuit: Who Knows What</text>
  <text x="440" y="54" text-anchor="middle" font-size="12" fill="#2A1A2E" opacity="0.75">A 512-byte cell wrapped in three symmetric layers; each relay peels one layer only.</text>

  <!-- Node row -->
  <g>
    <circle cx="80"  cy="180" r="34" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="80" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#2A1A2E">Alice</text>
    <text x="80" y="192" text-anchor="middle" font-size="10" fill="#2A1A2E">10.0.0.5</text>

    <rect x="200" y="150" width="120" height="60" rx="8" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="260" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#2A1A2E">Guard relay</text>
    <text x="260" y="194" text-anchor="middle" font-size="10" fill="#E2557A">peels K_guard</text>

    <rect x="410" y="150" width="120" height="60" rx="8" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="470" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#2A1A2E">Middle relay</text>
    <text x="470" y="194" text-anchor="middle" font-size="10" fill="#E2557A">peels K_middle</text>

    <rect x="620" y="150" width="120" height="60" rx="8" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="680" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#2A1A2E">Exit relay</text>
    <text x="680" y="194" text-anchor="middle" font-size="10" fill="#E2557A">peels K_exit</text>

    <circle cx="810" cy="180" r="34" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="810" y="176" text-anchor="middle" font-size="11" font-weight="600" fill="#2A1A2E">news.</text>
    <text x="810" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#2A1A2E">example</text>
  </g>

  <!-- Links -->
  <g stroke="#2A1A2E" stroke-width="1.5" fill="none">
    <line x1="114" y1="180" x2="200" y2="180"/>
    <line x1="320" y1="180" x2="410" y2="180"/>
    <line x1="530" y1="180" x2="620" y2="180"/>
    <line x1="740" y1="180" x2="776" y2="180"/>
  </g>

  <!-- Onion layers on link to destination -->
  <g font-size="9" text-anchor="middle">
    <text x="157" y="172" fill="#E2557A" font-weight="600">ENC(K_guard,</text>
    <text x="365" y="172" fill="#E2557A">ENC(K_middle,</text>
    <text x="575" y="172" fill="#E2557A">ENC(K_exit,</text>
    <text x="758" y="172" fill="#E2557A">cell))</text>
  </g>

  <!-- who knows what matrix -->
  <text x="440" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#2A1A2E">What each relay learns</text>
  <g font-size="11" fill="#2A1A2E">
    <line x1="120" y1="266" x2="760" y2="266" stroke="#2A1A2E" stroke-width="0.5"/>

    <text x="120" y="286" font-weight="600">Relay</text>
    <text x="300" y="286" font-weight="600">Knows source?</text>
    <text x="480" y="286" font-weight="600">Knows destination?</text>
    <text x="660" y="286" font-weight="600">Sees content?</text>
    <line x1="120" y1="294" x2="760" y2="294" stroke="#2A1A2E" stroke-width="0.5"/>

    <text x="120" y="312" font-weight="600">Guard</text>
    <text x="300" y="312" fill="#E2557A" font-weight="600">YES (Alice)</text>
    <text x="480" y="312">no</text>
    <text x="660" y="312">no</text>

    <text x="120" y="330" font-weight="600">Middle</text>
    <text x="300" y="330">no (only guard)</text>
    <text x="480" y="330">no (only exit)</text>
    <text x="660" y="330">no</text>

    <text x="120" y="348" font-weight="600">Exit</text>
    <text x="300" y="348">no</text>
    <text x="480" y="348" fill="#E2557A" font-weight="600">YES (news.example)</text>
    <text x="660" y="348">plaintext if not HTTPS</text>
    <line x1="120" y1="358" x2="760" y2="358" stroke="#2A1A2E" stroke-width="0.5"/>
  </g>

  <!-- Traffic confirmation -->
  <text x="440" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#2A1A2E">Traffic-confirmation: the timing leak Tor does NOT stop</text>
  <g>
    <!-- Alice side timing -->
    <text x="80" y="420" text-anchor="middle" font-size="10" fill="#2A1A2E">Alice&#8594;guard</text>
    <g stroke="#2A1A2E" stroke-width="2">
      <line x1="40" y1="440" x2="120" y2="440"/>
      <line x1="160" y1="440" x2="200" y2="440"/>
      <line x1="220" y1="440" x2="250" y2="440"/>
    </g>
    <text x="140" y="432" text-anchor="middle" font-size="9" fill="#E2557A">t = T</text>

    <!-- Destination side timing -->
    <text x="810" y="420" text-anchor="middle" font-size="10" fill="#2A1A2E">exit&#8594;news</text>
    <g stroke="#2A1A2E" stroke-width="2">
      <line x1="620" y1="440" x2="700" y2="440"/>
      <line x1="740" y1="440" x2="780" y2="440"/>
      <line x1="800" y1="440" x2="830" y2="440"/>
    </g>
    <text x="720" y="432" text-anchor="middle" font-size="9" fill="#E2557A">t = T + &#948;</text>

    <!-- correlation arc -->
    <path d="M 140 452 Q 440 478 720 452" fill="none" stroke="#E2557A" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="440" y="498" text-anchor="middle" font-size="11" font-weight="600" fill="#E2557A">size + timing correlation re-links Alice to news.example</text>
  </g>

  <!-- Intersection attack -->
  <text x="440" y="528" text-anchor="middle" font-size="13" font-weight="700" fill="#2A1A2E">Intersection attack shrinks the suspect set ~2x per window</text>
  <g font-size="10" fill="#2A1A2E">
    <rect x="120" y="546" width="560" height="34" fill="none" stroke="#2A1A2E" stroke-width="1" rx="4"/>
    <text x="130" y="567">N suspects</text>
    <line x1="210" y1="546" x2="210" y2="580" stroke="#2A1A2E" stroke-width="0.5"/>
    <text x="260" y="567" text-anchor="middle">N/2  (window 1)</text>
    <line x1="350" y1="546" x2="350" y2="580" stroke="#2A1A2E" stroke-width="0.5"/>
    <text x="430" y="567" text-anchor="middle">N/4  (window 2)</text>
    <line x1="510" y1="546" x2="510" y2="580" stroke="#2A1A2E" stroke-width="0.5"/>
    <text x="600" y="567" text-anchor="middle">1  (window k)</text>
  </g>
</svg>