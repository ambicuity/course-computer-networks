<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560">
  <rect width="880" height="560" fill="#FFF7EC"/>
  <style>
    .t { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .mono { font-family: monospace; fill: #2A1A2E; }
    .box { fill: #FFFFFF; stroke: #2A1A2E; stroke-width: 1.5; }
    .accent { fill: #E2557A; }
    .accentbox { fill: #FFFFFF; stroke: #E2557A; stroke-width: 2; }
    .edge { stroke: #2A1A2E; stroke-width: 1.5; fill: none; }
    .dead { fill: #f3e3e8; stroke: #E2557A; stroke-width: 1.5; }
  </style>

  <text x="32" y="40" class="t" font-size="24" font-weight="700">Who's Who in the Internet Standards World</text>
  <text x="32" y="62" class="t" font-size="13" opacity="0.7">Organizational tree (left) and the RFC lifecycle / obsolete chain (right)</text>

  <!-- LEFT: org tree -->
  <text x="32" y="96" class="t" font-size="14" font-weight="700">Governance</text>

  <rect x="32" y="108" width="150" height="42" rx="6" class="box"/>
  <text x="107" y="129" class="t" font-size="13" font-weight="700" text-anchor="middle">ISOC</text>
  <text x="107" y="144" class="t" font-size="10" text-anchor="middle" opacity="0.7">Internet Society</text>

  <path d="M107 150 L107 176" class="edge"/>
  <rect x="32" y="176" width="150" height="42" rx="6" class="box"/>
  <text x="107" y="197" class="t" font-size="13" font-weight="700" text-anchor="middle">IAB</text>
  <text x="107" y="212" class="t" font-size="10" text-anchor="middle" opacity="0.7">Architecture Board</text>

  <path d="M107 218 L107 244" class="edge"/>
  <path d="M107 244 L52 244 L52 268" class="edge"/>
  <path d="M107 244 L162 244 L162 268" class="edge"/>

  <rect x="0" y="268" width="104" height="56" rx="6" class="accentbox"/>
  <text x="52" y="290" class="accent" font-size="13" font-weight="700" text-anchor="middle">IETF</text>
  <text x="52" y="305" class="t" font-size="9" text-anchor="middle" opacity="0.75">short-term</text>
  <text x="52" y="317" class="t" font-size="9" text-anchor="middle" opacity="0.75">engineering</text>

  <rect x="114" y="268" width="104" height="56" rx="6" class="box"/>
  <text x="166" y="290" class="t" font-size="13" font-weight="700" text-anchor="middle">IRTF</text>
  <text x="166" y="305" class="t" font-size="9" text-anchor="middle" opacity="0.75">long-term</text>
  <text x="166" y="317" class="t" font-size="9" text-anchor="middle" opacity="0.75">research</text>

  <path d="M52 324 L52 350" class="edge"/>
  <rect x="0" y="350" width="218" height="40" rx="6" class="box"/>
  <text x="109" y="367" class="t" font-size="11" text-anchor="middle">&gt;100 Working Groups, grouped into Areas</text>
  <text x="109" y="382" class="t" font-size="10" text-anchor="middle" opacity="0.7">IESG (area directors) approve for publication</text>

  <rect x="0" y="404" width="218" height="64" rx="6" class="box"/>
  <text x="109" y="424" class="t" font-size="11" font-weight="700" text-anchor="middle">Output: the RFC series</text>
  <text x="109" y="441" class="mono" font-size="10" text-anchor="middle">www.ietf.org/rfc</text>
  <text x="109" y="457" class="t" font-size="10" text-anchor="middle" opacity="0.7">numbered, immutable, chronological</text>

  <text x="32" y="500" class="t" font-size="11" font-style="italic">"We reject kings, presidents, and voting.</text>
  <text x="32" y="516" class="t" font-size="11" font-style="italic">We believe in rough consensus</text>
  <text x="32" y="532" class="accent" font-size="11" font-style="italic" font-weight="700">and running code." — D. Clark, 1992</text>

  <!-- divider -->
  <line x1="270" y1="84" x2="270" y2="540" stroke="#2A1A2E" stroke-width="1" opacity="0.25"/>

  <!-- RIGHT: lifecycle ladder -->
  <text x="300" y="96" class="t" font-size="14" font-weight="700">Standards-track ladder (RFC 2026)</text>

  <rect x="300" y="110" width="540" height="40" rx="6" class="box"/>
  <text x="312" y="135" class="mono" font-size="12">Internet-Draft</text>
  <text x="470" y="135" class="t" font-size="11" opacity="0.7">work in progress — expires in 6 months</text>

  <path d="M330 150 L330 168" class="edge" marker-end="url(#arr)"/>
  <rect x="300" y="168" width="540" height="40" rx="6" class="box"/>
  <text x="312" y="193" class="mono" font-size="12">Proposed Standard</text>
  <text x="470" y="193" class="t" font-size="11" opacity="0.7">RFC + community interest (most stop here)</text>

  <path d="M330 208 L330 226" class="edge" marker-end="url(#arr)"/>
  <rect x="300" y="226" width="540" height="40" rx="6" class="box"/>
  <text x="312" y="251" class="mono" font-size="12">Draft Standard</text>
  <text x="470" y="251" class="accent" font-size="11" font-weight="700">2 independent impls, &#8805;4 months testing</text>

  <path d="M330 266 L330 284" class="edge" marker-end="url(#arr)"/>
  <rect x="300" y="284" width="540" height="40" rx="6" class="accentbox"/>
  <text x="312" y="309" class="mono" font-size="12" font-weight="700">Internet Standard</text>
  <text x="470" y="309" class="t" font-size="11" opacity="0.7">gets an STD number (RFC 6410 → 2 levels)</text>

  <!-- obsolete chain -->
  <text x="300" y="370" class="t" font-size="14" font-weight="700">Resolve the authoritative RFC (obsolete chain)</text>

  <rect x="300" y="384" width="150" height="46" rx="6" class="dead"/>
  <text x="375" y="404" class="mono" font-size="12" text-anchor="middle">RFC 793</text>
  <text x="375" y="420" class="accent" font-size="9" text-anchor="middle" font-weight="700">HISTORIC</text>

  <path d="M450 407 L500 407" class="edge" marker-end="url(#arr)"/>
  <text x="475" y="398" class="t" font-size="9" text-anchor="middle" opacity="0.7">obsoleted by</text>

  <rect x="500" y="384" width="170" height="46" rx="6" class="accentbox"/>
  <text x="585" y="404" class="mono" font-size="12" text-anchor="middle" font-weight="700">RFC 9293</text>
  <text x="585" y="420" class="t" font-size="9" text-anchor="middle" opacity="0.7">TCP — authoritative</text>

  <rect x="700" y="384" width="140" height="46" rx="6" class="box"/>
  <text x="770" y="404" class="mono" font-size="11" text-anchor="middle">RFC 2018</text>
  <text x="770" y="420" class="t" font-size="9" text-anchor="middle" opacity="0.7">updates (SACK)</text>
  <path d="M700 407 L672 407" class="edge" marker-end="url(#arr)"/>

  <text x="300" y="468" class="t" font-size="11" opacity="0.8">Never quote an RFC without reading its header:</text>
  <text x="300" y="486" class="mono" font-size="11">Category · Obsoletes · Updates · Obsoleted-By</text>
  <text x="300" y="512" class="t" font-size="11" opacity="0.8">code/main.py walks the chain and flags dead specs.</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0 L7 3 L0 6 Z" fill="#2A1A2E"/>
    </marker>
  </defs>
</svg>
