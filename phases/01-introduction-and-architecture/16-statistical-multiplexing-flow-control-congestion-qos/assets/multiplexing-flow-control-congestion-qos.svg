<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="880" height="560" fill="#FFF7EC"/>
  <text x="440" y="34" text-anchor="middle" fill="#2A1A2E" font-size="20" font-weight="700">Statistical Multiplexing, Flow Control, Congestion, and QoS</text>

  <!-- Pane 1: statistical multiplexing -->
  <text x="40" y="72" fill="#2A1A2E" font-size="14" font-weight="700">1) Statistical multiplexing — bursty flows share one link</text>
  <rect x="40" y="84" width="800" height="150" fill="none" stroke="#2A1A2E" stroke-width="1"/>

  <!-- 4 flow sources -->
  <g fill="#2A1A2E" font-size="11">
    <text x="60" y="106">flow A</text><text x="60" y="132">flow B</text>
    <text x="60" y="158">flow C</text><text x="60" y="184">flow D</text>
  </g>
  <!-- bursts (berry) where ON -->
  <g fill="#E2557A">
    <rect x="120" y="96" width="50" height="14"/><rect x="230" y="96" width="50" height="14"/>
    <rect x="175" y="122" width="55" height="14"/><rect x="340" y="122" width="50" height="14"/>
    <rect x="120" y="148" width="50" height="14"/><rect x="285" y="148" width="50" height="14"/>
    <rect x="230" y="174" width="50" height="14"/>
  </g>
  <!-- idle slots outline -->
  <g fill="none" stroke="#2A1A2E" stroke-width="0.5" opacity="0.35">
    <rect x="40" y="92" width="800" height="116"/>
  </g>
  <!-- merge arrows -->
  <line x1="420" y1="103" x2="560" y2="150" stroke="#2A1A2E" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="420" y1="129" x2="560" y2="150" stroke="#2A1A2E" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="420" y1="155" x2="560" y2="150" stroke="#2A1A2E" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="420" y1="181" x2="560" y2="150" stroke="#2A1A2E" stroke-width="1" marker-end="url(#arr)"/>
  <!-- buffer queue + link -->
  <rect x="575" y="138" width="40" height="26" fill="#FFF7EC" stroke="#2A1A2E"/>
  <text x="620" y="142" fill="#2A1A2E" font-size="10">FIFO</text>
  <text x="620" y="156" fill="#2A1A2E" font-size="10">buffer</text>
  <rect x="690" y="138" width="110" height="26" fill="#E2557A"/>
  <text x="745" y="156" text-anchor="middle" fill="#FFF7EC" font-size="12" font-weight="700">link C </text>
  <text x="690" y="186" fill="#2A1A2E" font-size="11">link sized for avg load  Σ N·p=0.4C  (not sum of peaks)</text>

  <!-- Pane 2: sliding window -->
  <text x="40" y="264" fill="#2A1A2E" font-size="14" font-weight="700">2) Sliding-window flow control — W=4, seq mod 8</text>
  <rect x="40" y="276" width="800" height="80" fill="none" stroke="#2A1A2E" stroke-width="1"/>
  <text x="50" y="306" fill="#2A1A2E" font-size="11">seq:</text>
  <g font-size="11">
    <rect x="100" y="298" width="40" height="22" fill="#E2557A"/><text x="120" y="314" text-anchor="middle" fill="#FFF7EC">0</text>
    <rect x="140" y="298" width="40" height="22" fill="#E2557A"/><text x="160" y="314" text-anchor="middle" fill="#FFF7EC">1</text>
    <rect x="180" y="298" width="40" height="22" fill="#E2557A"/><text x="200" y="314" text-anchor="middle" fill="#FFF7EC">2</text>
    <rect x="220" y="298" width="40" height="22" fill="#E2557A"/><text x="240" y="314" text-anchor="middle" fill="#FFF7EC">3</text>
    <rect x="260" y="298" width="40" height="22" fill="none" stroke="#2A1A2E"/><text x="280" y="314" text-anchor="middle" fill="#2A1A2E">4</text>
    <rect x="300" y="298" width="40" height="22" fill="none" stroke="#2A1A2E"/><text x="320" y="314" text-anchor="middle" fill="#2A1A2E">5</text>
    <rect x="340" y="298" width="40" height="22" fill="none" stroke="#2A1A2E"/><text x="360" y="314" text-anchor="middle" fill="#2A1A2E">6</text>
    <rect x="380" y="298" width="40" height="22" fill="none" stroke="#2A1A2E"/><text x="400" y="314" text-anchor="middle" fill="#2A1A2E">7</text>
  </g>
  <line x1="100" y1="330" x2="260" y2="330" stroke="#2A1A2E" stroke-width="2"/>
  <text x="100" y="348" fill="#2A1A2E" font-size="10">base=0</text>
  <text x="180" y="348" text-anchor="middle" fill="#E2557A" font-size="10" font-weight="700">window W=4 (0..3 in flight)</text>
  <text x="260" y="348" text-anchor="middle" fill="#2A1A2E" font-size="10">next_seq=4</text>
  <text x="470" y="314" fill="#2A1A2E" font-size="11">ACK slides base → window advances.  W==2^k ⇒ deadlock.</text>

  <!-- Pane 3: AIMD sawtooth -->
  <text x="40" y="384" fill="#2A1A2E" font-size="14" font-weight="700">3) AIMD congestion control — additive up, /2 on loss</text>
  <rect x="40" y="396" width="800" height="120" fill="none" stroke="#2A1A2E" stroke-width="1"/>
  <line x1="60" y1="396" x2="60" y2="516" stroke="#2A1A2E" stroke-width="1"/>
  <line x1="60" y1="516" x2="840" y2="516" stroke="#2A1A2E" stroke-width="1"/>
  <text x="42" y="406" fill="#2A1A2E" font-size="10" text-anchor="end">cwnd</text>
  <text x="56" y="520" fill="#2A1A2E" font-size="10">RTT→</text>
  <!-- sawtooth polyline -->
  <polyline points="60,500 90,490 120,480 150,470 180,460 220,450 280,456 320,446 360,436 400,426 440,416 480,406 540,456 580,446 620,436 660,426 700,416 760,446 800,436" fill="none" stroke="#E2557A" stroke-width="2"/>
  <!-- loss markers -->
  <text x="540" y="448" fill="#2A1A2E" font-size="10">LOSS /2</text>
  <circle cx="540" cy="456" r="3" fill="#2A1A2E"/>
  <circle cx="760" cy="446" r="3" fill="#2A1A2E"/>
  <text x="220" y="470" fill="#2A1A2E" font-size="10">+1 MMS / RTT</text>

  <!-- Pane 4: WFQ -->
  <text x="40" y="544" fill="#2A1A2E" font-size="14" font-weight="700">4) QoS — WFQ gives video weight 4, voice 2, bulk 1 (leftover for bulk)</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#2A1A2E"/>
    </marker>
  </defs>
</svg>
