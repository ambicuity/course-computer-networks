<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" width="880" height="620" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="880" height="620" fill="#FFF7EC"/>

  <text x="440" y="34" text-anchor="middle" fill="#2A1A2E" font-size="18" font-weight="700">The Six-Primitive Client-Server Exchange (Fig. 1-18)</text>
  <text x="440" y="54" text-anchor="middle" fill="#2A1A2E" font-size="12" opacity="0.75">Six acknowledged datagrams over a connection-oriented service. Shaded bars = process Blocked in a primitive.</text>

  <!-- Two time axes -->
  <line x1="170" y1="80" x2="170" y2="560" stroke="#2A1A2E" stroke-width="2"/>
  <line x1="710" y1="80" x2="710" y2="560" stroke="#2A1A2E" stroke-width="2"/>
  <text x="170" y="74" text-anchor="middle" fill="#2A1A2E" font-size="13" font-weight="600">Client process</text>
  <text x="710" y="74" text-anchor="middle" fill="#2A1A2E" font-size="13" font-weight="600">Server process</text>

  <!-- Blocked bars (kernel-suspended state) -->
  <rect x="130" y="100" width="80" height="46" fill="#E2557A" opacity="0.18" stroke="#E2557A" stroke-dasharray="4 3"/>
  <text x="170" y="118" text-anchor="middle" fill="#2A1A2E" font-size="11">CONNECT</text>
  <text x="170" y="132" text-anchor="middle" fill="#2A1A2E" font-size="9" opacity="0.7">blocked</text>

  <rect x="670" y="92" width="80" height="30" fill="#E2557A" opacity="0.18" stroke="#E2557A" stroke-dasharray="4 3"/>
  <text x="710" y="112" text-anchor="middle" fill="#2A1A2E" font-size="11">LISTEN</text>

  <rect x="670" y="190" width="80" height="40" fill="#E2557A" opacity="0.18" stroke="#E2557A" stroke-dasharray="4 3"/>
  <text x="710" y="214" text-anchor="middle" fill="#2A1A2E" font-size="11">RECEIVE</text>

  <rect x="670" y="410" width="80" height="36" fill="#E2557A" opacity="0.18" stroke="#E2557A" stroke-dasharray="4 3"/>
  <text x="710" y="432" text-anchor="middle" fill="#2A1A2E" font-size="11">RECEIVE</text>

  <rect x="130" y="270" width="80" height="34" fill="#E2557A" opacity="0.18" stroke="#E2557A" stroke-dasharray="4 3"/>
  <text x="170" y="291" text-anchor="middle" fill="#2A1A2E" font-size="10">RECEIVE</text>

  <rect x="130" y="470" width="80" height="34" fill="#E2557A" opacity="0.18" stroke="#E2557A" stroke-dasharray="4 3"/>
  <text x="170" y="491" text-anchor="middle" fill="#2A1A2E" font-size="10">DISCONNECT</text>

  <!-- Step 1: CONNECT request  client -> server -->
  <line x1="190" y1="116" x2="690" y2="116" stroke="#E2557A" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="110" text-anchor="middle" fill="#2A1A2E" font-size="11">(1) CONNECT request</text>
  <text x="440" y="124" text-anchor="middle" fill="#2A1A2E" font-size="9" opacity="0.7">unblocks LISTEN</text>

  <!-- Step 2: ACCEPT response  server -> client (dashed = ack)-->
  <line x1="690" y1="150" x2="210" y2="150" stroke="#2A1A2E" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrk)"/>
  <text x="440" y="144" text-anchor="middle" fill="#2A1A2E" font-size="11">(2) ACCEPT response  connection established</text>
  <text x="440" y="159" text-anchor="middle" fill="#2A1A2E" font-size="9" opacity="0.7">unblocks CONNECT</text>

  <!-- server issues RECEIVE immediately -->
  <text x="714" y="182" fill="#2A1A2E" font-size="9" opacity="0.6">server calls RECEIVE before (2) returns</text>

  <!-- Step 3: data request client -> server -->
  <line x1="190" y1="240" x2="690" y2="240" stroke="#E2557A" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="234" text-anchor="middle" fill="#2A1A2E" font-size="11">(3) SEND  request for data</text>
  <text x="440" y="248" text-anchor="middle" fill="#2A1A2E" font-size="9" opacity="0.7">unblocks RECEIVE</text>

  <!-- Step 4: reply server -> client -->
  <line x1="690" y1="308" x2="210" y2="308" stroke="#2A1A2E" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrk)"/>
  <text x="440" y="302" text-anchor="middle" fill="#2A1A2E" font-size="11">(4) SEND  reply</text>
  <text x="440" y="316" text-anchor="middle" fill="#2A1A2E" font-size="9" opacity="0.7">unblocks client RECEIVE</text>

  <!-- Step 5: DISCONNECT client -> server -->
  <line x1="190" y1="448" x2="690" y2="448" stroke="#E2557A" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="442" text-anchor="middle" fill="#2A1A2E" font-size="11">(5) DISCONNECT  I am done</text>
  <text x="440" y="456" text-anchor="middle" fill="#2A1A2E" font-size="9" opacity="0.7">unblocks server RECEIVE</text>

  <!-- Step 6: disconnect ack server -> client -->
  <line x1="690" y1="540" x2="210" y2="540" stroke="#2A1A2E" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrk)"/>
  <text x="440" y="534" text-anchor="middle" fill="#2A1A2E" font-size="11">(6) DISCONNECT ack  client released</text>

  <!-- Legend -->
  <line x1="60" y1="588" x2="100" y2="588" stroke="#E2557A" stroke-width="2" marker-end="url(#arr)"/>
  <text x="106" y="592" fill="#2A1A2E" font-size="10">data / control packet</text>
  <line x1="270" y1="588" x2="310" y2="588" stroke="#2A1A2E" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrk)"/>
  <text x="316" y="592" fill="#2A1A2E" font-size="10">acknowledgement</text>
  <rect x="470" y="582" width="22" height="12" fill="#E2557A" opacity="0.18" stroke="#E2557A" stroke-dasharray="4 3"/>
  <text x="498" y="592" fill="#2A1A2E" font-size="10">process blocked in a primitive (kernel suspends it)</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E2557A"/>
    </marker>
    <marker id="arrk" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2A1A2E"/>
    </marker>
  </defs>
</svg>