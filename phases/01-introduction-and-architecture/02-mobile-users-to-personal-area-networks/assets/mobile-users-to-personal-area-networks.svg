<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" height="560">
  <rect width="760" height="560" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, system-ui, sans-serif; fill: #2A1A2E; }
    .title { font-size: 20px; font-weight: 700; }
    .h { font-size: 14px; font-weight: 700; }
    .lbl { font-size: 12px; }
    .small { font-size: 10px; fill: #6b5563; }
    .mono { font-family: ui-monospace, monospace; font-size: 11px; }
    .edge { stroke: #2A1A2E; stroke-width: 1.5; }
    .berry { fill: #E2557A; }
    .berryStroke { stroke: #E2557A; stroke-width: 2; }
  </style>

  <text x="30" y="36" class="title">Personal Area Network: the Bluetooth piconet</text>
  <text x="30" y="56" class="small">IEEE 802.15.1 &#183; master/slave &#183; AM_ADDR 3-bit (1..7) &#183; 79 x 1 MHz, 1600 hops/s, 625 us/slot</text>

  <!-- ===== Piconet topology (left) ===== -->
  <text x="30" y="92" class="h">Piconet (1 master + up to 7 active slaves)</text>

  <!-- master -->
  <rect x="150" y="190" width="120" height="56" rx="8" fill="#2A1A2E"/>
  <text x="210" y="214" text-anchor="middle" class="lbl" fill="#FFF7EC">MASTER</text>
  <text x="210" y="232" text-anchor="middle" class="mono" fill="#FFF7EC">clock + hop seq</text>

  <!-- slaves around master -->
  <!-- s1 -->
  <line x1="210" y1="190" x2="80" y2="120" class="edge"/>
  <rect x="30" y="100" width="100" height="40" rx="6" fill="#fff" class="berryStroke"/>
  <text x="80" y="118" text-anchor="middle" class="lbl">mouse</text>
  <text x="80" y="132" text-anchor="middle" class="mono berry">AM 001</text>
  <!-- s2 -->
  <line x1="210" y1="190" x2="80" y2="200" class="edge"/>
  <rect x="30" y="182" width="100" height="40" rx="6" fill="#fff" class="berryStroke"/>
  <text x="80" y="200" text-anchor="middle" class="lbl">keyboard</text>
  <text x="80" y="214" text-anchor="middle" class="mono berry">AM 010</text>
  <!-- s3 -->
  <line x1="210" y1="246" x2="80" y2="300" class="edge"/>
  <rect x="30" y="282" width="100" height="40" rx="6" fill="#fff" class="berryStroke"/>
  <text x="80" y="300" text-anchor="middle" class="lbl">headset</text>
  <text x="80" y="314" text-anchor="middle" class="mono berry">AM 011</text>
  <!-- s4 -->
  <line x1="270" y1="200" x2="370" y2="120" class="edge"/>
  <rect x="320" y="100" width="100" height="40" rx="6" fill="#fff" class="berryStroke"/>
  <text x="370" y="118" text-anchor="middle" class="lbl">controller</text>
  <text x="370" y="132" text-anchor="middle" class="mono berry">AM 100</text>
  <!-- s5..7 collapsed -->
  <line x1="270" y1="226" x2="370" y2="226" class="edge"/>
  <rect x="320" y="206" width="100" height="40" rx="6" fill="#fff" class="berryStroke"/>
  <text x="370" y="224" text-anchor="middle" class="lbl">+3 slaves</text>
  <text x="370" y="238" text-anchor="middle" class="mono berry">AM 101..111</text>

  <!-- parked / rejected -->
  <line x1="270" y1="246" x2="370" y2="310" stroke="#6b5563" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="320" y="292" width="120" height="44" rx="6" fill="#FFF7EC" stroke="#6b5563" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="380" y="310" text-anchor="middle" class="lbl">8th device</text>
  <text x="380" y="324" text-anchor="middle" class="small">park -&gt; PM 1..255, or reject</text>

  <text x="30" y="372" class="small">000 reserved for broadcast &#8594; only 7 usable active addresses.</text>

  <!-- ===== Wireless vs Mobile 2x2 (right) ===== -->
  <text x="470" y="92" class="h">Wireless &#8800; Mobile</text>
  <g transform="translate(470,104)">
    <rect x="60" y="0" width="110" height="44" fill="#fff" stroke="#2A1A2E"/>
    <rect x="170" y="0" width="110" height="44" fill="#fff" stroke="#2A1A2E"/>
    <rect x="60" y="44" width="110" height="44" fill="#fff" stroke="#2A1A2E"/>
    <rect x="170" y="44" width="110" height="44" fill="#FCE4EC" stroke="#E2557A" stroke-width="2"/>
    <text x="115" y="-6" text-anchor="middle" class="small">fixed</text>
    <text x="225" y="-6" text-anchor="middle" class="small">mobile</text>
    <text x="54" y="26" text-anchor="end" class="small">wired</text>
    <text x="54" y="70" text-anchor="end" class="small">wireless</text>
    <text x="115" y="28" text-anchor="middle" class="small">office desktop</text>
    <text x="225" y="28" text-anchor="middle" class="small">hotel notebook</text>
    <text x="115" y="72" text-anchor="middle" class="small">home Wi-Fi PC</text>
    <text x="225" y="72" text-anchor="middle" class="small">handheld scanner</text>
  </g>
  <text x="470" y="232" class="small">Quadrants are independent: wired-mobile and</text>
  <text x="470" y="246" class="small">wireless-fixed both exist.</text>

  <!-- scale ladder -->
  <text x="470" y="288" class="h">Scale</text>
  <text x="470" y="310" class="lbl"><tspan class="berry" font-weight="700">1 m</tspan>  PAN  (this lesson)</text>
  <text x="470" y="328" class="small">100 m  LAN &#183; 10 km  MAN &#183; 1000 km  WAN</text>

  <!-- ===== FHSS timeline (bottom) ===== -->
  <text x="30" y="420" class="h">Frequency-hopping time slots (TDD)</text>
  <text x="30" y="438" class="small">even slot = master, odd slot = slave; new channel (0..78) every 625 us</text>

  <g transform="translate(30,452)">
    <!-- slots -->
    <rect x="0"   y="0" width="84" height="40" fill="#2A1A2E"/>
    <rect x="88"  y="0" width="84" height="40" class="berry"/>
    <rect x="176" y="0" width="84" height="40" fill="#2A1A2E"/>
    <rect x="264" y="0" width="84" height="40" class="berry"/>
    <rect x="352" y="0" width="84" height="40" fill="#2A1A2E"/>
    <rect x="440" y="0" width="84" height="40" class="berry"/>

    <text x="42"  y="18" text-anchor="middle" class="lbl" fill="#FFF7EC">slot 0 M</text>
    <text x="42"  y="33" text-anchor="middle" class="mono" fill="#FFF7EC">ch 25</text>
    <text x="130" y="18" text-anchor="middle" class="lbl" fill="#FFF7EC">slot 1 S</text>
    <text x="130" y="33" text-anchor="middle" class="mono" fill="#FFF7EC">ch 78</text>
    <text x="218" y="18" text-anchor="middle" class="lbl" fill="#FFF7EC">slot 2 M</text>
    <text x="218" y="33" text-anchor="middle" class="mono" fill="#FFF7EC">ch 2</text>
    <text x="306" y="18" text-anchor="middle" class="lbl" fill="#FFF7EC">slot 3 S</text>
    <text x="306" y="33" text-anchor="middle" class="mono" fill="#FFF7EC">ch 55</text>
    <text x="394" y="18" text-anchor="middle" class="lbl" fill="#FFF7EC">slot 4 M</text>
    <text x="394" y="33" text-anchor="middle" class="mono" fill="#FFF7EC">ch 58</text>
    <text x="482" y="18" text-anchor="middle" class="lbl" fill="#FFF7EC">slot 5 S</text>
    <text x="482" y="33" text-anchor="middle" class="mono" fill="#FFF7EC">ch 61</text>

    <line x1="0" y1="52" x2="524" y2="52" class="edge"/>
    <text x="0"   y="66" class="small">0 us</text>
    <text x="250" y="66" text-anchor="middle" class="small">&#8592; 625 us per slot &#8594;</text>
    <text x="524" y="66" text-anchor="end" class="small">3125 us</text>
  </g>
</svg>
