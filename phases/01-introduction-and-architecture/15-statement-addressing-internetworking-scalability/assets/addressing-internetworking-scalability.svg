<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="880" height="560" fill="#FFF7EC"/>

  <text x="40" y="44" fill="#2A1A2E" font-size="22" font-weight="700">IPv4 Fragmentation of a 4000-byte datagram (MTU 1500)</text>
  <text x="40" y="66" fill="#2A1A2E" font-size="13" opacity="0.7">Original = 20 B IP header + 3980 B payload. Each fragment adds its own 20 B header; offset field is in 8-byte units.</text>

  <!-- Original datagram -->
  <g transform="translate(40,96)">
    <rect width="800" height="40" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <rect x="0" y="0" width="40" height="40" fill="#E2557A"/>
    <rect x="40" y="0" width="760" height="40" fill="#2A1A2E" opacity="0.10"/>
    <text x="20" y="25" fill="#FFF7EC" font-size="12" text-anchor="middle">IP</text>
    <text x="20" y="58" fill="#2A1A2E" font-size="11" text-anchor="middle">20 B</text>
    <text x="420" y="25" fill="#2A1A2E" font-size="12" text-anchor="middle">payload 3980 B (id=0x1234, MF=0, offset=0)</text>
    <text x="420" y="58" fill="#2A1A2E" font-size="11" text-anchor="middle">3980 B</text>
  </g>

  <!-- Arrow down -->
  <line x1="440" y1="170" x2="440" y2="200" stroke="#E2557A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Fragment 1 -->
  <g transform="translate(40,210)">
    <text x="0" y="-6" fill="#2A1A2E" font-size="12" font-weight="600">Fragment 1</text>
    <rect width="300" height="40" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <rect x="0" y="0" width="40" height="40" fill="#E2557A"/>
    <rect x="40" y="0" width="260" height="40" fill="#2A1A2E" opacity="0.10"/>
    <text x="20" y="25" fill="#FFF7EC" font-size="11" text-anchor="middle">IP</text>
    <text x="170" y="25" fill="#2A1A2E" font-size="11" text-anchor="middle">1480 B</text>
    <text x="0" y="58" fill="#2A1A2E" font-size="11">total=1500  offset=0  MF=1</text>
  </g>

  <!-- Fragment 2 -->
  <g transform="translate(40,300)">
    <text x="0" y="-6" fill="#2A1A2E" font-size="12" font-weight="600">Fragment 2</text>
    <rect width="300" height="40" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <rect x="0" y="0" width="40" height="40" fill="#E2557A"/>
    <rect x="40" y="0" width="260" height="40" fill="#2A1A2E" opacity="0.10"/>
    <text x="20" y="25" fill="#FFF7EC" font-size="11" text-anchor="middle">IP</text>
    <text x="170" y="25" fill="#2A1A2E" font-size="11" text-anchor="middle">1480 B</text>
    <text x="0" y="58" fill="#2A1A2E" font-size="11">total=1500  offset=185  MF=1   (185*8 = 1480)</text>
  </g>

  <!-- Fragment 3 -->
  <g transform="translate(40,390)">
    <text x="0" y="-6" fill="#2A1A2E" font-size="12" font-weight="600">Fragment 3 (last)</text>
    <rect width="224" height="40" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <rect x="0" y="0" width="40" height="40" fill="#E2557A"/>
    <rect x="40" y="0" width="184" height="40" fill="#2A1A2E" opacity="0.10"/>
    <text x="20" y="25" fill="#FFF7EC" font-size="11" text-anchor="middle">IP</text>
    <text x="132" y="25" fill="#2A1A2E" font-size="11" text-anchor="middle">1020 B</text>
    <text x="0" y="58" fill="#2A1A2E" font-size="11">total=1040  offset=370  MF=0   (370*8 = 2960)</text>
  </g>

  <!-- Reassembly box -->
  <g transform="translate(380,300)">
    <rect x="0" y="0" width="460" height="180" rx="8" fill="none" stroke="#E2557A" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="14" y="24" fill="#E2557A" font-size="13" font-weight="700">Reassembly (RFC 815)</text>
    <text x="14" y="48" fill="#2A1A2E" font-size="12">key: (src, dst, id=0x1234, proto=17)</text>
    <text x="14" y="70" fill="#2A1A2E" font-size="12">1. buffer fragments by offset (8 B units)</text>
    <text x="14" y="90" fill="#2A1A2E" font-size="12">2. reject overlaps; fill the hole list</text>
    <text x="14" y="110" fill="#2A1A2E" font-size="12">3. wait for MF=0 fragment + contiguous</text>
    <text x="14" y="130" fill="#2A1A2E" font-size="12">4. timer (RFC 791 ~30-60 s); else drop all</text>
    <text x="14" y="160" fill="#E2557A" font-size="12" font-weight="600">=> 3980 B payload, byte-identical to original</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40,500)">
    <rect width="16" height="16" fill="#E2557A"/>
    <text x="24" y="13" fill="#2A1A2E" font-size="12">20-byte IPv4 header (per fragment)</text>
    <rect x="240" width="16" height="16" fill="#2A1A2E" opacity="0.10"/>
    <rect x="240" width="16" height="16" fill="none" stroke="#2A1A2E" stroke-width="1"/>
    <text x="264" y="13" fill="#2A1A2E" font-size="12">payload region (offset field counts 8-byte units)</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#E2557A"/>
    </marker>
  </defs>
</svg>
