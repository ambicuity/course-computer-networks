<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <rect width="760" height="460" fill="#FFF7EC"/>
  <text x="380" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2A1A2E">Max-Min Fair Allocation &amp; AIMD Convergence</text>
  <text x="380" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2A1A2E" font-style="italic">Tanenbaum Sec. 6.3.1 - 6.3.2 - four flows A,B,C,D on six unit-capacity links</text>

  <!-- Topology: R1-R2, R2-R3, R4-R5, R5-R6 with flows -->
  <g font-family="Georgia, serif" font-size="12" fill="#2A1A2E">
    <!-- Routers -->
    <circle cx="120" cy="150" r="22" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
    <text x="120" y="155" text-anchor="middle" fill="#FFF7EC" font-weight="bold">R1</text>
    <circle cx="320" cy="150" r="22" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
    <text x="320" y="155" text-anchor="middle" fill="#FFF7EC" font-weight="bold">R2</text>
    <circle cx="520" cy="150" r="22" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
    <text x="520" y="155" text-anchor="middle" fill="#FFF7EC" font-weight="bold">R3</text>
    <circle cx="120" cy="320" r="22" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
    <text x="120" y="325" text-anchor="middle" fill="#FFF7EC" font-weight="bold">R4</text>
    <circle cx="320" cy="320" r="22" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
    <text x="320" y="325" text-anchor="middle" fill="#FFF7EC" font-weight="bold">R5</text>
    <circle cx="520" cy="320" r="22" fill="#E2557A" stroke="#2A1A2E" stroke-width="2"/>
    <text x="520" y="325" text-anchor="middle" fill="#FFF7EC" font-weight="bold">R6</text>

    <!-- Links -->
    <line x1="142" y1="150" x2="298" y2="150" stroke="#2A1A2E" stroke-width="2"/>
    <line x1="342" y1="150" x2="498" y2="150" stroke="#2A1A2E" stroke-width="2"/>
    <line x1="142" y1="320" x2="298" y2="320" stroke="#2A1A2E" stroke-width="2"/>
    <line x1="342" y1="320" x2="498" y2="320" stroke="#2A1A2E" stroke-width="2"/>
    <line x1="120" y1="172" x2="120" y2="298" stroke="#2A1A2E" stroke-width="2"/>
    <line x1="520" y1="172" x2="520" y2="298" stroke="#2A1A2E" stroke-width="2"/>

    <!-- Link labels -->
    <text x="220" y="140" text-anchor="middle" fill="#E2557A" font-weight="bold">R1-R2 (A)</text>
    <text x="420" y="140" text-anchor="middle" fill="#E2557A" font-weight="bold">R2-R3 (A,B)</text>
    <text x="220" y="345" text-anchor="middle" fill="#E2557A" font-weight="bold">R4-R5 (B,C,D)</text>
    <text x="420" y="345" text-anchor="middle" fill="#E2557A" font-weight="bold">R5-R6 (C,D)</text>

    <!-- Flow lines -->
    <path d="M 90 130 Q 90 90 95 90 L 545 90 L 545 130" fill="none" stroke="#E2557A" stroke-width="2.5" stroke-dasharray="6 3"/>
    <text x="60" y="93" text-anchor="end" fill="#E2557A" font-weight="bold">A: 2/3</text>

    <path d="M 90 360 Q 90 400 95 400 L 545 400 L 545 360" fill="none" stroke="#2A1A2E" stroke-width="2.5" stroke-dasharray="6 3"/>
    <text x="60" y="403" text-anchor="end" fill="#2A1A2E" font-weight="bold">B: 1/3</text>

    <path d="M 320 342 Q 320 380 360 380 L 480 380 L 480 342" fill="none" stroke="#2A1A2E" stroke-width="2.5" stroke-dasharray="6 3"/>
    <text x="290" y="395" text-anchor="end" fill="#2A1A2E" font-weight="bold">C: 1/3</text>

    <path d="M 320 298 Q 320 280 360 280 L 480 280 L 480 298" fill="none" stroke="#2A1A2E" stroke-width="2.5" stroke-dasharray="6 3"/>
    <text x="290" y="270" text-anchor="end" fill="#2A1A2E" font-weight="bold">D: 1/3</text>
  </g>

  <!-- AIMD convergence panel -->
  <g>
    <rect x="580" y="100" width="160" height="320" fill="white" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="660" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2A1A2E">AIMD sawtooth</text>
    <text x="660" y="142" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2A1A2E">cwnd vs. time</text>

    <!-- Sawtooth path -->
    <polyline points="600,360 620,300 640,250 660,210 680,180 690,150 700,140 705,260 710,280 715,220 720,200 725,180 730,170" fill="none" stroke="#E2557A" stroke-width="2"/>

    <line x1="595" y1="380" x2="735" y2="380" stroke="#2A1A2E" stroke-width="1"/>
    <line x1="595" y1="140" x2="595" y2="380" stroke="#2A1A2E" stroke-width="1"/>

    <text x="600" y="395" font-family="Georgia, serif" font-size="9" fill="#2A1A2E">t = 0</text>
    <text x="725" y="395" font-family="Georgia, serif" font-size="9" fill="#2A1A2E" text-anchor="end">time</text>
    <text x="588" y="155" text-anchor="end" font-family="Georgia, serif" font-size="9" fill="#2A1A2E">cwnd</text>

    <text x="660" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#2A1A2E" font-style="italic">halve on loss (MD)</text>
    <text x="660" y="422" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#2A1A2E" font-style="italic">+1/RTT (AI)</text>
  </g>

  <!-- Caption -->
  <text x="380" y="448" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2A1A2E" font-style="italic">Spare capacity on R1-R2 (1/3 unused) and R5-R6 (1/3 unused) cannot be given to A,B,C,D without hurting a smaller flow.</text>
</svg>
