<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <rect width="760" height="460" fill="#FFF7EC"/>
  <text x="380" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2A1A2E">RPC Five-Step Flow &amp; RTP Header</text>
  <text x="380" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#2A1A2E">Tanenbaum Sec. 6.4.2 (RPC, Birrell-Nelson 1984) and 6.4.3 (RTP, RFC 3550)</text>

  <!-- RPC five-step -->
  <g font-family="Georgia, serif" font-size="11" fill="#2A1A2E">
    <rect x="40" y="80" width="170" height="320" fill="white" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="125" y="100" text-anchor="middle" font-weight="bold">Client CPU</text>

    <rect x="60" y="115" width="130" height="35" fill="#E2557A" stroke="#2A1A2E" stroke-width="1"/>
    <text x="125" y="137" text-anchor="middle" font-weight="bold" fill="#FFF7EC">Client App</text>

    <rect x="60" y="160" width="130" height="35" fill="#2A1A2E" stroke="#2A1A2E" stroke-width="1"/>
    <text x="125" y="182" text-anchor="middle" font-weight="bold" fill="#FFF7EC">Client Stub</text>

    <rect x="60" y="205" width="130" height="35" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="125" y="227" text-anchor="middle">Marshaling</text>

    <rect x="60" y="250" width="130" height="35" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="125" y="272" text-anchor="middle">send() syscall</text>

    <rect x="60" y="295" width="130" height="35" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="125" y="317" text-anchor="middle">recv() syscall</text>

    <rect x="60" y="340" width="130" height="35" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="125" y="362" text-anchor="middle">Unmarshaling</text>
  </g>

  <g font-family="Georgia, serif" font-size="11" fill="#2A1A2E">
    <rect x="550" y="80" width="170" height="320" fill="white" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="635" y="100" text-anchor="middle" font-weight="bold">Server CPU</text>

    <rect x="570" y="115" width="130" height="35" fill="#E2557A" stroke="#2A1A2E" stroke-width="1"/>
    <text x="635" y="137" text-anchor="middle" font-weight="bold" fill="#FFF7EC">Server App</text>

    <rect x="570" y="160" width="130" height="35" fill="#2A1A2E" stroke="#2A1A2E" stroke-width="1"/>
    <text x="635" y="182" text-anchor="middle" font-weight="bold" fill="#FFF7EC">Server Stub</text>

    <rect x="570" y="205" width="130" height="35" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="635" y="227" text-anchor="middle">Unmarshaling</text>

    <rect x="570" y="250" width="130" height="35" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="635" y="272" text-anchor="middle">recv() syscall</text>

    <rect x="570" y="295" width="130" height="35" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="635" y="317" text-anchor="middle">send() syscall</text>

    <rect x="570" y="340" width="130" height="35" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="635" y="362" text-anchor="middle">Marshaling</text>
  </g>

  <!-- Network between -->
  <g>
    <rect x="220" y="150" width="320" height="55" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="6 3"/>
    <text x="380" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2A1A2E">Network (UDP/IP)</text>
    <text x="380" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#E2557A">steps 3 and 4 (transmit + deliver)</text>
  </g>

  <!-- Step numbers -->
  <g font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#E2557A">
    <circle cx="42" cy="132" r="11" fill="#E2557A"/>
    <text x="42" y="137" text-anchor="middle" fill="#FFF7EC">1</text>
    <circle cx="552" cy="377" r="11" fill="#E2557A"/>
    <text x="552" y="382" text-anchor="middle" fill="#FFF7EC">2</text>
    <circle cx="380" cy="155" r="11" fill="#E2557A"/>
    <text x="380" y="160" text-anchor="middle" fill="#FFF7EC">3</text>
    <circle cx="380" cy="200" r="11" fill="#E2557A"/>
    <text x="380" y="205" text-anchor="middle" fill="#FFF7EC">4</text>
    <circle cx="552" cy="132" r="11" fill="#E2557A"/>
    <text x="552" y="137" text-anchor="middle" fill="#FFF7EC">5</text>
  </g>

  <!-- RTP header -->
  <g>
    <text x="40" y="425" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2A1A2E">RTP header (RFC 3550): 12-byte minimum</text>
    <g font-family="Georgia, serif" font-size="10" fill="#2A1A2E">
      <rect x="40" y="432" width="50" height="22" fill="#E2557A" stroke="#2A1A2E" stroke-width="1"/>
      <text x="65" y="446" text-anchor="middle" font-weight="bold" fill="#FFF7EC">V=2</text>
      <rect x="90" y="432" width="20" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
      <text x="100" y="446" text-anchor="middle">P</text>
      <rect x="110" y="432" width="20" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
      <text x="120" y="446" text-anchor="middle">X</text>
      <rect x="130" y="432" width="40" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
      <text x="150" y="446" text-anchor="middle">CC</text>
      <rect x="170" y="432" width="20" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
      <text x="180" y="446" text-anchor="middle">M</text>
      <rect x="190" y="432" width="50" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
      <text x="215" y="446" text-anchor="middle">PT(7)</text>
      <rect x="240" y="432" width="80" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
      <text x="280" y="446" text-anchor="middle">Sequence(16)</text>
      <rect x="320" y="432" width="100" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
      <text x="370" y="446" text-anchor="middle">Timestamp(32)</text>
      <rect x="420" y="432" width="100" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
      <text x="470" y="446" text-anchor="middle">SSRC(32)</text>
      <rect x="520" y="432" width="200" height="22" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
      <text x="620" y="446" text-anchor="middle">CSRC list + payload</text>
    </g>
  </g>
</svg>
