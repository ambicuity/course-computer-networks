<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" height="560">
  <rect x="0" y="0" width="760" height="560" fill="#FFF7EC"/>
  <style>
    .title { font-family: Inter, sans-serif; font-weight: 700; fill: #2A1A2E; }
    .label { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .mono  { font-family: monospace; fill: #2A1A2E; }
    .accent{ font-family: Inter, sans-serif; font-weight: 700; fill: #E2557A; }
    .box   { fill: #FFFFFF; stroke: #2A1A2E; stroke-width: 1.5; }
    .pass  { fill: #FBE6EC; stroke: #E2557A; stroke-width: 1.5; }
  </style>

  <text x="32" y="40" class="title" font-size="22">Trace Annotation Runbook</text>
  <text x="32" y="62" class="label" font-size="13">From a raw .pcap to a one-line verdict in four passes</text>

  <!-- Funnel boxes -->
  <rect x="32" y="86" width="240" height="62" rx="6" class="pass"/>
  <text x="48" y="110" class="accent" font-size="13">PASS 1 · Orient</text>
  <text x="48" y="130" class="mono" font-size="11">Conversations · Protocol Hierarchy</text>
  <text x="48" y="143" class="mono" font-size="11">+ name resolution &#8594; suspect 5-tuple</text>

  <rect x="32" y="164" width="240" height="62" rx="6" class="pass"/>
  <text x="48" y="188" class="accent" font-size="13">PASS 2 · Handshake</text>
  <text x="48" y="208" class="mono" font-size="11">t(SYN-ACK) &#8722; t(SYN)</text>
  <text x="48" y="221" class="mono" font-size="11">= RTT baseline</text>

  <rect x="32" y="242" width="240" height="62" rx="6" class="pass"/>
  <text x="48" y="266" class="accent" font-size="13">PASS 3 · Anomalies</text>
  <text x="48" y="286" class="mono" font-size="11">retransmission · dup-ACK</text>
  <text x="48" y="299" class="mono" font-size="11">zero-window · RST</text>

  <rect x="32" y="320" width="240" height="62" rx="6" class="pass"/>
  <text x="48" y="344" class="accent" font-size="13">PASS 4 · Time math</text>
  <text x="48" y="364" class="mono" font-size="11">phase deltas &#8594; dominant cost</text>
  <text x="48" y="377" class="mono" font-size="11">DNS / RTT / TLS / server</text>

  <rect x="32" y="404" width="240" height="44" rx="6" class="box"/>
  <text x="48" y="424" class="title" font-size="13">Verdict + evidence</text>
  <text x="48" y="440" class="mono" font-size="11">"server think = 1.2s, app owns it"</text>

  <!-- arrows down the funnel -->
  <g stroke="#E2557A" stroke-width="2" fill="none">
    <line x1="152" y1="148" x2="152" y2="162"/>
    <line x1="152" y1="226" x2="152" y2="240"/>
    <line x1="152" y1="304" x2="152" y2="318"/>
    <line x1="152" y1="382" x2="152" y2="402"/>
  </g>
  <g fill="#E2557A">
    <polygon points="147,162 157,162 152,170"/>
    <polygon points="147,240 157,240 152,248"/>
    <polygon points="147,318 157,318 152,326"/>
    <polygon points="147,402 157,402 152,410"/>
  </g>

  <!-- Right panel: handshake timing ladder -->
  <text x="330" y="106" class="title" font-size="14">Handshake timing ladder (Pass 2)</text>
  <line x1="380" y1="120" x2="380" y2="430" stroke="#2A1A2E" stroke-width="1.5"/>
  <line x1="660" y1="120" x2="660" y2="430" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="356" y="135" class="label" font-size="12" text-anchor="middle">client</text>
  <text x="660" y="135" class="label" font-size="12" text-anchor="middle">server</text>

  <!-- SYN (lost) -->
  <line x1="380" y1="160" x2="640" y2="190" stroke="#E2557A" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="386" y="156" class="mono" font-size="11">SYN  t=0.050</text>
  <text x="560" y="178" class="accent" font-size="11">&#10005; lost</text>

  <!-- SYN retransmit -->
  <line x1="380" y1="250" x2="660" y2="278" stroke="#2A1A2E" stroke-width="2"/>
  <text x="386" y="246" class="mono" font-size="11">SYN retransmit  t=1.052</text>
  <text x="386" y="232" class="accent" font-size="11">~1.0s RTO wait (RFC 6298)</text>

  <!-- SYN-ACK -->
  <line x1="660" y1="290" x2="380" y2="318" stroke="#2A1A2E" stroke-width="2"/>
  <text x="430" y="312" class="mono" font-size="11">SYN-ACK  t=1.094</text>

  <!-- ACK -->
  <line x1="380" y1="330" x2="660" y2="356" stroke="#2A1A2E" stroke-width="2"/>
  <text x="386" y="346" class="mono" font-size="11">ACK  t=1.095 &#8594; ESTABLISHED</text>

  <!-- baseline bracket -->
  <line x1="360" y1="250" x2="360" y2="318" stroke="#E2557A" stroke-width="2"/>
  <text x="300" y="288" class="accent" font-size="11">RTT</text>
  <text x="298" y="302" class="accent" font-size="11">42 ms</text>

  <!-- TCP flag byte legend -->
  <text x="330" y="392" class="title" font-size="13">TCP flag byte (header byte 13)</text>
  <g class="mono" font-size="11">
    <rect x="330" y="402" width="40" height="22" class="box"/><text x="338" y="417">FIN</text>
    <rect x="372" y="402" width="40" height="22" class="box" fill="#FBE6EC"/><text x="380" y="417">SYN</text>
    <rect x="414" y="402" width="40" height="22" class="box"/><text x="422" y="417">RST</text>
    <rect x="456" y="402" width="40" height="22" class="box" fill="#FBE6EC"/><text x="464" y="417">ACK</text>
    <rect x="498" y="402" width="40" height="22" class="box"/><text x="506" y="417">PSH</text>
  </g>
  <text x="330" y="442" class="label" font-size="11">SYN=0x02, ACK=0x10 &#8594; SYN-ACK = 0x12</text>

  <!-- footer verdict strip -->
  <rect x="32" y="476" width="696" height="60" rx="6" class="box"/>
  <text x="48" y="500" class="title" font-size="13">Worked example verdict</text>
  <text x="48" y="520" class="mono" font-size="12">DNS 41ms · RTT 1044ms · TLS 44ms · server 55ms  &#8594;  network owns 88% (lost SYN)</text>
</svg>
