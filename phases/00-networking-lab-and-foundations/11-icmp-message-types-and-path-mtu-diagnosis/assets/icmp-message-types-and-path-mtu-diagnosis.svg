<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560">
  <rect width="880" height="560" fill="#FFF7EC"/>
  <style>
    text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; fill: #2A1A2E; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .acc { fill: #E2557A; }
    .str { stroke: #2A1A2E; fill: none; }
    .accstr { stroke: #E2557A; fill: none; }
    .box { fill: #FFF7EC; stroke: #2A1A2E; stroke-width: 1.5; }
    .accbox { fill: #FFFFFF; stroke: #E2557A; stroke-width: 1.5; }
  </style>

  <text x="40" y="40" font-size="20" font-weight="700">ICMP message types and Path MTU Discovery</text>

  <!-- ICMP header layout -->
  <text x="40" y="78" font-size="13" font-weight="600">ICMP header (RFC 792) — 8 bytes</text>
  <g class="mono" font-size="11">
    <rect x="40" y="88" width="120" height="40" class="box"/>
    <text x="100" y="104" text-anchor="middle">Type</text>
    <text x="100" y="120" text-anchor="middle" font-size="9">1 byte</text>
    <rect x="160" y="88" width="120" height="40" class="box"/>
    <text x="220" y="104" text-anchor="middle">Code</text>
    <text x="220" y="120" text-anchor="middle" font-size="9">1 byte</text>
    <rect x="280" y="88" width="120" height="40" class="accbox"/>
    <text x="340" y="104" text-anchor="middle" class="acc">Checksum</text>
    <text x="340" y="120" text-anchor="middle" font-size="9">2 bytes (RFC 1071)</text>
    <rect x="400" y="88" width="240" height="40" class="box"/>
    <text x="520" y="104" text-anchor="middle">Rest of header</text>
    <text x="520" y="120" text-anchor="middle" font-size="9">4 bytes (id+seq / MTU / unused)</text>
    <rect x="640" y="88" width="200" height="40" class="box"/>
    <text x="740" y="104" text-anchor="middle">Payload</text>
    <text x="740" y="120" text-anchor="middle" font-size="9">variable</text>
  </g>
  <text x="40" y="148" font-size="11" class="acc">Type 8 = Echo Request · Type 0 = Echo Reply · Type 11 = Time Exceeded · Type 3 code 4 = Frag Needed</text>

  <!-- ping round trip -->
  <text x="40" y="186" font-size="13" font-weight="600">ping: Echo Request → Echo Reply</text>
  <g font-size="11">
    <rect x="60" y="200" width="130" height="36" rx="6" class="box"/>
    <text x="125" y="223" text-anchor="middle">Host A (src)</text>
    <rect x="690" y="200" width="130" height="36" rx="6" class="box"/>
    <text x="755" y="223" text-anchor="middle">Host B (dst)</text>

    <line x1="190" y1="214" x2="688" y2="214" class="accstr" stroke-width="1.5" marker-end="url(#ar)"/>
    <text x="440" y="208" text-anchor="middle" class="acc" font-size="10">type=8, id, seq, payload</text>
    <line x1="688" y1="232" x2="192" y2="232" class="str" stroke-width="1.5" marker-end="url(#ark)"/>
    <text x="440" y="248" text-anchor="middle" font-size="10">type=0, same id+seq, payload echoed</text>
  </g>

  <!-- traceroute -->
  <text x="40" y="290" font-size="13" font-weight="600">traceroute: TTL=k probe → Time Exceeded from hop k</text>
  <g font-size="10">
    <rect x="60" y="306" width="100" height="30" rx="5" class="box"/>
    <text x="110" y="325" text-anchor="middle">source</text>
    <rect x="230" y="306" width="100" height="30" rx="5" class="accbox"/>
    <text x="280" y="325" text-anchor="middle" class="acc">R1 (TTL1)</text>
    <rect x="400" y="306" width="100" height="30" rx="5" class="accbox"/>
    <text x="450" y="325" text-anchor="middle" class="acc">R2 (TTL2)</text>
    <rect x="570" y="306" width="100" height="30" rx="5" class="accbox"/>
    <text x="620" y="325" text-anchor="middle" class="acc">R3 (TTL3)</text>
    <rect x="740" y="306" width="100" height="30" rx="5" class="box"/>
    <text x="790" y="325" text-anchor="middle">dest</text>

    <line x1="160" y1="321" x2="228" y2="321" class="str" marker-end="url(#ark)"/>
    <line x1="330" y1="321" x2="398" y2="321" class="str" marker-end="url(#ark)"/>
    <line x1="500" y1="321" x2="568" y2="321" class="str" marker-end="url(#ark)"/>
    <line x1="670" y1="321" x2="738" y2="321" class="str" marker-end="url(#ark)"/>

    <line x1="280" y1="336" x2="110" y2="372" class="accstr" stroke-dasharray="4 3" marker-end="url(#ar)"/>
    <text x="170" y="368" class="acc">type=11 code=0</text>
    <line x1="450" y1="336" x2="110" y2="386" class="accstr" stroke-dasharray="4 3" marker-end="url(#ar)"/>
    <text x="260" y="384" class="acc">type=11 code=0</text>
    <line x1="790" y1="336" x2="110" y2="402" class="accstr" stroke-dasharray="4 3" marker-end="url(#ar)"/>
    <text x="380" y="400" class="acc">type=0 Echo Reply (reached)</text>
  </g>

  <!-- PMTUD -->
  <text x="40" y="430" font-size="13" font-weight="600">Path MTU Discovery (RFC 1191): DF-set probe → type 3 code 4</text>
  <g font-size="11">
    <rect x="60" y="446" width="110" height="34" rx="5" class="box"/>
    <text x="115" y="468" text-anchor="middle">sender MTU 1500</text>
    <rect x="320" y="446" width="140" height="34" rx="5" class="accbox"/>
    <text x="390" y="468" text-anchor="middle" class="acc">link MTU 1492</text>
    <rect x="690" y="446" width="130" height="34" rx="5" class="box"/>
    <text x="755" y="468" text-anchor="middle">sender MTU 1492</text>

    <line x1="172" y1="456" x2="318" y2="456" class="str" stroke-width="1.5" marker-end="url(#ark)"/>
    <text x="245" y="450" text-anchor="middle" font-size="10">1500-byte DF probe</text>
    <line x1="318" y1="478" x2="172" y2="478" class="accstr" stroke-width="1.5" marker-end="url(#ar)"/>
    <text x="245" y="494" text-anchor="middle" class="acc" font-size="10">type=3 code=4, next-hop MTU=1492</text>
    <line x1="460" y1="463" x2="688" y2="463" class="accstr" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ar)"/>
    <text x="574" y="458" text-anchor="middle" class="acc" font-size="10">reduce PMTU to 1492</text>
  </g>

  <text x="40" y="530" font-size="10">RFC 792 (ICMP) · RFC 1071 (checksum) · RFC 1191 (IPv4 PMTUD) · RFC 8201 (IPv6 PMTUD) · RFC 4443 (ICMPv6)</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#E2557A"/>
    </marker>
    <marker id="ark" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#2A1A2E"/>
    </marker>
  </defs>
</svg>
