<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <rect width="760" height="460" fill="#FFF7EC"/>
  <text x="32" y="44" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#2A1A2E">Latency is a distribution, not a number</text>
  <text x="32" y="70" font-family="Inter, sans-serif" font-size="14" fill="#2A1A2E" opacity="0.75">Right-skewed RTT: a physics floor, a queueing tail. The mean sits left of p99.</text>

  <!-- axes -->
  <line x1="80" y1="360" x2="700" y2="360" stroke="#2A1A2E" stroke-width="2"/>
  <line x1="80" y1="360" x2="80" y2="120" stroke="#2A1A2E" stroke-width="2"/>
  <text x="372" y="398" font-family="Inter, sans-serif" font-size="13" fill="#2A1A2E">RTT (ms)  ->  longer</text>
  <text x="36" y="240" font-family="Inter, sans-serif" font-size="13" fill="#2A1A2E" transform="rotate(-90 36 240)">count</text>

  <!-- skewed histogram bars -->
  <g fill="#2A1A2E" opacity="0.30">
    <rect x="92"  y="250" width="22" height="110"/>
    <rect x="116" y="160" width="22" height="200"/>
    <rect x="140" y="150" width="22" height="210"/>
    <rect x="164" y="205" width="22" height="155"/>
    <rect x="188" y="270" width="22" height="90"/>
    <rect x="212" y="300" width="22" height="60"/>
    <rect x="236" y="318" width="22" height="42"/>
    <rect x="260" y="330" width="22" height="30"/>
    <rect x="284" y="338" width="22" height="22"/>
    <rect x="320" y="344" width="22" height="16"/>
    <rect x="360" y="348" width="22" height="12"/>
    <rect x="410" y="350" width="22" height="10"/>
    <rect x="470" y="352" width="22" height="8"/>
    <rect x="540" y="353" width="22" height="7"/>
    <rect x="620" y="354" width="22" height="6"/>
  </g>

  <!-- mean marker -->
  <line x1="175" y1="110" x2="175" y2="360" stroke="#2A1A2E" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="175" y="104" font-family="monospace" font-size="13" font-weight="700" fill="#2A1A2E" text-anchor="middle">mean</text>
  <text x="175" y="378" font-family="monospace" font-size="11" fill="#2A1A2E" text-anchor="middle">~41 ms</text>

  <!-- p50 marker -->
  <line x1="150" y1="135" x2="150" y2="360" stroke="#2A1A2E" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.6"/>
  <text x="150" y="128" font-family="monospace" font-size="11" fill="#2A1A2E" text-anchor="middle" opacity="0.7">p50</text>

  <!-- p99 marker in berry -->
  <line x1="600" y1="110" x2="600" y2="360" stroke="#E2557A" stroke-width="3"/>
  <text x="600" y="104" font-family="monospace" font-size="14" font-weight="700" fill="#E2557A" text-anchor="middle">p99</text>
  <text x="600" y="378" font-family="monospace" font-size="11" fill="#E2557A" text-anchor="middle">~750 ms</text>

  <!-- the gap callout -->
  <path d="M 178 130 L 597 130" stroke="#E2557A" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="388" y="124" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#E2557A" text-anchor="middle">the gap the average hides</text>

  <!-- tail label -->
  <text x="470" y="330" font-family="Inter, sans-serif" font-size="12" fill="#E2557A">queueing / bufferbloat tail</text>

  <!-- bottom equation strip -->
  <rect x="32" y="412" width="696" height="36" rx="6" fill="#2A1A2E"/>
  <text x="48" y="435" font-family="monospace" font-size="13" fill="#FFF7EC">loss = (sent - received) / sent     BDP = bandwidth x RTT     goodput ~ payload / frame (~95%)</text>
</svg>
