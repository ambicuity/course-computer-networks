<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520">
  <rect width="720" height="520" fill="#FFF7EC"/>
  <text x="360" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="bold" fill="#2A1A2E">PGP Five-Step Flow and Message Format</text>

  <!-- Five-step flow -->
  <text x="40" y="56" font-family="Inter, sans-serif" font-size="13" font-weight="bold" fill="#2A1A2E">Encryption Flow (Alice -> Bob)</text>

  <rect x="60" y="70" width="120" height="36" rx="3" fill="#E8DCC8" stroke="#2A1A2E"/>
  <text x="120" y="86" text-anchor="middle" font-family="monospace" font-size="10" fill="#2A1A2E">1. Plaintext P</text>
  <text x="120" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">MD5 hash</text>

  <line x1="180" y1="88" x2="210" y2="88" stroke="#E2557A" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="210" y="70" width="120" height="36" rx="3" fill="#E2557A" stroke="#2A1A2E"/>
  <text x="270" y="86" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFF7EC">2. Sign hash</text>
  <text x="270" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFF7EC">RSA + D_A (private)</text>

  <line x1="330" y1="88" x2="360" y2="88" stroke="#E2557A" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="360" y="70" width="120" height="36" rx="3" fill="#D4C5A9" stroke="#2A1A2E"/>
  <text x="420" y="86" text-anchor="middle" font-family="monospace" font-size="10" fill="#2A1A2E">3. ZIP compress</text>
  <text x="420" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">P1 -> P1.Z</text>

  <line x1="480" y1="88" x2="510" y2="88" stroke="#E2557A" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="510" y="70" width="120" height="36" rx="3" fill="#B8A88C" stroke="#2A1A2E"/>
  <text x="570" y="86" text-anchor="middle" font-family="monospace" font-size="10" fill="#2A1A2E">4. IDEA encrypt</text>
  <text x="570" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">K_M (random 128b)</text>

  <!-- Row 2: step 5 -->
  <rect x="210" y="120" width="300" height="36" rx="3" fill="#E2557A" stroke="#2A1A2E" opacity="0.8"/>
  <text x="360" y="136" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFF7EC">5. RSA-encrypt K_M with E_B, base64-encode</text>
  <text x="360" y="150" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFF7EC">final message (base64 letters/digits/+/=)</text>

  <line x1="570" y1="88" x2="570" y2="118" stroke="#E2557A" stroke-width="1.5"/>
  <line x1="570" y1="118" x2="510" y2="118" stroke="#E2557A" stroke-width="1.5"/>
  <line x1="360" y1="118" x2="360" y2="120" stroke="#E2557A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- RSA workload note -->
  <rect x="60" y="170" width="600" height="24" rx="3" fill="#D4C5A9" stroke="#2A1A2E"/>
  <text x="360" y="186" text-anchor="middle" font-family="monospace" font-size="10" fill="#2A1A2E">RSA workload: 256 bits total (128-bit MD5 hash + 128-bit IDEA key) — not a bottleneck</text>

  <!-- Message format -->
  <text x="40" y="220" font-family="Inter, sans-serif" font-size="13" font-weight="bold" fill="#2A1A2E">PGP Message Format (three parts)</text>

  <rect x="60" y="232" width="180" height="60" rx="3" fill="#E2557A" stroke="#2A1A2E"/>
  <text x="150" y="250" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#FFF7EC">Key Part</text>
  <text x="150" y="266" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFF7EC">K_M encrypted with E_B</text>
  <text x="150" y="280" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFF7EC">+ key ID</text>

  <rect x="250" y="232" width="200" height="60" rx="3" fill="#D4C5A9" stroke="#2A1A2E"/>
  <text x="350" y="250" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#2A1A2E">Signature Part</text>
  <text x="350" y="266" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">timestamp, sender key ID</text>
  <text x="350" y="280" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">algo types, encrypted MD5 hash</text>

  <rect x="460" y="232" width="200" height="60" rx="3" fill="#B8A88C" stroke="#2A1A2E"/>
  <text x="560" y="250" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#2A1A2E">Message Part</text>
  <text x="560" y="266" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">header, filename</text>
  <text x="560" y="280" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">timestamp, message</text>

  <!-- Key lengths -->
  <text x="40" y="320" font-family="Inter, sans-serif" font-size="13" font-weight="bold" fill="#2A1A2E">RSA Key Lengths</text>
  <rect x="60" y="332" width="120" height="22" rx="2" fill="#E2557A" stroke="#2A1A2E" opacity="0.5"/>
  <text x="120" y="347" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFF7EC">Casual 384b</text>
  <rect x="190" y="332" width="120" height="22" rx="2" fill="#E2557A" stroke="#2A1A2E" opacity="0.7"/>
  <text x="250" y="347" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFF7EC">Commercial 512b</text>
  <rect x="320" y="332" width="140" height="22" rx="2" fill="#D4C5A9" stroke="#2A1A2E"/>
  <text x="390" y="347" text-anchor="middle" font-family="monospace" font-size="9" fill="#2A1A2E">Military 1024b</text>
  <rect x="470" y="332" width="120" height="22" rx="2" fill="#E8DCC8" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="530" y="347" text-anchor="middle" font-family="monospace" font-size="9" fill="#2A1A2E">Alien 2048b</text>
  <text x="120" y="368" text-anchor="middle" font-family="monospace" font-size="8" fill="#E2557A">breakable</text>
  <text x="250" y="368" text-anchor="middle" font-family="monospace" font-size="8" fill="#E2557A">3-letter agencies</text>
  <text x="390" y="368" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">secure on Earth</text>
  <text x="530" y="368" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">secure anywhere</text>

  <!-- Key management -->
  <text x="40" y="396" font-family="Inter, sans-serif" font-size="13" font-weight="bold" fill="#2A1A2E">Key Management</text>
  <rect x="60" y="408" width="280" height="50" rx="3" fill="#D4C5A9" stroke="#2A1A2E"/>
  <text x="200" y="424" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#2A1A2E">Private Key Ring</text>
  <text x="200" y="438" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">personal key pairs, password-encrypted</text>
  <text x="200" y="450" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">64-bit key IDs, multiple pairs supported</text>

  <rect x="360" y="408" width="280" height="50" rx="3" fill="#D4C5A9" stroke="#2A1A2E"/>
  <text x="500" y="424" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#2A1A2E">Public Key Ring</text>
  <text x="500" y="438" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">correspondents' public keys</text>
  <text x="500" y="450" text-anchor="middle" font-family="monospace" font-size="8" fill="#2A1A2E">trust indicators (highest=personal handoff)</text>

  <!-- PGP vs S/MIME -->
  <text x="40" y="480" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#2A1A2E">PGP: decentralized, IDEA+RSA+MD5</text>
  <text x="400" y="480" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#2A1A2E">S/MIME: IETF, X.509, multi-trust-anchors</text>
  <text x="40" y="500" font-family="monospace" font-size="9" fill="#E2557A">PEM failed: rigid root hierarchy — S/MIME avoids this</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#E2557A"/>
    </marker>
  </defs>
</svg>
