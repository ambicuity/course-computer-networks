<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <rect width="800" height="540" fill="#FFF7EC"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" fill="#2A1A2E">

    <text x="400" y="32" text-anchor="middle" font-size="22" font-weight="700">TLS Handshake + Firewall Policy Review</text>
    <text x="400" y="54" text-anchor="middle" font-size="13" fill="#5a4a5e">TLS 1.2 (2-RTT) and TLS 1.3 (1-RTT) handshakes paired with 12 firewall rules</text>

    <g>
      <text x="40" y="92" font-size="14" font-weight="700">TLS 1.2 (2 round trips)</text>
      <g stroke="#2A1A2E" stroke-width="1.2" fill="none">
        <line x1="120" y1="110" x2="120" y2="240"/>
        <line x1="350" y1="110" x2="350" y2="240"/>
      </g>
      <text x="120" y="108" text-anchor="middle" font-size="11" font-weight="700">Client</text>
      <text x="350" y="108" text-anchor="middle" font-size="11" font-weight="700">Server</text>

      <g font-size="10" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace">
        <line x1="125" y1="125" x2="345" y2="125" stroke="#E2557A" stroke-width="1.4"/>
        <text x="125" y="121">ClientHello (SNI, ALPN, ciphers)</text>
        <line x1="350" y1="140" x2="130" y2="140" stroke="#2A1A2E" stroke-width="1.2"/>
        <text x="225" y="136" text-anchor="middle">ServerHello, Cert, SKE, SHD</text>
        <line x1="125" y1="155" x2="345" y2="155" stroke="#2A1A2E" stroke-width="1.2"/>
        <text x="225" y="151" text-anchor="middle">CKE, CCS, Finished</text>
        <line x1="350" y1="170" x2="130" y2="170" stroke="#2A1A2E" stroke-width="1.2"/>
        <text x="225" y="166" text-anchor="middle">CCS, Finished</text>
        <line x1="125" y1="190" x2="345" y2="190" stroke="#E2557A" stroke-width="1.4" stroke-dasharray="3 3"/>
        <text x="225" y="186" text-anchor="middle">Application Data (encrypted)</text>
        <line x1="350" y1="205" x2="130" y2="205" stroke="#E2557A" stroke-width="1.4" stroke-dasharray="3 3"/>
        <text x="225" y="201" text-anchor="middle">Application Data (encrypted)</text>
      </g>
    </g>

    <g>
      <text x="430" y="92" font-size="14" font-weight="700">TLS 1.3 (1 round trip)</text>
      <g stroke="#2A1A2E" stroke-width="1.2" fill="none">
        <line x1="500" y1="110" x2="500" y2="240"/>
        <line x1="730" y1="110" x2="730" y2="240"/>
      </g>
      <text x="500" y="108" text-anchor="middle" font-size="11" font-weight="700">Client</text>
      <text x="730" y="108" text-anchor="middle" font-size="11" font-weight="700">Server</text>

      <g font-size="10" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace">
        <line x1="505" y1="125" x2="725" y2="125" stroke="#E2557A" stroke-width="1.4"/>
        <text x="505" y="121">ClientHello + key_share</text>
        <line x1="730" y1="145" x2="510" y2="145" stroke="#2A1A2E" stroke-width="1.2"/>
        <text x="620" y="141" text-anchor="middle">SH + key_share + Finished</text>
        <line x1="730" y1="160" x2="510" y2="160" stroke="#2A1A2E" stroke-width="1.2"/>
        <text x="620" y="156" text-anchor="middle">EncExt, Cert, CertVerify</text>
        <line x1="730" y1="175" x2="510" y2="175" stroke="#2A1A2E" stroke-width="1.2"/>
        <text x="620" y="171" text-anchor="middle">NewSessionTicket (optional)</text>
        <line x1="505" y1="195" x2="725" y2="195" stroke="#E2557A" stroke-width="1.4" stroke-dasharray="3 3"/>
        <text x="505" y="191">App Data (with client Finished)</text>
        <line x1="730" y1="210" x2="510" y2="210" stroke="#E2557A" stroke-width="1.4" stroke-dasharray="3 3"/>
        <text x="620" y="206" text-anchor="middle">App Data (encrypted)</text>
      </g>
    </g>

    <g>
      <text x="40" y="280" font-size="14" font-weight="700">Common TLS alert codes</text>
      <g font-size="11" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace">
        <text x="50" y="300">40  handshake_failure     (negotiation failed)</text>
        <text x="50" y="316">42  bad_certificate       (corrupt or signature invalid)</text>
        <text x="50" y="332">43  unsupported_certificate</text>
        <text x="50" y="348">44  certificate_revoked   (CRL or OCSP says revoked)</text>
        <text x="50" y="364">45  certificate_expired   (notBefore / notAfter)</text>
        <text x="50" y="380">46  certificate_unknown   (untrusted issuer)</text>
        <text x="50" y="396">47  illegal_parameter     (out of range or inconsistent)</text>
        <text x="50" y="412">48  unknown_ca            (chain to untrusted root)</text>
        <text x="50" y="428">116 certificate_required  (server wants mTLS client cert)</text>
      </g>
    </g>

    <g>
      <text x="430" y="280" font-size="14" font-weight="700">12 firewall rules for TLS</text>
      <g font-size="11" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace">
        <text x="440" y="300"> 1. in  TCP 443  any → web servers (HTTPS)</text>
        <text x="440" y="316"> 2. out TCP 443  any → any (clients, CDNs)</text>
        <text x="440" y="332"> 3. in  TCP 80   any → web (HTTP redirect)</text>
        <text x="440" y="348"> 4. out TCP 80   legacy + CT logs</text>
        <text x="440" y="364"> 5. in  UDP 443  HTTP/3 (QUIC)</text>
        <text x="440" y="380"> 6. out UDP 443  HTTP/3 clients</text>
        <text x="440" y="396"> 7. out TCP 25   mail servers (STARTTLS)</text>
        <text x="440" y="412"> 8. in  TCP 993  IMAPS</text>
        <text x="440" y="428"> 9. in  TCP 995  POP3S (legacy)</text>
        <text x="440" y="444">10. out TCP 587  mail submission</text>
        <text x="440" y="460">11. out TCP 853  DNS over TLS (DoT)</text>
        <text x="440" y="476">12. out TCP 443  allowlist only (egress)</text>
      </g>
    </g>

    <g>
      <rect x="40" y="490" width="720" height="40" fill="#FFE8C7" stroke="#E2557A" stroke-width="1.4" rx="4"/>
      <text x="50" y="508" font-size="12" font-weight="700">openssl s_client diagnostic</text>
      <text x="50" y="524" font-size="11" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace">openssl s_client -connect host:443 -servername host -tls1_3 -showcerts -status</text>
    </g>

  </g>
</svg>
