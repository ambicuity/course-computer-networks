<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" width="920" height="620">
  <rect width="920" height="620" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .title { font-size: 24px; font-weight: 700; }
    .sub { font-size: 13px; fill: #6b5560; }
    .node { font-size: 14px; font-weight: 700; }
    .mono { font-family: monospace; font-size: 11px; fill: #2A1A2E; }
    .accent { fill: #E2557A; }
    .label { font-size: 11px; fill: #6b5560; }
  </style>

  <text x="40" y="40" class="title">End-to-end secure channel: IPsec + IKEv2 + Kerberos + TLS 1.3</text>
  <text x="40" y="62" class="sub">Each layer owns a different threat model; each fails closed with its own error vocabulary.</text>

  <!-- Hosts and gateway -->
  <rect x="40" y="100" width="120" height="60" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="100" y="130" text-anchor="middle" class="node">User</text>
  <text x="100" y="148" text-anchor="middle" class="mono">browser + client cert</text>

  <rect x="380" y="100" width="160" height="60" rx="8" fill="#fff" stroke="#E2557A" stroke-width="3"/>
  <text x="460" y="130" text-anchor="middle" class="node accent">Service Proxy</text>
  <text x="460" y="148" text-anchor="middle" class="mono accent">TLS terminator</text>

  <rect x="700" y="100" width="180" height="60" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="790" y="130" text-anchor="middle" class="node">Backend</text>
  <text x="790" y="148" text-anchor="middle" class="mono">validates AP-REQ</text>

  <!-- Cross-layer packet annotations -->
  <line x1="160" y1="200" x2="380" y2="200" stroke="#2A1A2E" stroke-width="2"/>
  <polygon points="375,195 385,200 375,205" fill="#2A1A2E"/>
  <text x="170" y="194" class="mono">Layer 4: TLS 1.3 ClientHello + Authorization: Negotiate</text>

  <line x1="540" y1="240" x2="700" y2="240" stroke="#2A1A2E" stroke-width="2"/>
  <polygon points="695,235 705,240 695,245" fill="#2A1A2E"/>
  <text x="550" y="234" class="mono">Layer 3: Kerberos AP-REQ over SPNEGO</text>

  <!-- Underlay carrier -->
  <rect x="40" y="280" width="840" height="120" rx="10" fill="#fff" stroke="#E2557A" stroke-width="1.2"/>
  <text x="60" y="304" class="node accent">Layer 1 + 2: IPsec ESP tunnel between security gateways</text>

  <line x1="100" y1="335" x2="380" y2="335" stroke="#E2557A" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="375,330 385,335 375,340" fill="#E2557A"/>
  <text x="120" y="328" class="mono accent">ESP SPI=0xC0FFEE, AES-128-GCM, anti-replay window</text>

  <line x1="540" y1="370" x2="780" y2="370" stroke="#E2557A" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="775,365 785,370 775,375" fill="#E2557A"/>
  <text x="560" y="362" class="mono accent">IKEv2 PSK negotiated SAs; gateway-a &lt;-&gt; gateway-b</text>

  <!-- Trust anchors table -->
  <rect x="40" y="420" width="840" height="170" rx="10" fill="#fff" stroke="#2A1A2E" stroke-width="1.5"/>
  <text x="60" y="446" class="node">Trust anchors at each layer</text>

  <text x="60" y="470" class="mono">Layer 1 IPsec (ESP)</text>
  <text x="220" y="470" class="mono">: SPI in the Security Association Database</text>

  <text x="60" y="490" class="mono">Layer 2 IKEv2</text>
  <text x="220" y="490" class="mono">: PSK or gateway X.509 certificate</text>

  <text x="60" y="510" class="mono">Layer 3 Kerberos</text>
  <text x="220" y="510" class="mono">: KDC krbtgt long-term key</text>

  <text x="60" y="530" class="mono">Layer 4 TLS 1.3</text>
  <text x="220" y="530" class="mono">: CA bundle (workload certificate) + client cert TOFU/PKI</text>

  <text x="60" y="558" class="label accent">Failure vocabulary</text>
  <text x="60" y="574" class="label">ESP: silent drop or ICMP "bad SPI"</text>
  <text x="60" y="588" class="label">IKEv2: IKE_AUTH_FAILED notification (RFC 7296 §3.10.1)</text>

  <!-- Failure callouts -->
  <text x="430" y="558" class="label accent">Failure vocabulary (cont.)</text>
  <text x="430" y="574" class="label">Kerberos: KRB_AP_ERR_TKT_EXPIRED, KRB_AP_ERR_SKEW</text>
  <text x="430" y="588" class="label">TLS 1.3: alert bad_certificate, unknown_ca, handshake_failure</text>
</svg>
