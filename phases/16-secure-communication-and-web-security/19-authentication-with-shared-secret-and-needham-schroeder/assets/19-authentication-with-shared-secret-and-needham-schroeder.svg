<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" width="920" height="600">
  <rect width="920" height="600" fill="#FFF7EC"/>
  <style>
    text { font-family: Inter, sans-serif; fill: #2A1A2E; }
    .title { font-size: 24px; font-weight: 700; }
    .sub { font-size: 13px; fill: #6b5560; }
    .node { font-size: 14px; font-weight: 700; }
    .mono { font-family: monospace; font-size: 11px; fill: #2A1A2E; }
    .accent { fill: #E2557A; }
    .label { font-size: 11px; fill: #6b5560; }
  </style>

  <text x="40" y="40" class="title">Needham-Schroeder 1978 -- five-message KDC exchange</text>
  <text x="40" y="62" class="sub">Alice proves herself to the KDC, receives a sealed ticket for Bob, and Bob accepts K_S.</text>

  <!-- Alice / KDC / Bob columns -->
  <rect x="60" y="100" width="120" height="60" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="120" y="135" text-anchor="middle" class="node">Alice</text>

  <rect x="400" y="100" width="120" height="60" rx="8" fill="#fff" stroke="#E2557A" stroke-width="3"/>
  <text x="460" y="135" text-anchor="middle" class="node">KDC</text>

  <rect x="740" y="100" width="120" height="60" rx="8" fill="#fff" stroke="#2A1A2E" stroke-width="2"/>
  <text x="800" y="135" text-anchor="middle" class="node">Bob</text>

  <!-- message 1 -->
  <line x1="180" y1="200" x2="400" y2="200" stroke="#2A1A2E" stroke-width="2"/>
  <polygon points="395,195 405,200 395,205" fill="#2A1A2E"/>
  <text x="200" y="195" class="mono">1. A, B, R_A</text>
  <text x="200" y="212" class="label">plaintext; Alice picks a fresh nonce</text>

  <!-- message 2 -->
  <line x1="400" y1="250" x2="180" y2="250" stroke="#2A1A2E" stroke-width="2"/>
  <polygon points="185,245 175,250 185,255" fill="#2A1A2E"/>
  <text x="200" y="245" class="mono">2. K_A(R_A, B, K_S, K_B(A, K_S))</text>
  <text x="200" y="262" class="label">KDC mints K_S; ticket sealed under K_B</text>

  <!-- message 3 -->
  <line x1="180" y1="300" x2="740" y2="300" stroke="#2A1A2E" stroke-width="2"/>
  <polygon points="735,295 745,300 735,305" fill="#2A1A2E"/>
  <text x="200" y="295" class="mono">3. K_B(A, K_S)</text>
  <text x="200" y="312" class="label">Alice forwards the ticket; Bob opens it</text>

  <!-- message 4 -->
  <line x1="740" y1="350" x2="180" y2="350" stroke="#2A1A2E" stroke-width="2"/>
  <polygon points="185,345 175,350 185,355" fill="#2A1A2E"/>
  <text x="200" y="345" class="mono">4. K_S(R_A2)</text>
  <text x="200" y="362" class="label">Bob proves he can use K_S</text>

  <!-- message 5 -->
  <line x1="180" y1="400" x2="740" y2="400" stroke="#2A1A2E" stroke-width="2"/>
  <polygon points="735,395 745,400 735,405" fill="#2A1A2E"/>
  <text x="200" y="395" class="mono">5. K_S(R_A2 - 1)</text>
  <text x="200" y="412" class="label">Alice confirms; both sides share K_S</text>

  <!-- Denning-Sacco callout -->
  <rect x="60" y="450" width="800" height="120" rx="10" fill="#FFF0F4" stroke="#E2557A" stroke-width="1.5"/>
  <text x="80" y="478" class="node accent">Denning-Sacco attack (1981)</text>
  <text x="80" y="500" class="mono">Attacker recovers an OLD K_S (key compromise, weak RNG, leak)</text>
  <text x="80" y="518" class="mono">   -&gt; replays message 3 from a captured session: K_B(A, K_S_old)</text>
  <text x="80" y="536" class="mono">   -&gt; Bob has no timestamp or fresh R_B to detect the replay</text>
  <text x="80" y="556" class="mono accent">1987 fix: Bob issues fresh R_B; Alice returns K_S(R_B - 1). Old K_S cannot answer.</text>
</svg>
