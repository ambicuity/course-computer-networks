<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580">
  <rect width="900" height="580" fill="#FFF7EC"/>
  <g font-family="Georgia, serif" fill="#2A1A2E">
    <text x="40" y="42" font-size="22" font-weight="bold">RSA: math and attacks</text>
    <text x="40" y="66" font-size="13" fill="#7a5a6a">Small d, close p,q, shared factors all break textbook RSA</text>

    <g transform="translate(40,100)">
      <rect width="380" height="190" rx="6" fill="#fff" stroke="#E2557A" stroke-width="1.5"/>
      <text x="190" y="24" text-anchor="middle" font-size="14" font-weight="bold">Key generation (correct)</text>
      <text x="20" y="50" font-size="12">1. Pick random primes p, q (each ~1024 bits)</text>
      <text x="20" y="72" font-size="12">2. n = p * q ;  phi(n) = (p-1)(q-1)</text>
      <text x="20" y="94" font-size="12">3. e = 65537  ;  gcd(e, phi(n)) = 1</text>
      <text x="20" y="116" font-size="12">4. d = e^-1 mod phi(n)  ;  e * d ≡ 1 mod phi(n)</text>
      <text x="20" y="142" font-size="12" fill="#E2557A">Constraints:</text>
      <text x="20" y="160" font-size="11">  |p - q| &gt; 2^64  (defeat Fermat)</text>
      <text x="20" y="178" font-size="11">  d &gt;= n^0.5  (defeat Wiener)</text>
    </g>

    <g transform="translate(460,100)">
      <rect width="400" height="190" rx="6" fill="#fff" stroke="#E2557A" stroke-width="1.5"/>
      <text x="200" y="24" text-anchor="middle" font-size="14" font-weight="bold">Three classical attacks</text>
      <text x="20" y="56" font-size="12" font-weight="bold">1. Wiener (1990)</text>
      <text x="20" y="74" font-size="11">If d &lt; n^0.25 / 3, continued-fraction expansion of e/n</text>
      <text x="20" y="90" font-size="11">includes k/d; recover d in O(log n) time.</text>
      <text x="20" y="116" font-size="12" font-weight="bold">2. Fermat</text>
      <text x="20" y="134" font-size="11">If |p - q| &lt; n^0.25, then n is close to a perfect</text>
      <text x="20" y="150" font-size="11">square; iterate a = ceil(sqrt(n)) until a^2 - n is square.</text>
      <text x="20" y="174" font-size="11">Cost: ~sqrt(|p-q|) iterations — milliseconds if close.</text>
    </g>

    <g transform="translate(40,310)">
      <rect width="400" height="240" rx="6" fill="#fff" stroke="#E2557A" stroke-width="1.5"/>
      <text x="200" y="24" text-anchor="middle" font-size="14" font-weight="bold">Pollard's rho (Pollard 1975)</text>
      <text x="20" y="50" font-size="11">Random walk x_{i+1} = (x_i^2 + 1) mod n</text>
      <text x="20" y="68" font-size="11">Floyd cycle detection: x, y move at speed 1, 2.</text>
      <text x="20" y="86" font-size="11">When gcd(|x - y|, n) &gt; 1, factor found.</text>
      <text x="20" y="116" font-size="11">Expected runtime: O(p^0.5) for factor p.</text>
      <text x="20" y="148" font-size="12" font-weight="bold">Shared-factor attack</text>
      <text x="20" y="166" font-size="11">Two moduli n1 = p * q1, n2 = p * q2 with shared p:</text>
      <text x="20" y="184" font-size="11">gcd(n1, n2) = p instantly. Real-world failure:</text>
      <text x="20" y="202" font-size="11">2012 Debian weak-key incident, 2017 ROCA TPMs.</text>
      <text x="20" y="222" font-size="11">Mitigation: enforce p, q from independent entropy.</text>
    </g>

    <g transform="translate(480,310)">
      <rect width="380" height="240" rx="6" fill="#fde2c8" stroke="#E2557A" stroke-width="1.5"/>
      <text x="190" y="24" text-anchor="middle" font-size="14" font-weight="bold">What 2048-bit RSA still defends</text>
      <text x="20" y="58" font-size="11">With:</text>
      <text x="20" y="78" font-size="11">  - random 1024-bit p, q with |p - q| &gt; 2^64</text>
      <text x="20" y="98" font-size="11">  - d &gt;= n^0.5 (or CRT-randomized d)</text>
      <text x="20" y="118" font-size="11">  - OAEP padding</text>
      <text x="20" y="138" font-size="11">  - constant-time decryption</text>
      <text x="20" y="168" font-size="11">No classical algorithm factors n in &lt; 2^112 operations.</text>
      <text x="20" y="186" font-size="11">GNFS record: RSA-250 (829 bits) factored in 2020,</text>
      <text x="20" y="204" font-size="11">~2700 CPU-years. RSA-2048 is out of reach today.</text>
      <text x="20" y="224" font-size="11" fill="#E2557A">Shor (1994) breaks RSA on a quantum computer in O((log n)^3).</text>
    </g>
  </g>
</svg>