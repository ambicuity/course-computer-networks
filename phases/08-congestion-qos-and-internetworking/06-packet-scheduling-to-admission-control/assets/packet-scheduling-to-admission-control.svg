<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="900" height="560" fill="#FFF7EC"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#2A1A2E">RSVP PATH / RESV Signaling</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#2A1A2E" opacity="0.7">Admission control runs per-hop on the reverse RESV path</text>

  <!-- Nodes -->
  <g font-size="13" font-weight="600">
    <rect x="40"  y="260" width="110" height="56" rx="10" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="95"  y="293" text-anchor="middle" fill="#2A1A2E">Sender S</text>
    <rect x="250" y="260" width="110" height="56" rx="10" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="305" y="293" text-anchor="middle" fill="#2A1A2E">Router R1</text>
    <rect x="460" y="260" width="110" height="56" rx="10" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="515" y="293" text-anchor="middle" fill="#2A1A2E">Router R2</text>
    <rect x="670" y="260" width="110" height="56" rx="10" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="2"/>
    <text x="725" y="293" text-anchor="middle" fill="#2A1A2E">Receiver D</text>
  </g>

  <!-- PATH arrows: top, sender -> receiver -->
  <g stroke="#E2557A" stroke-width="2.2" fill="none">
    <line x1="150" y1="230" x2="250" y2="230" marker-end="url(#arrBerry)"/>
    <line x1="360" y1="230" x2="460" y2="230" marker-end="url(#arrBerry)"/>
    <line x1="570" y1="230" x2="670" y2="230" marker-end="url(#arrBerry)"/>
  </g>
  <text x="95"  y="216" font-size="11" fill="#E2557A" font-weight="700">PATH</text>
  <text x="405" y="216" font-size="11" fill="#E2557A" font-weight="700">PATH (TSpec, hop state)</text>

  <!-- RESV arrows: bottom, receiver -> sender -->
  <g stroke="#2A1A2E" stroke-width="2.2" fill="none">
    <line x1="670" y1="346" x2="570" y2="346" marker-end="url(#arrInk)"/>
    <line x1="460" y1="346" x2="360" y2="346" marker-end="url(#arrInk)"/>
    <line x1="250" y1="346" x2="150" y2="346" marker-end="url(#arrInk)"/>
  </g>
  <text x="725" y="362" font-size="11" fill="#2A1A2E" font-weight="700">RESV</text>
  <text x="405" y="362" font-size="11" fill="#2A1A2E" font-weight="700">RESV (flowspec, reserve)</text>

  <!-- Arrowheads -->
  <defs>
    <marker id="arrBerry" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#E2557A"/>
    </marker>
    <marker id="arrInk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2A1A2E"/>
    </marker>
  </defs>

  <!-- Per-hop admit/reject boxes -->
  <g font-size="11">
    <rect x="262" y="392" width="86" height="44" rx="6" fill="#FFF7EC" stroke="#E2557A" stroke-width="1.5"/>
    <text x="305" y="410" text-anchor="middle" fill="#E2557A" font-weight="700">R1 admit</text>
    <text x="305" y="426" text-anchor="middle" fill="#2A1A2E" opacity="0.75">W&#x2265;R/C, reserve</text>

    <rect x="472" y="392" width="86" height="44" rx="6" fill="#FFF7EC" stroke="#E2557A" stroke-width="1.5"/>
    <text x="515" y="410" text-anchor="middle" fill="#E2557A" font-weight="700">R2 admit</text>
    <text x="515" y="426" text-anchor="middle" fill="#2A1A2E" opacity="0.75">W&#x2265;R/C, reserve</text>

    <rect x="40"  y="392" width="110" height="44" rx="6" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="95"  y="410" text-anchor="middle" fill="#2A1A2E" font-weight="700">S installs</text>
    <text x="95"  y="426" text-anchor="middle" fill="#2A1A2E" opacity="0.75">soft state ok</text>
  </g>

  <!-- Flowspec panel -->
  <rect x="40" y="470" width="820" height="74" rx="8" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1.2" opacity="0.95"/>
  <text x="56" y="492" font-size="12" font-weight="700" fill="#2A1A2E">Flowspec (RFC 2210/2211) &#x2014; proposed by sender, only reducible per hop</text>
  <g font-size="11" fill="#2A1A2E">
    <text x="56"  y="514">Token bucket rate R (B/s) &#x2192; bandwidth</text>
    <text x="56"  y="532">Bucket size B (B) &#x2192; buffer for burst</text>
    <text x="410" y="514">Peak rate P (B/s) &#x2192; line ceiling</text>
    <text x="410" y="532">min/max pkt size &#x2192; CPU &amp; MTU</text>
  </g>
  <text x="690" y="514" font-size="11" font-weight="700" fill="#E2557A">Delay bound:</text>
  <text x="690" y="532" font-size="11" fill="#2A1A2E">D &#x2264; B / R per router</text>

  <!-- Legend -->
  <g font-size="11">
    <rect x="40" y="86" width="820" height="26" rx="4" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="0.8" opacity="0.6"/>
    <line x1="56" y1="99" x2="86" y2="99" stroke="#E2557A" stroke-width="2.2"/>
    <text x="94" y="103" fill="#2A1A2E">PATH: sender&#x2192;receiver, carries TSpec</text>
    <line x1="320" y1="99" x2="350" y2="99" stroke="#2A1A2E" stroke-width="2.2"/>
    <text x="358" y="103" fill="#2A1A2E">RESV: receiver&#x2192;sender, runs admission control</text>
    <text x="690" y="103" fill="#E2557A" font-weight="700">RFC 2205</text>
  </g>
</svg>