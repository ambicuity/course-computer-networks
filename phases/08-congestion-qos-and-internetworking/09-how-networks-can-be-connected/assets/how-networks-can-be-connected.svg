<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560">
  <rect width="820" height="560" fill="#FFF7EC"/>
  <defs>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2A1A2E"/>
    </marker>
  </defs>

  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#2A1A2E">How Networks Can Be Connected</text>
  <text x="410" y="56" text-anchor="middle" font-size="12" fill="#2A1A2E">Two strategies: protocol conversion, or a common network layer (IP)</text>

  <!-- Left column: device hierarchy -->
  <text x="70" y="92" font-size="13" font-weight="700" fill="#E2557A">Interconnection Devices</text>
  <line x1="70" y1="100" x2="320" y2="100" stroke="#E2557A" stroke-width="1.5"/>

  <!-- Repeater -->
  <rect x="70" y="115" width="250" height="48" rx="6" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="84" y="134" font-size="12" font-weight="600" fill="#2A1A2E">Repeater / Hub</text>
  <text x="84" y="152" font-size="10.5" fill="#2A1A2E">OSI L1 · inspects bits · regenerates signal</text>

  <!-- Bridge -->
  <rect x="70" y="178" width="250" height="48" rx="6" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="84" y="197" font-size="12" font-weight="600" fill="#2A1A2E">Bridge / Switch</text>
  <text x="84" y="215" font-size="10.5" fill="#2A1A2E">OSI L2 · reads MAC addr · forwards whole frame</text>

  <!-- Router (highlighted) -->
  <rect x="70" y="241" width="250" height="48" rx="6" fill="#E2557A" fill-opacity="0.12" stroke="#E2557A" stroke-width="1.8"/>
  <text x="84" y="260" font-size="12" font-weight="600" fill="#2A1A2E">Router</text>
  <text x="84" y="278" font-size="10.5" fill="#2A1A2E">OSI L3 · reads IP addr · strips frame, re-encapsulates</text>

  <!-- Gateway -->
  <rect x="70" y="304" width="250" height="48" rx="6" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="84" y="323" font-size="12" font-weight="600" fill="#2A1A2E">Gateway</text>
  <text x="84" y="341" font-size="10.5" fill="#2A1A2E">OSI L4-7 · translates upper-layer protocols</text>

  <text x="70" y="386" font-size="10.5" fill="#2A1A2E" font-style="italic">Switch transports the entire frame by MAC.</text>
  <text x="70" y="402" font-size="10.5" fill="#2A1A2E" font-style="italic">Router extracts the packet and reads IP.</text>
  <text x="70" y="418" font-size="10.5" fill="#2A1A2E" font-style="italic">That is why routers join dissimilar links.</text>

  <!-- Right column: the routed journey -->
  <text x="430" y="92" font-size="13" font-weight="700" fill="#E2557A">Routed Journey: 802.11 → MPLS → Ethernet</text>
  <line x1="430" y1="100" x2="770" y2="100" stroke="#E2557A" stroke-width="1.5"/>

  <!-- 802.11 source -->
  <rect x="430" y="115" width="100" height="42" rx="5" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="480" y="134" text-anchor="middle" font-size="11" font-weight="600" fill="#2A1A2E">802.11</text>
  <text x="480" y="148" text-anchor="middle" font-size="9.5" fill="#2A1A2E">source host</text>

  <!-- arrow to router1 -->
  <line x1="535" y1="136" x2="565" y2="136" stroke="#2A1A2E" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="548" y="128" text-anchor="middle" font-size="8.5" fill="#2A1A2E">frame</text>

  <!-- Router1 -->
  <rect x="570" y="115" width="70" height="42" rx="5" fill="#E2557A" fill-opacity="0.12" stroke="#E2557A" stroke-width="1.6"/>
  <text x="605" y="134" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2A1A2E">Router 1</text>
  <text x="605" y="148" text-anchor="middle" font-size="8.5" fill="#2A1A2E">strip frame</text>

  <!-- MPLS cloud -->
  <rect x="660" y="120" width="60" height="32" rx="16" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="690" y="140" text-anchor="middle" font-size="10" fill="#2A1A2E">MPLS</text>

  <!-- Router2 -->
  <rect x="735" y="115" width="40" height="42" rx="5" fill="#E2557A" fill-opacity="0.12" stroke="#E2557A" stroke-width="1.6"/>
  <text x="755" y="134" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2A1A2E">R2</text>
  <text x="755" y="148" text-anchor="middle" font-size="8" fill="#2A1A2E">pop label</text>

  <!-- Second row: Ethernet dest -->
  <rect x="690" y="180" width="90" height="42" rx="5" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="735" y="199" text-anchor="middle" font-size="11" font-weight="600" fill="#2A1A2E">Ethernet</text>
  <text x="735" y="213" text-anchor="middle" font-size="9.5" fill="#2A1A2E">dest (fragments)</text>

  <path d="M755 157 Q 770 168 735 178" stroke="#2A1A2E" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <text x="768" y="172" font-size="8.5" fill="#2A1A2E">fragment</text>

  <!-- processing notes -->
  <text x="430" y="180" font-size="9.5" fill="#2A1A2E">1. 802.11 frame carries IP packet to Router 1</text>
  <text x="430" y="196" font-size="9.5" fill="#2A1A2E">2. Router 1 strips frame, reads IP dst, pushes MPLS label</text>
  <text x="430" y="212" font-size="9.5" fill="#2A1A2E">3. Router 2 pops label, reads IP dst again</text>
  <text x="430" y="228" font-size="9.5" fill="#2A1A2E">4. Packet &gt; 1500 B → split into Ethernet fragments</text>
  <text x="430" y="244" font-size="9.5" fill="#2A1A2E">5. Dest reassembles fragments → delivers packet</text>

  <!-- Bottom: tunneling diagram -->
  <text x="70" y="460" font-size="13" font-weight="700" fill="#E2557A">Tunneling: IPv6 over IPv4 (Paris → London)</text>
  <line x1="70" y1="468" x2="770" y2="468" stroke="#E2557A" stroke-width="1.5"/>

  <!-- Paris host -->
  <rect x="80" y="486" width="70" height="38" rx="5" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="115" y="504" text-anchor="middle" font-size="10" font-weight="600" fill="#2A1A2E">IPv6 host</text>
  <text x="115" y="518" text-anchor="middle" font-size="8.5" fill="#2A1A2E">Paris</text>

  <!-- Paris router -->
  <rect x="180" y="486" width="70" height="38" rx="5" fill="#E2557A" fill-opacity="0.12" stroke="#E2557A" stroke-width="1.6"/>
  <text x="215" y="504" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2A1A2E">Router</text>
  <text x="215" y="518" text-anchor="middle" font-size="8" fill="#2A1A2E">encapsulate</text>

  <!-- IPv4 tunnel -->
  <rect x="270" y="490" width="280" height="30" rx="15" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="410" y="510" text-anchor="middle" font-size="10" fill="#2A1A2E">IPv4 Internet (tunnel, proto=41)</text>

  <!-- London router -->
  <rect x="570" y="486" width="70" height="38" rx="5" fill="#E2557A" fill-opacity="0.12" stroke="#E2557A" stroke-width="1.6"/>
  <text x="605" y="504" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2A1A2E">Router</text>
  <text x="605" y="518" text-anchor="middle" font-size="8" fill="#2A1A2E">decapsulate</text>

  <!-- London host -->
  <rect x="670" y="486" width="70" height="38" rx="5" fill="#FFFFFF" stroke="#2A1A2E" stroke-width="1.2"/>
  <text x="705" y="504" text-anchor="middle" font-size="10" font-weight="600" fill="#2A1A2E">IPv6 host</text>
  <text x="705" y="518" text-anchor="middle" font-size="8.5" fill="#2A1A2E">London</text>

  <line x1="150" y1="505" x2="178" y2="505" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="250" y1="505" x2="268" y2="505" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="550" y1="505" x2="568" y2="505" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="640" y1="505" x2="668" y2="505" stroke="#2A1A2E" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="70" y="548" font-size="9.5" fill="#2A1A2E" font-style="italic">Only the two boundary routers understand both protocols. Hosts see one contiguous IPv6 network (overlay).</text>
</svg>