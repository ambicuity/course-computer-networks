<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="820" height="480" fill="#FFF7EC"/>
  <g fill="#2A1A2E">
    <text x="410" y="30" text-anchor="middle" font-size="20" font-weight="bold">IPv6 Fixed Header + Extension Header Chain</text>
    <text x="410" y="50" text-anchor="middle" font-size="11" font-weight="bold">RFC 8200 §3 + RFC 8200 §4  (Next Header pointers walk the chain)</text>
  </g>

  <!-- Fixed 40-byte header -->
  <g>
    <rect x="40" y="80" width="740" height="56" fill="none" stroke="#2A1A2E" stroke-width="2"/>
    <g fill="#2A1A2E" font-size="10" font-weight="bold">
      <text x="50" y="100">Ver=6</text>
      <text x="50" y="115">4b</text>
      <line x1="78" y1="80" x2="78" y2="136" stroke="#2A1A2E" stroke-width="1"/>

      <text x="82" y="100">Traffic Class</text>
      <text x="82" y="115">8b</text>
      <line x1="158" y1="80" x2="158" y2="136" stroke="#2A1A2E" stroke-width="1"/>

      <text x="162" y="100">Flow Label</text>
      <text x="162" y="115">20b</text>
      <line x1="278" y1="80" x2="278" y2="136" stroke="#2A1A2E" stroke-width="1"/>

      <text x="282" y="100">Payload Length</text>
      <text x="282" y="115">16b</text>
      <line x1="382" y1="80" x2="382" y2="136" stroke="#2A1A2E" stroke-width="1"/>

      <text x="386" y="100">Next Header</text>
      <text x="386" y="115">8b</text>
      <line x1="450" y1="80" x2="450" y2="136" stroke="#2A1A2E" stroke-width="1"/>

      <text x="454" y="100">Hop Limit</text>
      <text x="454" y="115">8b</text>
      <line x1="510" y1="80" x2="510" y2="136" stroke="#2A1A2E" stroke-width="1"/>

      <text x="514" y="115">Source Address  (16B)</text>
      <line x1="650" y1="80" x2="650" y2="136" stroke="#2A1A2E" stroke-width="1"/>

      <text x="654" y="115">Destination Address  (16B)</text>
    </g>
    <text x="40" y="150" font-size="9" fill="#2A1A2E">No IHL · No header checksum · No fragmentation state in fixed header · 40 bytes</text>
  </g>

  <!-- Extension header chain -->
  <g>
    <rect x="40" y="170" width="740" height="270" fill="none" stroke="#2A1A2E" stroke-width="1.5"/>
    <text x="410" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#2A1A2E">Recommended chain (RFC 8200 §4.1)</text>
  </g>

  <!-- Each EH row -->
  <g font-size="10" fill="#2A1A2E">
    <rect x="60" y="206" width="700" height="32" fill="#E2557A" opacity="0.18" stroke="#2A1A2E" stroke-width="1"/>
    <text x="68" y="226">0 = Hop-by-Hop Options (TLV; PadN, Router Alert, Jumbo Payload)</text>
    <text x="700" y="226" text-anchor="end">processed by every router</text>

    <rect x="60" y="244" width="700" height="32" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="68" y="264">60 = Destination Options (intermediate)  — TLV format, 8B alignment</text>
    <text x="700" y="264" text-anchor="end">final dest only</text>

    <rect x="60" y="282" width="700" height="32" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="68" y="302">43 = Routing (Type 0 = list of intermediate v6 addrs; Segments Left)</text>
    <text x="700" y="302" text-anchor="end">list-walked by intermediate routers</text>

    <rect x="60" y="320" width="700" height="32" fill="#E2557A" opacity="0.18" stroke="#2A1A2E" stroke-width="1"/>
    <text x="68" y="340">44 = Fragment (8B: Next Hdr, Reserved, Offset 13b, Res 2b, M 1b, ID 32b)</text>
    <text x="700" y="340" text-anchor="end">source-only fragmentation</text>

    <rect x="60" y="358" width="700" height="32" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="68" y="378">51 = AH (Authentication Header)  — RFC 4302, integrity only, deprecated by RFC 8200 for IPv6 use</text>
    <text x="700" y="378" text-anchor="end">replaced by ESP+IPsec</text>

    <rect x="60" y="396" width="700" height="32" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1"/>
    <text x="68" y="416">50 = ESP (Encapsulating Security Payload)  — RFC 4303, encryption + integrity</text>
    <text x="700" y="416" text-anchor="end">modern IPsec transport</text>
  </g>

  <text x="40" y="460" font-size="11" fill="#2A1A2E" font-weight="bold">After fixed header: 6 = TCP, 17 = UDP, 58 = ICMPv6, 41 = IPv6-in-IPv6, 135 = Mobility</text>
</svg>
