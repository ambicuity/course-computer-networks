<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="800" height="520" fill="#FFF7EC"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2A1A2E"/>
    </marker>
    <marker id="arrowb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E2557A"/>
    </marker>
  </defs>

  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#2A1A2E">Traffic-aware Routing — Figure 5-23 Topology</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#2A1A2E" opacity="0.7">Load-sensitive SPF oscillates between cross-links CF and EI; multipath damps it.</text>

  <text x="160" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#E2557A">WEST</text>
  <text x="640" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#E2557A">EAST</text>
  <line x1="300" y1="88" x2="500" y2="88" stroke="#2A1A2E" stroke-width="1" stroke-dasharray="4 4" opacity="0.35"/>

  <g font-size="13" fill="#FFF7EC">
    <circle cx="100" cy="170" r="20" fill="#2A1A2E"/><text x="100" y="174" text-anchor="middle">A</text>
    <circle cx="220" cy="170" r="20" fill="#2A1A2E"/><text x="220" y="174" text-anchor="middle">B</text>
    <circle cx="100" cy="330" r="20" fill="#2A1A2E"/><text x="100" y="334" text-anchor="middle">C</text>
    <circle cx="220" cy="330" r="20" fill="#2A1A2E"/><text x="220" y="334" text-anchor="middle">D</text>
    <circle cx="580" cy="170" r="20" fill="#2A1A2E"/><text x="580" y="174" text-anchor="middle">E</text>
    <circle cx="700" cy="170" r="20" fill="#2A1A2E"/><text x="700" y="174" text-anchor="middle">G</text>
    <circle cx="580" cy="330" r="20" fill="#2A1A2E"/><text x="580" y="334" text-anchor="middle">F</text>
    <circle cx="700" cy="330" r="20" fill="#2A1A2E"/><text x="700" y="334" text-anchor="middle">H</text>
  </g>

  <g stroke="#2A1A2E" stroke-width="1.8" fill="none" marker-end="url(#arrow)">
    <line x1="120" y1="170" x2="200" y2="170"/>
    <line x1="120" y1="330" x2="200" y2="330"/>
    <line x1="220" y1="190" x2="220" y2="310"/>
    <line x1="100" y1="190" x2="100" y2="310"/>
    <line x1="600" y1="170" x2="680" y2="170"/>
    <line x1="600" y1="330" x2="680" y2="330"/>
    <line x1="580" y1="190" x2="580" y2="310"/>
    <line x1="700" y1="190" x2="700" y2="310"/>
  </g>

  <g stroke="#E2557A" stroke-width="2.6" fill="none" marker-end="url(#arrowb)">
    <line x1="120" y1="318" x2="560" y2="318"/>
    <line x1="240" y1="342" x2="560" y2="182"/>
  </g>
  <text x="340" y="306" font-size="12" font-weight="700" fill="#E2557A">CF (hot, w=2+load)</text>
  <text x="400" y="262" font-size="12" font-weight="700" fill="#E2557A">EI (idle, w=2+load)</text>

  <g font-size="11" fill="#2A1A2E">
    <text x="160" y="160" text-anchor="middle">1</text>
    <text x="160" y="352" text-anchor="middle">1</text>
    <text x="230" y="250" text-anchor="middle">1</text>
    <text x="88" y="250" text-anchor="middle">1</text>
    <text x="640" y="160" text-anchor="middle">1</text>
    <text x="640" y="352" text-anchor="middle">1</text>
    <text x="568" y="250" text-anchor="middle">1</text>
    <text x="712" y="250" text-anchor="middle">1</text>
  </g>

  <g>
    <rect x="40" y="408" width="720" height="92" rx="8" fill="#FFF7EC" stroke="#2A1A2E" stroke-width="1" opacity="0.95"/>
    <text x="60" y="432" font-size="12" font-weight="700" fill="#2A1A2E">Oscillation (no multipath)</text>
    <text x="60" y="452" font-size="11" fill="#2A1A2E">round 0: SPF picks A-C-F-H  → CF_load=100, EI_load=0</text>
    <text x="60" y="468" font-size="11" fill="#2A1A2E">round 1: SPF picks A-B-D-E-F-H → CF_load=50, EI_load=100</text>
    <text x="60" y="484" font-size="11" fill="#2A1A2E">round 2: SPF picks A-C-F-H again — traffic chases the idle link → unstable</text>
    <text x="420" y="432" font-size="12" font-weight="700" fill="#E2557A">With multipath</text>
    <text x="420" y="452" font-size="11" fill="#2A1A2E">split 50/50 across CF + EI each round → loads converge, no swing.</text>
    <text x="420" y="468" font-size="11" fill="#2A1A2E">Internet answer: keep OSPF weights fixed, do TE slowly outside the protocol.</text>
  </g>
</svg>